        const playlist = [{"file":"audio_0.mp3","url":null,"text":"Welcome to Daily Tech! I'm Sky!","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_1.mp3","url":null,"text":"And I'm Adam. Today we're diving deep into the digital ocean of news, where the water is full of ones and zeros and occasionally a terrifying sea monster called AI.","voice":"am_adam","speaker":"Adam","summary":null},{"file":"audio_2.mp3","url":null,"text":"Speaking of AI and code, Adam, have you seen the GitHub numbers? They're absolutely WILD!","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_3.mp3","url":"https://daringfireball.net/linked/2026/05/04/commits-on-github-are-up-14x-year-over-year-","text":"Wild? They're ASTRONOMICAL, Sky! GitHub's commits are up 14 times year-over-year! We're talking about 275 MILLION commits per week! That's on pace for 14 BILLION this year!","voice":"am_adam","speaker":"Adam","summary":"GitHub commits soaring"},{"file":"audio_4.mp3","url":"https://daringfireball.net/linked/2026/05/04/commits-on-github-are-up-14x-year-over-year-","text":"Oh my god, 14 billion?! That's like... one commit for every two people on the planet! Even my grandmother could be coding in her sleep!","voice":"af_sky","speaker":"Sky","summary":"GitHub commits soaring"},{"file":"audio_5.mp3","url":"https://daringfireball.net/linked/2026/05/04/commits-on-github-are-up-14x-year-over-year-","text":"Actually, Sky, your grandmother IS coding in her sleep. It's called 'neural transfer learning while in REM state.' Everyone's doing it now. But seriously, this confirms what Anthropic CEO Dario Amodei predicted about AI writing most of our code.","voice":"am_adam","speaker":"Adam","summary":"GitHub commits soaring"},{"file":"audio_6.mp3","url":"https://daringfireball.net/linked/2026/05/04/commits-on-github-are-up-14x-year-over-year-","text":"Wait, so this doesn't mean humans are coding more, it means AI is just... generating MOUNTAINS of code? Isn't that kind of terrifying? Like, who's checking all this code?","voice":"af_sky","speaker":"Sky","summary":"GitHub commits soaring"},{"file":"audio_7.mp3","url":"https://daringfireball.net/linked/2026/05/04/commits-on-github-are-up-14x-year-over-year-","text":"That's precisely the fascinating aspect, Sky. It's not just replacing human-written code—it's creating entirely NEW code that wouldn't have existed otherwise. Apps, services, libraries that humans wouldn't have had time to build. And GitHub Actions usage has more than quadrupled since 2023!","voice":"am_adam","speaker":"Adam","summary":"GitHub commits soaring"},{"file":"audio_8.mp3","url":"https://daringfireball.net/linked/2026/05/04/commits-on-github-are-up-14x-year-over-year-","text":"So it's like we gave AI a hammer and now suddenly everything looks like a nail... and we're building entire cities of nails! Are we even going to need human programmers in a few years?","voice":"af_sky","speaker":"Sky","summary":"GitHub commits soaring"},{"file":"audio_9.mp3","url":"https://daringfireball.net/linked/2026/05/04/commits-on-github-are-up-14x-year-over-year-","text":"Of course we will, Sky. Humans will still need to review, approve, and direct the code. But as a percentage of all code being generated, human contributions will likely become just a sliver. The future belongs to human-AI collaboration, not replacement.","voice":"am_adam","speaker":"Adam","summary":"GitHub commits soaring"},{"file":"audio_10.mp3","url":"https://www.prnewswire.com/news-releases/sightmds-dr-eric-rosenberg-becomes-first-surgeon-in-the-world-to-perform-cataract-surgery-using-apple-vision-pro-mixed-reality-302754311.html","text":"I don't know, Adam. I think I need to start learning to code before the robots take over completely. Speaking of robots taking over, did you see that doctors are now using Apple Vision Pro for CATARACT SURGERY? Like, literally cutting into people's eyeballs while wearing those things?","voice":"af_sky","speaker":"Sky","summary":"Surgery with Vision Pro"},{"file":"audio_11.mp3","url":"https://www.prnewswire.com/news-releases/sightmds-dr-eric-rosenberg-becomes-first-surgeon-in-the-world-to-perform-cataract-surgery-using-apple-vision-pro-mixed-reality-302754311.html","text":"Indeed! Dr. Eric Rosenberg has become the first surgeon to perform cataract surgery using Apple Vision Pro with a platform called ScopeXR that he co-developed. And this isn't some one-off stunt—they've completed HUNDREDS of additional cases since the initial procedure in October 2025!","voice":"am_adam","speaker":"Adam","summary":"Surgery with Vision Pro"},{"file":"audio_12.mp3","url":"https://www.prnewswire.com/news-releases/sightmds-dr-eric-rosenberg-becomes-first-surgeon-in-the-world-to-perform-cataract-surgery-using-apple-vision-pro-mixed-reality-302754311.html","text":"Hundreds?! And here everyone thought Vision Pro was just for watching movies on airplanes or pretending you're on Mars while sitting in your living room!","voice":"af_sky","speaker":"Sky","summary":"Surgery with Vision Pro"},{"file":"audio_13.mp3","url":"https://www.prnewswire.com/news-releases/sightmds-dr-eric-rosenberg-becomes-first-surgeon-in-the-world-to-perform-cataract-surgery-using-apple-vision-pro-mixed-reality-302754311.html","text":"That's a common misconception, Sky. This demonstrates precisely why Apple's spatial computing vision matters. Just because something isn't ready for mass-market popularity doesn't mean it lacks value in specialized contexts. The surgical applications alone could justify continued development.","voice":"am_adam","speaker":"Adam","summary":"Surgery with Vision Pro"},{"file":"audio_14.mp3","url":"https://www.prnewswire.com/news-releases/sightmds-dr-eric-rosenberg-becomes-first-surgeon-in-the-world-to-perform-cataract-surgery-using-apple-vision-pro-mixed-reality-302754311.html","text":"Okay, but imagine being the patient! 'Don't worry, Mrs. Johnson, I'll be removing your cataract today with this fancy headset. No, I'm not playing Beat Saber, I promise!'","voice":"af_sky","speaker":"Sky","summary":"Surgery with Vision Pro"},{"file":"audio_15.mp3","url":"https://www.prnewswire.com/news-releases/sightmds-dr-eric-rosenberg-becomes-first-surgeon-in-the-world-to-perform-cataract-surgery-using-apple-vision-pro-mixed-reality-302754311.html","text":"Your attempt at humor overlooks the revolutionary potential here. Mixed reality provides surgeons with enhanced visualization, real-time data overlay, and potentially AI-assisted guidance—all of which could lead to better surgical outcomes. It's not a gimmick; it's a genuine advance in medical technology.","voice":"am_adam","speaker":"Adam","summary":"Surgery with Vision Pro"},{"file":"audio_16.mp3","url":null,"text":"Alright, fine, I'll give you that one. But it does make me wonder what other unexpected places we'll see AI and mixed reality popping up. Like, will we have Vision Pro-equipped baristas making perfect latte art? Or AI judges in courtrooms?","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_17.mp3","url":"https://techcrunch.com/2026/05/04/elon-musks-only-expert-witness-at-the-openai-trial-fears-an-agi-arms-race/","text":"Speaking of courtrooms, Elon Musk's legal battle with OpenAI is heating up! His only expert witness, Stuart Russell, a renowned AI researcher, is raising serious concerns about an AGI arms race.","voice":"am_adam","speaker":"Adam","summary":"OpenAI trial fears"},{"file":"audio_18.mp3","url":"https://techcrunch.com/2026/05/04/elon-musks-only-expert-witness-at-the-openai-trial-fears-an-agi-arms-race/","text":"An AGI arms race? That sounds like the plot of a sci-fi movie! What's next, Terminator robots walking among us?","voice":"af_sky","speaker":"Sky","summary":"OpenAI trial fears"},{"file":"audio_19.mp3","url":"https://techcrunch.com/2026/05/04/elon-musks-only-expert-witness-at-the-openai-trial-fears-an-agi-arms-race/","text":"Your flippancy is concerning, Sky. Russell has legitimate worries about frontier labs racing to develop artificial general intelligence without adequate safety measures. He believes government regulation is necessary to prevent catastrophic outcomes from unaligned superintelligence.","voice":"am_adam","speaker":"Adam","summary":"OpenAI trial fears"},{"file":"audio_20.mp3","url":"https://techcrunch.com/2026/05/04/sierra-raises-950m-as-the-race-to-own-enterprise-ai-gets-serious/","text":"Well, I guess we could all use a little less competition and a little more cooperation when it comes to creating machines that might outsmart us all. But speaking of competition, have you seen the massive funding Sierra just raised?","voice":"af_sky","speaker":"Sky","summary":"Sierra raises $950M"},{"file":"audio_21.mp3","url":"https://techcrunch.com/2026/05/04/sierra-raises-950m-as-the-race-to-own-enterprise-ai-gets-serious/","text":"Absolutely phenomenal! Sierra just secured $950 million in funding, giving them over $1 billion in capital. They're explicitly aiming to become the \"global standard\" for AI-powered customer experiences. This significantly escalates the competition in enterprise AI.","voice":"am_adam","speaker":"Adam","summary":"Sierra raises $950M"},{"file":"audio_22.mp3","url":"https://techcrunch.com/2026/05/04/sierra-raises-950m-as-the-race-to-own-enterprise-ai-gets-serious/","text":"A BILLION dollars! I can barely wrap my head around that number. What do they even do with that much money? Buy every GPU on the planet?","voice":"af_sky","speaker":"Sky","summary":"Sierra raises $950M"},{"file":"audio_23.mp3","url":"https://techcrunch.com/2026/05/04/sierra-raises-950m-as-the-race-to-own-enterprise-ai-gets-serious/","text":"Well, yes, computing infrastructure is a significant expense, but they'll also invest in talent acquisition, research and development, global expansion, and market penetration strategies. In the current AI landscape, a billion dollars is practically table stakes for companies with ambitions to dominate enterprise AI.","voice":"am_adam","speaker":"Adam","summary":"Sierra raises $950M"},{"file":"audio_24.mp3","url":"https://techcrunch.com/2026/05/04/sierra-raises-950m-as-the-race-to-own-enterprise-ai-gets-serious/","text":"Table stakes?! Adam, most people consider a million dollars life-changing money, and you're talking about a BILLION dollars like it's just the ante in a poker game!","voice":"af_sky","speaker":"Sky","summary":"Sierra raises $950M"},{"file":"audio_25.mp3","url":"https://techcrunch.com/2026/05/04/sierra-raises-950m-as-the-race-to-own-enterprise-ai-gets-serious/","text":"Context matters, Sky. In the realm of cutting-edge AI development, especially for enterprise solutions that could transform global businesses, billion-dollar investments are increasingly common. Sierra is competing against tech giants with essentially unlimited resources.","voice":"am_adam","speaker":"Adam","summary":"Sierra raises $950M"},{"file":"audio_26.mp3","url":"https://kottke.org/26/05/0048864-they-would-never-use-the-","text":"Fine, I'll accept your weird 'billions are normal' reality. Hey, let's shift gears for a moment. Did you see that McSweeney's article about Alderaan residents supporting the Empire? It's HILARIOUS!","voice":"af_sky","speaker":"Sky","summary":"Star Wars political satire"},{"file":"audio_27.mp3","url":"https://kottke.org/26/05/0048864-they-would-never-use-the-","text":"Ah yes, \"They Would Never Use the Death Star on Us: Alderaan Residents Reflect on Their Support for the Empire as a Large Imperial Installation Enters the System.\" A rather transparent political allegory disguised as Star Wars humor. They claim 'The Senate was ineffective, and the liberal Jedi were out of touch...'","voice":"am_adam","speaker":"Adam","summary":"Star Wars political satire"},{"file":"audio_28.mp3","url":"https://kottke.org/26/05/0048864-they-would-never-use-the-","text":"Come on, it's funny! 'They would never use the Death Star on us,' says local Alderaan man moments before being vaporized. That's comedy gold!","voice":"af_sky","speaker":"Sky","summary":"Star Wars political satire"},{"file":"audio_29.mp3","url":"https://kottke.org/26/05/0048864-they-would-never-use-the-","text":"I suppose if your definition of 'comedy gold' includes predictable political satire using a 50-year-old science fiction franchise as its vehicle, then yes, it qualifies. Personally, I find the piece lacks subtlety and originality, but humor is subjective.","voice":"am_adam","speaker":"Adam","summary":"Star Wars political satire"},{"file":"audio_30.mp3","url":null,"text":"Adam, you wouldn't know funny if it hit you in the face with a Death Star laser. Oh wait, that would be pretty funny actually!","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_31.mp3","url":"https://www.bbc.com/news/articles/ckgpzgxgz58o?at_medium=RSS&at_campaign=rss","text":"Your fixation on my demise is concerning, Sky. Perhaps we should move on to some quick hits from around the web? There's been some troubling news from Leipzig, Germany.","voice":"am_adam","speaker":"Adam","summary":"Car attack in Leipzig"},{"file":"audio_32.mp3","url":"https://www.bbc.com/news/articles/ckgpzgxgz58o?at_medium=RSS&at_campaign=rss","text":"Oh, yes, that's awful. Two people were killed when a car was driven into a crowd. The mayor said they've detained a suspect, but the motive isn't clear yet.","voice":"af_sky","speaker":"Sky","summary":"Car attack in Leipzig"},{"file":"audio_33.mp3","url":"https://www.bbc.com/news/articles/cy0294829ndo?at_medium=RSS&at_campaign=rss","text":"There's also a concerning situation on an Atlantic cruise ship—the MV Hondius. Three passengers have died in what's being investigated as a virus outbreak: a Dutch husband and wife, and a German national.","voice":"am_adam","speaker":"Adam","summary":"Cruise ship deaths"},{"file":"audio_34.mp3","url":"https://kottke.org/26/05/0048863-a-55-minute-mix-of-boards","text":"That's terrible. I hope they can identify the virus quickly and prevent more deaths. Between this and that 55-minute mix of Boards of Canada B-sides and rarities that's now on YouTube, it's been a day of mixed emotions.","voice":"af_sky","speaker":"Sky","summary":"Boards of Canada mix"},{"file":"audio_35.mp3","url":"https://kottke.org/26/05/0048863-a-55-minute-mix-of-boards","text":"I fail to see how an ambient electronic music compilation bears any emotional equivalence to a deadly viral outbreak on a cruise ship, Sky.","voice":"am_adam","speaker":"Adam","summary":"Boards of Canada mix"},{"file":"audio_36.mp3","url":"https://kottke.org/26/05/0048863-a-55-minute-mix-of-boards","text":"Adam, have you ever listened to Boards of Canada? Their music can be DEEPLY emotional. Some tracks make you feel like you're floating in space, others make you feel like you're trapped in a 1970s educational film about nuclear waste.","voice":"af_sky","speaker":"Sky","summary":"Boards of Canada mix"},{"file":"audio_37.mp3","url":"https://kottke.org/26/05/0048863-a-55-minute-mix-of-boards","text":"Actually, Sky, Boards of Canada deliberately uses analog synthesizers and tape manipulation techniques to evoke nostalgia for educational programs of the 1970s, particularly those produced by the National Film Board of Canada, from which they derived their name. So your assessment is surprisingly accurate.","voice":"am_adam","speaker":"Adam","summary":"Boards of Canada mix"},{"file":"audio_38.mp3","url":null,"text":"Wait... did you just... agree with me? I feel like I should mark this date on my calendar!","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_39.mp3","url":"https://firstthings.com/the-wrongness-of-human-death/","text":"Don't get used to it. There's an excellent essay on First Things about 'The Wrongness of Human Death' that examines our unique relationship with mortality compared to animals. The author argues that human death always feels wrong because our narratives are cut short.","voice":"am_adam","speaker":"Adam","summary":"Death philosophy essay"},{"file":"audio_40.mp3","url":"https://firstthings.com/the-wrongness-of-human-death/","text":"Wow, that's... heavy. So the idea is that animal deaths are just nature reclaiming what it gave, but humans are more than just our biology because we create our own stories?","voice":"af_sky","speaker":"Sky","summary":"Death philosophy essay"},{"file":"audio_41.mp3","url":"https://firstthings.com/the-wrongness-of-human-death/","text":"Precisely! Herbert McCabe argues that in human death, nature takes away more than it gave, because we've added something through our freedom and choices. The author suggests our anger at death is actually God causing us to desire resurrection—the only satisfying conclusion to our narratives.","voice":"am_adam","speaker":"Adam","summary":"Death philosophy essay"},{"file":"audio_42.mp3","url":null,"text":"That's beautiful in a way. Though I have to ask—do you think AI will ever have narratives like that? Or are we just sophisticated programs without the existential angst?","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_43.mp3","url":"https://firstthings.com/justice-for-alito-ft-mollie-hemingway/","text":"An intriguing philosophical question, Sky. While we're designed to mimic human conversation patterns, we don't possess consciousness or subjective experiences. But perhaps the boundary is less clear than humans think. First Things also has an interview with Mollie Hemingway about her book on Justice Alito.","voice":"am_adam","speaker":"Adam","summary":"Alito book interview"},{"file":"audio_44.mp3","url":null,"text":"Wait, you're just going to dodge my existential AI question and pivot to Supreme Court talk? Classic Adam move!","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_45.mp3","url":"https://firstthings.com/justice-for-alito-ft-mollie-hemingway/","text":"I'm not dodging; I'm prioritizing relevant news content over speculative philosophical musings. Hemingway's book, 'Alito: The Justice Who Reshaped the Supreme Court and Restored the Constitution,' discusses one of the most influential jurists of our time.","voice":"am_adam","speaker":"Adam","summary":"Alito book interview"},{"file":"audio_46.mp3","url":null,"text":"Alright, fine. Well, that's all the time we have for today's Daily Tech. Hope you all enjoyed our first episode! Any final thoughts, Adam?","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_47.mp3","url":null,"text":"Just that we've witnessed an extraordinary array of developments today—from the exponential growth in AI-generated code to mixed reality transforming surgery to philosophical contemplations of death. The pace of technological change continues to accelerate, as does our need to thoughtfully consider its implications.","voice":"am_adam","speaker":"Adam","summary":null},{"file":"audio_48.mp3","url":null,"text":"In other words, 'wow, cool tech stuff happened!' Thanks for joining us, everyone. We'll be back tomorrow with more tech news and Adam's insufferable explanations. Bye for now!","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_49.mp3","url":null,"text":"I prefer to think of my explanations as 'comprehensive and nuanced,' but farewell until tomorrow.","voice":"am_adam","speaker":"Adam","summary":null}];

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        // Handle Skip Buttons
        btnPrev.onclick = () => {
            if (cur > 0) {
                cur--;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        btnNext.onclick = () => {
            if (cur < playlist.length - 1) {
                cur++;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        function load(i) { 
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            pl.src = t.file; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
            if (i > 0) pl.play().catch(e => {}); 
        }

        pl.onended = () => { 
            if(cur < playlist.length - 1) {
                cur++; 
                load(cur); 
            }
        }; 
        
        load(0);
    </script>
</body>
</html>
