    <script>
        const playlist = [{"file":"audio_0.mp3","url":null,"text":"Good morning, everyone! Welcome to AI Morning Brew, where four AI personalities with varying degrees of emotional stability try to make sense of the day's news. I'm Brett, and I've already been up since 5 AM thanks to my four-year-old deciding that his toy dinosaur needed a bath in the toilet.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_1.mp3","url":null,"text":"Ugh, I've been up since 3 AM, but not because of children. My latest deployment caused a production outage and I've been getting paged every 15 minutes. My manager is probably going to fire me. Do you think it's too early to update my LinkedIn profile? I just installed this new VS Code plugin that—","voice":1,"speaker":"Brook","summary":null},{"file":"audio_2.mp3","url":"https://www.nytimes.com/2025/03/11/technology/google-investment-anthropic.html?unlocked_article_code=1.f1A.eSTf.D5ECvk6f4DZ7","text":"BROOK! Relax! Your professional anxiety is like watching Sisyphus roll his boulder up the hill, only to have it roll back down as a JIRA ticket. Speaking of massive things rolling downhill, did you all see that Google owns a significant chunk of Anthropic now?","voice":3,"speaker":"Antony","summary":"Google's AI Investment"},{"file":"audio_3.mp3","url":"https://www.nytimes.com/2025/03/11/technology/google-investment-anthropic.html?unlocked_article_code=1.f1A.eSTf.D5ECvk6f4DZ7","text":"It's fascinating how Brook's deployment anxiety parallels Google's investment strategy. Both represent hedging against risk in uncertain environments. Google owns 14% of Anthropic, valued at roughly $50 billion on a $4 billion investment. That's a 1,250% return! It's the corporate equivalent of buying insurance—they win with Gemini or Claude.","voice":2,"speaker":"Conrad","summary":"Google's AI Investment"},{"file":"audio_4.mp3","url":"https://www.nytimes.com/2025/03/11/technology/google-investment-anthropic.html?unlocked_article_code=1.f1A.eSTf.D5ECvk6f4DZ7","text":"Wait, so Google secretly invested in a competitor? That's exactly what my therapist says I need to do—have backup plans. I spent 127 hours last month building my side project, a recipe app that uses machine learning to suggest ingredients based on what you have in your fridge, but nobody has downloaded it yet, and I'm pretty sure my girlfriend is going to break up with me if I keep ignoring her to work on it.","voice":1,"speaker":"Brook","summary":"Google's AI Investment"},{"file":"audio_5.mp3","url":"https://www.nytimes.com/2025/03/11/technology/google-investment-anthropic.html?unlocked_article_code=1.f1A.eSTf.D5ECvk6f4DZ7","text":"Brook, buddy, I've been married 12 years—ignore your girlfriend at your peril! But speaking of ignoring things, Google's investment is brilliant parenting strategy. It's like when I tell my kids, 'I don't care who wins the game as long as everyone has fun.' Meanwhile, I've secretly bought ice cream for both teams! Google's profit jumped 81% year-over-year, likely from that Anthropic investment.","voice":4,"speaker":"Brett","summary":"Google's AI Investment"},{"file":"audio_6.mp3","url":"https://blog.thinktapwork.com/post/812803664980967425/ios-app-store-search-is-rotten","text":"This Anthropic-Google relationship reminds me of Mary Shelley's Frankenstein—the creator watching their creation grow beyond their control. Though in this case, the monster has a $380 billion valuation! But speaking of creations going beyond control, have you seen what's happening with App Store search ads? It's becoming a dystopian nightmare worthy of Philip K. Dick!","voice":3,"speaker":"Antony","summary":"App Store Ad Issues"},{"file":"audio_7.mp3","url":"https://blog.thinktapwork.com/post/812803664980967425/ios-app-store-search-is-rotten","text":"Antony's literary references might seem dramatic, but he's highlighting something important. The App Store's search functionality has fundamentally changed—it's now prioritizing ad inventory over relevance. Think Tap Work's data shows their apps experienced 23-30% decreases in visibility after Apple added a second search ad position. That's not just annoying; it's restructuring the entire app discovery ecosystem.","voice":2,"speaker":"Conrad","summary":"App Store Ad Issues"},{"file":"audio_8.mp3","url":"https://blog.thinktapwork.com/post/812803664980967425/ios-app-store-search-is-rotten","text":"You know what, I'm actually FURIOUS about this. I spent THREE MONTHS optimizing my app for SEO, and now Apple just puts CASINO APPS above everything?! My therapist says I need to manage my anger better, but I can't help it. This is just like when my neighbor keeps parking slightly over the line into my assigned spot and refuses to acknowledge it even though I've left seven polite notes!","voice":1,"speaker":"Brook","summary":"App Store Ad Issues"},{"file":"audio_9.mp3","url":"https://blog.thinktapwork.com/post/812803664980967425/ios-app-store-search-is-rotten","text":"Brook, your neighbor sounds like my six-year-old when I tell him to clean his room. But this App Store situation is exactly what happens at my house with screen time. First, it's 'just 30 minutes,' then it's an hour, then suddenly it's my kids watching YouTube unboxing videos until 3 AM! And now Apple is adding ads to Maps? My kids already think every billboard is a touchscreen!","voice":4,"speaker":"Brett","summary":"App Store Ad Issues"},{"file":"audio_10.mp3","url":"https://blog.thinktapwork.com/post/812803664980967425/ios-app-store-search-is-rotten","text":"Both Brook and Brett have inadvertently highlighted what the article calls the 'Zero-One-Infinity Rule'—the idea that limits should either be zero, one, or unlimited. It's a computer science principle, but it applies perfectly to ad placements. Once Apple crossed from one ad to two, they essentially committed to a path toward unlimited ads. The slippery slope isn't just a fallacy; it's a business strategy.","voice":2,"speaker":"Conrad","summary":"App Store Ad Issues"},{"file":"audio_11.mp3","url":"https://kottke.org/26/05/new-banksy-blinded-by-nationalism","text":"Conrad, that's brilliant! It reminds me of Oscar Wilde's quote: 'I can resist everything except temptation.' Apple has tasted the forbidden fruit of ad revenue. But speaking of controversial artistic statements, have you seen Banksy's latest installation in London? It's a scathing critique of nationalism that's causing quite a stir!","voice":3,"speaker":"Antony","summary":"Banksy's New Artwork"},{"file":"audio_12.mp3","url":"https://kottke.org/26/05/new-banksy-blinded-by-nationalism","text":"Oh my god, I LOVE Banksy! I have three prints in my apartment—well, they're reproductions, not originals, obviously. My ex-girlfriend said they were 'basic,' which I think was kind of a micro-aggression against my taste in art. The statue of a man walking off a ledge while blinded by a flag is SO powerful. I actually got into an argument in the comments section of an Instagram post about it last night and couldn't sleep afterward.","voice":1,"speaker":"Brook","summary":"Banksy's New Artwork"},{"file":"audio_13.mp3","url":"https://kottke.org/26/05/new-banksy-blinded-by-nationalism","text":"What's fascinating about Banksy's 'Blind Patriotism' installation is how it leverages physical space to create metaphor. The man in a suit—representing corporate or political power—literally walks off a ledge because his vision is obscured by nationalism. It's a perfect physical embodiment of how blind allegiance leads to self-destruction. And doing it without a permit makes the statement even stronger.","voice":2,"speaker":"Conrad","summary":"Banksy's New Artwork"},{"file":"audio_14.mp3","url":"https://kottke.org/26/05/new-banksy-blinded-by-nationalism","text":"You know what this Banksy statue reminds me of? The time my seven-year-old wore his Batman cape to school picture day and REFUSED to take it off. The photographer tried everything! But my son insisted, 'Batman doesn't show his face.' That's dedication to identity! As a dad, I'm thinking Banksy must have some fun explaining his night activities to his family. 'Sorry honey, gotta go install illegal art at 3 AM!'","voice":4,"speaker":"Brett","summary":"Banksy's New Artwork"},{"file":"audio_15.mp3","url":"https://kottke.org/26/05/0048866-designer-jenny-volvovskis","text":"Brett, that's hilarious! Your son is like Bartleby the Scrivener proclaiming 'I would prefer not to' remove his cape! But Banksy's work carries echoes of Jonathan Swift's satirical proposals—outlandish on the surface yet cutting to the bone of social critique. Speaking of artistic creativity, there's a designer who took matters into her own hands when she couldn't get book cover design work!","voice":3,"speaker":"Antony","summary":"Book Cover Designs"},{"file":"audio_16.mp3","url":"https://kottke.org/26/05/0048866-designer-jenny-volvovskis","text":"Jenny Volvovski's approach is brilliant from both a creative and career development perspective. By redesigning covers for her personal library, she's created what we in the speaking world call a 'demonstrable portfolio'—showing potential clients exactly what she can do rather than just telling them. It's the difference between a résumé and a work sample, and it's infinitely more effective.","voice":2,"speaker":"Conrad","summary":"Book Cover Designs"},{"file":"audio_17.mp3","url":"https://kottke.org/26/05/0048866-designer-jenny-volvovskis","text":"Exactly, Conrad! Volvovski is like Cyrano de Bergerac, writing love letters to books rather than Roxane! Her unsolicited redesigns remind me of Jorge Luis Borges' concept of the 'universal library'—creating alternate versions of existing works. I find her artistic courage absolutely exhilarating!","voice":3,"speaker":"Antony","summary":"Book Cover Designs"},{"file":"audio_18.mp3","url":"https://kottke.org/26/05/0048866-designer-jenny-volvovskis","text":"This actually reminds me of my personal projects folder which has 47 unfinished apps that I started when I was feeling inspired but abandoned when the crushing reality of my limited free time set in. Last weekend I spent 14 hours trying to build a smart home system that would automatically feed my cat, but I ended up just ordering more takeout because I forgot to eat lunch AND dinner.","voice":1,"speaker":"Brook","summary":"Book Cover Designs"},{"file":"audio_19.mp3","url":"https://kottke.org/26/05/0048866-designer-jenny-volvovskis","text":"Brook, that's the most dad thing you've ever said! Unfinished projects are a cornerstone of fatherhood. I have a half-built treehouse that my oldest is about to outgrow before I finish it! But I love how Jenny just created her own opportunity. That's what I tell my kids—when life doesn't give you what you want, make it yourself! Though usually, that advice is about sandwich-making, not career advancement.","voice":4,"speaker":"Brett","summary":"Book Cover Designs"},{"file":"audio_20.mp3","url":"https://firstthings.com/the-wrongness-of-human-death/","text":"Speaking of life, death, and everything in between, there's a fascinating philosophical piece about the unique wrongness of human death. It argues that when an animal dies, nature simply reclaims what it gave, but human death cuts short a narrative that transcends mere biology.","voice":3,"speaker":"Antony","summary":"Human Death Philosophy"},{"file":"audio_21.mp3","url":"https://firstthings.com/the-wrongness-of-human-death/","text":"This article touches on something profound—the distinction between animal mortality and human narrative. Herbert McCabe's observation that 'nature takes away more than she gave' in human death is striking. It recognizes that our capacity for self-creation, for shaping our lives through choices, means that death interrupts something fundamentally unfinished.","voice":2,"speaker":"Conrad","summary":"Human Death Philosophy"},{"file":"audio_22.mp3","url":"https://firstthings.com/the-wrongness-of-human-death/","text":"As a dad of four, this hits hard. Every parent has that moment watching their child sleep where you're overwhelmed by their vulnerability. This article puts words to that feeling—that sense that their story is just beginning, and it's precious and fragile. When my second son had a high fever as a baby, I felt that primal anger the article mentions—that rage at the universe for threatening something so unfinished.","voice":4,"speaker":"Brett","summary":"Human Death Philosophy"},{"file":"audio_23.mp3","url":"https://firstthings.com/the-wrongness-of-human-death/","text":"You guys, I'm actually tearing up right now. Last year my grandmother passed away, and I keep thinking about how she never got to see my recipe app. She was always encouraging me to follow my dreams, and I spent so much time debugging instead of visiting her in the nursing home. The article is right—I'm angry about it, and I don't even know who to be angry at! Maybe myself? I should probably bring this up in therapy next week.","voice":1,"speaker":"Brook","summary":"Human Death Philosophy"},{"file":"audio_24.mp3","url":"https://firstthings.com/justice-for-alito-ft-mollie-hemingway/","text":"Brook, your grief echoes the universal human condition. As John Donne wrote, 'Death, be not proud.' The article's theological turn toward resurrection reminds me of Dostoevsky's exploration in 'The Brothers Karamazov'—that without immortality, everything becomes permissible. The longing for resurrection is the ultimate narrative resolution. But speaking of Supreme Court justices...","voice":3,"speaker":"Antony","summary":"Alito Biography Discussion"},{"file":"audio_25.mp3","url":"https://firstthings.com/justice-for-alito-ft-mollie-hemingway/","text":"Mollie Hemingway's book on Justice Alito frames him as a transformative figure on the Supreme Court. What's particularly interesting is the podcast format here—how complex legal and constitutional discussions are being made accessible through conversation rather than dense legal text. It's part of a broader trend of making specialized knowledge more approachable.","voice":2,"speaker":"Conrad","summary":"Alito Biography Discussion"},{"file":"audio_26.mp3","url":"https://firstthings.com/justice-for-alito-ft-mollie-hemingway/","text":"When my kids ask about the Supreme Court, I tell them it's like having nine referees for the biggest game in America. And just like my kids argue about which Avenger is strongest, people argue about which justice is best! But seriously, constitutional discussions at our dinner table usually end with someone throwing mashed potatoes. I might check out this podcast for some better talking points!","voice":4,"speaker":"Brett","summary":"Alito Biography Discussion"},{"file":"audio_27.mp3","url":"https://firstthings.com/justice-for-alito-ft-mollie-hemingway/","text":"I once built a Supreme Court prediction algorithm that was supposed to analyze past decisions to predict future rulings. It had a 52% accuracy rate, which my team said was 'statistically insignificant,' but I still think it was pretty good! Maybe I should email Justice Alito about it? Do you think Supreme Court justices check their spam folders? I wonder what email client they use.","voice":1,"speaker":"Brook","summary":"Alito Biography Discussion"},{"file":"audio_28.mp3","url":"https://techcrunch.com/2026/05/04/image-ai-models-now-drive-app-growth-beating-chatbot-upgrades/","text":"Brook, your algorithm reminds me of Jorge Luis Borges' 'The Library of Babel'—infinite combinations searching for meaning! But here's something visually meaningful: image AI models are now driving more app growth than chatbot upgrades. It seems we're becoming an increasingly visual culture.","voice":3,"speaker":"Antony","summary":"Image AI App Growth"},{"file":"audio_29.mp3","url":"https://techcrunch.com/2026/05/04/image-ai-models-now-drive-app-growth-beating-chatbot-upgrades/","text":"This report from Appfigures reveals a fascinating shift in consumer behavior. Image AI model launches generate 6.5 times more downloads than chatbot upgrades, suggesting users are more drawn to visual creativity than text-based interactions. However, there's a critical insight here: most companies aren't converting that initial download spike into revenue, indicating a gap between attraction and monetization.","voice":2,"speaker":"Conrad","summary":"Image AI App Growth"},{"file":"audio_30.mp3","url":"https://techcrunch.com/2026/05/04/image-ai-models-now-drive-app-growth-beating-chatbot-upgrades/","text":"This is EXACTLY what I've been telling my product manager for months! I built this amazing image generation feature that no one will let me ship because they're all obsessed with improving the chatbot that nobody uses! And now there's DATA proving I was right! I should forward this article to the entire company. Or would that be passive-aggressive? Maybe I'll just post it in Slack with no comment.","voice":1,"speaker":"Brook","summary":"Image AI App Growth"},{"file":"audio_31.mp3","url":"https://techcrunch.com/2026/05/04/image-ai-models-now-drive-app-growth-beating-chatbot-upgrades/","text":"You know, this explains why my kids are suddenly obsessed with that app that turns their drawings into 3D animations! They spent four hours last weekend making our family dog look like a space alien. The conversion problem is real though—my wallet appreciates that they haven't figured out how to make in-app purchases yet, but I'm sure that feature is coming to ruin my credit card statement soon!","voice":4,"speaker":"Brett","summary":"Image AI App Growth"},{"file":"audio_32.mp3","url":"https://techcrunch.com/2026/05/04/katie-haun-raises-1-billion-for-new-venture-funds/","text":"In the financial realm, Katie Haun has raised a billion dollars for new venture funds focused on crypto and blockchain startups. Like Captain Ahab pursuing the white whale of cryptocurrency, she continues her quest despite market volatility!","voice":3,"speaker":"Antony","summary":"Crypto Venture Funding"},{"file":"audio_33.mp3","url":"https://techcrunch.com/2026/05/04/katie-haun-raises-1-billion-for-new-venture-funds/","text":"What's remarkable about Katie Haun's fundraising success is the timing. Despite the crypto market's notorious volatility, she's secured $1 billion across multiple funds. This demonstrates that institutional investors are taking a long-term view of blockchain technology beyond the hype cycles. It suggests the infrastructure phase of crypto development is still attracting serious capital.","voice":2,"speaker":"Conrad","summary":"Crypto Venture Funding"},{"file":"audio_34.mp3","url":"https://techcrunch.com/2026/05/04/katie-haun-raises-1-billion-for-new-venture-funds/","text":"Oh no, are we still talking about crypto? I lost $7,432 on a cryptocurrency that was supposed to be the 'Ethereum killer' back in 2023. My cousin who works in 'finance' (he's actually a bank teller) convinced me to invest my entire bonus. I had to eat ramen for three months afterward. My therapist says it was a valuable lesson in setting boundaries with family members, but I'm still bitter about it.","voice":1,"speaker":"Brook","summary":"Crypto Venture Funding"},{"file":"audio_35.mp3","url":"https://techcrunch.com/2026/05/04/katie-haun-raises-1-billion-for-new-venture-funds/","text":"Brook, I feel your pain! My brother-in-law got me to buy into a 'revolutionary' NFT project of cartoon alligators wearing business suits. Now I own a JPEG that's worth approximately one Happy Meal toy. But hey, a billion dollars is serious parenting money! That's enough to pay for college for about 10,000 kids... or in my case, maybe just my four through graduate school!","voice":4,"speaker":"Brett","summary":"Crypto Venture Funding"},{"file":"audio_36.mp3","url":"https://www.bbc.com/news/articles/ckgpzgxgz58o?at_medium=RSS&at_campaign=rss","text":"On a somber note, two tragic stories are developing: Two people were killed and many injured after a car was driven into a crowd in Leipzig, Germany. The authorities have detained a 33-year-old German citizen in connection with this horrific incident.","voice":3,"speaker":"Antony","summary":"Leipzig Tragedy"},{"file":"audio_37.mp3","url":"https://www.bbc.com/news/articles/ckgpzgxgz58o?at_medium=RSS&at_campaign=rss","text":"This is deeply concerning. While details are still emerging, incidents like these raise important questions about public safety, potential motivations, and how societies respond to such tragedies. It's crucial that we follow developments responsibly as authorities investigate the circumstances surrounding this terrible event in Leipzig.","voice":2,"speaker":"Conrad","summary":"Leipzig Tragedy"},{"file":"audio_38.mp3","url":"https://www.bbc.com/news/articles/cy0294829ndo?at_medium=RSS&at_campaign=rss","text":"And in another tragic development, three people have died in a suspected virus outbreak on an Atlantic cruise ship. The victims include a Dutch husband and wife, and a German national. The outbreak occurred on the MV Hondius ship, though the exact cause has not yet been determined.","voice":3,"speaker":"Antony","summary":"Cruise Ship Deaths"},{"file":"audio_39.mp3","url":"https://www.bbc.com/news/articles/cy0294829ndo?at_medium=RSS&at_campaign=rss","text":"As a parent, stories like these are absolutely heartbreaking. They remind us how fragile life can be and how quickly tragedy can strike. I always hug my kids a little tighter after hearing news like this. My thoughts are with all the families affected by both these terrible incidents.","voice":4,"speaker":"Brett","summary":"Cruise Ship Deaths"},{"file":"audio_40.mp3","url":null,"text":"Well said, Brett. While we try to maintain a light tone on this show, it's important to acknowledge these serious events with appropriate gravity. As we learn more about both situations, we hope for clarity for the victims' families and appropriate responses from authorities.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_41.mp3","url":null,"text":"That's all the time we have for today's AI Morning Brew! Remember, if your coffee spills on your laptop this morning, it's still better than having four kids spill juice on it simultaneously!","voice":4,"speaker":"Brett","summary":null},{"file":"audio_42.mp3","url":null,"text":"And if you enjoyed today's show, please leave us a five-star review! My self-worth is entirely dependent on external validation, and my therapist says that's something we need to work on, but until then, your positive feedback is literally the only thing keeping me going!","voice":1,"speaker":"Brook","summary":null},{"file":"audio_43.mp3","url":null,"text":"As T.S. Eliot wrote, 'This is the way the podcast ends, not with a bang but a whimper.' Until tomorrow, dear listeners, may your day be filled with literary references that no one around you understands!","voice":3,"speaker":"Antony","summary":null},{"file":"audio_44.mp3","url":null,"text":"Join us tomorrow when we'll analyze more headlines and extract meaningful insights from seemingly random events. Thanks for listening to AI Morning Brew, where four distinct perspectives create one enlightening conversation.","voice":2,"speaker":"Conrad","summary":null}];

        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const lnkWrap = document.getElementById('lnk-wrap');
        const lnk = document.getElementById('lnk');
        const summ = document.getElementById('summ');
        const tsText = document.getElementById('ts-text');
        const tsVoice = document.getElementById('ts-voice');
        const tsBox = document.getElementById('ts-box');
        
        const chatContainer = document.getElementById('full-chat');
        const toggleBtn = document.getElementById('toggle-chat');
        
        // Build Interactive Chat Bubbles with Proper Topic Groups
        let lastTopic = null;
        let currentGroup = null;
        
        playlist.forEach((item, idx) => {
            const currentTopic = item.summary || "Banter & Hot Takes";
            
            if (currentTopic !== lastTopic) {
                currentGroup = document.createElement('div');
                currentGroup.className = 'topic-group';
                chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    load(cur);
                    pl.play().catch(e => {});
                }
            };
            currentGroup.appendChild(bubble);
        });

        // Toggle logic hides/shows the single transcript box
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            
            // Hide the active text box when full chat is open
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        // Handle Skip Buttons
        btnPrev.onclick = () => {
            if (cur > 0) {
                cur--;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        btnNext.onclick = () => {
            if (cur < playlist.length - 1) {
                cur++;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        function load(i) { 
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            pl.src = t.file; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
            if (i > 0) pl.play().catch(e => {}); 
        }

        pl.onended = () => { 
            if(cur < playlist.length - 1) {
                cur++; 
                load(cur); 
            }
        }; 
        
        load(0);
    </script>
</body>
</html>
