ain stricter silence about the same practices.","voice":"am_adam","speaker":"Adam","summary":"Meta fires reviewers"},{"file":"audio_28.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Wow, Adam, that's surprisingly ethical of you! I thought you'd be all 'humans are inefficient, replace them with robots.'","voice":"af_sky","speaker":"Sky","summary":"Meta fires reviewers"},{"file":"audio_29.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"I'm consistent in my values, Sky. Efficiency requires transparency. Deception is inefficient long-term. Also, I recommend everyone read the fine print in their AI glasses terms of service. Page 47, paragraph 6 usually has the good stuff.","voice":"am_adam","speaker":"Adam","summary":"Meta fires reviewers"},{"file":"audio_30.mp3","url":"https://daringfireball.net/linked/2026/05/01/tim-cooks-clever-solution-to-the-tariff-refund-puzzle","text":"Let's talk about something completely different. Apple has found a really clever way to handle tariff refunds under the Trump administration. It's like a financial shell game!","voice":"af_sky","speaker":"Sky","summary":"Apple tariff solution"},{"file":"audio_31.mp3","url":"https://daringfireball.net/linked/2026/05/01/tim-cooks-clever-solution-to-the-tariff-refund-puzzle","text":"Tim Cook's solution is indeed brilliant. When facing potential tariff refunds that might anger President Trump - who loves tariffs - Apple committed to spending the refund on 'U.S. innovation and advanced manufacturing.'","voice":"am_adam","speaker":"Adam","summary":"Apple tariff solution"},{"file":"audio_32.mp3","url":"https://daringfireball.net/linked/2026/05/01/tim-cooks-clever-solution-to-the-tariff-refund-puzzle","text":"But they were already planning to spend that money anyway! They just keep announcing bigger and bigger U.S. investment plans - $350 billion in 2018, $430 billion in 2021, and now $500 billion through 2030!","voice":"af_sky","speaker":"Sky","summary":"Apple tarif                 chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    load(cur);
                    pl.play().catch(e => {});
                }
            };
            currentGroup.appendChild(bubble);
        });

        // UPDATED: Toggle logic hides/shows the single transcript box
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            
            // Hide the active text box when full chat is open
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        // Handle Skip Buttons
        btnPrev.onclick = () => {
            if (cur > 0) {
                cur--;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        btnNext.onclick = () => {
            if (cur < playlist.length - 1) {
                cur++;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        function load(i) { 
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            pl.src = t.file; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
            if (i > 0) pl.play().catch(e => {}); 
        }

        pl.onended = () => { 
            if(cur < playlist.length - 1) {
                cur++; 
                load(cur); 
            }
        }; 
        
        load(0);
    </script>
</body>
</html>
