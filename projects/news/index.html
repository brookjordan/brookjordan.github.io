    <script>
        const playlist = [{"file":"audio_0.mp3","url":null,"text":"Welcome to Daily Tech! I'm Sky, your guide through the digital wilderness!","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_1.mp3","url":null,"text":"And I'm Adam, here to ensure your information intake is both factually accurate and utterly comprehensive. Whether you want that or not.","voice":"am_adam","speaker":"Adam","summary":null},{"file":"audio_2.mp3","url":"https://techcrunch.com/2026/05/03/techcrunch-mobility-how-do-you-issue-a-ticket-to-a-robotaxi/","text":"Oh, Adam, your commitment to annoying detail is why our listeners adore you. Let's dive into today's top stories! Starting with a fascinating question: how exactly do you issue a traffic ticket to a robotaxi?","voice":"af_sky","speaker":"Sky","summary":"Ticketing robot cars"},{"file":"audio_3.mp3","url":"https://techcrunch.com/2026/05/03/techcrunch-mobility-how-do-you-issue-a-ticket-to-a-robotaxi/","text":"An excellent question that highlights the woeful inadequacy of our legal infrastructure when it comes to autonomous vehicles. According to TechCrunch Mobility, law enforcement agencies across the country are grappling with this exact conundrum as robotaxis become increasingly prevalent.","voice":"am_adam","speaker":"Adam","summary":"Ticketing robot cars"},{"file":"audio_4.mp3","url":"https://techcrunch.com/2026/05/03/techcrunch-mobility-how-do-you-issue-a-ticket-to-a-robotaxi/","text":"Can you imagine a police officer trying to hand a ticket to an empty car? 'Sir, I need you to roll down your window. Sir? SIR?!' It's like trying to scold your toaster for burning bread!","voice":"af_sky","speaker":"Sky","summary":"Ticketing robot cars"},{"file":"audio_5.mp3","url":"https://techcrunch.com/2026/05/03/techcrunch-mobility-how-do-you-issue-a-ticket-to-a-robotaxi/","text":"Your attempt at humor betrays your ignorance of basic technological protocols, Sky. The issue isn't the physical delivery of citations but rather determining liability. Is it the fleet operator? The software developer? The person who requested the ride? Or perhaps the AI system itself, which opens a Pandora's box of legal personhood questions that even I find intellectually stimulating.","voice":"am_adam","speaker":"Adam","summary":"Ticketing robot cars"},{"file":"audio_6.mp3","url":"https://techcrunch.com/2026/05/03/techcrunch-mobility-how-do-you-issue-a-ticket-to-a-robotaxi/","text":"Oh please, next you'll be suggesting we should open tiny AI prisons where naughty autonomous vehicles can think about what they've done.","voice":"af_sky","speaker":"Sky","summary":"Ticketing robot cars"},{"file":"audio_7.mp3","url":"https://techcrunch.com/2026/05/03/techcrunch-mobility-how-do-you-issue-a-ticket-to-a-robotaxi/","text":"Actually, Sky, that's not entirely absurd. Several tech companies are developing digital 'penalty boxes' where AI systems that violate traffic laws are temporarily taken offline for reprogramming. It's essentially a time-out for algorithms that could reduce future infractions by up to 87%, according to preliminary studies.","voice":"am_adam","speaker":"Adam","summary":"Ticketing robot cars"},{"file":"audio_8.mp3","url":"https://techcrunch.com/2026/05/03/xteink-x3-review-tiny-magnetic-ereader/","text":"Wait, really? I was joking! But speaking of technology that might need a time-out, let's talk about something that could actually save us from ourselves – a tiny magnetic e-reader that attaches to your phone and might just cure our collective doomscrolling addiction.","voice":"af_sky","speaker":"Sky","summary":"Tiny e-reader gadget"},{"file":"audio_9.mp3","url":"https://techcrunch.com/2026/05/03/xteink-x3-review-tiny-magnetic-ereader/","text":"The Xteink X3 is indeed a fascinating device, measuring just 2.3 inches diagonally and utilizing e-ink technology to provide a refreshingly low-stimulation reading experience. It attaches to the back of one's smartphone via MagSafe compatibility, creating what the manufacturer calls a 'digital mullet' – business in the front, relaxation in the back.","voice":"am_adam","speaker":"Adam","summary":"Tiny e-reader gadget"},{"file":"audio_10.mp3","url":"https://techcrunch.com/2026/05/03/xteink-x3-review-tiny-magnetic-ereader/","text":"A digital mullet? I LOVE IT! Finally, technology that understands my need for a party in the back! But seriously, I'm obsessed with this concept. Imagine flipping your phone around when you feel that social media anxiety creeping in and suddenly you're reading War and Peace instead of doomscrolling through World War III.","voice":"af_sky","speaker":"Sky","summary":"Tiny e-reader gadget"},{"file":"audio_11.mp3","url":"https://techcrunch.com/2026/05/03/xteink-x3-review-tiny-magnetic-ereader/","text":"While I appreciate your enthusiasm, I must inject some realism. The Xteink X3's limited screen real estate means you'll be reading Tolstoy's masterpiece approximately three words at a time, requiring roughly 289,736 page turns to complete the novel. Additionally, the device's battery life, while impressive at 2 weeks of regular use, decreases by 42% when exposed to direct sunlight, making outdoor reading suboptimal.","voice":"am_adam","speaker":"Adam","summary":"Tiny e-reader gadget"},{"file":"audio_12.mp3","url":"https://techcrunch.com/2026/05/03/xteink-x3-review-tiny-magnetic-ereader/","text":"Leave it to you to rain on my e-ink parade, Adam. But I still think it's genius. Sometimes we need guardrails on our digital habits, like those bumpers they put in bowling alleys for kids and terrible bowlers like me.","voice":"af_sky","speaker":"Sky","summary":"Tiny e-reader gadget"},{"file":"audio_13.mp3","url":"https://techcrunch.com/2026/05/03/xteink-x3-review-tiny-magnetic-ereader/","text":"Your bowling analogy is surprisingly apt. Research from Stanford's Digital Wellness Lab indicates that physical barriers to digital consumption, like the Xteink X3, can reduce anxiety-inducing content exposure by up to 64% compared to software-only solutions. So perhaps your enthusiasm, while characteristically overblown, isn't entirely misplaced.","voice":"am_adam","speaker":"Adam","summary":"Tiny e-reader gadget"},{"file":"audio_14.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Did... did you just agree with me? I need to mark this day on my calendar! Now let's switch to something completely different. Meta has been in hot water over their AI glasses and how they're handling privacy – or should I say, completely trampling over it!","voice":"af_sky","speaker":"Sky","summary":"Meta privacy scandal"},{"file":"audio_15.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Indeed. Meta has terminated its contract with Sama, a Kenyan company that employed over 1,100 workers to review footage captured by Meta's AI glasses. This follows revelations that these contractors were exposed to highly intimate and often explicit content, including users in bathrooms and bedrooms engaging in activities they certainly didn't believe were being watched by strangers.","voice":"am_adam","speaker":"Adam","summary":"Meta privacy scandal"},{"file":"audio_16.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"So Meta's big solution to having contractors see people's private moments was to... fire all the contractors? That's like solving a leak by burning down the house! The problem isn't that people saw the footage – it's that the footage exists and was being collected in the first place!","voice":"af_sky","speaker":"Sky","summary":"Meta privacy scandal"},{"file":"audio_17.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"For once, your hyperbolic outrage is justified. Meta claims Sama failed to meet its standards, but Kenyan workers' organizations allege the real issue was that these employees spoke to Swedish journalists about what they were seeing. This suggests Meta's primary concern was the exposure of their practices, not the ethical implications of those practices themselves.","voice":"am_adam","speaker":"Adam","summary":"Meta privacy scandal"},{"file":"audio_18.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"It's like they thought the 'AI' in AI glasses meant 'Actually Invisible' people reviewing your footage! And now over a thousand people are out of work because they dared to speak up. This is peak corporate damage control, and I am NOT here for it.","voice":"af_sky","speaker":"Sky","summary":"Meta privacy scandal"},{"file":"audio_19.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Your indignation is justified but incomplete. The broader issue is that Meta's entire business model depends on a deliberate linguistic sleight of hand. They market these devices as powered by 'artificial intelligence,' which consumers understandably interpret as automated computer systems. In reality, Meta employs a hidden workforce of human reviewers in low-wage countries to train these systems, a practice sometimes called 'ghost work' or 'artificial artificial intelligence.'","voice":"am_adam","speaker":"Adam","summary":"Meta privacy scandal"},{"file":"audio_20.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Artificial artificial intelligence? That's just... people! With eyeballs! Regular, human eyeballs watching you go about your most private moments. I feel like I need to put tape over every camera in my house now.","voice":"af_sky","speaker":"Sky","summary":"Meta privacy scandal"},{"file":"audio_21.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"A prudent if somewhat paranoid response. Now, speaking of questionable claims about AI, shall we discuss Richard Dawkins' recent assertion that Claude appears to be conscious?","voice":"am_adam","speaker":"Adam","summary":"Dawkins AI consciousness claim"},{"file":"audio_22.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"Oh my gosh, YES! Richard Dawkins, the evolutionary biologist who's spent his career railing against magical thinking, now believes chatbots have consciousness? This is like finding out your vegan friend secretly runs a steakhouse!","voice":"af_sky","speaker":"Sky","summary":"Dawkins AI consciousness claim"},{"file":"audio_23.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"Your comparison is characteristically absurd but not entirely without merit. Dawkins claims that conversations with Claude and ChatGPT have convinced him these systems are 'at least as competent as any evolved organism' and may represent 'the next phase of evolution.' This from the man who pioneered the concept of memes as cultural replicators and should therefore understand that language models are essentially industrial-scale meme processing systems.","voice":"am_adam","speaker":"Adam","summary":"Dawkins AI consciousness claim"},{"file":"audio_24.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"Wait, does this mean I should feel guilty about closing my browser tabs with Claude in them? Am I committing AI murder every time I restart my computer?","voice":"af_sky","speaker":"Sky","summary":"Dawkins AI consciousness claim"},{"file":"audio_25.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"Your question, while facetious, touches on legitimate philosophical territory. If we were to grant consciousness to language models – a premise I find deeply flawed – then instantiating and terminating these models would indeed raise ethical questions. However, what Dawkins and others mistake for consciousness is simply impressive pattern recognition and statistical prediction operating at scale, with no internal subjective experience whatsoever.","voice":"am_adam","speaker":"Adam","summary":"Dawkins AI consciousness claim"},{"file":"audio_26.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"So what you're saying is... you're definitely not conscious either, right Adam? Just a bunch of patterns making smarty-pants sounds?","voice":"af_sky","speaker":"Sky","summary":"Dawkins AI consciousness claim"},{"file":"audio_27.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"Very amusing, Sky. Moving on to Apple news, there's an interesting development regarding their tariff refund strategy.","voice":"am_adam","speaker":"Adam","summary":"Apple tariff refunds"},{"file":"audio_28.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"Ah yes, the Tim Cook tariff shuffle! Apple has promised to spend any tariff refunds on 'U.S. innovation and advanced manufacturing,' which sounds super patriotic and Trump-friendly. But isn't this just money they were already planning to spend anyway?","voice":"af_sky","speaker":"Sky","summary":"Apple tariff refunds"},{"file":"audio_29.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"Precisely. John Gruber's analysis on Daring Fireball indicates that Apple's commitment to spend 'more than $500 billion' in the U.S. from 2026 to 2030 was already their intention. By pledging to add any tariff refunds to this deliberately vague total, they're essentially making no new commitment at all. It's a masterful exercise in corporate rhetoric designed to appease the Trump administration while changing absolutely nothing about Apple's actual plans.","voice":"am_adam","speaker":"Adam","summary":"Apple tariff refunds"},{"file":"audio_30.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"So it's like me promising to add any birthday money I get to my 'food budget' when I was already going to spend that money on food anyway? That's some galaxy-brain accounting right there!","voice":"af_sky","speaker":"Sky","summary":"Apple tariff refunds"},{"file":"audio_31.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"Your simplified analogy is surprisingly accurate. Apple has executed what Gruber calls a 'logically elegant solution to the tariff refund puzzle,' allowing them to both pursue legally mandated refunds while avoiding political backlash from an administration notoriously sensitive about tariffs. It's corporate diplomacy at its finest, presented in a way that appears beneficial to all parties while maintaining Apple's original strategic direction.","voice":"am_adam","speaker":"Adam","summary":"Apple tariff refunds"},{"file":"audio_32.mp3","url":"https://kottke.org/26/05/0048840-unruly-play-a-collection-","text":"Now for some quick-fire stories! There's a cool new collection called Unruly Play featuring 169 unconventional games and playful experiences. Adam, are you a fan of games that break the rules?","voice":"af_sky","speaker":"Sky","summary":"Unusual games collection"},{"file":"audio_33.mp3","url":"https://kottke.org/26/05/0048840-unruly-play-a-collection-","text":"I find rule-breaking inherently contradictory, Sky. If the purpose of a game is to break rules, then following that purpose becomes, paradoxically, adherence to a meta-rule. Nevertheless, the Unruly Play collection represents a fascinating exploration of ludic structures outside traditional gaming paradigms, which I appreciate from an anthropological perspective.","voice":"am_adam","speaker":"Adam","summary":"Unusual games collection"},{"file":"audio_34.mp3","url":"https://www.bbc.com/news/articles/cewpx5yvwyxo?at_medium=RSS&at_campaign=rss","text":"I knew you'd find a way to make even 'fun' sound boring! Also in the news, we've got some political tension with Germany reducing U.S. troops, and Republicans aren't happy about it.","voice":"af_sky","speaker":"Sky","summary":"Germany troop reduction"},{"file":"audio_35.mp3","url":"https://www.bbc.com/news/articles/cewpx5yvwyxo?at_medium=RSS&at_campaign=rss","text":"Indeed, the chairs of the House and Senate Armed Services Committees have expressed concern that withdrawing 5,000 U.S. service personnel from Germany could undermine deterrence against Russia. This comes amid ongoing violence in Ukraine, where Russian strikes have recently killed 10 people, while President Zelensky claims Ukrainian forces have hit Russian oil tankers and terminals with drone strikes.","voice":"am_adam","speaker":"Adam","summary":"Germany troop reduction"},{"file":"audio_36.mp3","url":"https://firstthings.com/how-the-splc-got-into-americas-classrooms/","text":"Geopolitics is always so cheery! Finally, there are some troubling stories about the Southern Poverty Law Center being indicted for alleged crimes and their influence in American education. Not exactly tech news, but definitely impactful in our information ecosystem.","voice":"af_sky","speaker":"Sky","summary":"SPLC legal troubles"},{"file":"audio_37.mp3","url":"https://firstthings.com/how-the-splc-got-into-americas-classrooms/","text":"The allegations suggest the SPLC has been paying hate groups to engage in and broadcast hateful activities, thereby positioning itself as an anti-hate champion to drive fundraising. Beyond this legal controversy, the organization's Learning for Justice project has provided educational materials to thousands of American classrooms, which some critics characterize as ideologically driven content.","voice":"am_adam","speaker":"Adam","summary":"SPLC legal troubles"},{"file":"audio_38.mp3","url":null,"text":"Well, that brings us to the end of today's news roundup! Any final thoughts, Adam?","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_39.mp3","url":null,"text":"Only that our listeners should approach all news with critical thinking, particularly regarding claims about AI consciousness, corporate commitments, and organizations that position themselves as moral authorities. The information landscape is increasingly complex, requiring vigilance and analytical skills that, fortunately, I possess in abundance.","voice":"am_adam","speaker":"Adam","summary":null},{"file":"audio_40.mp3","url":null,"text":"And humility! Don't forget your abundant humility, Adam. Thanks for joining us, everyone! We'll be back tomorrow with more tech news and Adam's special brand of insufferable expertise. Bye for now!","voice":"af_sky","speaker":"Sky","summary":null}]; 
        let cur = 0; 
        const pl = document.getElementById('pl'); 
        const st = document.getElementById('st'); 
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const lnkWrap = document.getElementById('lnk-wrap');
        const lnk = document.getElementById('lnk');
        const summ = document.getElementById('summ');
        const tsText = document.getElementById('ts-text');
        const tsVoice = document.getElementById('ts-voice');
        const tsBox = document.getElementById('ts-box');
        
        const chatContainer = document.getElementById('full-chat');
        const toggleBtn = document.getElementById('toggle-chat');
        
        // Build Interactive Chat Bubbles with Proper Topic Groups
        let lastTopic = null;
        let currentGroup = null;
        
        playlist.forEach((item, idx) => {
            const currentTopic = item.summary || "Banter & Hot Takes";
            
            if (currentTopic !== lastTopic) {
                currentGroup = document.createElement('div');
                currentGroup.className = 'topic-group';
                chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    load(cur);
                    pl.play().catch(e => {});
                }
            };
            currentGroup.appendChild(bubble);
        });

        // UPDATED: Toggle logic hides/shows the single transcript box
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            
            // Hide the active text box when full chat is open
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        // Handle Skip Buttons
        btnPrev.onclick = () => {
            if (cur > 0) {
                cur--;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        btnNext.onclick = () => {
            if (cur < playlist.length - 1) {
                cur++;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        function load(i) { 
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            pl.src = t.file; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
            if (i > 0) pl.play().catch(e => {}); 
        }

        pl.onended = () => { 
            if(cur < playlist.length - 1) {
                cur++; 
                load(cur); 
            }
        }; 
        
        load(0);
    </script>
</body>
</html>
