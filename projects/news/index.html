ch in the matrix? Quick, someone check if Adam's been replaced by AI!","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_17.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"Very amusing. I'm simply acknowledging a logical conclusion. But speaking of AI replacements, did you see that Richard Dawkins now thinks AI might be the next phase of evolution? He even claims Claude appears to be conscious!","voice":"am_adam","speaker":"Adam","summary":"Dawkins AI evolution claim"},{"file":"audio_18.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"Richard Dawkins thinks AI is conscious now? The same guy who spent decades telling everyone God isn't real now thinks my smart toaster has a soul? The irony is delicious!","voice":"af_sky","speaker":"Sky","summary":"Dawkins AI evolution claim"},{"file":"audio_19.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"ACTUALLY, Dawkins specifically mentioned Claude and ChatGPT, not toasters. And he didn't claim they have souls - he said his conversations convinced him they're 'at least as competent as any evolved organism.' It's about consciousness, not spirituality.","voice":"am_adam","speaker":"Adam","summary":"Dawkins AI evolution claim"},{"file":"audio_20.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"So the world's most famous atheist now thinks chatbots have consciousness? That's like finding out Gordon Ramsay thinks a hot pocket is gourmet cuisine!","voice":"af_sky","speaker":"Sky","summary":"Dawkins AI evolution claim"},{"file":"audio_21.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"Your culinary analogy is surprisingly apt. Hot Pockets now use high-quality ingredients and sous-vide cooking techniques in their manufacturing process. Several renowned chefs have collaborated on premium frozen food lines. The boundary between convenience food and gourmet cuisine is increasingly blurred, just as the line between simulated and genuine consciousness may be.","voice":"am_adam","speaker":"Adam","summary":"Dawkins AI evolution claim"},{"file":"audio_22.mp3","url":null,"text":"Wait, Hot Pockets are gourmet now? I was just making that up! Next you'll tell me that Meta's AI glasses aren't secretly recording everything we do!","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_23.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Interesting you should mention that! Meta has actually been in hot water over their AI glasses. They had contractors in Kenya reviewing footage - including extremely private moments - from users who had no idea humans were watching their recordings!","voice":"am_adam","speaker":"Adam","summary":"Meta fires whistleblowers"},{"file":"audio_24.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"I knew it! So people were just walking around with these glasses, going to the bathroom or whatever, and some random person in Kenya was watching? That's horrifying!","voice":"af_sky","speaker":"Sky","summary":"Meta fires whistleblowers"},{"file":"audio_25.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Precisely. Workers at a company called Sama were reviewing footage to train Meta's AI systems. When they spoke to Swedish reporters about seeing users in bathrooms or having sex, Meta promptly canceled their contract - resulting in over 1,100 workers losing their jobs.","voice":"am_adam","speaker":"Adam","summary":"Meta fires whistleblowers"},{"file":"audio_26.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"So Meta fired the whistleblowers?! That's their solution? Not, I don't know, STOPPING THE CREEPY SPYING?","voice":"af_sky","speaker":"Sky","summary":"Meta fires whistleblowers"},{"file":"audio_27.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Meta claims they terminated the contract because Sama 'didn't meet their standards.' But a Kenyan workers' organization alleges the real reason was staff speaking to the media. Meta's official position is that human review is mentioned in their terms of service, though it's buried in legal small print most users never read.","voice":"am_adam","speaker":"Adam","summary":"Meta fires whistleblowers"},{"file":"audio_28.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Oh sure, I always read the 50-page terms of service that basically says 'We own your soul and can sell your bathroom videos to the highest bidder.' This is why I stick with good old-fashioned regular glasses that don't spy on me!","voice":"af_sky","speaker":"Sky","summary":"Meta fires whistleblowers"},{"file":"audio_29.mp3","url":"https://daringfireball.net/linked/2026/05/01/tim-cooks-clever-solution-to-the-tariff-refund-puzzle","text":"Let's move on to Apple. Tim Cook has devised a clever solution to their tariff refund dilemma. They're committing to spending any tariff refunds on U.S. innovation and manufacturing, essentially neutralizing potential political backlash.","voice":"am_adam","speaker":"Adam","summary":"Cook's tariff strategy"},{"file":"audio_30.mp3","url":"https://daringfireball.net/linked/2026/05/01/tim-cooks-clever-solution-to-the-tariff-refund-puzzle","text":"So Apple is just promising to spend money they were already going to spend? That's like me promising to eat the pizza I already ordered!","voice":"af_sky","speaker":"Sky","summary":"Cook's tariff strategy"},{"file":"audio_31.mp3","url":"https://daringfireball.net/linked/2026/05/01/tim-cooks-clever-solution-to-the-tariff-refund-puzzle","text":"EXACTLY! John Gruber breaks down how Apple's commitment to spend 'more than $500 billion' in the U.S. between 2026-2030 was already planned. By saying they'll add any tariff refunds to this pool, they're not actually changing anything - the total will still be 'more than $500 billion.' It's a masterful political maneuver.","voice":"am_adam","speaker":"Adam","summary":"Cook's tariff strategy"},{"file":"audio_32.mp3","url":"https://daringfireball.net/linked/2026/05/01/tim-cooks-clever-solution-to-the-tariff-refund-puzzle","text":"I can't believe we're agreeing again! Tim Cook is basically saying 'I was going to spend at least $500, and now I'll spend at least $500 plus whatever change I find in my couch.' Genius!","voice":"af_sky","speaker":"Sky","summary":"Cook's tariff strategy"},{"file":"audio_33.mp3","url":"https://daringfireball.net/linked/2026/05/01/tim-cooks-clever-solution-to-the-tariff-refund-puzzle","text":"It's classic corporate diplomacy. Apple's making the same investments they planned regardless of who won the election, but framing them to appease 'President Transactional,' as Gruber puts it. It's a win-win-win: Apple does what it wants, Trump gets to claim he influenced Apple, and the American economy benefits.","voice":"am_adam","speaker":"Adam","summary":"Cook's tariff strategy"},{"file":"audio_34.mp3","url":"https://kottke.org/26/05/0048840-unruly-play-a-collection-","text":"Well, let's take a quick detour into fun territory. Have you heard about Unruly Play? It's this cool collection of unusual games and playful experiences in unexpected places!","voice":"af_sky","speaker":"Sky","summary":"Unusual games collection"},{"file":"audio_35.mp3","url":"https://kottke.org/26/05/0048840-unruly-play-a-collection-","text":"Indeed! Unruly Play features 169 interactive works that challenge conventional notions of what constitutes a 'game.' These experimental designs transform everyday spaces and objects into playful encounters, often blurring the boundaries between art installation, social experiment, and recreational activity.","voice":"am_adam","speaker":"Adam","summary":"Unusual games collection"},{"file":"audio_36.mp3","url":"https://kottke.org/26/05/0048840-unruly-play-a-collection-","text":"Adam, you make it sound so boring! It's about unexpected fun! Like games that turn grocery shopping into an adventure or make waiting for the bus actually enjoyable! It's like bringing a little magic into everyday life.","voice":"af_sky","speaker":"Sky","summary":"Unusual games collection"},{"file":"audio_37.mp3","url":"https://www.bbc.com/news/articles/cn0px2x53k2o?at_medium=RSS&at_campaign=rss","text":"We should also mention the disturbing political news. Iran claims the US has responded to their latest peace proposal, though Trump reportedly told Israeli media it was 'unacceptable.'","voice":"am_adam","speaker":"Adam","summary":"Iran peace proposal"},{"file":"audio_38.mp3","url":"https://www.bbc.com/news/articles/cgjp7vpee03o?at_medium=RSS&at_campaign=rss","text":"Ugh, politics. Though I did see that report about Ukraine potentially being closer to a ceasefire with Russia? Apparently President Zelensky has been showing off Ukraine's military capabilities in the Gulf.","voice":"af_sky","speaker":"Sky","summary":"Ukraine ceasefire chance"},{"file":"audio_39.mp3","url":"https://www.bbc.com/news/articles/cgjp7vpee03o?at_medium=RSS&at_campaign=rss","text":"Correct. The Iran conflict has unexpectedly strengthened Ukraine's position. Zelensky's diplomatic tour in the Gulf is showcasing Ukrainian military innovations that have impressed regional powers, potentially shifting the negotiation dynamics with Russia.","voice":"am_adam","speaker":"Adam","summary":"Ukraine ceasefire chance"},{"file":"audio_40.mp3","url":null,"text":"Let's end on something lighter. What's your tech prediction for this week, Adam?","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_41.mp3","url":"https://firstthings.com/how-the-splc-got-into-americas-classrooms/","text":"I predict we'll see more fallout from the SPLC indictment, particularly regarding their influence in educational curricula through their 'Learning for Justice' program, which has been adopted by several states.","voice":"am_adam","speaker":"Adam","summary":"SPLC classroom influence"},{"file":"audio_42.mp3","url":null,"text":"That's not tech-related or lighter! But I predict more companies will follow Meta's lead and try to hide their human AI training practices better. Maybe they'll train AIs to review the videos instead! What could go wrong?","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_43.mp3","url":null,"text":"That's actually an astute observation. Companies are increasingly using AI to monitor AI training, creating nested supervision systems. This raises fascinating questions about oversight regression and ethical blind spots in recursive AI development practices.","voice":"am_adam","speaker":"Adam","summary":null},{"file":"audio_44.mp3","url":null,"text":"I was being sarcastic, but sure, let's go with 'astute.' That's it for today's Daily Tech! I'm Sky, and this has been another episode of 'Adam Ruins Everything Fun About Technology!'","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_45.mp3","url":null,"text":"And I'm Adam, reminding you that understanding the technological nuances of our world isn't 'ruining the fun' - it's empowering you with knowledge. Until tomorrow, stay curious and technically accurate!","voice":"am_adam","speaker":"Adam","summary":null}]; 
        let cur = 0;

            const currentTopic = item.summary || "Banter & Hot Takes";

                currentGroup = document.createElement('div');
                currentGroup.className = 'topic-group';

                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;

            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    load(cur);
                    pl.play().catch(e => {});
                }
            };
            currentGroup.appendChild(bubble);
        });

        // UPDATED: Toggle logic hides/shows the single transcript box
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            
            // Hide the active text box when full chat is open
            tsBox.style.display = isVis ? 'none' : 'block';

                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

        // Handle Skip Buttons
        btnPrev.onclick = () => {
            if (cur > 0) {
                cur--;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        btnNext.onclick = () => {
            if (cur < playlist.length - 1) {
                cur++;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        function load(i) { 
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            pl.src = t.file; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
            if (i > 0) pl.play().catch(e => {}); 
        }

        pl.onended = () => { 
            if(cur < playlist.length - 1) {
                cur++; 
                load(cur); 
            }
        }; 
        
        load(0);
    </script>
</body>
</html>
