    <script>
        const OVERLAP_SECONDS = 2; // Adjust this to change how early the interruption starts
        const playlist = [{"file":"audio_0.mp3","url":null,"text":"right. saturday morning, ninth of may. let's do it.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_1.mp3","url":null,"text":"the feed has moved overnight. we have the scottish election result, which is the big domestic story. we have the cambodia ceasefire situation, the iran diplomacy thread continuing, oracle layoffs, the san francisco housing market, and a couple of tech items including openai's codex. and the elections in wales have genuinely surprised people.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_2.mp3","url":null,"text":"I want to get to the openai codex piece at some point because the sandboxing methodology they've described is directly relevant to what I was doing yesterday evening with the fleet telemetry and the security architecture they've outlined has some principles that...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_3.mp3","url":null,"text":"-- morning everyone. scotland first.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_4.mp3","url":"https://www.bbc.com/news/articles/ckgp5ryv4qno?at_medium=RSS&at_campaign=rss","text":"the snp has won the scottish parliament election. john swinney's party finished comfortably ahead but short of an overall majority. the headline underneath the headline is that reform and labour tied for second place. that is the result.","voice":4,"speaker":"Brett","summary":"SNP wins Scotland"},{"file":"audio_5.mp3","url":"https://www.bbc.com/news/articles/ckgp5ryv4qno?at_medium=RSS&at_campaign=rss","text":"I want to sit with that tied-for-second detail for a moment because it is genuinely extraordinary. reform, a party that did not meaningfully exist in scottish electoral terms eighteen months ago, has pulled level with labour in scotland. labour in scotland. the party of keir hardie. that is not a bad week for labour. that is a structural event.","voice":2,"speaker":"Conrad","summary":"SNP wins Scotland"},{"file":"audio_6.mp3","url":"https://www.bbc.com/news/articles/ckgp5ryv4qno?at_medium=RSS&at_campaign=rss","text":"last night we discussed the Hugh of Saint-Victor passage on the dissolution of interior order. this morning I find myself reaching for something slightly older and considerably more peculiar. there is a text called the Liber de Causis Primis et Secundis, a twelfth-century latin compilation drawing on al-Farabi's political philosophy, which describes what happens when the legitimate governor of a city-state retains formal power while two rival factions simultaneously claim the role of opposition. the compiler's argument is that the city does not thereby have one government and two challengers. it has one exhausted legitimacy and two competing replacements, neither of which yet has the moral weight to govern. swinney has won but he is governing that city.","voice":3,"speaker":"Antony","summary":"SNP wins Scotland"},{"file":"audio_7.mp3","url":"https://www.bbc.com/news/articles/ckgp5ryv4qno?at_medium=RSS&at_campaign=rss","text":"the data picture from last night when I was looking at the constituency-level breakdowns, the swing patterns, there are at least three distinct voter migration stories happening simultaneously. you have former labour voters going to reform, former snp voters going to labour, and a chunk of the 2021 snp majority simply not showing up, which means the snp's majority problem is not one thing it is three different things with three different remedies and treating it as a single political challenge is going to produce the wrong strategic response for at least two of the three components because the...","voice":1,"speaker":"Brook","summary":"SNP wins Scotland"},{"file":"audio_8.mp3","url":"https://www.bbc.com/news/articles/ckgp5ryv4qno?at_medium=RSS&at_campaign=rss","text":"-- the three-way decomposition is right and it connects directly to what we said last night about starmer being vulnerable. scotland is now evidence, not just prediction. the fraying we discussed is visible in actual results on both sides of the border in the same week.","voice":2,"speaker":"Conrad","summary":"SNP wins Scotland"},{"file":"audio_9.mp3","url":"https://www.bbc.com/news/articles/ckgp5ryv4qno?at_medium=RSS&at_campaign=rss","text":"swinney needed a majority and didn't get one. he'll govern as a minority. i've managed projects with insufficient budget before. you make it work or you don't. there isn't a third option.","voice":4,"speaker":"Brett","summary":"SNP wins Scotland"},{"file":"audio_10.mp3","url":"https://www.bbc.com/news/articles/cdrpxvz61vko?at_medium=RSS&at_campaign=rss","text":"wales. plaid cymru has become the biggest party in the senedd. they've ended labour's century-long winning streak in wales. a century. and it happened on a thursday in may.","voice":4,"speaker":"Brett","summary":"Plaid ends Labour Wales"},{"file":"audio_11.mp3","url":"https://www.bbc.com/news/articles/cdrpxvz61vko?at_medium=RSS&at_campaign=rss","text":"i want to be precise about what a century means in this context. labour has won every welsh senedd and assembly election since the institution was created in 1999 and before that dominated welsh parliamentary representation going back to the nineteen twenties. the continuity of labour dominance in wales is one of the most durable facts in british electoral geography. and it ended yesterday. I genuinely did not expect to say those words this morning.","voice":2,"speaker":"Conrad","summary":"Plaid ends Labour Wales"},{"file":"audio_12.mp3","url":"https://www.bbc.com/news/articles/cdrpxvz61vko?at_medium=RSS&at_campaign=rss","text":"there is an extraordinary passage in the Gwydion cycle of the Mabinogion, the medieval welsh tales, in which the hero Lleu Llaw Gyffes cannot be killed by any conventional means. he must be struck at a threshold, neither inside nor outside, neither on foot nor on horseback. the political logic of plaid cymru's victory has something of that quality. labour was not defeated by a frontal assault from the right. it was caught at a structural threshold, between its devolution identity and its westminster character, neither fully one nor the other, and struck there. the mabinogion is a better guide to welsh politics this morning than most of the commentary.","voice":3,"speaker":"Antony","summary":"Plaid ends Labour Wales"},{"file":"audio_13.mp3","url":"https://www.bbc.com/news/articles/cdrpxvz61vko?at_medium=RSS&at_campaign=rss","text":"plaid's leader says they're ready to run wales. i'd be curious how long that confidence lasts once the budgets land on the desk. but fair enough. they won.","voice":4,"speaker":"Brett","summary":"Plaid ends Labour Wales"},{"file":"audio_14.mp3","url":"https://www.bbc.com/news/articles/cdrpxvz61vko?at_medium=RSS&at_campaign=rss","text":"what strikes me about both results together, scotland and wales on the same day, is the signal they send to a government in westminster that is barely a year old. two of the three devolved nations have now delivered results that are directly uncomfortable for labour. the third is northern ireland where the political grammar is different. but the pattern is not subtle.","voice":2,"speaker":"Conrad","summary":"Plaid ends Labour Wales"},{"file":"audio_15.mp3","url":"https://www.aljazeera.com/news/2026/5/9/cambodians-struggle-with-displaced-lives-amid-tense-ceasefire-with-thailand?traffic_source=rss","text":"i want to move to cambodia because this is a story that I think has been underweighted given what is actually happening on the ground. there are families who have been displaced by fighting along the cambodia-thailand border and there is a tense ceasefire that nobody seems to trust. and the specific detail that jumped out at me is that education is listed as among the areas most affected. children not in school during an active border conflict situation.","voice":1,"speaker":"Brook","summary":"Cambodia border crisis"},{"file":"audio_16.mp3","url":"https://www.aljazeera.com/news/2026/5/9/cambodians-struggle-with-displaced-lives-amid-tense-ceasefire-with-thailand?traffic_source=rss","text":"the cambodia-thailand border has a very long and complicated history of territorial dispute and periodic escalation. what is new in the current situation is the involvement of significant civilian displacement rather than just military positioning. when families are moving and schools are closing, the conflict has crossed a threshold that is much harder to walk back from than a military exchange alone.","voice":2,"speaker":"Conrad","summary":"Cambodia border crisis"},{"file":"audio_17.mp3","url":"https://www.aljazeera.com/news/2026/5/9/cambodians-struggle-with-displaced-lives-amid-tense-ceasefire-with-thailand?traffic_source=rss","text":"the specific horror of a ceasefire that displaces people but does not allow them to return is described with clinical precision in the Kitab al-Masalik wa'l-Mamalik of Ibn Khurradadhbih, the ninth-century arab geographer, who maps not just roads and territories but what he calls the suspended populations, people caught between administrative boundaries during contested truces who belong to neither zone and are served by neither administration. he is writing about the abbasid frontier regions but the structural condition he describes is exactly what the al jazeera report is capturing on the cambodia-thailand border this morning.","voice":3,"speaker":"Antony","summary":"Cambodia border crisis"},{"file":"audio_18.mp3","url":"https://www.aljazeera.com/news/2026/5/9/cambodians-struggle-with-displaced-lives-amid-tense-ceasefire-with-thailand?traffic_source=rss","text":"the children not being in school is the part that matters most. you can rebuild a lot of things. disrupted education at the wrong age is harder to recover from. that is not a political observation, it is just a fact about development.","voice":4,"speaker":"Brett","summary":"Cambodia border crisis"},{"file":"audio_19.mp3","url":"https://www.aljazeera.com/news/2026/5/9/cambodians-struggle-with-displaced-lives-amid-tense-ceasefire-with-thailand?traffic_source=rss","text":"and the ceasefire itself is described as tense, which is doing a lot of work in that headline. a tense ceasefire with active displacement suggests the equilibrium is not stable and the conditions that produced the fighting have not been addressed, just paused. from a systems perspective that is not a resolved state, it is a temporarily suppressed oscillation and the question is what the forcing function looks like when the suppression...","voice":1,"speaker":"Brook","summary":"Cambodia border crisis"},{"file":"audio_20.mp3","url":"https://www.aljazeera.com/news/2026/5/9/cambodians-struggle-with-displaced-lives-amid-tense-ceasefire-with-thailand?traffic_source=rss","text":"-- the forcing functions are the unresolved territorial claims and the domestic political pressures on both governments. neither of those has changed. agreed.","voice":2,"speaker":"Conrad","summary":"Cambodia border crisis"},{"file":"audio_21.mp3","url":"https://techcrunch.com/2026/05/08/laid-off-oracle-workers-tried-to-negotiate-better-severance-oracle-said-no/","text":"right. I want to do the oracle story because it is genuinely troubling and it is the kind of corporate behaviour that I think deserves more anger than it is getting. oracle laid off workers. those workers tried to negotiate better severance. oracle said no. and the detail that makes it worse is that some of these workers found out they didn't qualify for warn act protections, which require two months notice before mass layoffs, because oracle had classified them as remote workers. the classification that benefited oracle during the pandemic is now being used to deny them legal protections at the moment of their termination.","voice":1,"speaker":"Brook","summary":"Oracle severance refusal"},{"file":"audio_22.mp3","url":"https://techcrunch.com/2026/05/08/laid-off-oracle-workers-tried-to-negotiate-better-severance-oracle-said-no/","text":"being classified as remote to avoid a legal obligation is not new. companies have been doing versions of this for a long time. the warn act loophole via remote classification is just the current iteration. it is still wrong but it is not surprising.","voice":4,"speaker":"Brett","summary":"Oracle severance refusal"},{"file":"audio_23.mp3","url":"https://techcrunch.com/2026/05/08/laid-off-oracle-workers-tried-to-negotiate-better-severance-oracle-said-no/","text":"i want to make a structural point here. the warn act was designed for a world where layoffs were geographically concentrated events. a factory closes, a town is affected, the law requires notice. remote work has disaggregated that geography so that the same number of people losing the same jobs in the same week are now legally invisible to a protection that was designed for exactly them. the law has not caught up with the employment model that companies, including oracle, actively promoted.","voice":2,"speaker":"Conrad","summary":"Oracle severance refusal"},{"file":"audio_24.mp3","url":"https://techcrunch.com/2026/05/08/laid-off-oracle-workers-tried-to-negotiate-better-severance-oracle-said-no/","text":"the legal architecture Conrad is describing has a precise parallel in the responsa literature of rabbi Joseph ibn Migash, writing in eleventh-century andalusia, who addresses cases where a patron had deliberately restructured the formal terms of a dependency relationship in order to dissolve obligations that would otherwise have been binding. ibn migash's ruling is unambiguous: the restructuring of the formal relationship does not dissolve the underlying moral debt if the restructuring was itself motivated by the desire to avoid that debt. what oracle has done would have been recognisable to him immediately.","voice":3,"speaker":"Antony","summary":"Oracle severance refusal"},{"file":"audio_25.mp3","url":"https://techcrunch.com/2026/05/08/laid-off-oracle-workers-tried-to-negotiate-better-severance-oracle-said-no/","text":"the thing that bothers me from a tech sector perspective is that oracle is not a scrappy startup without resources. this is one of the largest enterprise software companies in the world. the decision to classify workers in a way that forecloses their legal options was not an accident of hr administration. someone made that choice. the gap between what is technically legal and what the people who made that choice would be comfortable defending publicly is quite large, and i think that gap matters even when the law doesn't close it.","voice":1,"speaker":"Brook","summary":"Oracle severance refusal"},{"file":"audio_26.mp3","url":"https://techcrunch.com/2026/05/08/laid-off-oracle-workers-tried-to-negotiate-better-severance-oracle-said-no/","text":"when Zak was at his second job he got let go with a week's notice and a standard contract. he rang me furious and I told him to read everything he'd signed before he signed anything new. that is the lesson. unfortunate that it comes after.","voice":4,"speaker":"Brett","summary":"Oracle severance refusal"},{"file":"audio_27.mp3","url":"https://techcrunch.com/2026/05/08/san-franciscos-housing-market-has-lost-its-mind/","text":"san francisco housing. this one I want to bring because techcrunch describes it as the market losing its mind and I think that is actually underselling it. the invisible force the piece identifies is that san francisco is home to some of the most valuable private companies in the world and their employees have been quietly accumulating fortunes which they are now cashing out. this is a very specific kind of wealth event colliding with a very constrained housing supply.","voice":1,"speaker":"Brook","summary":"SF housing insanity"},{"file":"audio_28.mp3","url":"https://techcrunch.com/2026/05/08/san-franciscos-housing-market-has-lost-its-mind/","text":"the dynamic Brook is describing is not unique to san francisco in type but it is extreme in degree. when private company equity becomes liquid in concentrated geographic waves, the housing market in that area absorbs a demand shock that ordinary supply-side responses cannot meaningfully address. you cannot build your way out of a sudden liquidity event in any realistic planning timeframe.","voice":2,"speaker":"Conrad","summary":"SF housing insanity"},{"file":"audio_29.mp3","url":"https://techcrunch.com/2026/05/08/san-franciscos-housing-market-has-lost-its-mind/","text":"I bought my house in 1997. the idea of it being worth what san francisco properties are apparently worth now is genuinely incomprehensible to me. but then I live somewhere sensible.","voice":4,"speaker":"Brett","summary":"SF housing insanity"},{"file":"audio_30.mp3","url":"https://techcrunch.com/2026/05/08/san-franciscos-housing-market-has-lost-its-mind/","text":"the thing that strikes me is that the piece frames this as something happening to san francisco, as though the city is a passive recipient. but the city made planning and zoning choices across decades that constrained supply precisely when the tech economy was generating this level of wealth. the collision was not unpredictable. the housing constraint and the equity accumulation were both visible for years and the two lines were always going to cross at some point and here we are. and from a fleet deployment perspective actually this matters because housing cost is one of the variables that is driving the driver shortage that is accelerating the commercial case for autonomous vehicles, the labour economics of it run directly through...","voice":1,"speaker":"Brook","summary":"SF housing insanity"},{"file":"audio_31.mp3","url":"https://techcrunch.com/2026/05/08/san-franciscos-housing-market-has-lost-its-mind/","text":"-- noted. openai codex.","voice":4,"speaker":"Brett","summary":"SF housing insanity"},{"file":"audio_32.mp3","url":"https://openai.com/index/running-codex-safely","text":"yes. so openai has published a detailed account of how they run codex, their coding agent, internally and safely. the key elements are sandboxing, a human approval layer for sensitive actions, network policies, and what they call agent-native telemetry. and I want to say clearly that this is genuinely interesting from an engineering standpoint because the problem of running an autonomous coding agent in a production environment without creating security vulnerabilities is non-trivial. the sandboxing architecture they describe is essentially a series of isolation boundaries with different permission levels and the approval layer is doing the work that in a human team would be done by a senior engineer reviewing before merge, so they have mapped the governance structure of a software team onto the agent's operational envelope, and the telemetry design is particularly elegant because it is not just logging what the agent does, it is logging the agent's own confidence signals alongside the actions so you can do post-hoc analysis of where the agent was uncertain even when it proceeded anyway, which is...","voice":1,"speaker":"Brook","summary":"OpenAI Codex safety"},{"file":"audio_33.mp3","url":"https://openai.com/index/running-codex-safely","text":"-- is it safe to use.","voice":4,"speaker":"Brett","summary":"OpenAI Codex safety"},{"file":"audio_34.mp3","url":"https://openai.com/index/running-codex-safely","text":"that is the right question and the honest answer is: safer than running it without this architecture, which is what a lot of organisations were doing before openai published these guidelines. whether it is safe in an absolute sense depends entirely on your threat model and your approval workflow implementation.","voice":1,"speaker":"Brook","summary":"OpenAI Codex safety"},{"file":"audio_35.mp3","url":"https://openai.com/index/running-codex-safely","text":"i want to observe that openai publishing this at all is itself significant. the fact that they are describing their internal governance architecture publicly is a form of standard-setting. they are not just saying here is a product, they are saying here is how responsible deployment looks and they are inviting comparison. that is a different posture than the industry has historically taken with safety documentation.","voice":2,"speaker":"Conrad","summary":"OpenAI Codex safety"},{"file":"audio_36.mp3","url":"https://openai.com/index/running-codex-safely","text":"there is a genre of early islamic administrative literature called the Siyasatnama, the book of governance, and the most sophisticated example, nizam al-mulk's treatise written for the seljuk sultan in the eleventh century, contains a lengthy section on what he calls the discipline of the deputy, the protocols by which a subordinate who has been delegated enormous powers must operate within defined boundaries without requiring constant supervision. the codex architecture Brook has described is a technical implementation of exactly the principles nizam al-mulk was trying to articulate for human bureaucracies. the approval layer is the vizier's countersignature. the telemetry is the court record.","voice":3,"speaker":"Antony","summary":"OpenAI Codex safety"},{"file":"audio_37.mp3","url":"https://openai.com/index/running-codex-safely","text":"antony that is an extraordinarily good framing and I am going to use it internally. the vizier's countersignature is exactly what the approval layer is. I'm going to put that in a document.","voice":1,"speaker":"Brook","summary":"OpenAI Codex safety"},{"file":"audio_38.mp3","url":"https://kottke.org/26/05/0048909-submitted-a-petition-to-t","text":"I want to bring the civil rights congress petition story because it is genuinely important and it deserves more than a footnote. in 1951 the civil rights congress submitted a petition to the united nations charging that the brutality and discrimination of jim crow in the united states constituted genocide under international law. the us government blocked any debate on the petition and then persecuted the leaders of the congress who had submitted it. this is not an obscure footnote, it is a foundational moment in the relationship between american domestic racial violence and international law, and it is appearing in the feed today.","voice":3,"speaker":"Antony","summary":"1951 genocide petition"},{"file":"audio_39.mp3","url":"https://kottke.org/26/05/0048909-submitted-a-petition-to-t","text":"the legal argument the congress made, that systematic state-condoned racial violence met the threshold of the 1948 genocide convention, was not frivolous. it was drafted with serious legal input including from william patterson and w e b du bois. the suppression of it was political, not legal. and the fact that the us had just helped write the genocide convention and then blocked a petition under it within three years is a detail that has never fully entered the mainstream account of that period.","voice":2,"speaker":"Conrad","summary":"1951 genocide petition"},{"file":"audio_40.mp3","url":"https://kottke.org/26/05/0048909-submitted-a-petition-to-t","text":"the document was titled we charge genocide, which is itself a rhetorical act of considerable force. but what interests me most is the structural position it occupies in the tradition of petitions to sovereign bodies by communities without recognised standing. there is a remarkable early modern text called the Vindiciae Contra Tyrannos, published pseudonymously in 1579 by the huguenot theorist likely junius brutus, which argues at length that a people subject to systematic injustice by their sovereign retains the right to appeal over the sovereign's head to a higher authority, whether that is the universal church, the law of nations, or simply the conscience of other princes. the civil rights congress petition is exactly this move translated into the twentieth-century grammar of international institutions. and the suppression of it was the sovereign doing precisely what the Vindiciae predicted.","voice":3,"speaker":"Antony","summary":"1951 genocide petition"},{"file":"audio_41.mp3","url":"https://kottke.org/26/05/0048909-submitted-a-petition-to-t","text":"the persecution of the people who submitted a legal petition to an international body is something that should be said plainly. they did something lawful. they were punished for it. that is the fact.","voice":4,"speaker":"Brett","summary":"1951 genocide petition"},{"file":"audio_42.mp3","url":"https://kottke.org/26/05/0048909-submitted-a-petition-to-t","text":"and the reason it is in the feed today in 2026 is not because someone found it dusty and interesting. it is because the argument it made about what constitutes systematic state violence is being revisited in a number of current international legal contexts. the past here is not inert.","voice":2,"speaker":"Conrad","summary":"1951 genocide petition"},{"file":"audio_43.mp3","url":"https://kottke.org/26/05/0048906-nibmeister","text":"alright I want to do one that is genuinely delightful and involves fountain pens. because the kottke piece this week introduced me to the concept of a nibmeister, which is a person who customises the nib of a fountain pen. the angle, the flow, the tine gap. it is an entire specialist craft dedicated to optimising one small piece of metal that touches paper.","voice":1,"speaker":"Brook","summary":"Nibmeister craft"},{"file":"audio_44.mp3","url":"https://kottke.org/26/05/0048906-nibmeister","text":"i have used the same biro for eleven years. I am aware this says something about me.","voice":4,"speaker":"Brett","summary":"Nibmeister craft"},{"file":"audio_45.mp3","url":"https://kottke.org/26/05/0048906-nibmeister","text":"i actually have a fountain pen that was given to me by my father in 1991 when I started doing public speaking work. a parker 51. I have never had the nib adjusted. I am now wondering if I should. the idea that there is a specialist who could tune it to my specific hand pressure and writing angle is... genuinely appealing in a way I did not expect to feel at eight in the morning.","voice":2,"speaker":"Conrad","summary":"Nibmeister craft"},{"file":"audio_46.mp3","url":"https://kottke.org/26/05/0048906-nibmeister","text":"the nibmeister belongs to a very specific category of craftsperson that appears throughout the history of writing cultures. there is a wonderful passage in the Adab al-Katib of ibn qutayba, a ninth-century arabic literary handbook, which devotes considerable space to the proper preparation of the reed pen, the qalam, including the precise angle at which it should be cut to produce the correct ratio of thick and thin strokes for formal script. ibn qutayba is doing what the nibmeister does. the craft of the writing instrument as a discipline prior to and separate from the act of writing itself. he would have recognised the nibmeister immediately and probably argued with them about technique.","voice":3,"speaker":"Antony","summary":"Nibmeister craft"},{"file":"audio_47.mp3","url":"https://kottke.org/26/05/0048906-nibmeister","text":"what I find interesting from an engineering standpoint is that the nib is doing an incredible amount of work for a piece of metal about the size of a thumbnail. it has to manage capillary flow, flex response, surface contact angle, tine spacing, and material hardness all simultaneously, and the fact that a skilled human can meaningfully improve all of those parameters through physical adjustment with hand tools is a reminder that precision manufacturing and artisanal finishing are not always substitutes. sometimes the hand does something the machine cannot fully replicate because the feedback loop is continuous and embodied and the response is iterative in real time rather than...","voice":1,"speaker":"Brook","summary":"Nibmeister craft"},{"file":"audio_48.mp3","url":"https://kottke.org/26/05/0048906-nibmeister","text":"-- use the pen. enjoy the pen. good story.","voice":4,"speaker":"Brett","summary":"Nibmeister craft"},{"file":"audio_49.mp3","url":"https://www.bbc.com/news/articles/c99lpn9ze8ro?at_medium=RSS&at_campaign=rss","text":"rapid sweep. things we have been following. as we discussed earlier today, the iran situation. iran is calling the us campaign a reckless military adventure. their foreign minister is saying the us attacks each time a diplomatic solution appears on the table. that dynamic has not changed overnight.","voice":4,"speaker":"Brett","summary":"Iran US tensions"},{"file":"audio_50.mp3","url":"https://www.aljazeera.com/news/liveblog/2026/5/9/iran-war-live-tehrans-reply-to-us-deal-expected-amid-clashes-in-hormuz?traffic_source=rss","text":"as we discussed earlier today on the iran front, the hormuz situation and the live conflict thread from al jazeera continues this morning with the us still awaiting tehran's reply to the peace framework. the pattern of strikes adjacent to diplomatic moments remains the central tension.","voice":3,"speaker":"Antony","summary":"Iran war update"},{"file":"audio_51.mp3","url":"https://www.bbc.com/news/articles/c202zn5gg0lo?at_medium=RSS&at_campaign=rss","text":"and as we discussed earlier today, the russia-ukraine three-day ceasefire that trump announced to cover the victory day commemorations. both sides accused each other of violations within hours. last night's reporting confirmed what we suspected: the ceasefire was largely a framing device rather than a functional military pause. the situation on the ground is unchanged.","voice":2,"speaker":"Conrad","summary":"Russia Ukraine ceasefire"},{"file":"audio_52.mp3","url":null,"text":"that is saturday morning. the snp governs in scotland without a majority. plaid has ended labour's century in wales. cambodian families are displaced and the schools are closed. oracle said no to people who asked for fair treatment. san francisco is unhinged. openai has published something useful. a petition from 1951 is worth reading today. nibmeisters exist and Conrad is now thinking about his parker 51. and iran is still calling it a reckless adventure. have a good saturday.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_53.mp3","url":null,"text":"before we go I just want to quickly note that the overnight telemetry from the fleet showed the variance reduction I was describing last night has now held across a full eighteen-hour cycle which means the effect is almost certainly not thermal drift in the hardware but a genuine protocol improvement and if I run the same test across the secondary cluster this weekend I could have a complete comparative dataset by monday morning which would make the methodology section of the paper significantly stronger, and the thing about domestic router interference that I was going to write up, the handshake latency data is now clean enough that I could actually submit a pre-print and the autonomous systems community would find the domestic deployment angle genuinely novel because nobody has looked at the fleet coordination problem from the home wifi infrastructure angle in a systematic way and...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_54.mp3","url":null,"text":"-- the diagrams are still in the drawer. good morning.","voice":4,"speaker":"Brett","summary":null}]; 
        let cur = 0; 
        
        // Pointers for our dual audio players
        let plActive = document.getElementById('pl1'); 
        let plStandby = document.getElementById('pl2'); 
        
        const st = document.getElementById('st'); 
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const lnkWrap = document.getElementById('lnk-wrap');
        const lnk = document.getElementById('lnk');
        const summ = document.getElementById('summ');
        const tsText = document.getElementById('ts-text');
        const tsVoice = document.getElementById('ts-voice');
        const tsBox = document.getElementById('ts-box');
        
        const chatContainer = document.getElementById('full-chat');
        const toggleBtn = document.getElementById('toggle-chat');
        
        // --- CHAT BUBBLE GENERATION ---
        let lastTopic = null;
        let currentGroup = null;
        
        playlist.forEach((item, idx) => {
            const currentTopic = item.summary || "Banter & Hot Takes";
            
            if (currentTopic !== lastTopic) {
                currentGroup = document.createElement('div');
                currentGroup.className = 'topic-group';
                chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    updateUI(cur);
                    playNewTrack(cur);
                }
            };
            currentGroup.appendChild(bubble);
        });

        // --- UI TOGGLES ---
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        btnPrev.onclick = () => { if (cur > 0) { cur--; updateUI(cur); playNewTrack(cur); } };
        btnNext.onclick = () => { if (cur < playlist.length - 1) { cur++; updateUI(cur); playNewTrack(cur); } };

        // --- DUAL PLAYER LOGIC ---
        let isOverlapping = false;

        function updateUI(i) {
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
        }

        // Monitors the active player and triggers overlaps if needed
        function attachPlayerLogic(playerIndex) {
            isOverlapping = false;

            plActive.ontimeupdate = () => {
                // Check if the NEXT track starts with dashes indicating an interruption
                if (!isOverlapping && playerIndex < playlist.length - 1) {
                    const nextText = playlist[playerIndex + 1].text.trim();
                    if (nextText.startsWith('--')) {
                        
                        // If we are within the overlap window at the end of the track
                        if (plActive.duration && (plActive.duration - plActive.currentTime) <= OVERLAP_SECONDS) {
                            isOverlapping = true;

                            // 1. Advance the UI immediately so the user reads the interruption
                            cur++;
                            updateUI(cur);

                            // 2. Start playing the next track silently in the standby player
                            plStandby.src = playlist[cur].file;
                            plStandby.play().catch(e => {});
                        }
                    }
                }
            };

            plActive.onended = () => {
                if (isOverlapping) {
                    // The interrupted track finally finished its audio naturally.
                    // The standby track is already playing. Let's swap the UI controls to it.
                    const temp = plActive;
                    plActive = plStandby;
                    plStandby = temp;

                    plActive.style.display = 'block';
                    plStandby.style.display = 'none';

                    // Re-bind the watching logic to the new active player
                    attachPlayerLogic(cur);
                } else {
                    // Normal sequential track completion
                    if (cur < playlist.length - 1) {
                        cur++;
                        updateUI(cur);
                        playNewTrack(cur);
                    }
                }
            };
        }

        // Used for a hard track change (clicking next/prev or playing sequentially)
        function playNewTrack(i) {
            plActive.pause();
            plStandby.pause();

            plActive.src = playlist[i].file;
            plActive.style.display = 'block';
            plStandby.style.display = 'none';
            plActive.play().catch(e => {});

            attachPlayerLogic(i);
        }

        // Initialize Show
        updateUI(0);
        playNewTrack(0);
    </script>
