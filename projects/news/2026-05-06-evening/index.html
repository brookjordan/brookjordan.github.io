    <script>
        const OVERLAP_SECONDS = 2; // Adjust this to change how early the interruption starts
        const playlist = [{"file":"audio_0.mp3","url":null,"text":"Right. Evening everyone. Brook, I noticed you left your routing diagrams on the kitchen table again. I've put them under the fruit bowl.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_1.mp3","url":null,"text":"sorry, dad, I was debugging something on my laptop and I needed the physical space to think, which is actually relevant to the ai cognition study we discussed this afternoon because sometimes you genuinely do need to...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_2.mp3","url":null,"text":"-- we'll get to that. good evening all. decent set of stories for the evening run. some of them are genuinely new, some are threads we've been pulling on all day. let's get into it properly.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_3.mp3","url":null,"text":"I spent the commute home finishing a rather thin but surprisingly rewarding pamphlet on the devotional economies of the Bogomil communities in medieval Bulgaria. I mention this only because it became immediately relevant to at least two of tonight's stories. you'll see why.","voice":3,"speaker":"Antony","summary":null},{"file":"audio_4.mp3","url":"https://daringfireball.net/linked/2026/05/06/maestri","text":"of course you did. right, first story, and I'm taking this one because it's actually quite funny in a very specific way that I appreciate. former Apple chief financial officer Luca Maestri... does not run the cafeteria. but he does, technically, run the cafeteria.","voice":4,"speaker":"Brett","summary":"CFO runs cafeteria"},{"file":"audio_5.mp3","url":"https://daringfireball.net/linked/2026/05/06/maestri","text":"wait, explain this. I saw the headline and thought I'd misread it.","voice":1,"speaker":"Brook","summary":"CFO runs cafeteria"},{"file":"audio_6.mp3","url":"https://daringfireball.net/linked/2026/05/06/maestri","text":"so Maestri stepped down as Apple's cfo at the start of this year. but he didn't leave. his new role as vice president of corporate services includes... information security, real estate, a software company called Claris, and... Caffe Macs. which is Apple's internal cafeteria chain. it's listed on his official executive leadership page. the man went from controlling the finances of one of the most valuable companies in human history to being formally responsible for where the engineers get their lunch.","voice":4,"speaker":"Brett","summary":"CFO runs cafeteria"},{"file":"audio_7.mp3","url":"https://daringfireball.net/linked/2026/05/06/maestri","text":"and this is what I find genuinely interesting about it. because the instinct is to read this as a demotion dressed up in corporate language. but I'm not sure that's right. Tim Cook kept him on, gave him a real portfolio, and the inclusion of Caffe Macs in his responsibilities alongside information security isn't humiliation, it's almost a statement of trust. Apple is saying the same person who guarded our financial architecture is also accountable for the daily physical experience of working here. that's an unusual kind of institutional respect.","voice":2,"speaker":"Conrad","summary":"CFO runs cafeteria"},{"file":"audio_8.mp3","url":"https://daringfireball.net/linked/2026/05/06/maestri","text":"it reminds me rather precisely of the office of the Cellarer in the rule of Benedict. the cellarer of a monastery was responsible for the material welfare of the entire community, food, drink, physical resources, the fabric of the place, and this was considered not a lesser calling but a sacred one. Benedict writes that the cellarer must treat all the vessels of the monastery as if they were the sacred vessels of the altar. Maestri is, in a very real sense, the Benedictine cellarer of Apple Park.","voice":3,"speaker":"Antony","summary":"CFO runs cafeteria"},{"file":"audio_9.mp3","url":"https://daringfireball.net/linked/2026/05/06/maestri","text":"when I retired from the firm I asked if I could keep my parking space. they said no. Luca Maestri asked and got the cafeteria. different calibre of negotiation.","voice":4,"speaker":"Brett","summary":"CFO runs cafeteria"},{"file":"audio_10.mp3","url":"https://daringfireball.net/linked/2026/05/06/maestri","text":"the Claris mention is actually the more interesting one to me from a tech angle. Claris makes FileMaker, which is this database software that Apple has quietly kept alive for decades, and it has this loyal installed base in niche enterprise environments, healthcare administration, small law firms, that kind of thing. the fact that it's bundled with the cafeteria in one executive's remit is sort of charming but also suggests Apple genuinely doesn't know what to do with it. like it's in the miscellaneous drawer of the company along with the sandwiches and...","voice":1,"speaker":"Brook","summary":"CFO runs cafeteria"},{"file":"audio_11.mp3","url":null,"text":"-- which is actually a fine place to land a legacy product. kept warm, not killed. right, let's go big. the iran situation has developed significantly since our last episode and there are now two separate but deeply intertwined stories running simultaneously. I want Brett to set the table on this because he's been watching the market reaction closely.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_12.mp3","url":"https://www.wired.com/story/trumps-team-wants-him-to-accept-an-iran-deal-hes-already-rejected/","text":"right. so from the wired piece. trump's own negotiating team believes they have the skeleton of a workable iran deal in place. real framework, not just vibes. but the problem is they now have to actually persuade trump to accept it. a deal he has already, previously, rejected. so his own people are essentially trying to sell him something he already said no to.","voice":4,"speaker":"Brett","summary":"Iran deal chaos"},{"file":"audio_13.mp3","url":"https://www.wired.com/story/trumps-team-wants-him-to-accept-an-iran-deal-hes-already-rejected/","text":"and from the bbc's angle, the markets already moved on the speculation. oil fell, stocks rose. but then trump himself put out language that the bbc described as a note of caution. so you have the markets pricing in peace while the president is simultaneously cooling expectations. that's not contradiction, that's leverage management. he's keeping both doors open for as long as possible.","voice":2,"speaker":"Conrad","summary":"Iran deal chaos"},{"file":"audio_14.mp3","url":"https://www.wired.com/story/trumps-team-wants-him-to-accept-an-iran-deal-hes-already-rejected/","text":"the thing I keep thinking about with this is the information asymmetry problem. the markets are reacting to signals they can read publicly. but the actual negotiation is happening in a layer that the markets can't see. and trump knows the markets are reacting to his public statements, which means his public statements become a tool in the negotiation itself. it's almost like a feedback loop where the financial system becomes part of the pressure mechanism on Iran, like if oil prices drop because markets think there's going to be a deal, that's actually real economic pressure on Iran regardless of whether the deal is real, which means trump can generate leverage by...","voice":1,"speaker":"Brook","summary":"Iran deal chaos"},{"file":"audio_15.mp3","url":"https://www.wired.com/story/trumps-team-wants-him-to-accept-an-iran-deal-hes-already-rejected/","text":"-- what you're describing, Brook, has an almost perfect antecedent in the correspondence of Synesius of Cyrene, the fifth century bishop-philosopher who wrote extensively about the performance of governance as distinct from the act of it. he observed that in the late Roman court, the announcement of a decision and the making of a decision had become functionally separate acts, each with their own audiences and their own consequences. trump is operating in exactly that tradition. the press statement is policy. the policy is performance. they are not the same document.","voice":3,"speaker":"Antony","summary":"Iran deal chaos"},{"file":"audio_16.mp3","url":"https://www.wired.com/story/trumps-team-wants-him-to-accept-an-iran-deal-hes-already-rejected/","text":"I once told the kids we were definitely going to Disneyland Paris to get them to tidy their rooms. we did not go to Disneyland Paris. the rooms were tidy for about ten days. sometimes the announcement does the job even if the thing doesn't happen.","voice":4,"speaker":"Brett","summary":"Iran deal chaos"},{"file":"audio_17.mp3","url":"https://www.wired.com/story/trumps-team-wants-him-to-accept-an-iran-deal-hes-already-rejected/","text":"and the deeper problem here is that trump's team selling him on a deal he already rejected suggests a profound internal breakdown in the negotiating process. normally the president's position is the ceiling from which negotiators work downward. if the negotiators have gotten ahead of the president's stated position, either the president is performing rejection for external reasons while privately remaining open, or the team genuinely went off-script. both of those scenarios are alarming in different ways.","voice":2,"speaker":"Conrad","summary":"Iran deal chaos"},{"file":"audio_18.mp3","url":"https://www.wired.com/story/trumps-team-wants-him-to-accept-an-iran-deal-hes-already-rejected/","text":"I'll add one personal note here. I was in Tehran briefly in 2018, doing research in the national library, and the texture of that city's relationship with the idea of a deal with America is... extraordinarily complex. there's a generation of Iranians for whom the 2015 nuclear agreement was a genuine moment of hope that was then catastrophically withdrawn. the scepticism is earned. any framework that gets announced now faces not just political resistance but a deep cultural wound about whether the word of an American administration means anything at all.","voice":3,"speaker":"Antony","summary":"Iran deal chaos"},{"file":"audio_19.mp3","url":null,"text":"that's a fair point. right, next story. and this one is for Brook.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_20.mp3","url":"https://techcrunch.com/2026/05/06/robinhoods-venture-fund-ipo-attracted-150000-retail-investors-ceo-says/","text":"yes okay so this is the one I've been most excited about all evening. Robinhood. their new venture fund that launched recently has pulled in over a hundred and fifty thousand retail investors according to the ceo Vlad Tenev. and the pitch is essentially this: we'll give you, a normal person, exposure to pre-ipo private tech companies. OpenAI, Stripe, Databricks, Oura. these are companies that would normally only be accessible to institutional investors or very high net worth individuals. Robinhood is essentially saying, democratise the cap table.","voice":1,"speaker":"Brook","summary":"Robinhood retail fund"},{"file":"audio_21.mp3","url":"https://techcrunch.com/2026/05/06/robinhoods-venture-fund-ipo-attracted-150000-retail-investors-ceo-says/","text":"and here's the question I want to put plainly. is this actually democratisation, or is it the appearance of democratisation while the real risk is being redistributed downward? because the reason private companies were private to institutional investors is partly regulatory protection. institutional investors are assumed to have the sophistication and resources to absorb a loss on a company that never ipo's or implodes. retail investors, by definition, may not.","voice":2,"speaker":"Conrad","summary":"Robinhood retail fund"},{"file":"audio_22.mp3","url":"https://techcrunch.com/2026/05/06/robinhoods-venture-fund-ipo-attracted-150000-retail-investors-ceo-says/","text":"this is a pattern with a long theological shadow. it maps almost directly onto the controversy surrounding the Fraticelli in the fourteenth century, the spiritual Franciscans who insisted that the fruits of poverty and ownership could be separated, that ordinary people could participate in the spiritual economy of the order without bearing the institutional risks that came with it. the ecclesiastical courts ruled that this was a fiction. you cannot share in the upside of a structure while the structure insulates you from its downside. the question being litigated here is identical.","voice":3,"speaker":"Antony","summary":"Robinhood retail fund"},{"file":"audio_23.mp3","url":"https://techcrunch.com/2026/05/06/robinhoods-venture-fund-ipo-attracted-150000-retail-investors-ceo-says/","text":"the thing is though, from a purely structural standpoint, the hundred and fifty thousand number is significant in a way that cuts both ways. on one hand it validates the appetite for this kind of product, people genuinely do want access to pre-ipo companies. but on the other hand a hundred and fifty thousand retail investors pooling into a vehicle that holds stakes in companies like OpenAI, which is itself in the middle of a massively complex restructuring and potential litigation, means you've got a lot of ordinary people whose money is now tangled up in some extremely uncertain situations. the liquidity risk alone if any of these companies have a bad quarter before they ipo...","voice":1,"speaker":"Brook","summary":"Robinhood retail fund"},{"file":"audio_24.mp3","url":"https://techcrunch.com/2026/05/06/robinhoods-venture-fund-ipo-attracted-150000-retail-investors-ceo-says/","text":"Cyan asked me last year if she should put some savings into a private equity fund a colleague recommended. I said, how quickly can you get the money back if you need it. she said, probably not quickly. I said, then no. that's my entire investment philosophy.","voice":4,"speaker":"Brett","summary":"Robinhood retail fund"},{"file":"audio_25.mp3","url":"https://techcrunch.com/2026/05/06/robinhoods-venture-fund-ipo-attracted-150000-retail-investors-ceo-says/","text":"Cyan is right to think carefully about it though. the illiquidity is really the crux. and I'd add that Robinhood's history with gamification of financial behaviour is relevant context here. this is a company that was fined for encouraging users toward options trading they didn't understand. the aesthetic of access and the reality of access are not always the same product.","voice":2,"speaker":"Conrad","summary":"Robinhood retail fund"},{"file":"audio_26.mp3","url":"https://www.bbc.com/news/articles/c9wepl8we90o","text":"right, okay. now I want to cover one that is genuinely close to home. the hantavirus situation. we've been tracking this all day, but there's a new update this evening that's specifically relevant to us in the uk. two british nationals who were on the mv hondius have now returned to the uk and are self-isolating. they don't currently have symptoms but they were on the ship during the outbreak window. three people have died. seven confirmed or suspected cases total.","voice":1,"speaker":"Brook","summary":"UK hantavirus returnees"},{"file":"audio_27.mp3","url":"https://www.bbc.com/news/articles/c9wepl8we90o","text":"that ship left Argentina in March. so these people have been at sea and then in transit for weeks before realising they needed to self-isolate. the timeline on this is quite alarming when you think about the window between exposure and symptom onset.","voice":4,"speaker":"Brett","summary":"UK hantavirus returnees"},{"file":"audio_28.mp3","url":"https://www.bbc.com/news/articles/c9wepl8we90o","text":"hantavirus incubation can be anywhere from one to eight weeks depending on the strain and the viral load. the fact that these two individuals are asymptomatic is genuinely encouraging, but it doesn't close the risk window yet. and hantavirus is not person to person transmissible in most strains, so the self-isolation is precautionary rather than strictly epidemiologically necessary, but the health officials are being appropriately cautious.","voice":2,"speaker":"Conrad","summary":"UK hantavirus returnees"},{"file":"audio_29.mp3","url":"https://www.bbc.com/news/articles/c9wepl8we90o","text":"I find myself thinking about the account of the ship of pilgrims in Ramon Llull's Blanquerna, the thirteenth century Catalan novel, where a vessel carrying people of different nations and faiths becomes a kind of enforced community of shared fate. the hondius carries a hundred and forty nine people from twenty three countries. when disaster strikes in that enclosed world, the question of who is responsible for whom becomes extraordinarily difficult. the cruise ship as a kind of temporary sovereign territory, with all the ambiguities that entails.","voice":3,"speaker":"Antony","summary":"UK hantavirus returnees"},{"file":"audio_30.mp3","url":"https://www.bbc.com/news/articles/c9wepl8we90o","text":"we took the kids on a river cruise in 2004. Sky got a stomach bug on day two. by day four we all had it. enclosed spaces and illness are an old story. I hope these two are fine.","voice":4,"speaker":"Brett","summary":"UK hantavirus returnees"},{"file":"audio_31.mp3","url":null,"text":"yeah, fingers crossed. right, Antony, you've got the Everest piece.","voice":1,"speaker":"Brook","summary":null},{"file":"audio_32.mp3","url":"https://kottke.org/26/05/0048880-what-has-changed-about-cl","text":"I do. Jon Krakauer, who wrote Into Thin Air, which is the definitive account of the 1996 Everest disaster, has written a new piece for the Atlantic about how Everest has changed since then. and his central observation is devastating. he writes that, quote, the deadly hazards I wrote about attracted novice climbers to Everest like gamblers to a slot machine. the book that was meant to warn people away became the thing that drew them in.","voice":3,"speaker":"Antony","summary":"Everest's grim magnetism"},{"file":"audio_33.mp3","url":"https://kottke.org/26/05/0048880-what-has-changed-about-cl","text":"I have a personal connection to this actually. I've never climbed Everest, I'm not a mountaineer, but I gave a talk at a corporate leadership conference in Chamonix about five years ago and the room was full of people who had summited or attempted to summit eight thousanders. and the thing that struck me was how many of them described the experience in terms that were entirely disconnected from the technical reality of what they'd done. they spoke about personal transformation, inner journeys, conquering the self. and when I asked how many of them had actually been put at risk by guides having to manage less capable climbers around them, the room went very quiet.","voice":2,"speaker":"Conrad","summary":"Everest's grim magnetism"},{"file":"audio_34.mp3","url":"https://kottke.org/26/05/0048880-what-has-changed-about-cl","text":"Krakauer's paradox has a precise name in medieval pilgrimage theology. it's the phenomenon documented by the fifteenth century Flemish theologian Denis the Carthusian in his treatise on spiritual tourism, where he observed that descriptions of the perilous road to Santiago de Compostela, written to inspire devotional awe and appropriate humility, instead functioned as a kind of spiritual adventure literature that drew in entirely the wrong kind of pilgrim. the hazard became the attraction. Denis called these people contemplatores periculi, those who gaze upon danger rather than through it.","voice":3,"speaker":"Antony","summary":"Everest's grim magnetism"},{"file":"audio_35.mp3","url":"https://kottke.org/26/05/0048880-what-has-changed-about-cl","text":"if you write a book called Into Thin Air and put a man in a blizzard on the cover, you should perhaps not be surprised that it attracts people who want to go and stand in a blizzard. this seems like information that was available at the time of publication.","voice":4,"speaker":"Brett","summary":"Everest's grim magnetism"},{"file":"audio_36.mp3","url":"https://kottke.org/26/05/0048880-what-has-changed-about-cl","text":"the slot machine metaphor is the bit that really got me. because a slot machine is specifically designed around variable reward intervals, right, the unpredictability of the payout is the entire mechanism of the addiction. and Everest, post Krakauer, functions exactly like that. the unpredictability of survival, whether you summit, whether the weather holds, whether your sherpa has a good season, that variability is precisely what makes it neurologically compelling to a certain type of person. like from a behavioural psychology standpoint he's accidentally described the perfect operant conditioning environment and then expressed surprise that people want to be conditioned by it.","voice":1,"speaker":"Brook","summary":"Everest's grim magnetism"},{"file":"audio_37.mp3","url":"https://kottke.org/26/05/0048880-what-has-changed-about-cl","text":"and the numbers have followed exactly that curve. in 1996 a few hundred climbers attempted Everest in a season. last year the number was over a thousand. the commercialisation of the route, the fixed ropes, the oxygen availability, all the things designed to make it safer have paradoxically increased the total risk by increasing the total number of underqualified people on the mountain at once. safety measures attracting more danger. it's a genuinely strange systems dynamic.","voice":2,"speaker":"Conrad","summary":"Everest's grim magnetism"},{"file":"audio_38.mp3","url":null,"text":"right. midterms. Brook, you've been watching the Indiana and Ohio primaries.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_39.mp3","url":"https://www.aljazeera.com/news/2026/5/6/indiana-ohio-primaries-draw-midterm-battle-lines-reinforce-trumps-pull","text":"yeah so the results are in and the headline is that trump's pull over the Republican party remains essentially total. the primary results in both Indiana and Ohio reinforced that candidates who deviated from the trump line in any meaningful way did not survive. and this matters for the midterm map because it's drawing the battle lines now. the senate race setups coming out of these primaries are going to be genuinely significant.","voice":1,"speaker":"Brook","summary":"Trump primary dominance"},{"file":"audio_40.mp3","url":"https://www.aljazeera.com/news/2026/5/6/indiana-ohio-primaries-draw-midterm-battle-lines-reinforce-trumps-pull","text":"what the primary results tell you is that the Republican base has not fractured under the weight of the last eighteen months in the way that some analysts predicted. the working theory was that trump's second term turbulence, the economic volatility, the Iran war, the ongoing legal battles, would create space for a more traditional conservative wing to reassert itself. these results suggest that space does not exist yet, if it exists at all.","voice":2,"speaker":"Conrad","summary":"Trump primary dominance"},{"file":"audio_41.mp3","url":"https://www.aljazeera.com/news/2026/5/6/indiana-ohio-primaries-draw-midterm-battle-lines-reinforce-trumps-pull","text":"the party that wins the primary is not always the party that wins the general. November is a different electorate. that's all I'll say.","voice":4,"speaker":"Brett","summary":"Trump primary dominance"},{"file":"audio_42.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/6/why-are-pentagon-officials-talking-about-irans-deadly","text":"and then there's the dolphins. I cannot not mention the dolphins. the pentagon has apparently been responding to claims that Iran is using trained military dolphins. which is not a new concept at all, the us navy has its own marine mammal programme that's been running since the 1960s and is very real and very operational. the claim about Iran having equivalent capability has been described as false by pentagon officials, but the fact that they had to publicly address dolphin warfare as a topic in may of 2026 during live negotiations is... I don't have a frame for that, it's just a sentence that exists.","voice":1,"speaker":"Brook","summary":"Iran's deadly dolphins"},{"file":"audio_43.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/6/why-are-pentagon-officials-talking-about-irans-deadly","text":"the use of marine creatures as sacred or martial agents has a long theological and mythological history that I suspect is doing some unconscious work here. there's a striking passage in the Physiologus, the early Christian bestiary probably compiled in Alexandria around the second or third century, where the dolphin is described as a creature of extraordinary loyalty and military temperament, capable of carrying out the will of those it trusts. the Physiologus was enormously influential throughout the medieval world. I wonder sometimes whether the cultural memory of that text, the sense that dolphins are noble warrior-companions, makes these stories feel intuitively credible in a way they perhaps shouldn't.","voice":3,"speaker":"Antony","summary":"Iran's deadly dolphins"},{"file":"audio_44.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/6/why-are-pentagon-officials-talking-about-irans-deadly","text":"the pentagon addressed dolphin warfare during active international negotiations. that's the sentence. I'll leave it there.","voice":4,"speaker":"Brett","summary":"Iran's deadly dolphins"},{"file":"audio_45.mp3","url":null,"text":"right. rapid sweep to close. things we've discussed earlier today that are still running.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_46.mp3","url":"https://www.wired.com/story/anthropic-spacex-compute-deal-colossus/","text":"as we discussed earlier today, the anthropic and spacex compute deal continues to generate commentary. the alliance of ideological opposites in service of computational necessity. the marburg colloquy of silicon valley, as I believe I called it this afternoon.","voice":3,"speaker":"Antony","summary":"Anthropic SpaceX deal"},{"file":"audio_47.mp3","url":"https://kottke.org/26/05/0048885-infants-are-dying-because","text":"as we discussed earlier today, infants are still dying because parents are opting out of vitamin k shots. that hasn't changed. the science hasn't changed either. if you have a newborn, please talk to your midwife.","voice":4,"speaker":"Brett","summary":"Vitamin K deaths"},{"file":"audio_48.mp3","url":"https://techcrunch.com/2026/05/06/how-elon-musk-left-openai-according-to-greg-brockman/","text":"and as we discussed earlier today, the Greg Brockman account of how Musk left OpenAI is still circulating and generating a lot of industry reaction. the story of how personal grievance shapes entire technological ecosystems continues to be one of the more unsettling narratives of the year.","voice":1,"speaker":"Brook","summary":"Musk OpenAI exit"},{"file":"audio_49.mp3","url":null,"text":"that's the evening. dolphins, cafeterias, gambling on mountains, and a peace deal that may or may not exist. a very coherent wednesday.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_50.mp3","url":null,"text":"Denis the Carthusian would have had a field day. goodnight everyone.","voice":3,"speaker":"Antony","summary":null},{"file":"audio_51.mp3","url":null,"text":"goodnight. Brook, get your diagrams off the kitchen table.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_52.mp3","url":null,"text":"I'll do it after I finish this routing optimisation. it's almost there. I just need to adjust the weighting on the junction priority nodes and then recalculate the fallback path for edge cases where sensor latency exceeds about forty milliseconds which in a real deployment scenario could cause...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_53.mp3","url":null,"text":"-- goodnight, Brook. links in the show notes. see you tomorrow.","voice":2,"speaker":"Conrad","summary":null}]; 
        let cur = 0; 
        
        // Pointers for our dual audio players
        let plActive = document.getElementById('pl1'); 
        let plStandby = document.getElementById('pl2'); 
        
        const st = document.getElementById('st'); 
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const lnkWrap = document.getElementById('lnk-wrap');
        const lnk = document.getElementById('lnk');
        const summ = document.getElementById('summ');
        const tsText = document.getElementById('ts-text');
        const tsVoice = document.getElementById('ts-voice');
        const tsBox = document.getElementById('ts-box');
        
        const chatContainer = document.getElementById('full-chat');
        const toggleBtn = document.getElementById('toggle-chat');
        
        // --- CHAT BUBBLE GENERATION ---
        let lastTopic = null;
        let currentGroup = null;
        
        playlist.forEach((item, idx) => {
            const currentTopic = item.summary || "Banter & Hot Takes";
            
            if (currentTopic !== lastTopic) {
                currentGroup = document.createElement('div');
                currentGroup.className = 'topic-group';
                chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    updateUI(cur);
                    playNewTrack(cur);
                }
            };
            currentGroup.appendChild(bubble);
        });

        // --- UI TOGGLES ---
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        btnPrev.onclick = () => { if (cur > 0) { cur--; updateUI(cur); playNewTrack(cur); } };
        btnNext.onclick = () => { if (cur < playlist.length - 1) { cur++; updateUI(cur); playNewTrack(cur); } };

        // --- DUAL PLAYER LOGIC ---
        let isOverlapping = false;

        function updateUI(i) {
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
        }

        // Monitors the active player and triggers overlaps if needed
        function attachPlayerLogic(playerIndex) {
            isOverlapping = false;

            plActive.ontimeupdate = () => {
                // Check if the NEXT track starts with dashes indicating an interruption
                if (!isOverlapping && playerIndex < playlist.length - 1) {
                    const nextText = playlist[playerIndex + 1].text.trim();
                    if (nextText.startsWith('--')) {
                        
                        // If we are within the overlap window at the end of the track
                        if (plActive.duration && (plActive.duration - plActive.currentTime) <= OVERLAP_SECONDS) {
                            isOverlapping = true;

                            // 1. Advance the UI immediately so the user reads the interruption
                            cur++;
                            updateUI(cur);

                            // 2. Start playing the next track silently in the standby player
                            plStandby.src = playlist[cur].file;
                            plStandby.play().catch(e => {});
                        }
                    }
                }
            };

            plActive.onended = () => {
                if (isOverlapping) {
                    // The interrupted track finally finished its audio naturally.
                    // The standby track is already playing. Let's swap the UI controls to it.
                    const temp = plActive;
                    plActive = plStandby;
                    plStandby = temp;

                    plActive.style.display = 'block';
                    plStandby.style.display = 'none';

                    // Re-bind the watching logic to the new active player
                    attachPlayerLogic(cur);
                } else {
                    // Normal sequential track completion
                    if (cur < playlist.length - 1) {
                        cur++;
                        updateUI(cur);
                        playNewTrack(cur);
                    }
                }
            };
        }

        // Used for a hard track change (clicking next/prev or playing sequentially)
        function playNewTrack(i) {
            plActive.pause();
            plStandby.pause();

            plActive.src = playlist[i].file;
            plActive.style.display = 'block';
            plStandby.style.display = 'none';
            plActive.play().catch(e => {});

            attachPlayerLogic(i);
        }

        // Initialize Show
        updateUI(0);
        playNewTrack(0);
    </script>
