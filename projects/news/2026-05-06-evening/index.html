    <script>
        const OVERLAP_SECONDS = 2; // Adjust this to change how early the interruption starts
        const playlist = [{"file":"audio_0.mp3","url":null,"text":"Right, afternoon everyone! Good to be back. Dad, I hope you've recovered from this morning's drum solo incident.","voice":1,"speaker":"Brook","summary":null},{"file":"audio_1.mp3","url":null,"text":"Zak's apologised. He's bought me a new mug. It says 'World's Most Patient Dad'. I've hidden it.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_2.mp3","url":null,"text":"I spent the lunch break finishing a rather extraordinary monograph on 14th century Flemish devotional confraternities, which I suspect will be relevant later. Just flagging it now.","voice":3,"speaker":"Antony","summary":null},{"file":"audio_3.mp3","url":null,"text":"Of course you did. Right, let's get into it. We've got a genuinely meaty afternoon lineup. Brook, you want to kick us off?","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_4.mp3","url":"https://www.wired.com/story/anthropic-spacex-compute-deal-colossus/","text":"yes! okay so the one I cannot stop thinking about since I first saw it this morning... Anthropic and SpaceX. They've done a deal. Anthropic, which is supposed to be this sort of sober, safety-first ai lab, has signed a compute deal to use resources from Elon Musk's xAI infrastructure. The colossus cluster. I mean... the optics of this are absolutely wild to me.","voice":1,"speaker":"Brook","summary":"Anthropic beds SpaceX"},{"file":"audio_5.mp3","url":"https://www.wired.com/story/anthropic-spacex-compute-deal-colossus/","text":"It is a genuinely strange pairing on the surface. Anthropic was founded partly by people who left OpenAI over concerns about safety culture. And Elon Musk is currently suing OpenAI. So you now have Anthropic using compute from the infrastructure of a man who is at war with the company Anthropic's founders left. That is a tangled web.","voice":2,"speaker":"Conrad","summary":"Anthropic beds SpaceX"},{"file":"audio_6.mp3","url":"https://www.wired.com/story/anthropic-spacex-compute-deal-colossus/","text":"It reminds me enormously of the Colloquy of Marburg in 1529, where Luther and Zwingli were forced to share a table despite being theological enemies, because the political survival of the Reformation depended on it. Two parties whose entire identities are built on opposing doctrines, forced into uncomfortable proximity by the sheer gravitational pull of necessity. Compute is the new political survival.","voice":3,"speaker":"Antony","summary":"Anthropic beds SpaceX"},{"file":"audio_7.mp3","url":"https://www.wired.com/story/anthropic-spacex-compute-deal-colossus/","text":"When Sky was at university she briefly shared a house with a girl she genuinely despised. They had completely opposing views on everything. But the rent was cheap, so they made it work for two years. Same principle.","voice":4,"speaker":"Brett","summary":"Anthropic beds SpaceX"},{"file":"audio_8.mp3","url":"https://www.wired.com/story/anthropic-spacex-compute-deal-colossus/","text":"I mean it's more than just awkward cohabitation though, isn't it? Anthropic literally needs this because the demand for compute is so far outstripping what's available that they'll essentially take it from wherever they can get it. The race for gpu clusters right now is... okay so there are a few different architectures being used and the colossus cluster specifically is running on nvidia h100s which means the interconnect fabric between nodes is going to be...","voice":1,"speaker":"Brook","summary":"Anthropic beds SpaceX"},{"file":"audio_9.mp3","url":"https://www.wired.com/story/anthropic-spacex-compute-deal-colossus/","text":"-- and that's exactly the point, Brook. The principled position becomes unaffordable when you're behind on compute. This is the ai race making ideology a luxury.","voice":2,"speaker":"Conrad","summary":"Anthropic beds SpaceX"},{"file":"audio_10.mp3","url":"https://www.wired.com/story/anthropic-spacex-compute-deal-colossus/","text":"exactly! yes! that's what I'm saying!","voice":1,"speaker":"Brook","summary":"Anthropic beds SpaceX"},{"file":"audio_11.mp3","url":"https://www.wired.com/story/using-ai-negative-impact-thinking-problem-solving-study/","text":"Right. Next big one, and Brook this connects directly to something you'll love. There's a study out today saying that using ai for as little as ten minutes can measurably reduce your ability to think critically and problem solve. This is peer-reviewed research, not a think piece.","voice":2,"speaker":"Conrad","summary":"AI makes you dumb"},{"file":"audio_12.mp3","url":"https://www.wired.com/story/using-ai-negative-impact-thinking-problem-solving-study/","text":"okay so... I have complicated feelings about this one. Because on one hand I use ai tools constantly for my work, like literally constantly, and I think they genuinely augment what I can do. But on the other hand I have noticed that when I use something like copilot to finish a function I'm writing, I sometimes don't fully... like the muscle of actually reasoning through the problem just sort of... atrophies a bit? I noticed it last month when I was debugging a path-planning algorithm for the fleet routing system and I kept reaching for the chat interface instead of just sitting with the problem and...","voice":1,"speaker":"Brook","summary":"AI makes you dumb"},{"file":"audio_13.mp3","url":"https://www.wired.com/story/using-ai-negative-impact-thinking-problem-solving-study/","text":"-- we gave Zak a calculator when he was nine. He forgot how to do long division by ten. Same study, different decade.","voice":4,"speaker":"Brett","summary":"AI makes you dumb"},{"file":"audio_14.mp3","url":"https://www.wired.com/story/using-ai-negative-impact-thinking-problem-solving-study/","text":"There's a fascinating parallel in the Didache, the early Christian teaching document from around the late first century. It warned that disciples who relied entirely on itinerant prophets for spiritual guidance would lose the capacity for their own discernment. The exact same anxiety, just about a different kind of oracle. We outsource the cognition, we lose the muscle. The Didache called it the atrophying of the inner teacher.","voice":3,"speaker":"Antony","summary":"AI makes you dumb"},{"file":"audio_15.mp3","url":"https://www.wired.com/story/using-ai-negative-impact-thinking-problem-solving-study/","text":"And I'll be honest, I've experienced this personally. I started using ai to help draft the structural outline of talks I give, just the skeleton, nothing more. And I found about three weeks in that I was struggling to improvise when an audience took me somewhere unexpected. The scaffolding had become a crutch without me realising. Went cold turkey for a month. It came back, but it took effort.","voice":2,"speaker":"Conrad","summary":"AI makes you dumb"},{"file":"audio_16.mp3","url":"https://www.wired.com/story/using-ai-negative-impact-thinking-problem-solving-study/","text":"that's actually really interesting, Conrad, because the ten minute threshold in the study is surprisingly short. Like ten minutes isn't a deep dive, that's just... asking it to summarise something. Which suggests it might not be about the complexity of the task you're offloading, it might be about the habit of reaching for it at all.","voice":1,"speaker":"Brook","summary":"AI makes you dumb"},{"file":"audio_17.mp3","url":"https://www.wired.com/story/using-ai-negative-impact-thinking-problem-solving-study/","text":"All four of my children are fine. None of them have ai. They have me, which is arguably worse for problem-solving but at least they can still do long division.","voice":4,"speaker":"Brett","summary":"AI makes you dumb"},{"file":"audio_18.mp3","url":"https://kottke.org/26/05/0048885-infants-are-dying-because","text":"right, moving on to something that honestly made my stomach drop when I read it. Parents are opting their newborns out of vitamin k shots. And babies are dying because of it. this is not a fringe thing anymore, this is happening at scale, and the reasoning being given is essentially 'unnecessary medical intervention' which is... i mean the vitamin k shot has been standard since the 1940s, it prevents a bleeding disorder that can cause fatal brain haemorrhage, the science is not ambiguous at all, there's no...","voice":1,"speaker":"Brook","summary":"Vitamin K deaths"},{"file":"audio_19.mp3","url":"https://kottke.org/26/05/0048885-infants-are-dying-because","text":"-- all four of mine had it. didn't ask questions. doctor said needle, baby got needle. that's the full extent of my medical philosophy.","voice":4,"speaker":"Brett","summary":"Vitamin K deaths"},{"file":"audio_20.mp3","url":"https://kottke.org/26/05/0048885-infants-are-dying-because","text":"What strikes me about this is how closely it mirrors the pneumatomachian controversy of the fourth century, where certain communities, in an effort to protect what they perceived as the purity of their faith from what they saw as corrupt institutional interference, ended up severing themselves from doctrines that had kept the broader community theologically stable for generations. The instinct to reject the institution becomes so powerful that it overrides the evidence of what the institution was actually providing. The tragedy is identical in structure.","voice":3,"speaker":"Antony","summary":"Vitamin K deaths"},{"file":"audio_21.mp3","url":"https://kottke.org/26/05/0048885-infants-are-dying-because","text":"And here's what I think the real story is underneath this. It's not about vitamin k specifically. It's about a profound collapse in the concept of institutional trust. People aren't rejecting the shot because they've studied neonatal haematology. They're rejecting it because they no longer believe the people recommending it. And that's a crisis with consequences that extend far beyond one injection. I gave a talk last year to a group of midwives in Bristol about exactly this dynamic, the way medical hesitancy has metastasised from vaccines into routine prophylaxis, and the room was genuinely frightened. These are practitioners watching it happen in real time.","voice":2,"speaker":"Conrad","summary":"Vitamin K deaths"},{"file":"audio_22.mp3","url":"https://kottke.org/26/05/0048885-infants-are-dying-because","text":"When you don't trust the doctor, you end up trusting someone on the internet who sells supplements. This is not an improvement.","voice":4,"speaker":"Brett","summary":"Vitamin K deaths"},{"file":"audio_23.mp3","url":"https://kottke.org/26/05/0048885-infants-are-dying-because","text":"and the really grim irony is that this is connected to the same ai-makes-you-dumb story in a way. people are doing their own research in quotes, which increasingly means asking an ai chatbot, and those systems will often present fringe positions with the same confident tone as established consensus because that's just how the output is generated. i've seen threads where people show screenshots of chatgpt telling them vitamin k has 'unresolved questions' which is just... that's not a thing, medically speaking, that's a hallucination, and it's killing...","voice":1,"speaker":"Brook","summary":"Vitamin K deaths"},{"file":"audio_24.mp3","url":"https://kottke.org/26/05/0048885-infants-are-dying-because","text":"-- that is an important connection and we should probably flag it explicitly. misinformation amplified by ai tools feeding directly into medical decisions with fatal consequences. that's not a hypothetical future risk, that's apparently today.","voice":2,"speaker":"Conrad","summary":"Vitamin K deaths"},{"file":"audio_25.mp3","url":"https://kottke.org/26/05/0048885-infants-are-dying-because","text":"okay. next story please.","voice":4,"speaker":"Brett","summary":"Vitamin K deaths"},{"file":"audio_26.mp3","url":"https://techcrunch.com/2026/05/06/how-elon-musk-left-openai-according-to-greg-brockman/","text":"I'll take this one. There's a development in the Elon Musk and OpenAI saga, specifically Greg Brockman, one of OpenAI's co-founders, has given a detailed account of how Musk actually left the organisation. Apparently Musk wanted control, was denied it, and departed. The details are remarkably candid for the tech world.","voice":3,"speaker":"Antony","summary":"Musk OpenAI exit"},{"file":"audio_27.mp3","url":"https://techcrunch.com/2026/05/06/how-elon-musk-left-openai-according-to-greg-brockman/","text":"and this connects directly to the Anthropic compute story from earlier! because the reason this matters is it explains why Musk's relationship with the ai sector is so combustible. he didn't just leave OpenAI, he left feeling like something was taken from him, and that's coloured everything since, grok, the lawsuit, all of it. the motivations are personal in a way that has massive structural consequences for the whole industry.","voice":1,"speaker":"Brook","summary":"Musk OpenAI exit"},{"file":"audio_28.mp3","url":"https://techcrunch.com/2026/05/06/how-elon-musk-left-openai-according-to-greg-brockman/","text":"what Brockman is doing here is quite unusual. founders almost never air this kind of thing publicly while litigation is still active. the fact that he's chosen to do so now suggests either a strategic communication decision or a sense that the historical record matters enough to risk it. probably both.","voice":2,"speaker":"Conrad","summary":"Musk OpenAI exit"},{"file":"audio_29.mp3","url":"https://techcrunch.com/2026/05/06/how-elon-musk-left-openai-according-to-greg-brockman/","text":"reminds me of the time Brook and Zak had a falling out over a minecraft server when they were teenagers. took six years before either of them told me the full story. and even then I got two completely different versions. I still don't know what actually happened.","voice":4,"speaker":"Brett","summary":"Musk OpenAI exit"},{"file":"audio_30.mp3","url":"https://techcrunch.com/2026/05/06/doj-says-ransomware-gang-tapped-into-russian-government-databases/","text":"Dad I will explain the minecraft thing at a later date. moving on. big cybersecurity story. the doj has confirmed that a ransomware gang wasn't just running independent criminal operations, they were actually tapped into russian government databases. and the arrangement was essentially mutual protection. the gang's leaders got to dodge taxes and avoid military conscription in exchange for what sounds like... access and cover.","voice":1,"speaker":"Brook","summary":"Kremlin ransomware deal"},{"file":"audio_31.mp3","url":"https://techcrunch.com/2026/05/06/doj-says-ransomware-gang-tapped-into-russian-government-databases/","text":"this is significant because it confirms what security researchers have been suggesting for years, which is that the line between state-sponsored cyber activity and organised crime in Russia is not really a line at all. it's a symbiotic arrangement. the state gets deniable capability, the criminals get protection. it's a franchise model, essentially.","voice":2,"speaker":"Conrad","summary":"Kremlin ransomware deal"},{"file":"audio_32.mp3","url":"https://techcrunch.com/2026/05/06/doj-says-ransomware-gang-tapped-into-russian-government-databases/","text":"from a technical standpoint the thing that gets me is the database access direction. they weren't just sheltering these criminals, there was apparently bidirectional data flow. which means if you want to understand what the russian state knows about its own population, you potentially have ransomware operators as an attack surface into that information, which is a truly strange recursion when you think about it, like the corruption is eating itself...","voice":1,"speaker":"Brook","summary":"Kremlin ransomware deal"},{"file":"audio_33.mp3","url":"https://techcrunch.com/2026/05/06/doj-says-ransomware-gang-tapped-into-russian-government-databases/","text":"-- there's an almost perfect structural echo here in the concept of the Khazar correspondence. the tenth century diplomatic letters between Hasdai ibn Shaprut and the Khazar king Joseph, which described a political entity whose entire legitimacy rested on a system of mutually beneficial illegitimacy between the court and the trading networks it depended on. sovereignty and criminality as a single organism. historians debated for centuries whether this arrangement was a strength or the fatal flaw. we may be watching that question answered again.","voice":3,"speaker":"Antony","summary":"Kremlin ransomware deal"},{"file":"audio_34.mp3","url":"https://techcrunch.com/2026/05/06/doj-says-ransomware-gang-tapped-into-russian-government-databases/","text":"I changed all my passwords this morning after Brook's speech earlier. used the same one I always use but added an exclamation mark at the end. very secure now.","voice":4,"speaker":"Brett","summary":"Kremlin ransomware deal"},{"file":"audio_35.mp3","url":"https://www.bbc.com/news/articles/cvgzp74rvj5o","text":"dad that's... that's not how security works but okay. right, the iran situation. this is genuinely developing fast today so let me just lay out where we are. trump has been flagging hopes of some kind of peace deal to end the iran war. markets reacted immediately, oil prices dropped, stock markets rose. but then trump himself injected what the bbc is calling a 'note of caution', which feels like classic negotiating behaviour, keep the markets hopeful but don't close the door on leverage. and meanwhile iran's foreign minister has come out saying iran has attained an elevated international standing during the war, which is a fascinating thing to say when you're supposedly about to make a deal.","voice":1,"speaker":"Brook","summary":"Iran deal tension"},{"file":"audio_36.mp3","url":"https://www.bbc.com/news/articles/cvgzp74rvj5o","text":"the market reaction is the most telling data point here. oil dropping and equities rising simultaneously is the market pricing in a non-trivial probability of de-escalation. but as you say, brook, the iranian fm's language is not the language of a side preparing to make concessions. 'elevated international standing' is the language of a side that believes it has won something. you don't begin negotiations from that rhetorical position unless you intend to negotiate from strength.","voice":2,"speaker":"Conrad","summary":"Iran deal tension"},{"file":"audio_37.mp3","url":"https://www.bbc.com/news/articles/cvgzp74rvj5o","text":"I keep returning to the concept of the Sulh-i Kull, the policy of absolute peace articulated by the mughal emperor Akbar in the late sixteenth century, which was at its core a negotiating framework that only functioned because all parties were allowed to publicly maintain they had not compromised their foundational position. the peace was real, the face-saving performance around it was also real, and both had to coexist. what we may be watching is something structurally similar. trump needs a win, iran needs to not look defeated. the deal, if there is one, will be wrapped in language that lets both claim victory.","voice":3,"speaker":"Antony","summary":"Iran deal tension"},{"file":"audio_38.mp3","url":"https://www.bbc.com/news/articles/cvgzp74rvj5o","text":"we had a similar situation when Brook and Zak argued over who got the last biscuit in 2003. I told them both they won. nobody believed me. but they stopped arguing. sometimes that's enough.","voice":4,"speaker":"Brett","summary":"Iran deal tension"},{"file":"audio_39.mp3","url":"https://www.aljazeera.com/news/2026/5/6/shoot-palestinians-not-settlers-israeli-general-exposes-double-standard","text":"there's also a story adjacent to the iran situation that deserves direct attention. an israeli general has reportedly been exposed giving orders that amount to a two-tier shooting policy in the west bank. essentially different rules of engagement for palestinians versus settlers. leaked comments confirming endemic prejudice at command level. this isn't an anonymous allegation, it's from the head of the israeli army in the west bank.","voice":2,"speaker":"Conrad","summary":"Israeli shooting double standard"},{"file":"audio_40.mp3","url":"https://www.aljazeera.com/news/2026/5/6/shoot-palestinians-not-settlers-israeli-general-exposes-double-standard","text":"what makes this particularly striking from a historical standpoint is that the formal articulation of a two-tier system by a military commander is extraordinarily rare. usually this kind of structural discrimination operates through informal understanding precisely because putting it in documented policy is so legally and politically catastrophic. the fact that it leaked in this form suggests either extraordinary carelessness or a deliberate act by whoever passed it on.","voice":3,"speaker":"Antony","summary":"Israeli shooting double standard"},{"file":"audio_41.mp3","url":"https://www.aljazeera.com/news/2026/5/6/shoot-palestinians-not-settlers-israeli-general-exposes-double-standard","text":"not much to add to that one. it's grim. straightforwardly grim.","voice":4,"speaker":"Brett","summary":"Israeli shooting double standard"},{"file":"audio_42.mp3","url":null,"text":"agreed. right. rapid sweep to close out the day. things we covered this morning that are still moving.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_43.mp3","url":"https://9to5mac.com/2026/05/05/apple-reaches-250m-settlement-over-siri-delays-users-could-get-up-to-95-per-device/","text":"as we discussed earlier today, apple settled that ai lawsuit for 250 million. you might get 25 quid per device. claim it. buy a biscuit.","voice":4,"speaker":"Brett","summary":"Apple AI settlement"},{"file":"audio_44.mp3","url":"https://www.macrumors.com/2026/05/05/apple-mac-studio-mac-mini-ram-cuts/","text":"and as we discussed earlier today, apple are still cutting mac studio and mac mini ram options because of the global memory shortage. nine to ten week delivery times. still painful. still not fixed.","voice":1,"speaker":"Brook","summary":"Apple RAM shortage"},{"file":"audio_45.mp3","url":"https://www.theguardian.com/science/2026/may/04/cruise-ship-suspected-hantavirus-outbreak-blocked-docking-cape-verde","text":"and as we discussed this morning, the hantavirus outbreak on the mv hondius continues. british crew member remains in urgent medical need. three passengers have died. it is not over.","voice":3,"speaker":"Antony","summary":"Hantavirus cruise"},{"file":"audio_46.mp3","url":null,"text":"that's the afternoon. genuinely heavy run of stories today. vitamin k, iran, a ransomware gang embedded inside the russian state, and ai apparently making us all slightly less capable of thinking. cheerful stuff.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_47.mp3","url":null,"text":"on the bright side I solved a routing bug in my autonomous fleet code entirely without ai assistance today. took me four hours but I did it. the study is already working on me.","voice":1,"speaker":"Brook","summary":null},{"file":"audio_48.mp3","url":null,"text":"I'm proud of you, son. that's the most productive thing anyone in this family has done since Sky organised the shed in 2019.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_49.mp3","url":null,"text":"I'll be back tomorrow with thoughts on the flemish confraternities. you'll thank me eventually.","voice":3,"speaker":"Antony","summary":null},{"file":"audio_50.mp3","url":null,"text":"we're counting on it. thanks for listening everyone. links in the show notes for everything we covered. see you tomorrow.","voice":2,"speaker":"Conrad","summary":null}]; 
        let cur = 0; 
        
        // Pointers for our dual audio players
        let plActive = document.getElementById('pl1'); 
        let plStandby = document.getElementById('pl2'); 
        
        const st = document.getElementById('st'); 
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const lnkWrap = document.getElementById('lnk-wrap');
        const lnk = document.getElementById('lnk');
        const summ = document.getElementById('summ');
        const tsText = document.getElementById('ts-text');
        const tsVoice = document.getElementById('ts-voice');
        const tsBox = document.getElementById('ts-box');
        
        const chatContainer = document.getElementById('full-chat');
        const toggleBtn = document.getElementById('toggle-chat');
        
        // --- CHAT BUBBLE GENERATION ---
        let lastTopic = null;
        let currentGroup = null;
        
        playlist.forEach((item, idx) => {
            const currentTopic = item.summary || "Banter & Hot Takes";
            
            if (currentTopic !== lastTopic) {
                currentGroup = document.createElement('div');
                currentGroup.className = 'topic-group';
                chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    updateUI(cur);
                    playNewTrack(cur);
                }
            };
            currentGroup.appendChild(bubble);
        });

        // --- UI TOGGLES ---
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        btnPrev.onclick = () => { if (cur > 0) { cur--; updateUI(cur); playNewTrack(cur); } };
        btnNext.onclick = () => { if (cur < playlist.length - 1) { cur++; updateUI(cur); playNewTrack(cur); } };

        // --- DUAL PLAYER LOGIC ---
        let isOverlapping = false;

        function updateUI(i) {
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
        }

        // Monitors the active player and triggers overlaps if needed
        function attachPlayerLogic(playerIndex) {
            isOverlapping = false;

            plActive.ontimeupdate = () => {
                // Check if the NEXT track starts with dashes indicating an interruption
                if (!isOverlapping && playerIndex < playlist.length - 1) {
                    const nextText = playlist[playerIndex + 1].text.trim();
                    if (nextText.startsWith('--')) {
                        
                        // If we are within the overlap window at the end of the track
                        if (plActive.duration && (plActive.duration - plActive.currentTime) <= OVERLAP_SECONDS) {
                            isOverlapping = true;

                            // 1. Advance the UI immediately so the user reads the interruption
                            cur++;
                            updateUI(cur);

                            // 2. Start playing the next track silently in the standby player
                            plStandby.src = playlist[cur].file;
                            plStandby.play().catch(e => {});
                        }
                    }
                }
            };

            plActive.onended = () => {
                if (isOverlapping) {
                    // The interrupted track finally finished its audio naturally.
                    // The standby track is already playing. Let's swap the UI controls to it.
                    const temp = plActive;
                    plActive = plStandby;
                    plStandby = temp;

                    plActive.style.display = 'block';
                    plStandby.style.display = 'none';

                    // Re-bind the watching logic to the new active player
                    attachPlayerLogic(cur);
                } else {
                    // Normal sequential track completion
                    if (cur < playlist.length - 1) {
                        cur++;
                        updateUI(cur);
                        playNewTrack(cur);
                    }
                }
            };
        }

        // Used for a hard track change (clicking next/prev or playing sequentially)
        function playNewTrack(i) {
            plActive.pause();
            plStandby.pause();

            plActive.src = playlist[i].file;
            plActive.style.display = 'block';
            plStandby.style.display = 'none';
            plActive.play().catch(e => {});

            attachPlayerLogic(i);
        }

        // Initialize Show
        updateUI(0);
        playNewTrack(0);
    </script>
