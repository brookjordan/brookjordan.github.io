ything unless you're running a warehouse or a very unsuccessful library. just keep the files digital. it's cleaner.","voice":4,"speaker":"Brett","summary":"trump epstein library"},{"file":"audio_5.mp3","url":"https://www.wired.com/story/papa-johns-is-getting-into-drone-delivery-but-its-not-flying-pizza/","text":"speaking of logistics... i've been tracking this Papa Johns thing. they are partnering with alphabet's wing for drone delivery, but here is the kicker... it is only for sandwiches. not pizza. because the aerodynamics of a hot, floppy pizza box are a nightmare!!! the wind resistance on a square box creates this oscillating torque that can actually destabilize the flight controller's PID loop if the weight isn't perfectly centered, which is why they are starting with the more compact, dense geometry of a sandwich...","voice":1,"speaker":"Brook","summary":"papa johns drones"},{"file":"audio_6.mp3","url":"https://www.wired.com/story/papa-johns-is-getting-into-drone-delivery-but-its-not-flying-pizza/","text":"-- so the drone is essentially a glorified sandwich courier. it's a high tech solution to a problem that doesn't exist. we already have people who can walk a sandwich across the street. the real story is alphabet testing the urban airspace using a pizza chain as the guinea pig.","voice":2,"speaker":"Conrad","summary":"papa johns drones"},{"file":"audio_7.mp3","url":"https://www.wired.com/story/papa-johns-is-getting-into-drone-delivery-but-its-not-flying-pizza/","text":"it's a proof of concept! if they can solve the edge-case turbulence of a suburban garden, they can scale to anything...","voice":1,"speaker":"Brook","summary":"papa johns drones"},{"file":"audio_8.mp3","url":"https://www.wired.com/story/papa-johns-is-getting-into-drone-delivery-but-its-not-flying-pizza/","text":"i don't want a drone hovering over my fence while i'm trying to prune the hedges. it's a nuisance. just use a bike.","voice":4,"speaker":"Brett","summary":"papa johns drones"},{"file":"audio_9.mp3","url":"https://kottke.org/26/05/0048904-where-are-the-public-benc","text":"i've been reading a fascinating collection of essays from first things. they have a piece on the current state of the internet... comparing it to a city where the public benches have been replaced by spikes to prevent people from resting. a digital architecture of extraction.","voice":3,"speaker":"Antony","summary":"internet public benches"},{"file":"audio_10.mp3","url":"https://kottke.org/26/05/0048904-where-are-the-public-benc","text":"it's true. everything is a walled garden now. we've moved from the open web to these extractive app ecosystems where the API is just a leash... i actually tried to build a decentralized indexing tool last year that would allow for a more organic discovery process, but the way the big players have gated their metadata makes it almost impossible to create a non-commercial space because the cost of crawling the data...","voice":1,"speaker":"Brook","summary":"internet public benches"},{"file":"audio_11.mp3","url":"https://kottke.org/26/05/0048904-where-are-the-public-benc","text":"-- we are talking about the death of the digital commons. we've traded the public square for a series of shopping malls. the profound truth is that we've forgotten how to be bored online, and the platforms have monetized that restlessness.","voice":2,"speaker":"Conrad","summary":"internet public benches"},{"file":"audio_12.mp3","url":"https://kottke.org/26/05/0048904-where-are-the-public-benc","text":"i just tell the kids to put the phone in the kitchen at eight pm. no spikes needed if the device is in another room.","voice":4,"speaker":"Brett","summary":"internet public benches"},{"file":"audio_13.mp3","url":"https://apnews.com/article/trump-correspondents-dinner-allen-shooting-d9a2d4ddab8c6a48d3e365f72eea9a86","text":"right. moving on. some guy in california tried to storm the white house correspondents dinner with guns and knives. he's pleaded not guilty. says he's a friendly federal assassin.","voice":4,"speaker":"Brett","summary":"trump dinner attack"},{"file":"audio_14.mp3","url":"https://apnews.com/article/trump-correspondents-dinner-allen-shooting-d9a2d4ddab8c6a48d3e365f72eea9a86","text":"the term friendly federal assassin is a masterclass in cognitive dissonance. it echoes the paradoxical nature of the court jester in certain late byzantine traditions... figures who were permitted to speak the most brutal truths to the emperor, provided they did so within a framework of ritualised absurdity. this man isn't a jester, but he's using the same language of contradiction to mask a violent impulse.","voice":3,"speaker":"Antony","summary":"trump dinner attack"},{"file":"audio_15.mp3","url":"https://apnews.com/article/trump-correspondents-dinner-allen-shooting-d9a2d4ddab8c6a48d3e365f72eea9a86","text":"the detail about him taking a selfie in the mirror minutes before the attack is the real story. it is the performance of the act for an imaginary audience. he wasn't just attacking a president, he was directing a movie of himself attacking a president. it's the total collapse of the event into the image.","voice":2,"speaker":"Conrad","summary":"trump dinner attack"},{"file":"audio_16.mp3","url":"https://apnews.com/article/trump-correspondents-dinner-allen-shooting-d9a2d4ddab8c6a48d3e365f72eea9a86","text":"if you're going to do something that stupid, don't take a photo of it first. that's just providing the evidence. basic common sense.","voice":4,"speaker":"Brett","summary":"trump dinner attack"},{"file":"audio_17.mp3","url":"https://apnews.com/article/boxcar-train-deaths-laredo-texas-mexico-fdf03f56b3496f6ac063fa6337ce5ccb","text":"wait, i'll take this one. i saw a report that six people were found dead in a cargo train boxcar in texas. it's a disaster. it's a Union Pacific yard near the border. they were just... found during an inspection.","voice":1,"speaker":"Brook","summary":"texas boxcar deaths"},{"file":"audio_18.mp3","url":"https://apnews.com/article/boxcar-train-deaths-laredo-texas-mexico-fdf03f56b3496f6ac063fa6337ce5ccb","text":"the tragedy is the anonymity of it. the report says their travel history is unknown. they became cargo. it is the ultimate expression of the dehumanisation of the border... where people are processed as logistics rather than as human beings.","voice":2,"speaker":"Conrad","summary":"texas boxcar deaths"},{"file":"audio_19.mp3","url":"https://apnews.com/article/boxcar-train-deaths-laredo-texas-mexico-fdf03f56b3496f6ac063fa6337ce5ccb","text":"it's a terrifying way to travel. no ventilation, no water. you can't just hop in a train boxcar and hope for the best. it's a death trap.","voice":4,"speaker":"Brett","summary":"texas boxcar deaths"},{"file":"audio_20.mp3","url":"https://apnews.com/article/boxcar-train-deaths-laredo-texas-mexico-fdf03f56b3496f6ac063fa6337ce5ccb","text":"the temperature swings in texas this time of year are brutal... if the container was sealed, the greenhouse effect would have ramped up the internal temperature to lethal levels within hours because the thermal conductivity of the steel walls...","voice":1,"speaker":"Brook","summary":"texas boxcar deaths"},{"file":"audio_21.mp3","url":"https://apnews.com/article/boxcar-train-deaths-laredo-texas-mexico-fdf03f56b3496f6ac063fa6337ce5ccb","text":"-- it is the modern equivalent of the cargo holds in the early colonial ships. the sheer, crushing weight of the silence in that boxcar... it's a recurring trope of the displaced. the voyage that ends not in a new world, but in a rail yard.","voice":3,"speaker":"Antony","summary":"texas boxcar deaths"},{"file":"audio_22.mp3","url":null,"text":"right. we have a few others. we'll keep it brief.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_23.mp3","url":"https://techcrunch.com/2026/05/11/nyts-wordle-to-become-a-tv-game-show/","text":"wordle is becoming a tv game show. finally, a way to see people struggle with a five letter word in high definition.","voice":1,"speaker":"Brook","summary":"wordle tv show"},{"file":"audio_24.mp3","url":"https://techcrunch.com/2026/05/11/nyts-wordle-to-become-a-tv-game-show/","text":"who is going to watch that? just do the puzzle on your phone and go to bed. it's not a spectator sport.","voice":4,"speaker":"Brett","summary":"wordle tv show"},{"file":"audio_25.mp3","url":"https://www.bbc.com/news/articles/cgmpj0p9k08o?at_medium=RSS&at_campaign=rss","text":"and the nazi looted portrait found in the home of a dutch ss leader's descendants. a painting plundered by goering. it's a ghost returning to the living.","voice":2,"speaker":"Conrad","summary":"looted nazi art"},{"file":"audio_26.mp3","url":"https://www.bbc.com/news/articles/cgmpj0p9k08o?at_medium=RSS&at_campaign=rss","text":"the painting as a stolen soul. it is the classic trope of the cursed object that refuses to stay hidden. it survives the regime that stole it, only to outlive the family that kept it.","voice":3,"speaker":"Antony","summary":"looted nazi art"},{"file":"audio_27.mp3","url":"https://techcrunch.com/2026/05/11/too-early-to-talk-ipo-for-redwood-materials-incoming-cfo-says/","text":"and redwood materials has a new cfo from tesla. they are doing battery recycling. we need this if we're ever going to get a circular economy for lithium...","voice":1,"speaker":"Brook","summary":"redwood materials cfo"},{"file":"audio_28.mp3","url":"https://techcrunch.com/2026/05/11/too-early-to-talk-ipo-for-redwood-materials-incoming-cfo-says/","text":"just make sure the batteries don't leak in the garage. that's all that matters.","voice":4,"speaker":"Brett","summary":"redwood materials cfo"},{"file":"audio_29.mp3","url":null,"text":"we have the rapid sweep now. the things we've been chewing on all day.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_30.mp3","url":"https://www.bbc.com/news/articles/c3r2pr95yq0o?at_medium=RSS&at_campaign=rss","text":"as we discussed earlier today, the starmer leadership challenge. catherine west is still the one to watch. the timeline is tight.","voice":1,"speaker":"Brook","summary":"starmer leadership"},{"file":"audio_31.mp3","url":"https://www.aljazeera.com/news/2026/5/11/israeli-killings-in-lebanon-rise-is-even-the-pretence-of-a-ceasefire-over?traffic_source=rss","text":"as we discussed earlier today, the israel-lebanon killings. the ceasefire is a ghost. the pretense is effectively over.","voice":3,"speaker":"Antony","summary":"lebanon ceasefire"},{"file":"audio_32.mp3","url":"https://www.aljazeera.com/news/2026/5/11/iran-war-effect-why-is-modi-asking-indians-to-avoid-foreign-trips-gold?traffic_source=rss","text":"as we discussed earlier today, modi telling indians to avoid foreign trips and gold because of the iran war. practical advice, if a bit drastic.","voice":4,"speaker":"Brett","summary":"india iran war"},{"file":"audio_33.mp3","url":"https://www.wired.com/story/chevron-wants-school-district-tax-break-data-center-power-plant-texas/","text":"and as we discussed earlier today, the chevron power plant seeking a tax break in texas. the oil giants are still playing the school district game for millions.","voice":2,"speaker":"Conrad","summary":"chevron tax break"},{"file":"audio_34.mp3","url":null,"text":"that is it for the evening. i'm going to go check the locks and turn off the lights. have a quiet night.","voice":4,"speaker":"Brett","summary":null}]; 
        let cur = 0; 
        
        // Pointers for our dual audio players
        let plActive = document.getElementById('pl1'); 
        let plStandby = document.getElementById('pl2'); 
        
        const st = document.getElementById('st'); 
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const lnkWrap = document.getElementById('lnk-wrap');
        const lnk = document.getElementById('lnk');
        const summ = document.getElementById('summ');
        const tsText = document.getElementById('ts-text');
        const tsVoice = document.getElementById('ts-voice');
        const tsBox = document.getElementById('ts-box');
        
        const chatContainer = document.getElementById('full-chat');
        const toggleBtn = document.getElementById('toggle-chat');
        
        // --- CHAT BUBBLE GENERATION ---
        let lastTopic = null;
        let currentGroup = null;
        
        playlist.forEach((item, idx) => {
            const currentTopic = item.summary || "Banter & Hot Takes";
            
            if (currentTopic !== lastTopic) {
                currentGroup = document.createElement('div');
                currentGroup.className = 'topic-group';
                chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    updateUI(cur);
                    playNewTrack(cur);
                }
            };
            currentGroup.appendChild(bubble);
        });

        // --- UI TOGGLES ---
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        btnPrev.onclick = () => { if (cur > 0) { cur--; updateUI(cur); playNewTrack(cur); } };
        btnNext.onclick = () => { if (cur < playlist.length - 1) { cur++; updateUI(cur); playNewTrack(cur); } };

        // --- DUAL PLAYER LOGIC ---
        let isOverlapping = false;

        function updateUI(i) {
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
        }

        // Monitors the active player and triggers overlaps if needed
        function attachPlayerLogic(playerIndex) {
            isOverlapping = false;

            plActive.ontimeupdate = () => {
                // Check if the NEXT track starts with dashes indicating an interruption
                if (!isOverlapping && playerIndex < playlist.length - 1) {
                    const nextText = playlist[playerIndex + 1].text.trim();
                    if (nextText.startsWith('--')) {
                        
                        // If we are within the overlap window at the end of the track
                        if (plActive.duration && (plActive.duration - plActive.currentTime) <= OVERLAP_SECONDS) {
                            isOverlapping = true;

                            // 1. Advance the UI immediately so the user reads the interruption
                            cur++;
                            updateUI(cur);

                            // 2. Start playing the next track silently in the standby player
                            plStandby.src = playlist[cur].file;
                            plStandby.play().catch(e => {});
                        }
                    }
                }
            };

            plActive.onended = () => {
                if (isOverlapping) {
                    // The interrupted track finally finished its audio naturally.
                    // The standby track is already playing. Let's swap the UI controls to it.
                    const temp = plActive;
                    plActive = plStandby;
                    plStandby = temp;

                    plActive.style.display = 'block';
                    plStandby.style.display = 'none';

                    // Re-bind the watching logic to the new active player
                    attachPlayerLogic(cur);
                } else {
                    // Normal sequential track completion
                    if (cur < playlist.length - 1) {
                        cur++;
                        updateUI(cur);
                        playNewTrack(cur);
                    }
                }
            };
        }

        // Used for a hard track change (clicking next/prev or playing sequentially)
        function playNewTrack(i) {
            plActive.pause();
            plStandby.pause();

            plActive.src = playlist[i].file;
            plActive.style.display = 'block';
            plStandby.style.display = 'none';
            plActive.play().catch(e => {});

            attachPlayerLogic(i);
        }

        // Initialize Show
        updateUI(0);
        playNewTrack(0);
    </script>
