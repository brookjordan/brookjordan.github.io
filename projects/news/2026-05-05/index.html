    <script>
        const playlist = [{"file":"audio_0.mp3","url":null,"text":"Good morning, everyone! Welcome to The Morning Download. I'm Brook, your host and resident web developer. I've been up since 4AM fixing a catastrophic CSS bug, and let me tell you, I am WIRED on coffee right now!","voice":1,"speaker":"Brook","summary":null},{"file":"audio_1.mp3","url":null,"text":"Good morning, son. You know, when you were a teenager, you'd stay up all night on that computer too. Your mother and I would find you passed out at the keyboard with those Doritos crumbs all over your face. Some things never change.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_2.mp3","url":null,"text":"DAD! We've talked about this! You can't just tell embarrassing stories about me on air! We're professionals here!","voice":1,"speaker":"Brook","summary":null},{"file":"audio_3.mp3","url":null,"text":"Ah, the family drama unfolds like a Dickensian novel. Speaking of family dynamics, shall we dive into today's headlines? We have quite the Pandora's box to open.","voice":3,"speaker":"Antony","summary":null},{"file":"audio_4.mp3","url":"https://daringfireball.net/2026/05/y_combinators_stake_in_openai","text":"Let's start with something substantial. OpenAI's valuation has hit $852 billion, and there's an interesting story about Y Combinator having a 0.6% stake in it. That's about $5 billion dollars of influence we're talking about.","voice":2,"speaker":"Conrad","summary":"Y Combinator's OpenAI Stake"},{"file":"audio_5.mp3","url":"https://daringfireball.net/2026/05/y_combinators_stake_in_openai","text":"Oh man, I LOVE this story! Tech drama is my absolute jam! So basically, Paul Graham, who's like this god in the startup world, is publicly defending Sam Altman, but conveniently NOT mentioning that he stands to make literal BILLIONS from OpenAI's success. Talk about a conflict of interest!","voice":1,"speaker":"Brook","summary":"Y Combinator's OpenAI Stake"},{"file":"audio_6.mp3","url":"https://daringfireball.net/2026/05/y_combinators_stake_in_openai","text":"It reminds me of Shakespeare's Merchant of Venice – a pound of flesh given for a loan, with high stakes hidden beneath seemingly casual opinions. The public theater of tech discourse often conceals these financial entanglements, much like characters in Renaissance drama hiding their true motivations behind courtly language.","voice":3,"speaker":"Antony","summary":"Y Combinator's OpenAI Stake"},{"file":"audio_7.mp3","url":"https://daringfireball.net/2026/05/y_combinators_stake_in_openai","text":"You know what I always say about money? It's like that time my daughter Cyan asked for a new bicycle. I told her, 'Money doesn't grow on trees, but apparently it does grow on artificial intelligence.' Then I had to explain what AI was. Took three hours. Missed the football.","voice":4,"speaker":"Brett","summary":"Y Combinator's OpenAI Stake"},{"file":"audio_8.mp3","url":"https://daringfireball.net/2026/05/y_combinators_stake_in_openai","text":"Brett, your seemingly random anecdote actually highlights an important point. The general public still has trouble understanding the real-world value of AI. When people like Graham are publicly commenting on Altman's character without disclosing their financial stake, it's a bit like your daughter not understanding where money comes from. Transparency matters, especially when billions are at stake.","voice":2,"speaker":"Conrad","summary":"Y Combinator's OpenAI Stake"},{"file":"audio_9.mp3","url":"https://techcrunch.com/2026/05/04/openais-cozy-partner-cerebras-is-on-track-for-a-blockbuster-ipo/","text":"Speaking of AI companies making absurd amounts of money, have you guys seen this story about Cerebras heading for an IPO that could value it at over $26 billion? And they're apparently super tight with OpenAI too!","voice":1,"speaker":"Brook","summary":"Cerebras IPO Plans"},{"file":"audio_10.mp3","url":"https://techcrunch.com/2026/05/04/openais-cozy-partner-cerebras-is-on-track-for-a-blockbuster-ipo/","text":"Indeed, the AI gold rush continues unabated. Cerebras, with its wafer-scale AI chips, reminds me of the mythological Prometheus bringing fire to humanity. In this modern interpretation, they're bringing computational power that was once the exclusive domain of the gods down to earth. Though unlike Prometheus, they're being handsomely rewarded rather than having their liver pecked out daily.","voice":3,"speaker":"Antony","summary":"Cerebras IPO Plans"},{"file":"audio_11.mp3","url":"https://techcrunch.com/2026/05/04/openais-cozy-partner-cerebras-is-on-track-for-a-blockbuster-ipo/","text":"When I was raising my kids, a chip was something you ate with dip at a party. Now my son Brook keeps talking about chips worth billions. No wonder Zak calls me a boomer. I'm still trying to figure out how to stop my toaster from burning my bread.","voice":4,"speaker":"Brett","summary":"Cerebras IPO Plans"},{"file":"audio_12.mp3","url":null,"text":"Dad, we're not going through the toaster tutorial again on air! And for the last time, I've told you a million times that you're not technically a boomer! You were born in '59, which makes you technically Generation Jones!","voice":1,"speaker":"Brook","summary":null},{"file":"audio_13.mp3","url":"https://techcrunch.com/2026/05/04/u-s-government-warns-of-severe-copyfail-bug-affecting-major-versions-of-linux/","text":"Let's pivot to something a bit more alarming. The US government has issued a warning about a severe bug affecting major versions of Linux called CopyFail. This is potentially disastrous for servers and data centers, and CISA reports it's already being exploited in active hacking campaigns.","voice":2,"speaker":"Conrad","summary":"CopyFail Linux Bug"},{"file":"audio_14.mp3","url":"https://techcrunch.com/2026/05/04/u-s-government-warns-of-severe-copyfail-bug-affecting-major-versions-of-linux/","text":"Oh man, this is BAD. Like, catastrophically bad. Almost every major website and cloud service runs on Linux! I was reading about this last night and it's basically a memory corruption vulnerability that could let hackers execute code remotely. If you're listening and you manage any Linux systems, PATCH THEM NOW! I'm not even kidding!","voice":1,"speaker":"Brook","summary":"CopyFail Linux Bug"},{"file":"audio_15.mp3","url":"https://techcrunch.com/2026/05/04/u-s-government-warns-of-severe-copyfail-bug-affecting-major-versions-of-linux/","text":"The name 'CopyFail' has a certain Kafkaesque quality to it, doesn't it? Like the protagonist in 'The Trial' who's arrested without explanation, our digital infrastructure finds itself vulnerable without warning. In theology, this would be akin to a sudden fall from grace - the once-secure garden of Linux now exposed to serpents bearing malicious code.","voice":3,"speaker":"Antony","summary":"CopyFail Linux Bug"},{"file":"audio_16.mp3","url":"https://techcrunch.com/2026/05/04/u-s-government-warns-of-severe-copyfail-bug-affecting-major-versions-of-linux/","text":"Back in my day, a bug was something you squashed with your shoe. Now they're named like rock bands. CopyFail sounds like something my kids would listen to while wearing those ridiculous baggy pants. By the way, does this mean my internet banking is at risk? I've still got all those Nigerian prince emails to respond to.","voice":4,"speaker":"Brett","summary":"CopyFail Linux Bug"},{"file":"audio_17.mp3","url":null,"text":"DAD! Stop! You DO NOT respond to those emails! We've been over this like a thousand times!","voice":1,"speaker":"Brook","summary":null},{"file":"audio_18.mp3","url":"https://techcrunch.com/2026/05/04/u-s-government-warns-of-severe-copyfail-bug-affecting-major-versions-of-linux/","text":"Brett's joke aside, this is actually a serious concern for everyday users. While you can't directly patch Linux yourself if you're just using online services, it's a good reminder to enable two-factor authentication on all your important accounts and make sure your passwords are strong and unique.","voice":2,"speaker":"Conrad","summary":"CopyFail Linux Bug"},{"file":"audio_19.mp3","url":"https://kottke.org/26/05/new-banksy-blinded-by-nationalism","text":"Ooh, let's switch to something a bit more provocative. Banksy has a new installation in London - it shows a man in a suit walking off a ledge because he's blinded by a flag. It's called 'Blind Patriotism' and it's taking aim at the rise of nationalism in the UK.","voice":1,"speaker":"Brook","summary":"Banksy's New Installation"},{"file":"audio_20.mp3","url":"https://kottke.org/26/05/new-banksy-blinded-by-nationalism","text":"Ah, Banksy continues his role as our modern-day Juvenal, using satire to critique society's excesses. This piece evokes Icarus, flying too close to the sun of nationalistic fervor. There's also a clear parallel to the biblical warning about the blind leading the blind, both falling into a pit. In this case, the pit is quite literal - a commentary perhaps on how nationalism creates its own gravitational pull toward destruction.","voice":3,"speaker":"Antony","summary":"Banksy's New Installation"},{"file":"audio_21.mp3","url":"https://kottke.org/26/05/new-banksy-blinded-by-nationalism","text":"You know, I've always thought patriotism is like disciplining your kids. You love 'em to death but you don't let them get away with everything. My son Brook once tried to convince me his math homework was optional. Much like our country, sometimes you need a firm hand to guide it in the right direction. Though I do wonder why these artists always have to make everything so dramatic. Can't they just paint a nice landscape?","voice":4,"speaker":"Brett","summary":"Banksy's New Installation"},{"file":"audio_22.mp3","url":"https://kottke.org/26/05/new-banksy-blinded-by-nationalism","text":"Brett, your parenting analogy is surprisingly apt. True patriotism involves a critical love - appreciating what works while acknowledging what needs improvement. Banksy's art functions as that critical voice, challenging blind adherence. The installation's location in London is significant too, given the UK's ongoing struggles with defining its post-Brexit identity.","voice":2,"speaker":"Conrad","summary":"Banksy's New Installation"},{"file":"audio_23.mp3","url":"https://kottke.org/26/05/new-banksy-blinded-by-nationalism","text":"I just think it's absolutely BRILLIANT! Banksy always cuts straight to the point. And the fact that he just put it up without permission is so punk rock. I mean, the way politicians are whipping up nationalist sentiment these days is genuinely terrifying. They're literally leading people off a cliff!","voice":1,"speaker":"Brook","summary":"Banksy's New Installation"},{"file":"audio_24.mp3","url":"https://firstthings.com/the-wrongness-of-human-death/","text":"Speaking of profound perspectives on humanity, there's a fascinating piece in First Things titled 'The Wrongness of Human Death' that explores our unique anger at death and how it differs from animal mortality. The author argues that human death cuts short our narrative in a way that feels fundamentally unjust.","voice":3,"speaker":"Antony","summary":"Human Death Philosophy"},{"file":"audio_25.mp3","url":"https://firstthings.com/the-wrongness-of-human-death/","text":"Death is just part of life, son. Like when our family dog Rusty died when Brook was seven. Remember how you wouldn't come out of your room for three days? I told you then that everything that lives must die, but you still made us hold a full funeral with your stuffed animals as mourners. Cost me a perfectly good shoebox.","voice":4,"speaker":"Brett","summary":"Human Death Philosophy"},{"file":"audio_26.mp3","url":null,"text":"OH MY GOD, DAD! Will you STOP with the embarrassing childhood stories?! And for the record, I was NINE, not seven, and Rusty deserved that funeral! He was a good boy!","voice":1,"speaker":"Brook","summary":null},{"file":"audio_27.mp3","url":"https://firstthings.com/the-wrongness-of-human-death/","text":"The article makes that exact point, actually. Animal death feels natural - nature taking back what it gave. But human death feels like a cheat because we're more than our genetics and environment - we're the authors of our own stories. When we die, those stories are cut short. The theological perspective is fascinating too - it suggests God actually causes our anger at death to make us long for resurrection.","voice":3,"speaker":"Antony","summary":"Human Death Philosophy"},{"file":"audio_28.mp3","url":"https://firstthings.com/the-wrongness-of-human-death/","text":"That's a profound observation. Our discomfort with death isn't just emotional - it's existential. If we were merely biological machines, death would be just a mechanical shutdown. But our sense of narrative, of unfinished business, suggests something transcendent about human consciousness that rebels against its own finitude. Whether you're religious or not, that feeling is universal.","voice":2,"speaker":"Conrad","summary":"Human Death Philosophy"},{"file":"audio_29.mp3","url":"https://www.thurrott.com/paul/334577/the-markdown-book-on-writing?utm_source=dlvr.it&utm_medium=mastodon","text":"Wow, this got heavy quick! Hey, on a lighter note, did anyone see that Paul Thurrott might write a book about Markdown? As a web dev, I use Markdown constantly, but I can't imagine reading an entire book about it!","voice":1,"speaker":"Brook","summary":"Thurrott's Markdown Book"},{"file":"audio_30.mp3","url":"https://www.thurrott.com/paul/334577/the-markdown-book-on-writing?utm_source=dlvr.it&utm_medium=mastodon","text":"Ah, the humble Markdown - a syntax so simple yet so powerful. It reminds me of Hemingway's iceberg theory of writing - what you see on the surface is merely a fraction of what lies beneath. John Gruber, Markdown's creator, seems amused by this development. There's something deliciously ironic about a detailed book on a format designed for simplicity, like writing a tome on the art of haiku.","voice":3,"speaker":"Antony","summary":"Thurrott's Markdown Book"},{"file":"audio_31.mp3","url":"https://www.thurrott.com/paul/334577/the-markdown-book-on-writing?utm_source=dlvr.it&utm_medium=mastodon","text":"Back when I was dating your mother, 'marking down' meant the department store was having a sale. Got her a lovely sweater once, half price. She wore it on our third date. Nine months later, Brook was born. Not saying there's a connection, but that sweater worked magic.","voice":4,"speaker":"Brett","summary":"Thurrott's Markdown Book"},{"file":"audio_32.mp3","url":null,"text":"DAAAAD! That's DISGUSTING! Nobody wants to hear about how I was conceived! Can we PLEASE stay professional for just five minutes?!","voice":1,"speaker":"Brook","summary":null},{"file":"audio_33.mp3","url":"https://www.thurrott.com/paul/334577/the-markdown-book-on-writing?utm_source=dlvr.it&utm_medium=mastodon","text":"What's fascinating about Markdown is how it exemplifies the principle that constraints breed creativity. By limiting formatting options, it forces writers to focus on content rather than presentation. There's a lesson here that extends far beyond text formatting - in any creative endeavor, setting boundaries often leads to more innovative solutions.","voice":2,"speaker":"Conrad","summary":"Thurrott's Markdown Book"},{"file":"audio_34.mp3","url":"https://kottke.org/26/05/0048867-you-can-watch-the-whole-m","text":"For the bibliophiles among our listeners, there's a documentary film called 'The Booksellers' about antiquarian and rare book dealers that's now available to watch for free on YouTube. It's a fascinating glimpse into a world where books are not just repositories of knowledge but physical artifacts with their own histories.","voice":3,"speaker":"Antony","summary":"Booksellers Documentary"},{"file":"audio_35.mp3","url":"https://kottke.org/26/05/0048867-you-can-watch-the-whole-m","text":"Oh, that actually sounds really cool! I might check it out. My algorithm feeds are all tech all the time, so it's nice to get recommendations for something different!","voice":1,"speaker":"Brook","summary":"Booksellers Documentary"},{"file":"audio_36.mp3","url":"https://kottke.org/26/05/0048867-you-can-watch-the-whole-m","text":"Books, eh? I've got a garage full of your mother's romance novels. Tried to read one once. Lot of heaving bosoms and throbbing manhoods. Made me uncomfortable. Reminded me of that awkward talk I had with Zak when he was thirteen. Poor kid couldn't look me in the eye for a week.","voice":4,"speaker":"Brett","summary":"Booksellers Documentary"},{"file":"audio_37.mp3","url":"https://kottke.org/26/05/0048867-you-can-watch-the-whole-m","text":"The documentary delves into the tactile relationship we have with physical books - something increasingly rare in our digital age. These antiquarian dealers are like modern monks preserving medieval manuscripts, except instead of religious texts, they're preserving everything from first edition Hemingways to obscure philosophical treatises. There's something deeply moving about their dedication to these physical repositories of human thought.","voice":3,"speaker":"Antony","summary":"Booksellers Documentary"},{"file":"audio_38.mp3","url":"https://www.bbc.com/news/articles/cjwp432d0v5o?at_medium=RSS&at_campaign=rss","text":"Let's quickly cover some international news. US forces have struck Iranian fast boats as Iran attacks a UAE oil facility. Maersk reports one of its US-flagged vessels successfully exited the Strait of Hormuz under US military protection.","voice":2,"speaker":"Conrad","summary":"US-Iran Naval Conflict"},{"file":"audio_39.mp3","url":"https://www.bbc.com/news/articles/cjwp432d0v5o?at_medium=RSS&at_campaign=rss","text":"This is getting seriously scary. The whole situation in the Middle East seems to be escalating by the day. And the Strait of Hormuz is SUPER important for global oil shipping. If that gets disrupted, we could see massive energy price spikes worldwide!","voice":1,"speaker":"Brook","summary":"US-Iran Naval Conflict"},{"file":"audio_40.mp3","url":"https://www.bbc.com/news/articles/cjwp432d0v5o?at_medium=RSS&at_campaign=rss","text":"The Strait of Hormuz has long been what historians call a 'chokepoint' - a geographical feature that concentrates power and conflict. Like the ancient Thermopylae where Spartans made their stand, or the Dardanelles that Byzantine emperors defended for a millennium. These narrow sea passages become the stages upon which the drama of geopolitical struggle unfolds, with global consequences hanging in the balance.","voice":3,"speaker":"Antony","summary":"US-Iran Naval Conflict"},{"file":"audio_41.mp3","url":"https://www.bbc.com/news/articles/cjwp432d0v5o?at_medium=RSS&at_campaign=rss","text":"When I was in the Navy... well, I wasn't in the Navy. But I did own a sailboat for three weeks before your mother made me sell it. Said it was a death trap. She was right. Damn thing nearly capsized with all four kids on board. Still, I understand these strait situations. Like when Zak was caught between wanting to go to prom and being too afraid to ask anyone. Tension on all sides, no good way out.","voice":4,"speaker":"Brett","summary":"US-Iran Naval Conflict"},{"file":"audio_42.mp3","url":"https://www.bbc.com/news/articles/ckgpzgxgz58o?at_medium=RSS&at_campaign=rss","text":"In other tragic news, two people were killed and many injured after a car was driven into a crowd in the German city of Leipzig. A 33-year-old German citizen has been detained. Our thoughts go out to the victims and their families.","voice":2,"speaker":"Conrad","summary":"Leipzig Car Attack"},{"file":"audio_43.mp3","url":"https://www.bbc.com/news/articles/ckgpzgxgz58o?at_medium=RSS&at_campaign=rss","text":"God, that's awful. These vehicle attacks are becoming way too common. I remember when they used to be shocking, but now they happen so often it's horrifying how normalized they've become.","voice":1,"speaker":"Brook","summary":"Leipzig Car Attack"},{"file":"audio_44.mp3","url":"https://www.bbc.com/news/articles/ckgpzgxgz58o?at_medium=RSS&at_campaign=rss","text":"There's an unsettling parallel here to Albert Camus' novel 'The Stranger,' where senseless violence disrupts the social fabric. These attacks represent a profound alienation from the community of humanity - a rejection of the basic social contract that allows cities to function. The vehicle, once a symbol of freedom and connection, perverted into a weapon against the very society that created it.","voice":3,"speaker":"Antony","summary":"Leipzig Car Attack"},{"file":"audio_45.mp3","url":"https://www.bbc.com/news/articles/ckgpzgxgz58o?at_medium=RSS&at_campaign=rss","text":"Terrible business. Reminds me of teaching my four kids to drive. Told them a car is like a loaded weapon - you have to respect its power. People forget that two tons of metal moving at speed is dangerous even without malicious intent. Don't mean to make light of tragedy, just saying we've all got a responsibility when we get behind that wheel.","voice":4,"speaker":"Brett","summary":"Leipzig Car Attack"},{"file":"audio_46.mp3","url":"https://firstthings.com/justice-for-alito-ft-mollie-hemingway/","text":"Finally, there's news about a podcast interview with Mollie Hemingway discussing her book 'Alito: The Justice Who Reshaped the Supreme Court and Restored the Constitution.' It's part of an ongoing series with contributing editor Mark Bauerlein at First Things.","voice":2,"speaker":"Conrad","summary":"Alito Book Interview"},{"file":"audio_47.mp3","url":"https://firstthings.com/justice-for-alito-ft-mollie-hemingway/","text":"Oh great, another book lionizing Alito as some kind of constitutional hero. Look, I'm not getting into the politics, but the guy has been SUPER controversial with some of his opinions. This is definitely going to be a one-sided take!","voice":1,"speaker":"Brook","summary":"Alito Book Interview"},{"file":"audio_48.mp3","url":"https://firstthings.com/justice-for-alito-ft-mollie-hemingway/","text":"The Supreme Court as an institution has always occupied a unique narrative space in American civic religion. Justices are portrayed either as sages or villains depending on one's perspective. It reminds me of how Medieval hagiographies would portray saints - all virtue or all vice with little room for human complexity. Hemingway's book appears to continue this tradition, casting Alito in the role of the constitutional paladin.","voice":3,"speaker":"Antony","summary":"Alito Book Interview"},{"file":"audio_49.mp3","url":"https://firstthings.com/justice-for-alito-ft-mollie-hemingway/","text":"Don't know much about Supreme Court justices. Can't name more than three. But I do know when my kids were fighting, they'd always come to me to settle things. 'Dad, Cyan took my action figure!' 'Dad, Brook's hogging the computer!' You make a ruling, half the family thinks you're Solomon, the other half thinks you're Satan. No different with these judges, I suppose.","voice":4,"speaker":"Brett","summary":"Alito Book Interview"},{"file":"audio_50.mp3","url":null,"text":"And that wraps up our Morning Download for today. We've covered everything from AI billionaires to Banksy, cybersecurity threats to Supreme Court justices. Quite the spectrum of stories.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_51.mp3","url":null,"text":"Thanks for listening, everyone! We'll be back tomorrow with more news and hopefully fewer embarrassing stories about me from my dad. Brett, I swear, we're going to have a serious talk after the show!","voice":1,"speaker":"Brook","summary":null},{"file":"audio_52.mp3","url":null,"text":"As Shakespeare wrote in The Tempest, 'What's past is prologue.' Until tomorrow, dear listeners, when we shall once more unto the breach of breaking news!","voice":3,"speaker":"Antony","summary":null},{"file":"audio_53.mp3","url":null,"text":"Goodbye all! Remember, if you're having trouble with your kids, just wait until they're grown up and you can embarrass them on a podcast. Works wonders. See you tomorrow!","voice":4,"speaker":"Brett","summary":null}]; 
        let cur = 0; 
        const pl = document.getElementById('pl'); 
        const st = document.getElementById('st'); 
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const lnkWrap = document.getElementById('lnk-wrap');
        const lnk = document.getElementById('lnk');
        const summ = document.getElementById('summ');
        const tsText = document.getElementById('ts-text');
        const tsVoice = document.getElementById('ts-voice');
        const tsBox = document.getElementById('ts-box');
        
        const chatContainer = document.getElementById('full-chat');
        const toggleBtn = document.getElementById('toggle-chat');
        
        // Build Interactive Chat Bubbles with Proper Topic Groups
        let lastTopic = null;
        let currentGroup = null;
        
        playlist.forEach((item, idx) => {
            const currentTopic = item.summary || "Banter & Hot Takes";
            
            if (currentTopic !== lastTopic) {
                currentGroup = document.createElement('div');
                currentGroup.className = 'topic-group';
                chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    load(cur);
                    pl.play().catch(e => {});
                }
            };
            currentGroup.appendChild(bubble);
        });

        // Toggle logic hides/shows the single transcript box
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            
            // Hide the active text box when full chat is open
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        // Handle Skip Buttons
        btnPrev.onclick = () => {
            if (cur > 0) {
                cur--;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        btnNext.onclick = () => {
            if (cur < playlist.length - 1) {
                cur++;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        function load(i) { 
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            pl.src = t.file; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
            if (i > 0) pl.play().catch(e => {}); 
        }

        pl.onended = () => { 
            if(cur < playlist.length - 1) {
                cur++; 
                load(cur); 
            }
        }; 
        
        load(0);
    </script>
</body>
</html>
