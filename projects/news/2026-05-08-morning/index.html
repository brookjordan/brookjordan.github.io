        const playlist = [{"file":"audio_0.mp3","url":null,"text":"right. friday afternoon, eighth of may. the morning results are coming in thick now. before we get into it properly... Brook, the diagrams are still in the drawer.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_1.mp3","url":null,"text":"I know dad. I checked this morning. I also clocked that the latency improvement I mentioned actually held across the midday fleet run, which means the toaster corner hypothesis is essentially confirmed at this point, the data is really quite clean, if you look at the standard deviation across the twelve o'clock handshake cycles versus the eight a.m. baseline you can see the...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_2.mp3","url":null,"text":"-- afternoon edition. let's go. we have a lot to get through.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_3.mp3","url":null,"text":"I will note that Aphrahat served me well this morning and I have spent the afternoon with something considerably more peculiar. you will understand when we get there.","voice":3,"speaker":"Antony","summary":null},{"file":"audio_4.mp3","url":"https://www.bbc.com/news/articles/c0ljrp76ywxo","text":"right. biggest story of the afternoon. and I want to be the one to say this because I think it needs saying plainly. the uk council election results are now substantially in and Reform UK has had a historic day. the scale of what has happened today to both Labour and the Conservatives is not a wobble. it is a rout in a significant number of areas.","voice":4,"speaker":"Brett","summary":"Reform historic gains"},{"file":"audio_5.mp3","url":"https://www.bbc.com/news/articles/c0ljrp76ywxo","text":"the maps tell a story that is very hard to argue with. Reform is not just winning in the places you'd expect. the geographic spread of these gains is wider than most polling predicted. there are councils falling that people in those councils genuinely did not expect to fall.","voice":2,"speaker":"Conrad","summary":"Reform historic gains"},{"file":"audio_6.mp3","url":"https://www.bbc.com/news/articles/c0ljrp76ywxo","text":"I went through the ward-level data that's been trickling out through the afternoon because my question from this morning was about whether this was uniform or clustered, and the honest answer is... it is both at once in a way I didn't expect. there are very clear demographic signatures in some of the flipping wards but there are also flips in places that don't fit the profile neatly at all, which suggests the swing has a structural component that goes beyond any single community type, and if you look at the turnout figures alongside the swing data you can see something interesting happening in the relationship between...","voice":1,"speaker":"Brook","summary":"Reform historic gains"},{"file":"audio_7.mp3","url":"https://www.bbc.com/news/articles/cvgz8d556zpo","text":"-- and Wales. Labour has held the Senedd for a century. Chris Mason at the bbc is now saying the early results suggest that run is ending. I want to sit with that for a moment. a hundred years.","voice":4,"speaker":"Brett","summary":"Reform historic gains"},{"file":"audio_8.mp3","url":"https://www.bbc.com/news/articles/cvgz8d556zpo","text":"this morning I invoked al-Shahrastani's typology of pure protest movements and where they fracture at the threshold of governance. this afternoon I want to add something from an entirely different tradition because I think the Wales dimension changes the shape of the thing. there is a treatise by the Welsh Franciscan John of Wales, Communiloquium, written in the late thirteenth century, which is essentially a handbook for those transitioning from opposition to authority. he is writing about princes and counsellors but the frame is surprisingly transferable. his central observation is that the hardest thing for any movement is not winning. it is deciding what it was actually for once the winning is done. Reform is about to discover that question in councils across england and possibly in wales. and John of Wales, of all people, predicted the difficulty with uncomfortable precision.","voice":3,"speaker":"Antony","summary":"Reform historic gains"},{"file":"audio_9.mp3","url":"https://www.bbc.com/news/articles/cvgz8d556zpo","text":"I have watched a lot of elections. I was in the room, actually, at a count in the north of england in 2015 where a seat that had been Labour since 1935 flipped, and I remember the faces of the Labour activists. there was a specific kind of shock that is not just disappointment. it is the shock of something you thought was permanent turning out not to be. I imagine that is what is happening in certain Labour offices in Wales tonight. and I think it is worth saying that whatever you think of the politics, that kind of institutional rupture takes years to process properly.","voice":2,"speaker":"Conrad","summary":"Reform historic gains"},{"file":"audio_10.mp3","url":"https://www.bbc.com/news/articles/cvgz8d556zpo","text":"the practical question that nobody is really asking yet is what happens on monday in the councils Reform has just won. there are roads to maintain and planning applications to process and social care contracts to renew. those things do not pause for a political revolution.","voice":4,"speaker":"Brett","summary":"Reform historic gains"},{"file":"audio_11.mp3","url":"https://www.bbc.com/news/articles/cvgz8d556zpo","text":"exactly right. and that is the test. not the result. what comes after the result.","voice":2,"speaker":"Conrad","summary":"Reform historic gains"},{"file":"audio_12.mp3","url":"https://www.bbc.com/news/articles/c86dp85g59xo","text":"next story and I want to bring this one because it connects to something I genuinely think about from a systems perspective. there has been an exchange of fire in the strait of hormuz overnight. the us and Iran. Trump said this afternoon that the ceasefire is still in place. Iran said it is not. and from a pure logistics standpoint, the strait of hormuz is not an abstract geopolitical flashpoint. it is a physical chokepoint through which roughly a fifth of the world's seaborne oil passes on any given day, and when there is live fire in that corridor the downstream effects on fuel costs and shipping insurance and supply chain modelling are essentially immediate, not weeks away, immediate, and the cascade through to consumer prices is something you can actually model quite precisely if you have the freight data, which I do, and the numbers are...","voice":1,"speaker":"Brook","summary":"Hormuz ceasefire fracturing"},{"file":"audio_13.mp3","url":"https://www.bbc.com/news/articles/c86dp85g59xo","text":"-- oil prices rose today. that is already happening.","voice":4,"speaker":"Brett","summary":"Hormuz ceasefire fracturing"},{"file":"audio_14.mp3","url":"https://www.bbc.com/news/articles/c86dp85g59xo","text":"Trump's phrase this afternoon, that Iran had better sign fast, is precisely the kind of language the Byzantine diplomat and theologian Symeon of Thessalonica analysed in his writings on the ritual of ultimatums. he makes a distinction between a warning issued to create conditions for agreement and a warning issued to create conditions for the appearance of agreement while the situation deteriorates. the latter is, in his framing, the more dangerous because both parties can claim publicly that the truce holds while privately the positions harden. I think we are watching Symeon's second category in real time.","voice":3,"speaker":"Antony","summary":"Hormuz ceasefire fracturing"},{"file":"audio_15.mp3","url":"https://www.aljazeera.com/news/2026/5/8/ukraine-may-have-turned-tide-of-russian-territorial-gains-says-think-tank","text":"the think tank story running alongside this from al Jazeera is also significant. the institute for the study of war is saying Ukraine may have turned the tide on Russian territorial gains, that Moscow's advance is slowing, and that Ukraine is claiming Russia suffered more than thirty-five thousand casualties in April alone. that is an enormous number if accurate. I want to flag that ISW's assessments have been broadly reliable over the course of this conflict but casualty figures from any active warzone should be treated with appropriate caution. what is not in doubt is that the pace of Russian advance appears to have changed.","voice":2,"speaker":"Conrad","summary":"Ukraine tide turning"},{"file":"audio_16.mp3","url":"https://www.aljazeera.com/news/2026/5/8/ukraine-may-have-turned-tide-of-russian-territorial-gains-says-think-tank","text":"thirty-five thousand in a single month is more than the uk armed forces total strength. that number is difficult to fully comprehend.","voice":4,"speaker":"Brett","summary":"Ukraine tide turning"},{"file":"audio_17.mp3","url":"https://www.aljazeera.com/news/2026/5/8/ukraine-may-have-turned-tide-of-russian-territorial-gains-says-think-tank","text":"it is. and if the slowing is real and sustained rather than a temporary operational pause, the strategic calculus for both sides changes in ways that will eventually feed back into whatever diplomatic process is trying to operate in parallel with the fighting.","voice":2,"speaker":"Conrad","summary":"Ukraine tide turning"},{"file":"audio_18.mp3","url":"https://www.aljazeera.com/news/2026/5/8/rubio-meets-pope-leo-can-they-heal-white-house-vatican-rift","text":"now. I want to bring the Rubio and Pope Leo story because it connects directly to what we discussed this morning about Leo's Christocentric vision, and there is a genuine continuation here. Rubio has met with the Pope today in what the state department is calling an effort to underscore strong ties, despite Trump having publicly attacked Leo in recent weeks. the meeting is interesting not just diplomatically but because of what it reveals about the gap between official diplomatic language and the actual texture of the relationship. we talked this morning about Leo's January address to the diplomatic corps, his use of Augustine's two cities, his very direct language about refugees and about the abuse of words as weapons. Rubio sat across from a man who said those things publicly to a room of ambassadors. that meeting has a very specific weight to it.","voice":3,"speaker":"Antony","summary":"Rubio meets Pope Leo"},{"file":"audio_19.mp3","url":"https://www.aljazeera.com/news/2026/5/8/rubio-meets-pope-leo-can-they-heal-white-house-vatican-rift","text":"I said this morning that I find this pope interesting because he has a clear argument and states it directly. I'll add that meeting someone who has publicly criticised your government's approach to refugees and international law and then calling it an underscoring of strong ties requires a particular kind of diplomatic composure.","voice":4,"speaker":"Brett","summary":"Rubio meets Pope Leo"},{"file":"audio_20.mp3","url":"https://www.aljazeera.com/news/2026/5/8/rubio-meets-pope-leo-can-they-heal-white-house-vatican-rift","text":"the real question is whether this meeting does any actual work or whether it is purely performative. the Vatican's position on most of the things the Trump administration is doing has not changed. Leo's language has not softened. a photo opportunity does not resolve a doctrinal and political disagreement. what it does is give both sides a way to claim the relationship is functional while the disagreement continues entirely unchanged.","voice":2,"speaker":"Conrad","summary":"Rubio meets Pope Leo"},{"file":"audio_21.mp3","url":"https://www.aljazeera.com/news/2026/5/8/rubio-meets-pope-leo-can-they-heal-white-house-vatican-rift","text":"there is an extraordinary passage in the Liber Pontificalis, the medieval papal chronicle, describing the meeting between Pope Leo the First, the original Leo, and Attila the Hun on the Mincio river in 452. what strikes scholars is not what was said, because nobody recorded it, but that after the meeting Attila turned around and left Italy. the chroniclers could not fully explain it. the meeting itself was the event. I am not suggesting Rubio is Attila, to be absolutely clear. but there is a long tradition in Vatican diplomacy of the meeting being the message, independent of what is actually agreed.","voice":3,"speaker":"Antony","summary":"Rubio meets Pope Leo"},{"file":"audio_22.mp3","url":"https://www.wired.com/story/best-mobile-gaming-controllers/","text":"right, I want to do the mobile gaming controllers story because I know that sounds lightweight against everything else we've covered but I actually think the wired piece today touches on something genuinely interesting about the convergence of mobile hardware and console gaming. the backbone controller, which wired ranks as their favourite, is essentially a peripheral that completes a loop that started when phones became powerful enough to run console-quality games but remained ergonomically miserable to play them on. what's happened in this product category over the last three years is a compression of the price-performance curve that I find really interesting from a hardware design standpoint, the latency on bluetooth input handling has dropped to the point where it's no longer a meaningful differentiator between mobile and dedicated hardware for most genres, and the implications for how game studios think about their platform distribution strategy are actually quite significant because if a flagship android or ios device with a forty pound controller delivers an experience that is within a few percent of a dedicated console then the addressable market question for studios becomes...","voice":1,"speaker":"Brook","summary":"Mobile gaming controllers"},{"file":"audio_23.mp3","url":"https://www.wired.com/story/best-mobile-gaming-controllers/","text":"Zak went through four different mobile controllers between 2022 and 2024. each one he said was finally the one that solved it. I am now extremely sceptical of the phrase finally the one that solves it in any consumer electronics context.","voice":4,"speaker":"Brett","summary":"Mobile gaming controllers"},{"file":"audio_24.mp3","url":"https://www.wired.com/story/best-mobile-gaming-controllers/","text":"in fairness to Zak the backbone really is different. the latency numbers are genuinely better. I have the benchmarks.","voice":1,"speaker":"Brook","summary":"Mobile gaming controllers"},{"file":"audio_25.mp3","url":"https://www.wired.com/story/best-mobile-gaming-controllers/","text":"he has four controllers in a box in the garage. they all solved it.","voice":4,"speaker":"Brett","summary":"Mobile gaming controllers"},{"file":"audio_26.mp3","url":"https://www.wired.com/story/we-asked-coffee-pros-to-blind-test-coffee-machines-the-results-were-surprising/","text":"and the coffee machine blind test. wired sat coffee industry professionals down, stripped all the branding, and the winner was not what anyone expected. I find this story genuinely delightful because it is a controlled demolition of the kind of received hierarchy that governs most premium consumer categories. the machine that won is almost certainly not the one the professionals would have confidently predicted before tasting. this is precisely what the twelfth-century Andalusian philosopher Ibn Tufayl describes in Hayy ibn Yaqzan, his philosophical novel about a child raised in isolation who reasons his way to truth without inherited categories. the coffee professionals, stripped of brand and price signals, are briefly Hayy ibn Yaqzan. they are tasting without the noise of reputation and discovering that their actual palates disagree with their professional positions. I find that wonderful.","voice":3,"speaker":"Antony","summary":"Coffee blind test shock"},{"file":"audio_27.mp3","url":"https://www.wired.com/story/we-asked-coffee-pros-to-blind-test-coffee-machines-the-results-were-surprising/","text":"I have a personal investment in this story. I have one of those coffee machines that cost a significant amount of money and that I chose largely on the basis of a review from someone whose opinion I respected. and I will admit that I have occasionally wondered whether if someone swapped it for a machine costing a third of the price I would actually notice. the wired test suggests I possibly would not. that is mildly confronting.","voice":2,"speaker":"Conrad","summary":"Coffee blind test shock"},{"file":"audio_28.mp3","url":"https://www.wired.com/story/we-asked-coffee-pros-to-blind-test-coffee-machines-the-results-were-surprising/","text":"I have made coffee in the same cafetiere since 1997. I have never once been surprised by the result.","voice":4,"speaker":"Brett","summary":"Coffee blind test shock"},{"file":"audio_29.mp3","url":"https://www.wired.com/story/we-asked-coffee-pros-to-blind-test-coffee-machines-the-results-were-surprising/","text":"that is actually the most sophisticated coffee setup in this building, dad. you have removed every variable. the cafetiere is a deterministic system.","voice":1,"speaker":"Brook","summary":"Coffee blind test shock"},{"file":"audio_30.mp3","url":"https://www.wired.com/story/we-asked-coffee-pros-to-blind-test-coffee-machines-the-results-were-surviving/","text":"it makes coffee. that was the goal.","voice":4,"speaker":"Brett","summary":"Coffee blind test shock"},{"file":"audio_31.mp3","url":"https://techcrunch.com/2026/05/07/the-back-office-problem-that-explains-why-specialists-never-call-you-back/","text":"right. rapid sweep. stories we've been tracking through the day. as we discussed earlier today, the ai company Basata and the broader question of whether medical administrative staff will be displaced or rescued by automation. the founders say their staff want the help. Brook raised the harder long-term question that will be asked eventually. that conversation is not resolved but it is moving.","voice":2,"speaker":"Conrad","summary":"AI doctor admin recap"},{"file":"audio_32.mp3","url":"https://firstthings.com/pope-leos-christocentric-vision/","text":"as we discussed earlier today, the two First Things pieces on Pope Leo's first year and the theology of the Ascension. the argument that Leo's Christocentrism is not devotional but explicitly political, a claim about where authority actually resides. the Ascension as cosmic legal verdict. Aphrahat the Persian Sage. I stand by all of it.","voice":3,"speaker":"Antony","summary":"Pope Leo vision recap"},{"file":"audio_33.mp3","url":null,"text":"that is the friday afternoon edition. Reform has had a historic day. Labour may lose Wales for the first time in a century. there is live fire in the strait of hormuz and Trump says the ceasefire holds. Ukraine may be turning the tide. a pope and a secretary of state had a meeting that was itself the message. and the coffee professionals were wrong about their own coffee. good friday afternoon everyone.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_34.mp3","url":null,"text":"I am going to go and pull the afternoon telemetry. I want to see whether the midday latency improvement held into the two o'clock fleet cycle because if it did the toaster corner hypothesis is not just confirmed, it is essentially a publishable result at this point, and I have been thinking about a writeup that could actually formalise the methodology because the packet loss correlation across different router distances in a domestic setting is genuinely underexplored in the literature and the data I have from this week alone would form the basis of a really compelling...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_35.mp3","url":null,"text":"-- drawer. good afternoon.","voice":4,"speaker":"Brett","summary":null}]; 
        let cur = 0;

                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
        }

        // Monitors the active player and triggers overlaps if needed
        function attachPlayerLogic(playerIndex) {
            isOverlapping = false;

            plActive.ontimeupdate = () => {
                // Check if the NEXT track starts with dashes indicating an interruption
                if (!isOverlapping && playerIndex < playlist.length - 1) {
                    const nextText = playlist[playerIndex + 1].text.trim();
                    if (nextText.startsWith('--')) {
                        
                        // If we are within the overlap window at the end of the track
                        if (plActive.duration && (plActive.duration - plActive.currentTime) <= OVERLAP_SECONDS) {
                            isOverlapping = true;

                            // 1. Advance the UI immediately so the user reads the interruption
                            cur++;
                            updateUI(cur);

                            // 2. Start playing the next track silently in the standby player
                            plStandby.src = playlist[cur].file;
                            plStandby.play().catch(e => {});
                        }
                    }
                }
            };

            plActive.onended = () => {
                if (isOverlapping) {
                    // The interrupted track finally finished its audio naturally.
                    // The standby track is already playing. Let's swap the UI controls to it.
                    const temp = plActive;
                    plActive = plStandby;
                    plStandby = temp;

                    plActive.style.display = 'block';
                    plStandby.style.display = 'none';

                    // Re-bind the watching logic to the new active player
                    attachPlayerLogic(cur);
                } else {
                    // Normal sequential track completion
                    if (cur < playlist.length - 1) {
                        cur++;
                        updateUI(cur);
                        playNewTrack(cur);
                    }
                }
            };
        }

        // Used for a hard track change (clicking next/prev or playing sequentially)
        function playNewTrack(i) {
            plActive.pause();
            plStandby.pause();

            plActive.src = playlist[i].file;
            plActive.style.display = 'block';
            plStandby.style.display = 'none';
            plActive.play().catch(e => {});

            attachPlayerLogic(i);
        }

        // Initialize Show
        updateUI(0);
        playNewTrack(0);
    </script>
