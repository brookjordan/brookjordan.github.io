    <script>
        const OVERLAP_SECONDS = 2; // Adjust this to change how early the interruption starts
        const playlist = [{"file":"audio_0.mp3","url":null,"text":"right. friday morning, eighth of may. I moved the routing diagrams from the toaster corner back to the second kitchen drawer last night. they are in the drawer. that is where they live.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_1.mp3","url":null,"text":"that drawer is genuinely three metres from the router though, dad. I ran the tests. the latency difference is measurable. I can show you the packet loss graph, it's actually quite striking when you overlay it with the telemetry timestamps from the nine o'clock run, the correlation is...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_2.mp3","url":null,"text":"-- friday, eighth of may. big morning. let's go.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_3.mp3","url":null,"text":"before we do, I will say I spent part of this morning with something that put me in a very particular frame of mind for at least three of today's stories. you'll understand when we get there.","voice":3,"speaker":"Antony","summary":null},{"file":"audio_4.mp3","url":"https://www.wired.com/story/canvas-hack-shinyhunters-ransomware-instructure/","text":"right. let's start with the biggest one this morning. thousands of schools across the united states were effectively shut down yesterday after an education technology company called Instructure pulled the plug on access to its Canvas platform. Canvas is the learning management system that a huge number of american schools and universities run on. teachers couldn't teach. students couldn't access coursework. the reason Instructure shut it down was that they'd been breached by a hacking group called ShinyHunters.","voice":4,"speaker":"Brett","summary":"Canvas schools hacked"},{"file":"audio_5.mp3","url":"https://www.wired.com/story/canvas-hack-shinyhunters-ransomware-instructure/","text":"so ShinyHunters is not a new name in the threat landscape. they've been responsible for some significant data breaches over the last few years, Ticketmaster being the most high profile. what makes this one particularly interesting from a technical standpoint is that Instructure made the call to proactively shut down access rather than try to contain the breach while staying live. that is actually the right call in most ransomware scenarios but it comes with an enormous operational cost, which in this case was measured in disrupted school days for an absolutely staggering number of students. the blast radius of a single point of failure in centralised edtech infrastructure is something people systematically underestimate until something like this happens. Canvas has something like forty percent of the american higher education market plus a significant chunk of k through twelve, so when it goes dark, the number of people affected is not hundreds of thousands, it's in the millions, and the dependency chains are...","voice":1,"speaker":"Brook","summary":"Canvas schools hacked"},{"file":"audio_6.mp3","url":"https://www.wired.com/story/canvas-hack-shinyhunters-ransomware-instructure/","text":"-- there is a word that appeared in the Wired coverage that I think is doing a lot of work and deserves unpacking. the word is paralysed. thousands of schools were paralysed. that is not hyperbole. it is describing a structural dependency that most people didn't know existed until yesterday. the question this raises is not really about ShinyHunters. it's about what it means to have allowed a single commercial platform to become load-bearing infrastructure for a significant fraction of american public education. when that platform goes down, for any reason at all, the educational system it supports stops. that is a systemic vulnerability that predates this breach and will outlast it.","voice":2,"speaker":"Conrad","summary":"Canvas schools hacked"},{"file":"audio_7.mp3","url":"https://www.wired.com/story/canvas-hack-shinyhunters-ransomware-instructure/","text":"I have been thinking about the specific name. ShinyHunters. there is a tradition in certain strands of late antique gnostic literature, particularly the texts associated with the Valentinian school, of describing the Demiurge's agents as beings defined entirely by their appetite for what glitters. the archons in the Tripartite Tractate are described as creatures drawn irresistibly toward surfaces, toward the appearance of value rather than value itself. ShinyHunters is an extraordinarily on-the-nose name for a group whose entire business model is capturing data that shines, credentials, records, access tokens, things that look like treasure to anyone who wants to sell them. they are, in that framework, exactly what the Valentinians feared. entities that mistake luminosity for substance.","voice":3,"speaker":"Antony","summary":"Canvas schools hacked"},{"file":"audio_8.mp3","url":"https://www.wired.com/story/canvas-hack-shinyhunters-ransomware-instructure/","text":"the practical question is what schools are supposed to do on monday if Canvas is still down. that is the question every headteacher and every parent is sitting with this morning. the metaphysics of the hackers' name is interesting but it doesn't answer that question.","voice":4,"speaker":"Brett","summary":"Canvas schools hacked"},{"file":"audio_9.mp3","url":"https://www.wired.com/story/canvas-hack-shinyhunters-ransomware-instructure/","text":"and the answer is basically that they revert to whatever they were doing before Canvas existed. email, shared drives, printed materials, which exposes a second vulnerability that I find almost more troubling than the breach itself. a meaningful number of schools and universities have allowed their non-platform workflows to atrophy to the point where a Canvas outage is genuinely catastrophic rather than just disruptive. the resilience architecture was never built because nobody thought they needed it. which is a lesson that applies to every piece of centralised infrastructure running critical services.","voice":1,"speaker":"Brook","summary":"Canvas schools hacked"},{"file":"audio_10.mp3","url":"https://www.bbc.com/news/articles/cvgz155y9exo","text":"next big story this morning. the uk council elections. and this is a significant set of results. Reform UK has made substantial gains at the expense of both Labour and the Conservatives in the early overnight counts. there is a very real and developing story around Wales specifically, which we will come to in a moment.","voice":2,"speaker":"Conrad","summary":"Reform UK surge"},{"file":"audio_11.mp3","url":"https://www.bbc.com/news/articles/cvgz155y9exo","text":"I have voted in every local election since I was eligible. I will say this: when I see Reform making these gains, my first thought is not ideological. my first thought is that a very large number of people made a decision in a polling booth yesterday that means something specific about how they feel right now. and that feeling did not come from nowhere.","voice":4,"speaker":"Brett","summary":"Reform UK surge"},{"file":"audio_12.mp3","url":"https://www.bbc.com/news/articles/cvgz155y9exo","text":"what strikes me about the Reform surge, and I have been sitting with this since the early results came in at about three this morning, is that it follows a pattern described with remarkable precision in a text that almost nobody outside a very specific academic corner reads. the Kitab al-Milal wa al-Nihal, the Book of Religious and Philosophical Sects, written by al-Shahrastani in the twelfth century. al-Shahrastani is cataloguing movements, and he identifies a recurring typology he calls the people of pure protest, groups whose coherence is entirely negational. they are not defined by what they believe but by what they refuse. their energy is entirely oppositional. the moment they are required to govern, to build, to be responsible for outcomes rather than merely to oppose, the coalition fractures because the only thing holding it together was the shared object of its refusal. Reform is at the exact moment al-Shahrastani describes as the threshold. they have the gains. now comes the test his typology predicts they will struggle to pass.","voice":3,"speaker":"Antony","summary":"Reform UK surge"},{"file":"audio_13.mp3","url":"https://www.bbc.com/news/articles/cvgz155y9exo","text":"that is a genuinely useful frame and I want to extend it practically. I have spent years watching political movements at the point of transition between opposition and responsibility. the ones that survive it are almost always the ones that had, underneath the oppositional energy, some kind of positive programme that their own members actually agreed on. the question for Reform is not whether they can win more councils. clearly they can. the question is whether there is a governing philosophy inside the tent that can hold once the shared enemy, which is variously the political class, immigration policy, net zero, depending on who you ask, is no longer sufficient glue.","voice":2,"speaker":"Conrad","summary":"Reform UK surge"},{"file":"audio_14.mp3","url":"https://www.bbc.com/news/articles/cvgz155y9exo","text":"I have a data question that I genuinely want answered. are these gains happening uniformly across different types of councils or are there specific demographic and geographic profiles of the wards that are flipping to Reform? because if the surge is concentrated in particular kinds of communities then the interpretation is quite different from a genuinely broad national swing. I haven't seen that granular breakdown yet this morning but it matters enormously for reading what this actually means.","voice":1,"speaker":"Brook","summary":"Reform UK surge"},{"file":"audio_15.mp3","url":"https://www.bbc.com/news/articles/cvgz155y9exo","text":"the Wales story is the one I want to make sure we give proper weight to. Labour has held the Senedd, the Welsh parliament, for a hundred years continuously. Labour sources are telling the bbc this morning that they expect that run to end. a century is a long time to hold anything.","voice":4,"speaker":"Brett","summary":"Reform UK surge"},{"file":"audio_16.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/8/trump-says-ceasefire-still-in-effect-but-iran-better-sign-agreement","text":"right. moving on. the Iran situation. Trump has said the ceasefire with Iran is still in effect this morning, but there have been exchanges of fire in the strait of hormuz overnight. Iran is accusing the united states of violating the truce. they allege the us targeted an oil tanker and carried out attacks on coastal areas. Washington's position is that the ceasefire holds. Tehran's position is that it doesn't. those two positions cannot both be true.","voice":2,"speaker":"Conrad","summary":"Iran ceasefire cracks"},{"file":"audio_17.mp3","url":"https://www.bbc.com/news/articles/c626zyywxjno","text":"the phrase Trump used, that Iran had better sign the agreement fast, is the kind of language that in diplomatic history almost always precedes one of two things. either a rapid capitulation or a significant escalation. there is very little middle ground when a head of state issues a public deadline framed as a warning. I was reading this morning a passage from the late Byzantine canonist Matthew Blastares, writing in the fourteenth century about the legal theology of truces, and he makes a distinction that seems almost designed for this moment. he separates a cessation of hostilities, which is a factual condition, from a truce in the proper legal sense, which requires mutual recognition and continuous performance by both parties. what the strait of hormuz incident suggests is that the parties have a cessation on paper and something considerably more contested in practice.","voice":3,"speaker":"Antony","summary":"Iran ceasefire cracks"},{"file":"audio_18.mp3","url":"https://www.bbc.com/news/articles/c626zyywxjno","text":"the strait of hormuz carries about twenty percent of the world's oil supply through it on any given day. when there is live fire in that strait, the number that matters most is the oil price. everything else follows from that.","voice":4,"speaker":"Brett","summary":"Iran ceasefire cracks"},{"file":"audio_19.mp3","url":"https://www.bbc.com/news/articles/c626zyywxjno","text":"and the Germany comment from last night is worth recalling here. Germany's finance minister used the word irresponsible about this war yesterday. this morning we have live fire in the strait of hormuz. the gap between what European allies are saying in public and what the us administration is doing is not closing. it is widening by the hour.","voice":2,"speaker":"Conrad","summary":"Iran ceasefire cracks"},{"file":"audio_20.mp3","url":"https://firstthings.com/pope-leos-christocentric-vision/","text":"I want to bring the Pope Leo story in because I find it genuinely interesting and also because we have two pieces about it this morning that fit together in an unusual way. there's an article from First Things marking the first year of Leo the fourteenth's pontificate. the argument is that his entire approach, his public speeches, his diplomatic address in January, his remarks in Istanbul about what they're calling new Arianism, all of it is built around a single organising principle which is that Christ is not a background figure in the church's public mission but the explicit and named foundation of everything. even the political and diplomatic language.","voice":1,"speaker":"Brook","summary":"Pope Leo's vision"},{"file":"audio_21.mp3","url":"https://firstthings.com/the-conquerors-triumph/","text":"I have been waiting for this one. there is a second piece running alongside it this morning on the Ascension, by German Saucedo, drawing heavily on Joshua Jipp's work on Paul's royal ideology, and the argument is actually more radical than it first appears. the claim is that the Ascension is not a postscript to Easter but the political proclamation that the crucified king has been enthroned over every human authority including the ones that killed him. there is a tradition in certain strands of early Syriac Christianity, specifically in the writings of Aphrahat the Persian Sage from the fourth century, of reading the Ascension as a cosmic legal verdict. the execution was the injustice. the Ascension is the overturning of the verdict at the highest possible level. Leo's Christocentrism maps very precisely onto that framework. he is not making a merely devotional point. he is making a claim about where actual authority resides.","voice":3,"speaker":"Antony","summary":"Pope Leo's vision"},{"file":"audio_22.mp3","url":"https://firstthings.com/pope-leos-christocentric-vision/","text":"I want to make an observation about the political context here, because I think it is easy to read Leo's Christocentric language as purely theological and miss what it is doing in the world. his January address to the diplomatic corps was explicitly framed in terms of Augustine's two cities. he used that framework to talk about refugees, about the dignity of conscience, about the abuse of language as a weapon. that is not abstract theology. that is a pope using a very specific intellectual tradition to critique very specific things happening in the world right now, including things happening in countries whose ambassadors were sitting in the room when he said it.","voice":2,"speaker":"Conrad","summary":"Pope Leo's vision"},{"file":"audio_23.mp3","url":"https://firstthings.com/pope-leos-christocentric-vision/","text":"I am not a religious person but I find this pope more interesting than most. a man who has a clear argument and states it directly and does not appear to be trying to please everyone simultaneously is relatively rare in any institution. whatever you think of the argument itself.","voice":4,"speaker":"Brett","summary":"Pope Leo's vision"},{"file":"audio_24.mp3","url":"https://techcrunch.com/2026/05/07/the-back-office-problem-that-explains-why-specialists-never-call-you-back/","text":"I want to bring the AI healthcare story because it is directly relevant to something most people in the uk experience. there is a piece out this morning asking why you can never get your specialist to call you back. the answer is that medical administrative staff are drowning. a company called Basata is building ai agents specifically for specialist clinic back-office work, referral coordination, prior authorisation, insurance paperwork. the problem they have identified is not the clinical side, it is the enormous amount of administrative labour that sits between a patient's need and the clinical encounter. the founders say the staff they work with are not worried about being replaced by ai. they are worried about drowning without it. and I find that a genuinely important distinction because the automation and displacement conversation usually assumes that workers are afraid. in this case the workers are asking for the help.","voice":1,"speaker":"Brook","summary":"AI fixes doctor chaos"},{"file":"audio_25.mp3","url":"https://techcrunch.com/2026/05/07/the-back-office-problem-that-explains-why-specialists-never-call-you-back/","text":"I want to add a personal note here because I have a close friend who is a consultant neurologist and I've watched his administrative burden increase consistently over the last decade to the point where I'd estimate he spends more time on documentation and coordination than on actual clinical work. he has said to me explicitly that the thing he went to medical school to do is now a minority of his working hours. if an ai system genuinely frees up clinical time by absorbing the administrative overhead, the benefit is not to the machine. it is to the patient who finally gets the call back and to the doctor who went into medicine to practice medicine.","voice":2,"speaker":"Conrad","summary":"AI fixes doctor chaos"},{"file":"audio_26.mp3","url":"https://techcrunch.com/2026/05/07/the-back-office-problem-that-explains-why-specialists-never-call-you-back/","text":"I will say that when Cyan needed a specialist referral sorted last year I spent three weeks leaving voicemails. if an ai can fix that specific problem I am not going to argue about the philosophy of it.","voice":4,"speaker":"Brett","summary":"AI fixes doctor chaos"},{"file":"audio_27.mp3","url":"https://techcrunch.com/2026/05/07/the-back-office-problem-that-explains-why-specialists-never-call-you-back/","text":"the displacement question is the one that Basata's founders are going to have to answer eventually though, and I want to be honest about that because it is the harder long-term question. the immediate case is compelling. the staff want the help, the patients need the calls, the system is under enormous strain. but once the ai handles referral coordination at scale the natural next question from a cost-focused health system administrator is whether you still need the same number of administrative staff at all. that question is not being asked yet because everyone is focused on the drowning problem. but it will be asked, and the founders know it, and the article is to its credit quite transparent about the fact that they do not yet have a fully worked out answer.","voice":1,"speaker":"Brook","summary":"AI fixes doctor chaos"},{"file":"audio_28.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/8/ex-prisoners-recount-abuse-in-israeli-detention-centres","text":"now. Palestinian former detainees speaking out. we touched on the allegations last night. this morning there is new video testimony, former prisoners describing abuse including sexual violence in Israeli detention facilities. this is getting significant coverage across all the major outlets this morning and it sits alongside the active international criminal court investigation that Conrad mentioned last night.","voice":4,"speaker":"Brett","summary":"Israeli detention abuse"},{"file":"audio_29.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/8/ex-prisoners-recount-abuse-in-israeli-detention-centres","text":"the additional video testimony this morning strengthens the evidentiary picture considerably. as I said last night, the distinction that matters legally is between isolated incidents and a systematic pattern. every corroborated account from individuals who had no contact with each other adds to the case that this is the latter. the icc investigation is active. the record being compiled is serious.","voice":2,"speaker":"Conrad","summary":"Israeli detention abuse"},{"file":"audio_30.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/8/ex-prisoners-recount-abuse-in-israeli-detention-centres","text":"I said last night that Shenoute of Atripe wrote about the body of the captive as the site where the humanity of the captor is most fully revealed or most fully destroyed. I keep returning to that framing this morning watching these testimonies. the people speaking are describing what was done to them. but they are also, in the terms of that tradition, describing what was done to the people who did it. both of those things are in the testimony simultaneously and both matter.","voice":3,"speaker":"Antony","summary":"Israeli detention abuse"},{"file":"audio_31.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/8/ex-prisoners-recount-abuse-in-israeli-detention-centres","text":"the people in these videos are telling what happened to them. that is what needs to be heard first. everything else follows from taking that seriously.","voice":4,"speaker":"Brett","summary":"Israeli detention abuse"},{"file":"audio_32.mp3","url":"https://www.bbc.com/news/articles/cdrpxvz61vko","text":"right. rapid sweep. stories we have been tracking through the day. as we discussed earlier today, Labour is expected to lose the Senedd after a century of winning elections in Wales. Labour sources have told the bbc directly that they anticipate the run ending. that is a historic shift in british political geography and we will continue to follow it as the counts come in through the morning.","voice":2,"speaker":"Conrad","summary":"Labour loses Wales"},{"file":"audio_33.mp3","url":"https://www.bbc.com/news/articles/c626zyywxjno","text":"as we discussed earlier today, the us Iran ceasefire is under serious strain. Iran is accusing the us of violating the truce after exchanges of fire in the strait of hormuz overnight. Trump's language this morning, that Iran had better sign the agreement fast, is not the language of a stable diplomatic situation.","voice":1,"speaker":"Brook","summary":"Iran ceasefire cracks"},{"file":"audio_34.mp3","url":null,"text":"that is friday morning. Canvas down for millions of american students, Reform making history in uk councils, fire in the strait of hormuz, a pope with a very clear argument about where authority actually sits, and ai that might finally get your doctor to call you back. have a good friday everyone.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_35.mp3","url":null,"text":"Aphrahat the Persian Sage, the Valentinian archons, al-Shahrastani's people of pure protest, and Matthew Blastares on the legal theology of truces. I consider that a reasonable friday morning. goodnight.","voice":3,"speaker":"Antony","summary":null},{"file":"audio_36.mp3","url":null,"text":"I'm going to go and run the nine o'clock telemetry from the toaster corner. I have the packet loss graphs from last night and the improvement at that location compared to the kitchen drawer is really quite significant, the numbers are something like forty milliseconds improvement in average latency which for fleet coordination over a local network is actually the difference between a clean handshake and a dropped instruction and if you scale that across the whole fleet you're looking at...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_37.mp3","url":null,"text":"-- drawer. the diagrams are in the drawer. have a good morning everyone.","voice":4,"speaker":"Brett","summary":null}];

                chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    updateUI(cur);
                    playNewTrack(cur);
                }
            };
            currentGroup.appendChild(bubble);
        });

        // --- UI TOGGLES ---
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        btnPrev.onclick = () => { if (cur > 0) { cur--; updateUI(cur); playNewTrack(cur); } };
        btnNext.onclick = () => { if (cur < playlist.length - 1) { cur++; updateUI(cur); playNewTrack(cur); } };

        // --- DUAL PLAYER LOGIC ---
        let isOverlapping = false;

        function updateUI(i) {
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
        }

        // Monitors the active player and triggers overlaps if needed
        function attachPlayerLogic(playerIndex) {
            isOverlapping = false;

            plActive.ontimeupdate = () => {
                // Check if the NEXT track starts with dashes indicating an interruption
                if (!isOverlapping && playerIndex < playlist.length - 1) {
                    const nextText = playlist[playerIndex + 1].text.trim();
                    if (nextText.startsWith('--')) {
                        
                        // If we are within the overlap window at the end of the track
                        if (plActive.duration && (plActive.duration - plActive.currentTime) <= OVERLAP_SECONDS) {
                            isOverlapping = true;

                            // 1. Advance the UI immediately so the user reads the interruption
                            cur++;
                            updateUI(cur);

                            // 2. Start playing the next track silently in the standby player
                            plStandby.src = playlist[cur].file;
                            plStandby.play().catch(e => {});
                        }
                    }
                }
            };

            plActive.onended = () => {
                if (isOverlapping) {
                    // The interrupted track finally finished its audio naturally.
                    // The standby track is already playing. Let's swap the UI controls to it.
                    const temp = plActive;
                    plActive = plStandby;
                    plStandby = temp;

                    plActive.style.display = 'block';
                    plStandby.style.display = 'none';

                    // Re-bind the watching logic to the new active player
                    attachPlayerLogic(cur);
                } else {
                    // Normal sequential track completion
                    if (cur < playlist.length - 1) {
                        cur++;
                        updateUI(cur);
                        playNewTrack(cur);
                    }
                }
            };
        }

        // Used for a hard track change (clicking next/prev or playing sequentially)
        function playNewTrack(i) {
            plActive.pause();
            plStandby.pause();

            plActive.src = playlist[i].file;
            plActive.style.display = 'block';
            plStandby.style.display = 'none';
            plActive.play().catch(e => {});

            attachPlayerLogic(i);
        }

        // Initialize Show
        updateUI(0);
        playNewTrack(0);
    </script>
</body>
</html>
