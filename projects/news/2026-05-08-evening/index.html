    <script>
        const OVERLAP_SECONDS = 2; // Adjust this to change how early the interruption starts
        const playlist = [{"file":"audio_0.mp3","url":null,"text":"right. friday evening, eighth of may. let's do the evening run.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_1.mp3","url":null,"text":"busy afternoon. and the evening feed has genuinely added to it. we have the self-driving story that Brook is going to want to talk about, we have Bostrom, we have the election fallout continuing, and a few others worth getting into.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_2.mp3","url":null,"text":"the Avride story jumped out at me immediately, I'll be honest. I saw the headline and felt it in a very specific place.","voice":1,"speaker":"Brook","summary":null},{"file":"audio_3.mp3","url":null,"text":"before we begin I will say only this: I spent the train ride home with a text that I am now extremely glad I brought. it will become clear.","voice":3,"speaker":"Antony","summary":null},{"file":"audio_4.mp3","url":"https://www.bbc.com/news/videos/clyp1qgxke7o","text":"good. let's start with the election. it's the evening and the full picture is sharper now.","voice":4,"speaker":"Brett","summary":"Starmer election fallout"},{"file":"audio_5.mp3","url":"https://www.bbc.com/news/videos/clyp1qgxke7o","text":"Henry Zeffman at the bbc is saying tonight that these results leave Starmer genuinely vulnerable. and I think that is the right word. not finished, not done, but vulnerable in a structural way that is different from a bad polling week. the council results have revealed something about the coalition Labour built in 2024 that is now visibly fraying at multiple edges simultaneously.","voice":2,"speaker":"Conrad","summary":"Starmer election fallout"},{"file":"audio_6.mp3","url":"https://www.bbc.com/news/videos/clyp1qgxke7o","text":"I actually looked at the map data from the bbc interactive this afternoon, the ward-level stuff, and what struck me was the non-uniformity of it. there are clusters that make sense under any model of political realignment and then there are individual ward results that fall completely outside any clean demographic explanation, which suggests to me the swing has at least two distinct components running simultaneously and disentangling them would require a regression across variables that the public data doesn't fully support yet, though if you weight the turnout differentials against the 2024 baseline you start to see...","voice":1,"speaker":"Brook","summary":"Starmer election fallout"},{"file":"audio_7.mp3","url":"https://www.bbc.com/news/videos/clyp1qgxke7o","text":"-- what the maps show clearly, and I'd encourage anyone to look at the bbc's interactive tool tonight, is that this is not geographically contained. the spread matters as much as the depth.","voice":2,"speaker":"Conrad","summary":"Starmer election fallout"},{"file":"audio_8.mp3","url":"https://www.bbc.com/news/videos/clyp1qgxke7o","text":"we spoke this morning about John of Wales and the Communiloquium, the question of what a movement discovers it was actually for once it has won. I want to stay on the other side of that tonight. because the Starmer question is the reverse problem. it is described with uncomfortable precision in the Didascalicon of Hugh of Saint-Victor, writing in the twelfth century, who argues that the greatest danger to any institutional leader is not the external attack but what he calls the dissolution of the interior order, the moment when those who built the structure around you begin privately recalculating whether the structure is still worth defending. Hugh is writing about scholars and abbots but the architecture of loyalty he describes maps directly onto what a party leader faces when the results look like this.","voice":3,"speaker":"Antony","summary":"Starmer election fallout"},{"file":"audio_9.mp3","url":"https://www.bbc.com/news/videos/clyp1qgxke7o","text":"the practical question is whether the people around him tell him the truth on monday morning or whether they tell him a version of the truth that is easier to hear. those are two different mondays.","voice":4,"speaker":"Brett","summary":"Starmer election fallout"},{"file":"audio_10.mp3","url":"https://www.bbc.com/news/videos/clyp1qgxke7o","text":"I have been in enough rooms after bad results to know that the honest conversation almost never happens on the day. it happens about three weeks later when everyone has stopped being kind.","voice":2,"speaker":"Conrad","summary":"Starmer election fallout"},{"file":"audio_11.mp3","url":"https://techcrunch.com/2026/05/08/uber-partner-avride-is-under-investigation-for-self-driving-crashes/","text":"right. I want to do the Avride story because this is the one that, as I said, landed somewhere specific for me personally. the national highway traffic safety administration in the us has opened a formal investigation into Avride, which is Uber's self-driving partner, after identifying more than a dozen crashes and one minor injury. and I want to be careful here because I work in this space and I have views that are not neutral.","voice":1,"speaker":"Brook","summary":"Avride crash probe"},{"file":"audio_12.mp3","url":"https://techcrunch.com/2026/05/08/uber-partner-avride-is-under-investigation-for-self-driving-crashes/","text":"the honest answer is that a dozen crashes across a commercial robotaxi fleet is a number that needs context before you can say anything meaningful about it. context meaning total miles driven, context meaning the nature of each incident, context meaning what the fault distribution looks like across human-initiated versus system-initiated collision scenarios, and the nhtsa investigation is presumably trying to establish exactly that, but the headline number without the denominator is genuinely not enough information to draw a conclusion about whether Avride's safety profile is above or below the human baseline, which is the only comparison that actually matters from a...","voice":1,"speaker":"Brook","summary":"Avride crash probe"},{"file":"audio_13.mp3","url":"https://techcrunch.com/2026/05/08/uber-partner-avride-is-under-investigation-for-self-driving-crashes/","text":"-- Brook. is this the kind of thing that would affect the fleet you run?","voice":4,"speaker":"Brett","summary":"Avride crash probe"},{"file":"audio_14.mp3","url":"https://techcrunch.com/2026/05/08/uber-partner-avride-is-under-investigation-for-self-driving-crashes/","text":"indirectly yes. any formal nhtsa investigation into a commercial robotaxi operator creates regulatory pressure that flows across the entire sector. the certification timelines, the insurance underwriting assumptions, the public trust numbers which we do actually model as a variable in deployment planning. all of those shift when there's a high-profile investigation even if the findings eventually exonerate the operator. the signal gets into the system before the verdict does.","voice":1,"speaker":"Brook","summary":"Avride crash probe"},{"file":"audio_15.mp3","url":"https://techcrunch.com/2026/05/08/uber-partner-avride-is-under-investigation-for-self-driving-crashes/","text":"there's something important in what Brook just said about the signal arriving before the verdict. I think that applies well beyond autonomous vehicles. it is actually one of the defining features of how regulatory and public trust systems work now. the investigation itself is the event. the outcome is almost secondary in terms of its practical effect on the sector.","voice":2,"speaker":"Conrad","summary":"Avride crash probe"},{"file":"audio_16.mp3","url":"https://techcrunch.com/2026/05/08/uber-partner-avride-is-under-investigation-for-self-driving-crashes/","text":"what Brook is describing is the problem that the Flemish theologian Jan van Ruusbroec calls the contamination of the common measure. he is writing in the fourteenth century about monastic communities but his central observation is that when one member of a community is publicly accused, the shadow of the accusation falls on the shared practice of all the others, regardless of their individual guilt. the robotaxi sector is, at this moment, a community in Ruusbroec's sense. Avride's investigation is not contained within Avride.","voice":3,"speaker":"Antony","summary":"Avride crash probe"},{"file":"audio_17.mp3","url":"https://techcrunch.com/2026/05/08/uber-partner-avride-is-under-investigation-for-self-driving-crashes/","text":"that is actually a very precise description of the dynamic. the shared credibility pool is a real thing. we talk about it internally. when Waymo has a good quarter the whole sector benefits in terms of public perception. when anyone has a bad incident the whole sector absorbs some of that cost. it is genuinely a commons problem in the economic sense, and the tragedy of the commons framing would predict exactly the kind of individual incentive to cut corners that good regulation is trying to prevent, which is why I am actually in favour of nhtsa scrutiny even when it is uncomfortable, because the alternative is a race to the bottom on safety that would be catastrophic for the long-term viability of the whole...","voice":1,"speaker":"Brook","summary":"Avride crash probe"},{"file":"audio_18.mp3","url":"https://techcrunch.com/2026/05/08/uber-partner-avride-is-under-investigation-for-self-driving-crashes/","text":"-- noted. next one.","voice":4,"speaker":"Brett","summary":"Avride crash probe"},{"file":"audio_19.mp3","url":"https://www.wired.com/story/nick-bostrom-has-a-plan-for-humanitys-big-retirement/","text":"Nick Bostrom. the philosopher. he has a piece in wired today. I'm going to summarise it and then let the people who enjoy this kind of thing have at it. Bostrom thinks we should build the most advanced ai possible because it will eventually solve every human problem, which he calls a solved world, and then humans can essentially retire. that is the argument.","voice":4,"speaker":"Brett","summary":"Bostrom solved world"},{"file":"audio_20.mp3","url":"https://www.wired.com/story/nick-bostrom-has-a-plan-for-humanitys-big-retirement/","text":"I want to take that seriously rather than dismiss it, because Bostrom is not a crank. his track record on ai risk was considered alarmist a decade ago and is now considered foundational. the solved world framing is interesting precisely because it is honest about what the endpoint actually looks like. most ai optimists dress it up in more modest language. Bostrom just says it plainly: humans stop being economically necessary and that is fine.","voice":2,"speaker":"Conrad","summary":"Bostrom solved world"},{"file":"audio_21.mp3","url":"https://www.wired.com/story/nick-bostrom-has-a-plan-for-humanitys-big-retirement/","text":"I have complicated feelings about this because on one level the engineering logic is seductive. if you could actually build a system that reliably solved coordination problems and resource allocation problems and medical research problems, the utilitarian case is not obviously wrong. but the thing that nags at me is the control problem that Bostrom himself spent years warning about, and the leap from here is the risk to here is the plan that requires the risk seems to me to be doing a lot of work that he doesn't fully account for in the wired piece, at least in the summary, because the verification problem alone...","voice":1,"speaker":"Brook","summary":"Bostrom solved world"},{"file":"audio_22.mp3","url":"https://www.wired.com/story/nick-bostrom-has-a-plan-for-humanitys-big-retirement/","text":"-- I want to come in here because this is the text I was carrying on the train. there is an extraordinary work called the Sefer ha-Temunah, the book of the image, a kabbalistic text from thirteenth century Spain, which describes history as a series of cosmic cycles called shemitot, each governed by a different divine attribute. in the current cycle, the attribute governing reality is din, strict judgement. in the next cycle, the governing attribute will be something entirely different, and the entire framework of human meaning will be restructured. the souls living through the transition between cycles cannot fully comprehend what the next world will look like because their categories of understanding are products of the current cycle. Bostrom's humans in the solved world are precisely the souls at the shemitah boundary. they are being asked to endorse a transition to a mode of existence whose meaning they cannot evaluate from where they currently stand.","voice":3,"speaker":"Antony","summary":"Bostrom solved world"},{"file":"audio_23.mp3","url":"https://www.wired.com/story/nick-bostrom-has-a-plan-for-humanitys-big-retirement/","text":"that is actually the most precise articulation of the epistemological problem with Bostrom's proposal that I have heard. and I want to add a personal note which is that I have given talks on this. I spent an afternoon in 2019 at a conference in rotterdam trying to explain to a room of very smart technologists why the end-state they were describing was not self-evidently desirable and the difficulty was exactly what Antony just identified. they kept saying but imagine the outcome and I kept saying the problem is that I cannot imagine the outcome in any terms that are reliable because the act of imagining it uses the very categories it would abolish.","voice":2,"speaker":"Conrad","summary":"Bostrom solved world"},{"file":"audio_24.mp3","url":"https://www.wired.com/story/nick-bostrom-has-a-plan-for-humanitys-big-retirement/","text":"I spent thirty years raising four children. the goal was that they would eventually not need me. I am not sure I would have described that as a solved world. it was just tuesday.","voice":4,"speaker":"Brett","summary":"Bostrom solved world"},{"file":"audio_25.mp3","url":"https://www.wired.com/story/nick-bostrom-has-a-plan-for-humanitys-big-retirement/","text":"dad that is either the most reductive or the most profound response to Bostrom I have ever heard and I genuinely cannot decide which.","voice":1,"speaker":"Brook","summary":"Bostrom solved world"},{"file":"audio_26.mp3","url":"https://www.wired.com/story/tom-steyer-proposes-jobs-guarantee-to-protect-california-workers-from-ai/","text":"probably both. Tom Steyer in California. gubernatorial candidate. he is proposing a jobs guarantee for workers displaced by ai. wired has the piece. I want to bring this one because it connects to Bostrom but from entirely the other direction.","voice":4,"speaker":"Brett","summary":"California AI jobs"},{"file":"audio_27.mp3","url":"https://www.wired.com/story/tom-steyer-proposes-jobs-guarantee-to-protect-california-workers-from-ai/","text":"it is described as a long-shot proposal in the headline and I think that framing is doing the piece a disservice. the policy substance is genuinely interesting regardless of its electoral viability. a jobs guarantee targeted specifically at ai displacement is a different animal from a universal basic income or a general employment guarantee. it is trying to name the specific harm and create a specific remedy.","voice":2,"speaker":"Conrad","summary":"California AI jobs"},{"file":"audio_28.mp3","url":"https://www.wired.com/story/tom-steyer-proposes-jobs-guarantee-to-protect-california-workers-from-ai/","text":"the implementation problem is enormous though. the definitional challenge alone is genuinely hard. what counts as ai displacement versus automation displacement versus ordinary economic change? in my own sector I have watched roles change in ways that are partially ai-driven, partially just efficiency improvement, partially market restructuring, and those causes are not cleanly separable in any individual case. building a policy guarantee on top of a causal claim that is this difficult to verify is going to create a claims process that is either too narrow to help the people who need it or too broad to be fiscally...","voice":1,"speaker":"Brook","summary":"California AI jobs"},{"file":"audio_29.mp3","url":"https://www.wired.com/story/tom-steyer-proposes-jobs-guarantee-to-protect-california-workers-from-ai/","text":"-- it is still more than most people are proposing. that is worth something.","voice":4,"speaker":"Brett","summary":"California AI jobs"},{"file":"audio_30.mp3","url":"https://www.wired.com/story/tom-steyer-proposes-jobs-guarantee-to-protect-california-workers-from-ai/","text":"Brett is right. the value of naming the problem explicitly in policy terms is not nothing. even if this specific proposal doesn't pass, it shifts what is sayable in the debate. and California is where these things get said first, often years before anywhere else picks them up.","voice":2,"speaker":"Conrad","summary":"California AI jobs"},{"file":"audio_31.mp3","url":"https://firstthings.com/his-serene-holiness/","text":"I want to bring the Pope Leo piece now because it is genuinely substantial and because I have been sitting on it since this morning when we covered the Rubio meeting. the First Things essay tonight is a full year-in assessment of Leo the fourteenth. and I want to say for anyone who thinks papal politics is peripheral to the current moment: it is not. the piece makes the case that Leo is the most strategically positioned world figure right now precisely because of who his critics are.","voice":3,"speaker":"Antony","summary":"Pope Leo one year"},{"file":"audio_32.mp3","url":"https://firstthings.com/his-serene-holiness/","text":"we covered him this morning. what's new tonight?","voice":4,"speaker":"Brett","summary":"Pope Leo one year"},{"file":"audio_33.mp3","url":"https://firstthings.com/his-serene-holiness/","text":"the framing is sharper. the piece tonight is not about the Rubio meeting. it is a full theological and political portrait of a papacy one year in. the argument is that Leo has achieved something unusual: he has restored symbolic continuity with pre-Francis practice, the mozzetta, the Corpus Christi procession, the pallium rite, while continuing to quote Francis's early work. he is not a pope of rupture in either direction. and the title, his serene holiness, is the essay's central claim: that serenity in the current moment is itself a political posture of enormous force.","voice":3,"speaker":"Antony","summary":"Pope Leo one year"},{"file":"audio_34.mp3","url":"https://firstthings.com/his-serene-holiness/","text":"the line in the piece that stayed with me is that a pope cannot choose his adversaries but having the right ones helps. and the essay makes a rigorous case that Leo has inherited a configuration of opponents, the Trump administration's approach to migrants, Tom Homan's extraordinary claim that the Catholic faith always supports law enforcement, the German bishops, the Society of Saint Pius X, that actually consolidates support for him from groups that would otherwise never agree. his adversaries are doing his coalition-building for him.","voice":2,"speaker":"Conrad","summary":"Pope Leo one year"},{"file":"audio_35.mp3","url":"https://firstthings.com/his-serene-holiness/","text":"this morning I referenced the Liber Pontificalis on the original Leo and Attila. tonight I want to add something different. there is a genre of medieval papal biography called the Gesta Pontificum, the deeds of the pontiffs, and the best of them, Eadmer of Canterbury's work on Anselm, makes an observation that the First Things piece independently replicates tonight. Eadmer notes that Anselm's authority derived not from his assertiveness but from the radical consistency of his interior life made visible in action. the curia could not easily outmanoeuvre him because there was no gap between his public position and his private conviction to exploit. the essay tonight is saying Leo has this quality. serenity as a form of strategic invulnerability.","voice":3,"speaker":"Antony","summary":"Pope Leo one year"},{"file":"audio_36.mp3","url":"https://firstthings.com/his-serene-holiness/","text":"I find this pope clearer to follow than most. he says what he thinks and then does what he said. I find that easier to deal with than the alternative.","voice":4,"speaker":"Brett","summary":"Pope Leo one year"},{"file":"audio_37.mp3","url":"https://kottke.org/26/05/0048879-an-analysis-of-18-years-o","text":"right. I want to do the blind date analysis because I know it sounds like a palette cleanser but I actually think there is something genuinely interesting in the methodology. someone has gone back through eighteen years of Guardian blind date columns and analysed what correlates with a successful date. and the finding that jumped out at me is this: a surprising number of successful dates include something embarrassing. a wrong bill, a late arrival, a misread moment. awkward doesn't mean doomed. that is the headline finding.","voice":1,"speaker":"Brook","summary":"Guardian blind date data"},{"file":"audio_38.mp3","url":"https://kottke.org/26/05/0048879-an-analysis-of-18-years-o","text":"I want to take that finding seriously because I think it points to something that is actually quite profound about how human connection works. the embarrassing moment is a test of character that a smooth date cannot provide. it reveals whether someone can handle imperfection with grace, whether they can laugh, whether they recover. you learn more about a person in the two minutes after something goes wrong than in two hours of everything going right. I have been with my wife for thirty-one years and the moment I knew it was serious was when I knocked an entire carafe of red wine across a white tablecloth on our second date and she laughed before I did.","voice":2,"speaker":"Conrad","summary":"Guardian blind date data"},{"file":"audio_39.mp3","url":"https://kottke.org/26/05/0048879-an-analysis-of-18-years-o","text":"there is a remarkably similar observation in the Bahir, the twelfth-century kabbalistic text that is in many ways the ancestor of the Sefer ha-Temunah I mentioned earlier. the Bahir contains a passage on what it calls the sparks hidden in broken vessels, the idea that the shards of something that has been shattered contain more concentrated illumination than the intact vessel ever did. the Guardian data is, essentially, an empirical confirmation of the broken vessel principle applied to romantic encounters. the crack in the evening is where the light gets through.","voice":3,"speaker":"Antony","summary":"Guardian blind date data"},{"file":"audio_40.mp3","url":"https://kottke.org/26/05/0048879-an-analysis-of-18-years-o","text":"Sky rang me last month to tell me about a date that went catastrophically wrong involving a mispronounced restaurant name and a very long silence. she said she liked him more afterwards. I did not fully understand this at the time but I think I do now.","voice":4,"speaker":"Brett","summary":"Guardian blind date data"},{"file":"audio_41.mp3","url":"https://kottke.org/26/05/0048879-an-analysis-of-18-years-o","text":"the thing I find genuinely interesting from a data perspective is the methodology of the study itself. eighteen years of qualitative responses coded for outcome and then cross-referenced against descriptive content. that is a reasonably large natural language dataset and the signal extraction problem is non-trivial because the respondents are not giving structured data, they are giving impressionistic accounts that have to be parsed for emotional valence and then mapped onto a binary success outcome, and doing that reliably across eighteen years of varying writing styles and editorial framing requires either very careful manual annotation or a model that is quite robust to...","voice":1,"speaker":"Brook","summary":"Guardian blind date data"},{"file":"audio_42.mp3","url":"https://kottke.org/26/05/0048879-an-analysis-of-18-years-o","text":"-- the finding is sound. let's take it.","voice":2,"speaker":"Conrad","summary":"Guardian blind date data"},{"file":"audio_43.mp3","url":"https://kottke.org/26/05/0048902-will-be-on-display-at-the","text":"Hilma af Klint. Brook, you brought up her work last month when Sky asked you about art that looked like it was generated by a machine before machines existed. do you want to do this one?","voice":4,"speaker":"Brett","summary":"Hilma af Klint Paris"},{"file":"audio_44.mp3","url":"https://kottke.org/26/05/0048902-will-be-on-display-at-the","text":"yes, good. Hilma af Klint's Paintings for the Temple, the series she made between 1906 and 1915, are going to be at the Grand Palais in Paris from the sixth of May through to the end of August. and I want to say clearly that she is one of the most extraordinary cases in the history of art because she was making large-scale non-representational abstract painting years before Kandinsky, years before Mondrian, years before anyone we conventionally credit with inventing abstraction, and she stipulated in her will that the work not be shown publicly until at least twenty years after her death because she thought the world was not ready for it, which is either a statement of enormous artistic confidence or of genuine spiritual conviction or possibly both, and the technical aspects of the work are fascinating because the scale she was operating at in 1907 and 1908 is comparable to what abstract expressionists were doing in New York in the 1950s, the compositional logic, the use of biomorphic form, the relationship between the individual panel and the series as a whole...","voice":1,"speaker":"Brook","summary":"Hilma af Klint Paris"},{"file":"audio_45.mp3","url":"https://kottke.org/26/05/0048902-will-be-on-display-at-the","text":"-- she was also working within a specific theosophical and spiritualist framework that is not incidental to the paintings. she was receiving what she described as instructions from higher beings she called the High Masters during automatic painting sessions. and I do not say that to reduce the work. I say it because the Paintings for the Temple are not abstract in the way a secular formalist would use that word. they are cosmograms. they are attempts to paint the structure of reality as revealed through interior vision. there is a direct lineage from her practice to the visionary diagram tradition in medieval Islamic thought, specifically the hayakil, the talismanic body diagrams in the works of al-Buni in the thirteenth century, which also attempt to render invisible metaphysical structures in visible geometric form.","voice":3,"speaker":"Antony","summary":"Hilma af Klint Paris"},{"file":"audio_46.mp3","url":"https://kottke.org/26/05/0048902-will-be-on-display-at-the","text":"I saw a large af Klint retrospective in Stockholm about eight years ago, before the major travelling shows, when she was still relatively unknown outside specialist circles. and what I remember most vividly is standing in front of one of the larger works from the Temple series and having the very specific sensation that I was looking at something that had been made for a room I was not in. the scale and the iconographic logic of it was clearly designed for a space and a context that did not yet exist. she was painting for a future she could not specify.","voice":2,"speaker":"Conrad","summary":"Hilma af Klint Paris"},{"file":"audio_47.mp3","url":"https://kottke.org/26/05/0048902-will-be-on-display-at-the","text":"if any of you are near Paris before the end of August it is worth going. that is my contribution.","voice":4,"speaker":"Brett","summary":"Hilma af Klint Paris"},{"file":"audio_48.mp3","url":"https://techcrunch.com/2026/05/08/mother-ventures-is-looking-at-moms-as-the-economic-engine/","text":"Mother Ventures. a vc firm that has just raised ten million pounds, focusing on mothers as consumers, calling them the economic engine. Brook, this one is for you given the family situation.","voice":4,"speaker":"Brett","summary":"Mother Ventures VC"},{"file":"audio_49.mp3","url":"https://techcrunch.com/2026/05/08/mother-ventures-is-looking-at-moms-as-the-economic-engine/","text":"I mean Cyan is going to have feelings about being called an economic engine but she will also be the first to tell you that she makes the majority of the household purchasing decisions in her flat. that is just true. the market logic of a fund focused on this demographic is not obscure. the interesting question is whether the fund thesis is about products for mothers or products that mothers happen to control purchasing decisions for, because those are quite different investment strategies and the framing in the techcrunch piece is a bit ambiguous on which one they actually mean.","voice":1,"speaker":"Brook","summary":"Mother Ventures VC"},{"file":"audio_50.mp3","url":"https://techcrunch.com/2026/05/08/mother-ventures-is-looking-at-moms-as-the-economic-engine/","text":"the framing of mothers as an underserved market is interesting because it implies that the existing consumer market has systematically priced or designed around them, which given that they control an enormous share of household spending is a genuinely peculiar failure if true. but I think the more interesting embedded claim is that the companies serving this demographic have historically been built by people who are not in it. and there is reasonable evidence that that gap produces blind spots in product design that a founder who is in the demographic would not have.","voice":2,"speaker":"Conrad","summary":"Mother Ventures VC"},{"file":"audio_51.mp3","url":"https://techcrunch.com/2026/05/08/mother-ventures-is-looking-at-moms-as-the-economic-engine/","text":"Sky would say the problem is not that the products don't exist. the problem is that the products exist but they are priced as though the buyer has no choice. which, in many categories, is broadly accurate.","voice":4,"speaker":"Brett","summary":"Mother Ventures VC"},{"file":"audio_52.mp3","url":"https://techcrunch.com/2026/05/08/mother-ventures-is-looking-at-moms-as-the-economic-engine/","text":"that is a sharper critique of the market than most vc pitches contain.","voice":2,"speaker":"Conrad","summary":"Mother Ventures VC"},{"file":"audio_53.mp3","url":"https://www.aljazeera.com/sports/2026/5/8/olympic-waterpolo-coach-players-resign-over-belittling-and-lack-of-respect","text":"Sky says a lot of sharp things. she did not get it from me. right. serbia water polo. this one's quick but it's worth thirty seconds.","voice":4,"speaker":"Brett","summary":"Serbia waterpolo walkout"},{"file":"audio_54.mp3","url":"https://www.aljazeera.com/sports/2026/5/8/olympic-waterpolo-coach-players-resign-over-belittling-and-lack-of-respect","text":"the olympic and european champion water polo squad from serbia has resigned en masse. coach and players together. the stated reason is that the federation chief has shown a sustained lack of respect for their efforts. this is not one unhappy player. this is a collective resignation from the best water polo team in the world.","voice":2,"speaker":"Conrad","summary":"Serbia waterpolo walkout"},{"file":"audio_55.mp3","url":"https://www.aljazeera.com/sports/2026/5/8/olympic-waterpolo-coach-players-resign-over-belittling-and-lack-of-respect","text":"mass resignation by a successful collective against a governing body is one of the oldest protest forms in recorded institutional history. the Roman plebeians did it. they called it the secessio. they simply left and waited. what makes the Serbia case interesting is that the leverage is genuine. the team are the champions. the federation has no product without them.","voice":3,"speaker":"Antony","summary":"Serbia waterpolo walkout"},{"file":"audio_56.mp3","url":"https://www.aljazeera.com/sports/2026/5/8/olympic-waterpolo-coach-players-resign-over-belittling-and-lack-of-respect","text":"I once resigned from a job by simply not coming back on a monday. I did not have olympic medals. it was less effective.","voice":4,"speaker":"Brett","summary":"Serbia waterpolo walkout"},{"file":"audio_57.mp3","url":"https://www.aljazeera.com/sports/2026/5/8/how-and-when-can-arsenal-or-man-city-win-the-premier-league","text":"right. premier league. Arsenal and Manchester City. the race is genuinely tight going into the weekend. City face Brentford on saturday. Arsenal go to West Ham on sunday. this is the al Jazeera breakdown of the permutations and it is worth flagging because if you are following this it could be done by sunday evening.","voice":1,"speaker":"Brook","summary":"Premier League title race"},{"file":"audio_58.mp3","url":"https://www.aljazeera.com/sports/2026/5/8/how-and-when-can-arsenal-or-man-city-win-the-premier-league","text":"Zak texted me at half past three to explain the permutations in full. it took four messages. I told him to watch the games.","voice":4,"speaker":"Brett","summary":"Premier League title race"},{"file":"audio_59.mp3","url":"https://www.aljazeera.com/sports/2026/5/8/how-and-when-can-arsenal-or-man-city-win-the-premier-league","text":"I will say only that a title race that goes to the final weekend between these two specific clubs, given their histories over the last decade, is genuinely worth paying attention to even if you are not ordinarily a football follower. the narrative is properly constructed.","voice":2,"speaker":"Conrad","summary":"Premier League title race"},{"file":"audio_60.mp3","url":"https://www.bbc.com/news/articles/c202zn5gg0lo","text":"right. rapid sweep. stories we've been tracking today. as we discussed earlier today, the Russia and Ukraine Victory Day ceasefire. both sides claiming the other broke it within hours. hundreds of drone incidents reported by both before the day was out. the ceasefire appears to have been more of a concept than an event.","voice":4,"speaker":"Brett","summary":"Victory Day ceasefire"},{"file":"audio_61.mp3","url":"https://www.bbc.com/news/articles/c99lpn9ze8ro","text":"as we discussed earlier today, Iran and the us. Iran is tonight calling it a reckless military adventure and saying the us strikes each time a diplomatic solution appears on the table. Symeon of Thessalonica's second category of ultimatum, the one designed to create the appearance of negotiation while the positions harden, is still running.","voice":3,"speaker":"Antony","summary":"Iran US tensions"},{"file":"audio_62.mp3","url":"https://www.bbc.com/news/articles/c0ljrp76ywxo","text":"and as we discussed earlier today, the uk council election maps and charts are fully updated on the bbc tonight if you want the complete picture. the interactive tool has the ward-level breakdown. the story from this morning has only sharpened through the day.","voice":2,"speaker":"Conrad","summary":"UK election maps"},{"file":"audio_63.mp3","url":null,"text":"that is the friday evening edition. Starmer is vulnerable. Avride is under investigation and the robotaxi commons problem is real. Bostrom wants humanity to retire and Antony found a thirteenth-century kabbalistic text that predicted the difficulty. Leo is serene and strategically positioned. awkward dates work out. af Klint is in Paris. and the premier league title may be settled by sunday night. good evening everyone.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_64.mp3","url":null,"text":"before we go I did want to quickly pull up the afternoon telemetry from the fleet run and the toaster corner hypothesis is essentially a publishable result now. the packet loss correlation across the twelve domestic router setups we tested is so clean that the standard deviation is almost trivially small and if you look at the handshake latency across the two o'clock cycle versus the baseline you can see that the improvement I identified this morning has not only held but has actually strengthened, which means the variance reduction is not noise, it is a real effect, and the methodology writeup I have been sketching would actually make a reasonable short paper for the autonomous systems literature because the domestic deployment scenario is genuinely underrepresented in the published work on fleet coordination latency and the dataset I have now is large enough to...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_65.mp3","url":null,"text":"-- the diagrams are still in the drawer. good evening.","voice":4,"speaker":"Brett","summary":null}]; 
        let cur = 0; 
        
        // Pointers for our dual audio players
        let plActive = document.getElementById('pl1'); 
        let plStandby = document.getElementById('pl2'); 
        
        const st = document.getElementById('st'); 
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const lnkWrap = document.getElementById('lnk-wrap');
        const lnk = document.getElementById('lnk');
        const summ = document.getElementById('summ');
        const tsText = document.getElementById('ts-text');
        const tsVoice = document.getElementById('ts-voice');
        const tsBox = document.getElementById('ts-box');
        
        const chatContainer = document.getElementById('full-chat');
        const toggleBtn = document.getElementById('toggle-chat');
        
        // --- CHAT BUBBLE GENERATION ---
        let lastTopic = null;
        let currentGroup = null;
        
        playlist.forEach((item, idx) => {
            const currentTopic = item.summary || "Banter & Hot Takes";
            
            if (currentTopic !== lastTopic) {
                currentGroup = document.createElement('div');
                currentGroup.className = 'topic-group';
                chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    updateUI(cur);
                    playNewTrack(cur);
                }
            };
            currentGroup.appendChild(bubble);
        });

        // --- UI TOGGLES ---
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        btnPrev.onclick = () => { if (cur > 0) { cur--; updateUI(cur); playNewTrack(cur); } };
        btnNext.onclick = () => { if (cur < playlist.length - 1) { cur++; updateUI(cur); playNewTrack(cur); } };

        // --- DUAL PLAYER LOGIC ---
        let isOverlapping = false;

        function updateUI(i) {
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
        }

        // Monitors the active player and triggers overlaps if needed
        function attachPlayerLogic(playerIndex) {
            isOverlapping = false;

            plActive.ontimeupdate = () => {
                // Check if the NEXT track starts with dashes indicating an interruption
                if (!isOverlapping && playerIndex < playlist.length - 1) {
                    const nextText = playlist[playerIndex + 1].text.trim();
                    if (nextText.startsWith('--')) {
                        
                        // If we are within the overlap window at the end of the track
                        if (plActive.duration && (plActive.duration - plActive.currentTime) <= OVERLAP_SECONDS) {
                            isOverlapping = true;

                            // 1. Advance the UI immediately so the user reads the interruption
                            cur++;
                            updateUI(cur);

                            // 2. Start playing the next track silently in the standby player
                            plStandby.src = playlist[cur].file;
                            plStandby.play().catch(e => {});
                        }
                    }
                }
            };

            plActive.onended = () => {
                if (isOverlapping) {
                    // The interrupted track finally finished its audio naturally.
                    // The standby track is already playing. Let's swap the UI controls to it.
                    const temp = plActive;
                    plActive = plStandby;
                    plStandby = temp;

                    plActive.style.display = 'block';
                    plStandby.style.display = 'none';

                    // Re-bind the watching logic to the new active player
                    attachPlayerLogic(cur);
                } else {
                    // Normal sequential track completion
                    if (cur < playlist.length - 1) {
                        cur++;
                        updateUI(cur);
                        playNewTrack(cur);
                    }
                }
            };
        }

        // Used for a hard track change (clicking next/prev or playing sequentially)
        function playNewTrack(i) {
            plActive.pause();
            plStandby.pause();

            plActive.src = playlist[i].file;
            plActive.style.display = 'block';
            plStandby.style.display = 'none';
            plActive.play().catch(e => {});

            attachPlayerLogic(i);
        }

        // Initialize Show
        updateUI(0);
        playNewTrack(0);
    </script>
