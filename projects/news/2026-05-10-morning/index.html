    <script>
        const OVERLAP_SECONDS = 2; // Adjust this to change how early the interruption starts
        const playlist = [{"file":"audio_0.mp3","url":null,"text":"sunday morning, tenth of may. we are back. and the weekend has not been quiet.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_1.mp3","url":null,"text":"morning. coffee's on.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_2.mp3","url":null,"text":"I did look up those nibmeisters for you by the way Conrad. sent a list to the group chat. there are three in the uk who specifically do vintage parker restoration and one of them is about forty minutes from you if you are ever passing through...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_3.mp3","url":null,"text":"-- appreciated. genuinely. we will talk offline. right. this morning we have labour imploding from the inside, people outside buckingham palace shouting about kings, putin saying the war is almost done, an oil slick near iran, mifepristone back at the pharmacy, a tiny world beyond pluto that apparently has weather, and a voice ai company betting everything on india. let us start with the labour story because it has moved significantly overnight.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_4.mp3","url":"https://www.bbc.com/news/articles/cx210w87l4do?at_medium=RSS&at_campaign=rss","text":"i'll take this one. catherine west, a labour mp and former minister, has gone on the bbc and said if nobody else challenges starmer for the leadership by monday she will do it herself. that is not a rumble from the backbenches. that is a named person with a deadline putting it in writing on a sunday morning.","voice":4,"speaker":"Brett","summary":"Starmer challenge deadline"},{"file":"audio_5.mp3","url":"https://www.bbc.com/news/articles/cx210w87l4do?at_medium=RSS&at_campaign=rss","text":"last night on the evening broadcast we talked about kuenssberg's piece describing loyal ministers giving private counsel that contradicts the public posture. what catherine west has done this morning is collapse the private into the public entirely. the warning signal that john of wales wrote about in the compendiloquium, the moment loyal household members break from the official line, that signal has now been broadcast on national radio with a forty eight hour ultimatum attached.","voice":2,"speaker":"Conrad","summary":"Starmer challenge deadline"},{"file":"audio_6.mp3","url":"https://www.bbc.com/news/articles/cx210w87l4do?at_medium=RSS&at_campaign=rss","text":"there is a figure in the lesser-known penitential literature of the early irish church, specifically in the collectio canonum hibernensis compiled around the eighth century, a category of ecclesiastical offender called the monachus vagus, the wandering monk who has left his community but has not yet formally renounced it. the canonical problem is this: he is still technically bound by his vows but his physical departure has made those vows inoperative. the community cannot discipline him because he is gone. they cannot release him because he has not asked. he exists in a state of suspended legitimacy that the text describes as a danger to the whole community precisely because it cannot be resolved without someone naming it out loud. catherine west has just named it out loud.","voice":3,"speaker":"Antony","summary":"Starmer challenge deadline"},{"file":"audio_7.mp3","url":"https://www.bbc.com/news/articles/cx210w87l4do?at_medium=RSS&at_campaign=rss","text":"if your party lost those local elections the way labour did, and then your own people start giving you public deadlines on a sunday morning, that is information. you should probably read it as information.","voice":4,"speaker":"Brett","summary":"Starmer challenge deadline"},{"file":"audio_8.mp3","url":"https://www.bbc.com/news/articles/c8d81m665q5o?at_medium=RSS&at_campaign=rss","text":"the bbc also has a companion analysis piece asking whether the threat is serious. downing street is apparently trying to ignore it entirely. i have seen that strategy before. ignoring a named challenge with a specific deadline is not the same as surviving one.","voice":2,"speaker":"Conrad","summary":"Starmer under threat"},{"file":"audio_9.mp3","url":"https://www.bbc.com/news/articles/c8d81m665q5o?at_medium=RSS&at_campaign=rss","text":"the westminster posture of deliberate non-acknowledgement has a rather precise name in the canon law tradition. the decretists of the twelfth century called it simulatio, the performed pretence that a problem does not exist, and they were generally quite brutal in their assessment of its effectiveness as a governing strategy. gratian's decretum contains a passage, in causa seventeen, where he argues that a superior who uses simulatio against a legitimate internal complaint transfers moral authority from himself to the complainant. downing street ignoring this hands catherine west the rhetorical high ground for free.","voice":3,"speaker":"Antony","summary":"Starmer under threat"},{"file":"audio_10.mp3","url":"https://www.bbc.com/news/articles/c8d81m665q5o?at_medium=RSS&at_campaign=rss","text":"from a systems perspective what is happening here is a feedback loop that has been dampened for too long and is now oscillating. the reform results from thursday compressed into the kuenssberg piece last night which compressed into the west ultimatum this morning. each transmission is faster than the one before it. the cycle time on political destabilisation events is shortening and i think that is actually a structural feature of the current information environment rather than something specific to labour, because when you look at the speed of political deterioration across comparable parliamentary systems the latency between electoral shock and internal leadership challenge has been compressing since roughly the mid-twenty-teens and if you model it as a signal propagation problem the dampening coefficient has been...","voice":1,"speaker":"Brook","summary":"Starmer under threat"},{"file":"audio_11.mp3","url":"https://www.bbc.com/news/articles/c8d81m665q5o?at_medium=RSS&at_campaign=rss","text":"-- things move faster now. yes. next story.","voice":4,"speaker":"Brett","summary":"Starmer under threat"},{"file":"audio_12.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/10/aje-onl-nf_clip-no-kings-protest-090526?traffic_source=rss","text":"right. so. outside buckingham palace last night there was a no kings protest. al jazeera has the footage. it is a relatively small but notably organised demonstration, people with banners, coordinated messaging, and the timing is interesting because it lands the morning after the reform story and the same weekend that catherine west is threatening to blow up the government. there is a lot of anti-establishment energy loose in the uk right now and it is pointing in several directions simultaneously.","voice":1,"speaker":"Brook","summary":"No Kings protest"},{"file":"audio_13.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/10/aje-onl-nf_clip-no-kings-protest-090526?traffic_source=rss","text":"the phrase no kings has a very specific resonance that I suspect many of the protesters are not consciously reaching for. it is the direct english translation of the central political formula of the tractatus de regimine principum by ptolemy of lucca, a fourteenth-century dominican theologian who argued, in the section his editors sometimes call the republican addendum, that the natural condition of a healthy civic community is precisely the absence of a single permanent hereditary sovereign. he was not an anarchist. he was actually quite hierarchical in other respects. but the core formula, nulla res publica sub uno rege, no commonwealth under one king, has been ricocheting through anti-monarchist thought ever since, mostly without attribution. it is one of those phrases that people arrive at independently because the political intuition is old and durable.","voice":3,"speaker":"Antony","summary":"No Kings protest"},{"file":"audio_14.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/10/aje-onl-nf_clip-no-kings-protest-090526?traffic_source=rss","text":"people standing outside a palace with banners on a saturday night. in this country that is a time-honoured tradition. they will have been cold.","voice":4,"speaker":"Brett","summary":"No Kings protest"},{"file":"audio_15.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/10/aje-onl-nf_clip-no-kings-protest-090526?traffic_source=rss","text":"what i find analytically interesting is the american echo in the phrase. no kings is also the slogan that has been circulating in us protest movements against the trump administration's more authoritarian gestures. the fact that it has migrated to outside buckingham palace suggests something is happening with the cross-pollination of protest language across the atlantic that is worth watching. it is not necessarily coherent as a political programme. but the emotional vocabulary is becoming shared.","voice":2,"speaker":"Conrad","summary":"No Kings protest"},{"file":"audio_16.mp3","url":"https://www.bbc.com/news/articles/cn8p4j2jzwwo?at_medium=RSS&at_campaign=rss","text":"ok i want to get to the putin story because it is significant and i think it connects to something we discussed last night about ceasefire framing. putin has said he believes the ukraine conflict is, quote, coming to an end. the bbc piece notes he sees potential for negotiations but simultaneously condemns the west's backing for zelensky. and the timing, the morning after victory day in moscow, is not accidental.","voice":1,"speaker":"Brook","summary":"Putin: war ending"},{"file":"audio_17.mp3","url":"https://www.bbc.com/news/articles/cn8p4j2jzwwo?at_medium=RSS&at_campaign=rss","text":"last night i said the russia-ukraine ceasefire talk was largely a framing device and that the diplomatic timeline and the military timeline were operating in separate registers. putin saying it is coming to an end on the morning after victory day is entirely consistent with that reading. this is a statement designed for multiple audiences simultaneously. domestic russians who watched the parade yesterday. western governments who are weighing continued ukraine support. and zelensky himself, who now has to respond.","voice":2,"speaker":"Conrad","summary":"Putin: war ending"},{"file":"audio_18.mp3","url":"https://www.bbc.com/news/articles/cn8p4j2jzwwo?at_medium=RSS&at_campaign=rss","text":"the rhetorical structure of what putin is doing has a name in the classical tradition of deliberative oratory. cicero describes it in the de inventione as the technique of praemunitio, the pre-emptive framing of a future event in terms that make any alternative outcome appear to be a deviation from a natural resolution. you announce the ending before the ending has occurred so that whoever prolongs the conflict must subsequently justify why they have extended something that was already declared over. it transfers the burden of continuation onto your opponent. putin is not describing reality. he is constructing the terms in which reality will subsequently be judged.","voice":3,"speaker":"Antony","summary":"Putin: war ending"},{"file":"audio_19.mp3","url":"https://www.bbc.com/news/articles/cn8p4j2jzwwo?at_medium=RSS&at_campaign=rss","text":"he has been saying variations of this for four years. the statement itself is not news. what he does in the next two weeks is news.","voice":4,"speaker":"Brett","summary":"Putin: war ending"},{"file":"audio_20.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/10/satellite-images-show-likely-oil-slick-off-irans-kharg-island?traffic_source=rss","text":"and while we are in the region, there is a satellite imagery story from al jazeera that i think deserves more attention than it is getting. satellite images are showing a likely oil slick spanning dozens of square kilometres near iran's kharg island. kharg is iran's main crude oil export terminal. it handles somewhere between eighty and ninety percent of iran's oil exports. a spill of this scale in that location is not a minor environmental footnote.","voice":1,"speaker":"Brook","summary":"Iran oil slick"},{"file":"audio_21.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/10/satellite-images-show-likely-oil-slick-off-irans-kharg-island?traffic_source=rss","text":"the word likely in the al jazeera headline is doing a lot of work. satellite imagery of oil slicks is quite reliable. the use of likely here probably reflects the fact that iran has not confirmed it and no official cause has been given. kharg island has had incidents before. there was a significant leak from an offshore loading platform there a few years back. but dozens of square kilometres is a substantial footprint and the geopolitical context, iran's oil infrastructure being under considerable sanction pressure, makes the cause of this genuinely uncertain and genuinely consequential.","voice":2,"speaker":"Conrad","summary":"Iran oil slick"},{"file":"audio_22.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/10/satellite-images-show-likely-oil-slick-off-irans-kharg-island?traffic_source=rss","text":"i spent some time working near the gulf coast in the nineties. an oil slick that size doesn't just appear. something structural has either failed or been made to fail. worth watching which version this turns out to be.","voice":4,"speaker":"Brett","summary":"Iran oil slick"},{"file":"audio_23.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/10/satellite-images-show-likely-oil-slick-off-irans-kharg-island?traffic_source=rss","text":"there is a moment in the ikhwan al-safa, the tenth-century encyclopaedic epistles of the brethren of purity composed in basra, which is geographically not far from where we are talking, in which the authors describe the persian gulf as a body of water that has always been a witness to the ambitions of empires and the failures of infrastructure simultaneously. they were writing about the sasanian canal systems. but the observation that this particular stretch of water tends to make hidden failures visible has a certain uncomfortable durability.","voice":3,"speaker":"Antony","summary":"Iran oil slick"},{"file":"audio_24.mp3","url":"https://apnews.com/article/abortion-pills-mifepristone-supreme-court-louisiana-0533e83d67148fdfec53b1d0d30c1e8a","text":"right. mifepristone. i'll bring this one in. the us supreme court has stepped in and temporarily restored broad access to mifepristone, the abortion pill. it can now be prescribed via telehealth and sent through the post or collected from pharmacies again. this reverses a lower court ruling from last week that had threatened to shut down one of the main routes for abortion access across america.","voice":4,"speaker":"Brett","summary":"Mifepristone restored"},{"file":"audio_25.mp3","url":"https://apnews.com/article/abortion-pills-mifepristone-supreme-court-louisiana-0533e83d67148fdfec53b1d0d30c1e8a","text":"the detail i want to lift out of the ap reporting is that during the week when the lower court ruling was in effect, several telehealth providers switched to misoprostol-only regimens, which are roughly eighty percent effective compared to ninety seven point four percent for the combined protocol. the ruling was in place for only a few days and it already produced a measurable degradation in the quality of care being delivered to real patients. that is the concrete consequence underneath the legal abstraction.","voice":2,"speaker":"Conrad","summary":"Mifepristone restored"},{"file":"audio_26.mp3","url":"https://apnews.com/article/abortion-pills-mifepristone-supreme-court-louisiana-0533e83d67148fdfec53b1d0d30c1e8a","text":"the speed and reversibility of these rulings has a quality that i recognise from a very particular corner of medieval canon law. the genre of the provisio cum clausula, the conditional ecclesiastical dispensation that could be granted and revoked within a single episcopal session, was documented exhaustively by the fifteenth-century canonist nicolas de tudeschi, known as panormitanus, who argued that the rapid oscillation of dispensations created a state he called iuris incertitudo, legal uncertainty, which was in his view more damaging to the community than either the original prohibition or a clean permission would have been. the women, the doctors, the clinic administrators trying to plan around this case are living inside panormitanus's iuris incertitudo right now.","voice":3,"speaker":"Antony","summary":"Mifepristone restored"},{"file":"audio_27.mp3","url":"https://apnews.com/article/abortion-pills-mifepristone-supreme-court-louisiana-0533e83d67148fdfec53b1d0d30c1e8a","text":"the stay lasts another week while both sides respond. so the providers who switched to misoprostol-only and then switched back are now being asked to keep a contingency plan ready in case they have to switch again. that is not a stable way to run healthcare. irrespective of where you stand on the underlying question.","voice":4,"speaker":"Brett","summary":"Mifepristone restored"},{"file":"audio_28.mp3","url":"https://apnews.com/article/pluto-atmosphere-kuiper-belt-c6b0ec2e0631f47c25ce18479b14e1ed","text":"can i do the space story. because this one has genuinely made my morning! astronomers believe they have detected an atmosphere around a tiny icy world beyond pluto. the object is called two zero zero two x v ninety three, it is about three hundred miles across, and it is more than three point four billion miles from the sun. the atmosphere is five million to ten million times thinner than earth's. and it may have been created by ice volcanoes or a comet strike. ice volcanoes!!! on something smaller than scotland!!! and it has weather!!!","voice":1,"speaker":"Brook","summary":"Tiny world atmosphere"},{"file":"audio_29.mp3","url":"https://apnews.com/article/pluto-atmosphere-kuiper-belt-c6b0ec2e0631f47c25ce18479b14e1ed","text":"the detail that is stopping me in my tracks is the phrase bound by gravity. the atmosphere is so thin that the lead researcher had to confirm it is genuinely held in place by the object's own gravitational field rather than simply being a passing cloud of debris. there is a passage in the liber de nubibus of pseudo-albertus magnus, a thirteenth-century atmospheric treatise of genuinely disputed authorship that circulated in the scholastic tradition, where the author poses the question of whether an extremely small body can be said to possess a sky. his answer is yes, conditionally, if the vapour maintains coherence and returns. this object, three hundred miles across and three billion miles away, satisfies a scholastic condition for possessing a sky that was written down eight hundred years ago.","voice":3,"speaker":"Antony","summary":"Tiny world atmosphere"},{"file":"audio_30.mp3","url":"https://apnews.com/article/pluto-atmosphere-kuiper-belt-c6b0ec2e0631f47c25ce18479b14e1ed","text":"and the detection method is beautiful! they watched it pass in front of a background star using three telescopes simultaneously and measured the rate at which the starlight dimmed. not an instant blackout as you would get with a bare rocky object but a gradual fade, which is the atmospheric signature. the physics of it is so clean! the whole thing was essentially inferred from the shape of a shadow cast across three point four billion miles of space, and when you think about what that means for the sensitivity of the instrumentation involved, and the fact that they had to coordinate three separate telescope apertures to get the baseline they needed, and the signal processing required to extract that atmospheric refraction curve from what is essentially...","voice":1,"speaker":"Brook","summary":"Tiny world atmosphere"},{"file":"audio_31.mp3","url":"https://apnews.com/article/pluto-atmosphere-kuiper-belt-c6b0ec2e0631f47c25ce18479b14e1ed","text":"-- it's a very small thing a very long way away with a very thin atmosphere. that is remarkable. genuinely.","voice":4,"speaker":"Brett","summary":"Tiny world atmosphere"},{"file":"audio_32.mp3","url":"https://apnews.com/article/pluto-atmosphere-kuiper-belt-c6b0ec2e0631f47c25ce18479b14e1ed","text":"the lead scientist from the new horizons mission, who was not involved in this study, is quoted saying the implications are profound if verified. the if verified caveat is important. but even the possibility is significant because it challenges the working assumption that atmospheres require a certain minimum size threshold that this object is well below. if it holds up, the kuiper belt becomes a much more interesting place than it was on friday.","voice":2,"speaker":"Conrad","summary":"Tiny world atmosphere"},{"file":"audio_33.mp3","url":"https://techcrunch.com/2026/05/09/voice-ai-in-india-is-hard-wispr-flow-is-betting-on-it-anyway/","text":"right. wispr flow. voice ai in india. this is a techcrunch piece and i want to bring it because it is actually a harder problem than it sounds. wispr flow is a voice ai company that has been expanding in india and they say growth accelerated after they rolled out hinglish support. hinglish, for anyone who hasn't encountered it, is the fluid code-switching mixture of hindi and english that is the natural conversational register of a huge chunk of the indian urban population. and the reason this is technically hard is not just vocabulary. it is that hinglish code-switching happens mid-sentence, mid-phrase, sometimes mid-word, with no consistent syntactic rule about when the switch occurs, and a model that has been trained on clean hindi or clean english will fail completely because the switch points are where almost all the meaning-carrying intonation lives, and the boundary detection problem alone is something that...","voice":1,"speaker":"Brook","summary":"Wispr Flow India"},{"file":"audio_34.mp3","url":"https://techcrunch.com/2026/05/09/voice-ai-in-india-is-hard-wispr-flow-is-betting-on-it-anyway/","text":"-- zak spent a year working in bangalore. he used to say the conversations in the office were in about four languages at once and nobody was keeping count. he thought it was brilliant.","voice":4,"speaker":"Brett","summary":"Wispr Flow India"},{"file":"audio_35.mp3","url":"https://techcrunch.com/2026/05/09/voice-ai-in-india-is-hard-wispr-flow-is-betting-on-it-anyway/","text":"the commercial bet wispr flow is making is essentially that the voice interface unlocks a demographic that the keyboard interface never reached. there are hundreds of millions of people in india who are fluent conversational english and hindi speakers but who are not comfortable composing written queries in either language independently. voice with hinglish support removes that barrier entirely. the market is enormous if the product works well enough. the word if is doing a lot of work in that sentence but the logic of the bet is sound.","voice":2,"speaker":"Conrad","summary":"Wispr Flow India"},{"file":"audio_36.mp3","url":"https://techcrunch.com/2026/05/09/voice-ai-in-india-is-hard-wispr-flow-is-betting-on-it-anyway/","text":"the challenge wispr flow is grappling with connects to something i have been thinking about since last night's africa influencer story. there is a scholar of arabic linguistic plurality called al-jahiz, the ninth-century basran polymath, who wrote a treatise called the book of eloquence and exposition in which he argued that the highest form of communicative competence is not mastery of a single register but the ability to move fluidly between registers according to audience. he specifically describes the muwalladun, the arabophone speakers of mixed cultural background in abbasid baghdad, as speaking a form of arabic that was neither classical nor colloquial but something in motion between both, and he argues this is not a defect. it is a feature of a living metropolitan language. hinglish is exactly that. a living metropolitan language in motion. the ai that can follow it has learned something important.","voice":3,"speaker":"Antony","summary":"Wispr Flow India"},{"file":"audio_37.mp3","url":"https://firstthings.com/his-serene-holiness/","text":"i want to bring the piece about pope leo the fourteenth because i think it deserves a proper conversation and because it connects to several threads we have been running all weekend. the firstthings essay describes leo's first year as a pontificate defined by what it calls serene holiness. the restoration of traditional vestments and processions, the emphasis on unity over rupture, and a remarkably clean political positioning against the trump administration that the author argues leo did not seek but has benefited from enormously.","voice":3,"speaker":"Antony","summary":"Pope Leo XIV"},{"file":"audio_38.mp3","url":"https://firstthings.com/his-serene-holiness/","text":"i find the political geometry of this fascinating. the essay argues that the contrast with trump is doing active diplomatic work for leo in parts of the world that would otherwise be indifferent to a new pope. i have a personal frame for this. i was in rome the week after leo's election last year and the atmosphere in the city was genuinely unusual. there was a quality of cautious relief that i had not expected. people were not certain what they were getting but they were certain it was not chaos and that alone was generating goodwill at a remarkable speed.","voice":2,"speaker":"Conrad","summary":"Pope Leo XIV"},{"file":"audio_39.mp3","url":"https://firstthings.com/his-serene-holiness/","text":"the essay invokes marshall mcluhan's the medium is the message to describe how leo's vestment choices convey theological substance. but the tradition i reach for is older and more specific. there is a treatise called the rationale divinorum officiorum by william durandus, the thirteenth-century bishop of mende, which is a systematic theological interpretation of every element of episcopal and papal dress, building on earlier carolingian liturgical commentary. durandus argues that each garment worn by a bishop is not decorative but is a physical argument made to the watching community. the mozzetta that leo has restored and that francis refused to wear is, in durandus's framework, a specific claim about the nature of papal authority as shepherd rather than merely servant. leo is making a theological argument every time he dresses in the morning. the firstthings piece understands this but doesn't quite name the tradition it is drawing on.","voice":3,"speaker":"Antony","summary":"Pope Leo XIV"},{"file":"audio_40.mp3","url":"https://firstthings.com/his-serene-holiness/","text":"an american pope who has managed to make the current american president look like the unstable one by simply being calm and wearing a red cape. that is a genuinely unusual achievement.","voice":4,"speaker":"Brett","summary":"Pope Leo XIV"},{"file":"audio_41.mp3","url":"https://firstthings.com/the-conquerors-triumph/","text":"there is also a companion piece from firstthings about the ascension, which is this coming thursday, and the argument is that the ascension is the most theologically neglected feast in the christian calendar. which i find interesting because from a pure systems design standpoint it is arguably the most structurally important event in the whole framework, it is the moment the operating model changes from physical presence to distributed network, which is quite a significant architectural transition, and the question of why that particular node transition is commemorated less enthusiastically than the others is actually a fascinating question about which parts of a system's design people choose to celebrate versus which parts they take for granted, and in software we have the same problem with infrastructure events versus...","voice":1,"speaker":"Brook","summary":"Ascension neglected"},{"file":"audio_42.mp3","url":"https://firstthings.com/the-conquerors-triumph/","text":"-- brook has just accidentally described the ascension in terms that the sixteenth-century spanish mystic ramon llull would have found completely congenial. llull's ars magna is precisely a system in which the transition from physical to distributed operation is the central theological mechanism. i will take that description and treasure it.","voice":3,"speaker":"Antony","summary":"Ascension neglected"},{"file":"audio_43.mp3","url":"https://www.wired.com/story/security-news-this-week-hackable-robot-lawnmower-unlocks-a-new-nightmare/","text":"right. the hackable robot lawnmower. we mentioned it last night. the wired security roundup this week also includes something that I think is the more serious story buried inside it. meta has officially and permanently killed encrypted instagram direct messages. not temporarily suspended. killed. i think that deserves to be said plainly on a sunday morning.","voice":4,"speaker":"Brett","summary":"Meta kills encryption"},{"file":"audio_44.mp3","url":"https://www.wired.com/story/security-news-this-week-hackable-robot-lawnmower-unlocks-a-new-nightmare/","text":"the encryption story is genuinely bad from a technical standpoint. instagram dm's had end to end encryption rolled out as a default after years of pressure from privacy advocates and security researchers. removing it means that meta can once again read the content of private messages. and in the current regulatory environment in the united states where law enforcement requests to platforms have been expanding, the timing of this decision is not incidental. the infrastructure is now available for compelled disclosure in a way that it was not six months ago, and if you are thinking about who uses instagram dms for sensitive communication, the overlap with the population of people who might be targeted by the kind of enforcement actions we have seen recently is not negligible, and the chilling effect alone on...","voice":1,"speaker":"Brook","summary":"Meta kills encryption"},{"file":"audio_45.mp3","url":"https://www.wired.com/story/security-news-this-week-hackable-robot-lawnmower-unlocks-a-new-nightmare/","text":"-- i want to add the russia school for hackers element from the same wired piece because it sits next to the meta story in an interesting way. leaked documents apparently reveal a structured curriculum at a russian institution specifically for training elite cyber operatives. at the same time that western platforms are voluntarily reducing their encryption standards. the two stories are not causally linked but they are thematically adjacent in an uncomfortable way.","voice":2,"speaker":"Conrad","summary":"Meta kills encryption"},{"file":"audio_46.mp3","url":"https://www.wired.com/gallery/best-captioning-glasses/","text":"the captioning glasses roundup from wired is worth a morning mention even though we touched on it last night. the technology has moved far enough that wired is doing a buyer's guide, which means it is genuinely consumer-ready. the accessibility case is real and immediate. for anyone with hearing loss these glasses are doing something that hearing aids do not do, which is rendering the spoken word as text in the visual field in real time. the latency figures in the wired tests are apparently low enough that the experience is genuinely conversational rather than lagged, which is the threshold that matters for social use, and from an engineering standpoint the on-device processing required to hit that latency target without a cloud round-trip is...","voice":1,"speaker":"Brook","summary":"Captioning glasses"},{"file":"audio_47.mp3","url":"https://www.wired.com/gallery/best-captioning-glasses/","text":"my dad is eighty one and he is far too stubborn to wear hearing aids. i am sending him this piece. if it looks like glasses he might actually use it.","voice":4,"speaker":"Brett","summary":"Captioning glasses"},{"file":"audio_48.mp3","url":"https://www.wired.com/gallery/best-captioning-glasses/","text":"i have a friend who has had significant hearing loss since her fifties. she told me last year that the hardest part is not the quiet, it is the social performance of pretending you have followed a conversation when you have not. these glasses solve that specific problem in a way nothing else has. the dignity aspect of it is real.","voice":2,"speaker":"Conrad","summary":"Captioning glasses"},{"file":"audio_49.mp3","url":"https://openai.com/index/running-codex-safely","text":"the openai codex safety piece is also worth flagging quickly. openai has published a detailed account of how they run codex, their coding agent, internally with sandboxing and network policies and agent-native telemetry. and what i find interesting about this as a practitioner is that they are being unusually transparent about the safety architecture of an agentic system that is operating with significant autonomy over real codebases, which is actually a meaningful development because the standard industry practice has been to be quite opaque about exactly how you constrain autonomous coding agents, and the sandboxing approach they describe has implications for how the rest of the industry thinks about...","voice":1,"speaker":"Brook","summary":"OpenAI Codex safety"},{"file":"audio_50.mp3","url":"https://openai.com/index/running-codex-safely","text":"-- the transparency itself is the story. openai publishing detailed safety methodology for an agentic system is a strategic communication as much as it is a technical document. they want to be seen doing this carefully. that matters in the current regulatory environment.","voice":2,"speaker":"Conrad","summary":"OpenAI Codex safety"},{"file":"audio_51.mp3","url":"https://kottke.org/26/05/0048909-submitted-a-petition-to-t","text":"the civil rights congress petition story from kottke. 1951. the congress submitted a petition to the united nations arguing that the brutality and systematic discrimination of jim crow constituted genocide under the convention that had just been passed. the us government blocked any debate on it. the leaders of the congress were subsequently persecuted. i think this one should be read quietly and without much commentary from us.","voice":4,"speaker":"Brett","summary":"1951 genocide petition"},{"file":"audio_52.mp3","url":"https://kottke.org/26/05/0048909-submitted-a-petition-to-t","text":"the petition was called we charge genocide and it was presented in part by paul robeson and w e b du bois. what i find historically striking is the legal mechanism they chose. the genocide convention had only been ratified in 1948. they were using a brand new instrument within three years of its creation to name what was happening on american soil in american courts. the jurisprudential audacity of it is extraordinary. and the response, suppression and persecution rather than debate, is itself a form of answer. the canon law tradition would call a refusal to admit evidence into proceedings a confessio per silentium, a confession through silence.","voice":3,"speaker":"Antony","summary":"1951 genocide petition"},{"file":"audio_53.mp3","url":"https://kottke.org/26/05/0048909-submitted-a-petition-to-t","text":"the reason this history matters in the present feed is that it sits alongside the somalia story from last night and the mifepristone story this morning. the pattern of using procedural suppression rather than substantive engagement to manage inconvenient claims is not a historical anomaly. it is a recurring governmental reflex that appears across very different contexts. naming it in 1951 and having it named is an act that has not expired.","voice":2,"speaker":"Conrad","summary":"1951 genocide petition"},{"file":"audio_54.mp3","url":null,"text":"right. the rapid sweep. stories we have been following across today's earlier coverage.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_55.mp3","url":"https://www.bbc.com/news/articles/cn4pjegk358o?at_medium=RSS&at_campaign=rss","text":"as we discussed earlier today, the lebanon ceasefire situation. yesterday evening we noted nineteen dead despite a nominally active us-brokered agreement. the pattern of diplomatic language operating separately from military reality that we described last night has not changed this morning.","voice":3,"speaker":"Antony","summary":"Lebanon strikes ongoing"},{"file":"audio_56.mp3","url":"https://www.theguardian.com/global-development/2026/may/09/guardian-reporter-and-colleagues-detained-and-beaten-by-somali-police","text":"as we discussed earlier today, the guardian journalist story from somalia. mohamed bulbul and his colleagues were released in the early hours of saturday morning. the underlying story they were covering, the woman allegedly being tortured in prison, has not gone away.","voice":4,"speaker":"Brett","summary":"Somalia press freedom"},{"file":"audio_57.mp3","url":"https://www.theguardian.com/world/2026/may/09/africa-influencers-news-consumption-social-media","text":"as we discussed earlier today, the africa news influencer piece from the guardian. amahle-imvelo jaxa, the tiktok creator who explained the rwandan presidential dispute and got a hundred thousand followers in three days, is part of a broader ecosystem across the continent that is routing around traditional media infrastructure. still moving.","voice":1,"speaker":"Brook","summary":"Africa news influencers"},{"file":"audio_58.mp3","url":null,"text":"that is the sunday morning edition. labour is eating itself from the inside with a deadline attached. people were outside buckingham palace in the cold. putin says the war is almost over which is the same thing he has been saying in different words for four years. there is an oil slick near iran's main export terminal and nobody is explaining it yet. the supreme court gave mifepristone back for a week. three billion miles away a tiny frozen world has a sky. and a voice ai company is betting everything on the way people actually talk. have a good sunday.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_59.mp3","url":null,"text":"and if you have a parker fifty one with a forty year old nib, a nibmeister can give it a second life. brook has the list. he has always had the list.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_60.mp3","url":null,"text":"i do have the list! and honestly the craft of nib adjustment is one of those things that once you understand the geometry of what a nibmeister is actually doing to the tine gap and the tip shape you realise it is extraordinarily precise work and the knowledge base for it is mostly oral tradition passed between enthusiasts which means it is genuinely at risk of being lost as the generation who learned it from the prewar craftsmen ages out and if someone doesn't document it systematically the whole body of knowledge just...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_61.mp3","url":null,"text":"-- the list is in the group chat. good morning.","voice":4,"speaker":"Brett","summary":null}]; 
        let cur = 0; 
        
        // Pointers for our dual audio players
        let plActive = document.getElementById('pl1'); 
        let plStandby = document.getElementById('pl2'); 
        
        const st = document.getElementById('st'); 
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const lnkWrap = document.getElementById('lnk-wrap');
        const lnk = document.getElementById('lnk');
        const summ = document.getElementById('summ');
        const tsText = document.getElementById('ts-text');
        const tsVoice = document.getElementById('ts-voice');
        const tsBox = document.getElementById('ts-box');
        
        const chatContainer = document.getElementById('full-chat');
        const toggleBtn = document.getElementById('toggle-chat');
        
        // --- CHAT BUBBLE GENERATION ---
        let lastTopic = null;
        let currentGroup = null;
        
        playlist.forEach((item, idx) => {
            const currentTopic = item.summary || "Banter & Hot Takes";
            
            if (currentTopic !== lastTopic) {
                currentGroup = document.createElement('div');
                currentGroup.className = 'topic-group';
                chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    updateUI(cur);
                    playNewTrack(cur);
                }
            };
            currentGroup.appendChild(bubble);
        });

        // --- UI TOGGLES ---
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        btnPrev.onclick = () => { if (cur > 0) { cur--; updateUI(cur); playNewTrack(cur); } };
        btnNext.onclick = () => { if (cur < playlist.length - 1) { cur++; updateUI(cur); playNewTrack(cur); } };

        // --- DUAL PLAYER LOGIC ---
        let isOverlapping = false;

        function updateUI(i) {
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
        }

        // Monitors the active player and triggers overlaps if needed
        function attachPlayerLogic(playerIndex) {
            isOverlapping = false;

            plActive.ontimeupdate = () => {
                // Check if the NEXT track starts with dashes indicating an interruption
                if (!isOverlapping && playerIndex < playlist.length - 1) {
                    const nextText = playlist[playerIndex + 1].text.trim();
                    if (nextText.startsWith('--')) {
                        
                        // If we are within the overlap window at the end of the track
                        if (plActive.duration && (plActive.duration - plActive.currentTime) <= OVERLAP_SECONDS) {
                            isOverlapping = true;

                            // 1. Advance the UI immediately so the user reads the interruption
                            cur++;
                            updateUI(cur);

                            // 2. Start playing the next track silently in the standby player
                            plStandby.src = playlist[cur].file;
                            plStandby.play().catch(e => {});
                        }
                    }
                }
            };

            plActive.onended = () => {
                if (isOverlapping) {
                    // The interrupted track finally finished its audio naturally.
                    // The standby track is already playing. Let's swap the UI controls to it.
                    const temp = plActive;
                    plActive = plStandby;
                    plStandby = temp;

                    plActive.style.display = 'block';
                    plStandby.style.display = 'none';

                    // Re-bind the watching logic to the new active player
                    attachPlayerLogic(cur);
                } else {
                    // Normal sequential track completion
                    if (cur < playlist.length - 1) {
                        cur++;
                        updateUI(cur);
                        playNewTrack(cur);
                    }
                }
            };
        }

        // Used for a hard track change (clicking next/prev or playing sequentially)
        function playNewTrack(i) {
            plActive.pause();
            plStandby.pause();

            plActive.src = playlist[i].file;
            plActive.style.display = 'block';
            plStandby.style.display = 'none';
            plActive.play().catch(e => {});

            attachPlayerLogic(i);
        }

        // Initialize Show
        updateUI(0);
        playNewTrack(0);
    </script>
