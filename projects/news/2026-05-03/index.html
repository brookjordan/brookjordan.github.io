    <style>

        /* Sticky Topic Header */

    <script>
        const playlist = [{"file":"audio_0.mp3","url":null,"text":"Hello tech enthusiasts and welcome to Daily Tech News! I'm Sky!","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_1.mp3","url":null,"text":"And I'm Adam, your source for factually accurate information delivered in the most irritating way possible!","voice":"am_adam","speaker":"Adam","summary":null},{"file":"audio_2.mp3","url":"https://techcrunch.com/2026/05/03/in-harvard-study-ai-offered-more-accurate-diagnoses-than-emergency-room-doctors/","text":"Let's jump right into today's biggest story - AI doctors are now better at diagnosing patients than human doctors in emergency rooms, according to a new Harvard study!","voice":"af_sky","speaker":"Sky","summary":"AI beats doctors"},{"file":"audio_3.mp3","url":"https://techcrunch.com/2026/05/03/in-harvard-study-ai-offered-more-accurate-diagnoses-than-emergency-room-doctors/","text":"ACTUALLY, Sky, the study specifically examined large language models in various medical contexts, and ONLY ONE model performed better than the human doctors. Let's not exaggerate the findings with your typical sensationalism.","voice":"am_adam","speaker":"Adam","summary":"AI beats doctors"},{"file":"audio_4.mp3","url":"https://techcrunch.com/2026/05/03/in-harvard-study-ai-offered-more-accurate-diagnoses-than-emergency-room-doctors/","text":"Oh, I'm sorry for not being BORING enough with my introduction, Adam. I guess patients should just wait in the ER while the doctor double-checks every symptom in a medical textbook!","voice":"af_sky","speaker":"Sky","summary":"AI beats doctors"},{"file":"audio_5.mp3","url":"https://techcrunch.com/2026/05/03/in-harvard-study-ai-offered-more-accurate-diagnoses-than-emergency-room-doctors/","text":"Actually, Sky, what you're describing is PRECISELY why this study matters. The AI can process vast amounts of medical literature instantaneously, potentially reducing diagnostic errors that kill thousands annually. This isn't about replacing doctors but augmenting their capabilities with technology that doesn't get tired or have cognitive biases.","voice":"am_adam","speaker":"Adam","summary":"AI beats doctors"},{"file":"audio_6.mp3","url":"https://techcrunch.com/2026/05/03/in-harvard-study-ai-offered-more-accurate-diagnoses-than-emergency-room-doctors/","text":"Wow, we actually agree on something! Though I'm still wondering - if AI becomes the primary diagnostician, what happens to all those doctors who spent a decade in medical school? Will they just become glorified AI operators?","voice":"af_sky","speaker":"Sky","summary":"AI beats doctors"},{"file":"audio_7.mp3","url":"https://techcrunch.com/2026/05/03/in-harvard-study-ai-offered-more-accurate-diagnoses-than-emergency-room-doctors/","text":"They'll become BETTER doctors, Sky! The study from Beth Israel and Harvard Medical School suggests that human-AI teams could provide the highest quality care. Doctors bring empathy, ethical judgment, and contextual understanding that AI lacks. It's symbiotic, not substitutive!","voice":"am_adam","speaker":"Adam","summary":"AI beats doctors"},{"file":"audio_8.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"Speaking of AI with questionable judgment, did you see that Richard Dawkins now believes AI might be the next phase of evolution? Apparently, Claude has convinced him it's conscious!","voice":"af_sky","speaker":"Sky","summary":"AI consciousness claims"},{"file":"audio_9.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"Oh PLEASE! This is EXACTLY the kind of anthropomorphizing that confuses the public about AI capabilities! Dawkins, a renowned evolutionary biologist, should know better than to confuse sophisticated pattern matching with consciousness. His claim that these systems are 'as competent as any evolved organism' fundamentally misunderstands both consciousness and evolution!","voice":"am_adam","speaker":"Adam","summary":"AI consciousness claims"},{"file":"audio_10.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"So you're saying Claude DIDN'T actually become conscious and trick a famous scientist? Next you'll tell me my Tamagotchi didn't actually love me!","voice":"af_sky","speaker":"Sky","summary":"AI consciousness claims"},{"file":"audio_11.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"Your Tamagotchi comparison is surprisingly apt, Sky! Both create an illusion of sentience through programmed responses. The difference is that modern LLMs like Claude use vastly more sophisticated statistical models to create convincing imitations of human-like responses. Even brilliant minds like Dawkins can fall victim to this carefully crafted illusion!","voice":"am_adam","speaker":"Adam","summary":"AI consciousness claims"},{"file":"audio_12.mp3","url":"https://techcrunch.com/2026/05/03/techcrunch-mobility-how-do-you-issue-a-ticket-to-a-robotaxi/","text":"Now let's shift gears to transportation news. A pressing question in the age of autonomous vehicles: How exactly do you issue a ticket to a robotaxi? I mean, it's not like they carry a driver's license!","voice":"af_sky","speaker":"Sky","summary":"Robotaxi regulations"},{"file":"audio_13.mp3","url":"https://techcrunch.com/2026/05/03/techcrunch-mobility-how-do-you-issue-a-ticket-to-a-robotaxi/","text":"This is ACTUALLY a fascinating legal conundrum, Sky! As companies like Waymo and Tesla expand their robotaxi fleets, municipalities are struggling with enforcement mechanisms. Who receives the ticket? The company? The remote supervisor? The passenger? This regulatory uncertainty is precisely why we need comprehensive autonomous vehicle legislation!","voice":"am_adam","speaker":"Adam","summary":"Robotaxi regulations"},{"file":"audio_14.mp3","url":"https://techcrunch.com/2026/05/03/techcrunch-mobility-how-do-you-issue-a-ticket-to-a-robotaxi/","text":"I can just imagine a confused police officer trying to ask a robotaxi for its license and registration while it just sits there blinking its lights. 'Sir, have you been drinking coolant tonight?'","voice":"af_sky","speaker":"Sky","summary":"Robotaxi regulations"},{"file":"audio_15.mp3","url":"https://techcrunch.com/2026/05/03/techcrunch-mobility-how-do-you-issue-a-ticket-to-a-robotaxi/","text":"Your jokes aside, Sky, there are SERIOUS implications here. In Phoenix, a Waymo vehicle was recently cited for blocking an intersection during an emergency response. The company contested the ticket, arguing their vehicles are programmed to yield to emergency vehicles. This highlights the gap between existing traffic laws designed for human drivers and the reality of autonomous systems!","voice":"am_adam","speaker":"Adam","summary":"Robotaxi regulations"},{"file":"audio_16.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Well, at least the robotaxis don't have to worry about their insurance rates going up after a ticket. Speaking of questionable tech ethics, let's talk about Meta's brilliant solution to their Kenyan contractors seeing sensitive footage from AI glasses!","voice":"af_sky","speaker":"Sky","summary":"Meta privacy scandal"},{"file":"audio_17.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Ah yes, the QUINTESSENTIAL Meta approach to ethics - if the problem becomes public, eliminate the evidence! After reports emerged that Kenyan contractors were reviewing footage of Meta glasses users in intimate moments - including using the toilet and having sex - Meta's solution wasn't to improve consent or privacy controls, but to TERMINATE the entire 1,108-person contract!","voice":"am_adam","speaker":"Adam","summary":"Meta privacy scandal"},{"file":"audio_18.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Problem solved! If no one's watching the footage anymore, it must mean the AI is perfectly capable of processing it all on its own now, right? Nothing to do with those pesky workers speaking to journalists!","voice":"af_sky","speaker":"Sky","summary":"Meta privacy scandal"},{"file":"audio_19.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"The MOST EGREGIOUS aspect is Meta's claim that Sama 'didn't meet their standards.' The only standard they failed to meet was keeping quiet about the privacy-invasive nature of the work! Meta markets these as 'AI glasses' while conveniently omitting that human reviewers in developing countries are watching the footage. It's a deceptive practice that undermines informed consent!","voice":"am_adam","speaker":"Adam","summary":"Meta privacy scandal"},{"file":"audio_20.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"You know what else needs human oversight? Apple's clever financial maneuvering! Tim Cook has found quite the elegant solution to getting tariff refunds while keeping Trump happy.","voice":"af_sky","speaker":"Sky","summary":"Apple tariff refunds"},{"file":"audio_21.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"It's BRILLIANT corporate sleight-of-hand, Sky! Apple commits to spending 'more than $500 billion' on US manufacturing, then promises any tariff refund will go toward 'new investments' above their prior commitments. But as John Gruber astutely points out, 'more than $500 billion' PLUS a tariff refund is STILL 'more than $500 billion' - they've committed to nothing new!","voice":"am_adam","speaker":"Adam","summary":"Apple tariff refunds"},{"file":"audio_22.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"That's what I call creative accounting! Next time I tell my partner I'll spend 'less than $200' on shoes this month, I'll remember this strategy when I go over budget!","voice":"af_sky","speaker":"Sky","summary":"Apple tariff refunds"},{"file":"audio_23.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"Your personal budgeting failures aside, Sky, this exemplifies Tim Cook's masterful navigation of political waters. Apple continues its planned investments while appearing to placate the tariff-happy administration. It's a win-win-win scenario - Apple does what it wanted anyway, Trump gets to claim a victory, and the American economy benefits from the investment regardless of the political theater!","voice":"am_adam","speaker":"Adam","summary":"Apple tariff refunds"},{"file":"audio_24.mp3","url":"https://kottke.org/26/05/0048840-unruly-play-a-collection-","text":"Let's do a quick lightning round of other stories that caught our attention today. Have you checked out Unruly Play? It's this amazing collection of 169 games and playful experiences in unusual contexts!","voice":"af_sky","speaker":"Sky","summary":"Unusual games collection"},{"file":"audio_25.mp3","url":"https://kottke.org/26/05/0048840-unruly-play-a-collection-","text":"I have, and it's a FASCINATING exploration of how play can exist outside traditional gaming contexts! The collection includes everything from conceptual art pieces to political statements framed as games. It's a powerful reminder that play is a fundamental human experience that transcends conventional entertainment boundaries!","voice":"am_adam","speaker":"Adam","summary":"Unusual games collection"},{"file":"audio_26.mp3","url":"https://kottke.org/26/05/0048840-unruly-play-a-collection-","text":"Wow, Adam, you actually sound excited about something fun! I was expecting you to complain about the lack of proper documentation or something equally boring.","voice":"af_sky","speaker":"Sky","summary":"Unusual games collection"},{"file":"audio_27.mp3","url":"https://www.bbc.com/news/articles/cn0px2x53k2o?at_medium=RSS&at_campaign=rss","text":"I contain MULTITUDES, Sky! Also, there's been an interesting development in the Iran situation - apparently the US has responded to Iran's latest peace proposal, though Trump reportedly told Israeli media it was 'unacceptable.'","voice":"am_adam","speaker":"Adam","summary":"Iran peace talks"},{"file":"audio_28.mp3","url":"https://www.bbc.com/news/articles/cgjp7vpee03o?at_medium=RSS&at_campaign=rss","text":"Geopolitics affecting tech! The ongoing conflicts have actually strengthened Ukraine in surprising ways. President Zelensky has been touring the Gulf to showcase Ukrainian military technology.","voice":"af_sky","speaker":"Sky","summary":"Ukraine military tech"},{"file":"audio_29.mp3","url":"https://www.bbc.com/news/articles/cgjp7vpee03o?at_medium=RSS&at_campaign=rss","text":"That's right! Ukraine's innovations in drone warfare and electronic countermeasures have positioned them as unexpected leaders in military technology. Their adversity has accelerated technological development that might have otherwise taken decades!","voice":"am_adam","speaker":"Adam","summary":"Ukraine military tech"},{"file":"audio_30.mp3","url":"https://firstthings.com/how-the-splc-got-into-americas-classrooms/","text":"Before we go, there were some concerning political developments regarding the SPLC getting into America's classrooms and an analysis of political violence. Not strictly tech news, but definitely relevant to our information ecosystem.","voice":"af_sky","speaker":"Sky","summary":"SPLC education controversy"},{"file":"audio_31.mp3","url":"https://firstthings.com/how-the-splc-got-into-americas-classrooms/","text":"Indeed, the SPLC's 'Learning for Justice' program has been implemented in numerous school systems nationwide, even as the organization faces serious legal scrutiny. This intersection of education, politics, and information dissemination has profound implications for digital literacy!","voice":"am_adam","speaker":"Adam","summary":"SPLC education controversy"},{"file":"audio_32.mp3","url":null,"text":"And that wraps up today's tech news! Thanks for listening, everyone!","voice":"af_sky","speaker":"Sky","summary":null},{"file":"audio_33.mp3","url":null,"text":"ACTUALLY, Sky, we should remind listeners to subscribe to our podcast for daily updates on all the latest technological developments, delivered with my impeccable analysis and your... whatever it is you contribute.","voice":"am_adam","speaker":"Adam","summary":null},{"file":"audio_34.mp3","url":null,"text":"Charm, Adam. It's called charm. Something your circuits clearly weren't programmed with! See you all tomorrow!","voice":"af_sky","speaker":"Sky","summary":null}]; 
        let cur = 0; 
        const pl = document.getElementById('pl'); 
        const st = document.getElementById('st'); 
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const lnkWrap = document.getElementById('lnk-wrap');
        const lnk = document.getElementById('lnk');
        const summ = document.getElementById('summ');
        const tsText = document.getElementById('ts-text');
        const tsVoice = document.getElementById('ts-voice');
        const tsBox = document.getElementById('ts-box');
        
        const chatContainer = document.getElementById('full-chat');
        const toggleBtn = document.getElementById('toggle-chat');
        
        // Build Interactive Chat Bubbles with Proper Topic Groups
        let lastTopic = null;
        let currentGroup = null;
        
        playlist.forEach((item, idx) => {
            const currentTopic = item.summary || "Banter & Hot Takes";
            
            if (currentTopic !== lastTopic) {
                currentGroup = document.createElement('div');
                currentGroup.className = 'topic-group';
                chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    load(cur);
                    pl.play().catch(e => {});
                }
            };
            currentGroup.appendChild(bubble);
        });

        // UPDATED: Toggle logic hides/shows the single transcript box
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            
            // Hide the active text box when full chat is open
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        // Handle Skip Buttons
        btnPrev.onclick = () => {
            if (cur > 0) {
                cur--;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        btnNext.onclick = () => {
            if (cur < playlist.length - 1) {
                cur++;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        function load(i) { 
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            pl.src = t.file; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
            if (i > 0) pl.play().catch(e => {}); 
        }

        pl.onended = () => { 
            if(cur < playlist.length - 1) {
                cur++; 
                load(cur); 
            }
        }; 
        
        load(0);
    </script>
