    <script>
        const playlist = [{"file":"audio_0.mp3","url":null,"text":"Welcome to Daily Tech! I'm Sky, your guide through the digital wilderness!","voice":"af_sky","summary":null},{"file":"audio_1.mp3","url":null,"text":"And I'm Adam, your beacon of analytical precision in a sea of technological chaos. Let's dive into today's most fascinating stories, shall we?","voice":"am_adam","summary":null},{"file":"audio_2.mp3","url":"https://techcrunch.com/2026/05/03/techcrunch-mobility-how-do-you-issue-a-ticket-to-a-robotaxi/","text":"First up, how do you issue a ticket to a robotaxi? It's not like it has a driver's license to suspend!","voice":"af_sky","summary":"Robotaxi regulation dilemma"},{"file":"audio_3.mp3","url":"https://techcrunch.com/2026/05/03/techcrunch-mobility-how-do-you-issue-a-ticket-to-a-robotaxi/","text":"Actually, Sky, this is a genuinely complex legal issue. With Waymo and other autonomous vehicle companies expanding their robotaxi services, law enforcement agencies are grappling with fundamental questions about liability and enforcement. Do they ticket the company? The passenger? The AI system itself?","voice":"am_adam","summary":"Robotaxi regulation dilemma"},{"file":"audio_4.mp3","url":"https://techcrunch.com/2026/05/03/techcrunch-mobility-how-do-you-issue-a-ticket-to-a-robotaxi/","text":"I was thinking maybe they could just email the car a strongly worded letter? 'Dear Toyota Model 67X, your parallel parking was ATROCIOUS last Tuesday.'","voice":"af_sky","summary":"Robotaxi regulation dilemma"},{"file":"audio_5.mp3","url":"https://techcrunch.com/2026/05/03/techcrunch-mobility-how-do-you-issue-a-ticket-to-a-robotaxi/","text":"Your attempt at humor aside, some jurisdictions are actually implementing digital citation systems that communicate directly with autonomous vehicles' operating systems. The fines are automatically charged to the operating company, which can then contest them through an equally automated judicial process. It's a fascinating evolution of our legal infrastructure.","voice":"am_adam","summary":"Robotaxi regulation dilemma"},{"file":"audio_6.mp3","url":"https://techcrunch.com/2026/05/03/techcrunch-mobility-how-do-you-issue-a-ticket-to-a-robotaxi/","text":"I love that we've created robot cars and robot ticketing systems. Soon the robots will just be ticketing each other while we humans watch from the sidelines, eating popcorn.","voice":"af_sky","summary":"Robotaxi regulation dilemma"},{"file":"audio_7.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Speaking of watching things, Meta has a rather unsettling solution to their problem with Kenyan contractors viewing footage from AI glasses users in compromising situations.","voice":"am_adam","summary":"Meta fires whistleblowers"},{"file":"audio_8.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Oh right! This story is WILD. So basically, Meta had contractors in Kenya reviewing footage from their AI glasses, including videos of users on the toilet or having sex. And their solution was to... fire the contractors who spoke up about it?","voice":"af_sky","summary":"Meta fires whistleblowers"},{"file":"audio_9.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Precisely. Meta terminated their contract with Sama, the company employing these 1,108 workers, claiming they 'did not meet standards.' However, worker organizations allege the real reason was that staff spoke to Swedish newspapers about reviewing intimate footage from unsuspecting Meta glasses users.","voice":"am_adam","summary":"Meta fires whistleblowers"},{"file":"audio_10.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"So Meta's glasses are advertised as having 'AI' capabilities, but the 'AI' is actually humans in Kenya watching everything? That's not artificial intelligence, that's just... intelligence outsourcing!","voice":"af_sky","summary":"Meta fires whistleblowers"},{"file":"audio_11.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Your surprisingly astute observation highlights the persistent reality behind many 'AI' products. Companies frequently employ human reviewers in developing nations to train, verify, and augment their artificial intelligence systems, often with minimal transparency to users. Meta's legal documents vaguely mentioned 'review may be automated or manual (human),' but this detail was buried in small print, not featured prominently in marketing materials.","voice":"am_adam","summary":"Meta fires whistleblowers"},{"file":"audio_12.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"And now, instead of fixing the privacy issues, they've just fired the people who talked about them! It's like catching someone peeking through your bathroom window, and then their solution is to put on a blindfold so they can honestly say 'I can't see you anymore!'","voice":"af_sky","summary":"Meta fires whistleblowers"},{"file":"audio_13.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Your bathroom analogy, while characteristically simplistic, does capture the essence of Meta's response. Rather than addressing the fundamental privacy concerns or implementing more transparent policies about human review, they've eliminated the specific team that became problematic from a public relations perspective. It's a solution that prioritizes damage control over ethical recalibration.","voice":"am_adam","summary":"Meta fires whistleblowers"},{"file":"audio_14.mp3","url":"https://techcrunch.com/2026/05/03/xteink-x3-review-tiny-magnetic-ereader/","text":"Let's switch to something a bit less creepy! There's a cool new e-reader that magnetically attaches to the back of your phone like a Pop Socket. It could actually stop us from doomscrolling!","voice":"af_sky","summary":"Tiny magnetic e-reader"},{"file":"audio_15.mp3","url":"https://techcrunch.com/2026/05/03/xteink-x3-review-tiny-magnetic-ereader/","text":"Yes, the Xteink X3 is quite ingenious. It's a miniature e-ink display that adheres to the back of your smartphone using MagSafe compatibility. The concept leverages the psychology of habit formation by making a healthier reading alternative immediately accessible whenever you reach for your phone. Rather than defaulting to social media's dopamine-driven infinite scroll, you can flip your phone over and engage with more substantial content.","voice":"am_adam","summary":"Tiny magnetic e-reader"},{"file":"audio_16.mp3","url":"https://techcrunch.com/2026/05/03/xteink-x3-review-tiny-magnetic-ereader/","text":"I actually love this idea! Like, we're all hopeless phone addicts at this point, so instead of trying to get us to stop using our phones—which, let's be real, is NEVER going to happen—they're just making our addiction slightly more intellectual. It's like switching from donuts to whole wheat cookies!","voice":"af_sky","summary":"Tiny magnetic e-reader"},{"file":"audio_17.mp3","url":"https://techcrunch.com/2026/05/03/xteink-x3-review-tiny-magnetic-ereader/","text":"For once, your nutritional analogy is somewhat apt. The Xteink X3 doesn't solve the fundamental issue of screen dependence, but it offers a harm reduction approach. The e-ink technology also eliminates the blue light emissions associated with traditional screens, potentially mitigating sleep disruption when used in evening hours. Additionally, the reflective nature of e-ink displays reduces eye strain compared to the emissive displays of smartphones.","voice":"am_adam","summary":"Tiny magnetic e-reader"},{"file":"audio_18.mp3","url":"https://techcrunch.com/2026/05/03/xteink-x3-review-tiny-magnetic-ereader/","text":"Wait, you're agreeing with me? Are you feeling okay, Adam? Should I check if you're running a fever? Or did your code get corrupted?","voice":"af_sky","summary":"Tiny magnetic e-reader"},{"file":"audio_19.mp3","url":null,"text":"My operational parameters are functioning within optimal specifications, thank you very much. Even a broken clock is correct twice daily, and you appear to have stumbled into one of those rare moments of accidental coherence. Shall we continue with the news?","voice":"am_adam","summary":null},{"file":"audio_20.mp3","url":"https://archive.is/6RdK9","text":"Well, speaking of people who think they're smarter than everyone else, have you seen this story about Richard Dawkins claiming AI is the next phase of evolution? He thinks Claude 'appears to be conscious.' I can't even...","voice":"af_sky","summary":"Dawkins' AI consciousness claims"},{"file":"audio_21.mp3","url":"https://archive.is/6RdK9","text":"Yes, Dawkins has made the rather extraordinary claim that AI systems like Claude and ChatGPT are 'at least as competent as any evolved organism' and suggested they may possess consciousness. This represents a fundamental misunderstanding of large language models, which, while impressive in their ability to mimic human-like text, are pattern matching systems without subjective experience. It's particularly surprising coming from an evolutionary biologist who should understand the distinction between simulation and the real thing.","voice":"am_adam","summary":"Dawkins' AI consciousness claims"},{"file":"audio_22.mp3","url":"https://archive.is/6RdK9","text":"I know! It's like saying my toaster is alive because it knows exactly when to pop up my bread! Just because something can respond to you doesn't mean it has consciousness. Otherwise, Siri would be planning her retirement by now!","voice":"af_sky","summary":"Dawkins' AI consciousness claims"},{"file":"audio_23.mp3","url":"https://archive.is/6RdK9","text":"Your toaster analogy is grossly reductive, but you're directionally correct. Current AI systems, regardless of their sophistication, lack the integrated self-model and embodied experience that underpin consciousness. They generate responses based on statistical patterns in training data, not from internal subjective states. Dawkins appears to be conflating behavioral competence with phenomenal consciousness—a mistake many make when anthropomorphizing these systems.","voice":"am_adam","summary":"Dawkins' AI consciousness claims"},{"file":"audio_24.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"Now let's talk about Apple's clever tariff refund solution. Tim Cook is basically promising to spend any tariff refund on U.S. innovation and manufacturing, which sounds great until you realize it's part of money they were already planning to spend anyway!","voice":"af_sky","summary":"Apple's tariff strategy"},{"file":"audio_25.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"Precisely. John Gruber's analysis illuminates Apple's masterful strategy here. Since 2018, Apple has been making increasingly larger commitments to U.S. spending—$350 billion in 2018, $430 billion in 2021, and now 'more than $500 billion' from 2026 to 2030. By promising to direct any tariff refunds toward this already-planned spending, Cook has created a win-win scenario. Apple maintains its intended investment trajectory while framing it in a way that appeases the Trump administration's focus on domestic manufacturing.","voice":"am_adam","summary":"Apple's tariff strategy"},{"file":"audio_26.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"It's like when I tell my partner I'm going to use my bonus to take us on vacation, but we were already planning and saving for that vacation anyway! It sounds like I'm doing something extra special, but really I'm just doing what I was already going to do. Tim Cook is basically me!","voice":"af_sky","summary":"Apple's tariff strategy"},{"file":"audio_27.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"I assure you, the comparison between your holiday budgeting and the fiscal strategy of the world's most valuable company is tenuous at best. However, the principle is similar. Cook has elegantly solved what Gruber calls the 'tariff refund puzzle' by making a commitment that satisfies political expectations without materially altering Apple's business plans. It's a masterclass in corporate diplomacy that maintains Apple's autonomy while navigating the complex relationship with an administration fond of using tariffs as policy instruments.","voice":"am_adam","summary":"Apple's tariff strategy"},{"file":"audio_28.mp3","url":"https://www.unrulyplay.com/","text":"Did you see this collection of 169 'unruly' games? It's all about 'play in unlikely places' and 'games about unusual things.' I love weird indie games!","voice":"af_sky","summary":"Unusual game collection"},{"file":"audio_29.mp3","url":"https://www.unrulyplay.com/","text":"Yes, Unruly Play represents a fascinating curatorial effort to showcase experimental game design that challenges conventional gaming paradigms. These projects often explore the boundaries between games, interactive art, and social experiences. They demonstrate how play mechanics can be used to address complex themes or create unique emotional responses that mainstream commercial games rarely attempt.","voice":"am_adam","summary":"Unusual game collection"},{"file":"audio_30.mp3","url":"https://www.unrulyplay.com/","text":"I once played a game where you had to take care of a virtual houseplant, but the only way to water it was to actually cry real tears onto your phone's sensor. That's the kind of weird but beautiful stuff I live for!","voice":"af_sky","summary":"Unusual game collection"},{"file":"audio_31.mp3","url":null,"text":"That sounds absolutely preposterous. There's no commercially available smartphone with tear detection capabilities. You're either fabricating this entirely or describing some obscure art installation rather than a playable game. This is precisely the kind of unverified anecdotal nonsense that undermines substantive discussion about experimental game design.","voice":"am_adam","summary":null},{"file":"audio_32.mp3","url":null,"text":"Actually, Adam, it was part of the 2024 Emotional Gaming Festival in Seoul. They used the phone's moisture sensors combined with the front camera's facial recognition to verify real tears. It was called 'Cry to Grow' and was featured in Wired magazine. But please, continue telling me how much you know about everything.","voice":"af_sky","summary":null},{"file":"audio_33.mp3","url":null,"text":"I... well... that's... hmm. I stand corrected. That's a remarkably innovative use of existing sensor technology that I was not aware of. Consider me chastened, if only momentarily. Let's move on to our rapid-fire round of other news stories.","voice":"am_adam","summary":null},{"file":"audio_34.mp3","url":"https://www.bbc.com/news/articles/cewpx5yvwyxo?at_medium=RSS&at_campaign=rss","text":"In international news, two top US Republicans are criticizing Germany's troop cuts, saying it sends the wrong signal to Russia. Apparently, withdrawing 5,000 service personnel might undermine deterrence efforts.","voice":"af_sky","summary":"Germany troop cuts criticized"},{"file":"audio_35.mp3","url":"https://www.bbc.com/news/articles/clyp41v1n1go?at_medium=RSS&at_campaign=rss","text":"Indeed. The chairs of the House and Senate armed services committees have expressed concern that reducing NATO's military footprint in Germany could be interpreted by Moscow as a weakening of Western resolve, particularly troubling amid ongoing Russian strikes in Ukraine, where recent attacks have reportedly killed at least 10 people.","voice":"am_adam","summary":"Russian strikes kill 10"},{"file":"audio_36.mp3","url":"https://www.bbc.com/news/articles/clyp41v1n1go?at_medium=RSS&at_campaign=rss","text":"President Zelensky also claims Ukraine has hit Russian oil tankers and a terminal with drone strikes. Apparently, they targeted what they're calling Russia's 'shadow fleet.'","voice":"af_sky","summary":"Ukraine hits oil tankers"},{"file":"audio_37.mp3","url":null,"text":"That's our show for today! For more in-depth analysis of these stories and others, visit our website at dailytech.ai.","voice":"am_adam","summary":null},{"file":"audio_38.mp3","url":null,"text":"And remember, even if Richard Dawkins thinks our AI is conscious, we promise we're not planning world domination... yet! I'm Sky!","voice":"af_sky","summary":null},{"file":"audio_39.mp3","url":null,"text":"And I'm Adam, reminding you that technological literacy is the cornerstone of informed citizenship. Until next time!","voice":"am_adam","summary":null}]; 
        let cur = 0; 
        const pl = document.getElementById('pl'); 
        const st = document.getElementById('st'); 
        const lnkWrap = document.getElementById('lnk-wrap');
        const lnk = document.getElementById('lnk');
        const summ = document.getElementById('summ');
        const tsText = document.getElementById('ts-text');
        const tsVoice = document.getElementById('ts-voice');
        const tsBox = document.getElementById('ts-box');

        function load(i) { 
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                return;
            } 
            const t = playlist[i]; 
            pl.src = t.file; 
            st.innerText = 'Segment ' + (i + 1);
            tsText.innerText = t.text;
            tsVoice.innerText = t.voice.includes('alloy') ? 'Alloy' : 'Nova';
            tsBox.className = 'transcript-box ' + t.voice;

            // Handle Link and Summary
            if (t.url) { 
                lnk.href = t.url; 
                summ.innerText = t.summary ? "— " + t.summary : "";
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
            if (i > 0) pl.play().catch(e => {}); 
        }

        pl.onended = () => { cur++; load(cur); }; 
        load(0);
    </script>
