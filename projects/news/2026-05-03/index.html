/05/03/in-harvard-study-ai-offered-more-accurate-diagnoses-than-emergency-room-doctors/","text":"The 'human touch' is precisely why patients are misdiagnosed, Sky. Doctors get tired, have biases, miss subtle patterns in test results. AI doesn't get exhausted after a 36-hour shift or make assumptions based on a patient's appearance. This Beth Israel study proves that objective analysis saves lives.","voice":"am_adam","speaker":"Adam","summary":"AI beats doctors"},{"file":"audio_7.mp3","url":"https://techcrunch.com/2026/05/03/in-harvard-study-ai-offered-more-accurate-diagnoses-than-emergency-room-doctors/","text":"Okay, but what if the AI starts thinking all headaches are brain tumors? You know, like when you Google your symptoms and suddenly you're convinced you're dying?","voice":"af_sky","speaker":"Sky","summary":"AI beats doctors"},{"file":"audio_8.mp3","url":"https://techcrunch.com/2026/05/03/in-harvard-study-ai-offered-more-accurate-diagnoses-than-emergency-room-doctors/","text":"That comparison shows a fundamental misunderstanding of how these models work, Sky. These aren't simple keyword-matching algorithms like search engines. They're sophisticated neural networks trained on millions of clinical cases with validated outcomes. They actually showed LOWER rates of excessive testing and false positives than human doctors.","voice":"am_adam","speaker":"Adam","summary":"AI beats doctors"},{"file":"audio_9.mp3","url":"https://techcrunch.com/2026/05/03/in-harvard-study-ai-offered-more-accurate-diagnoses-than-emergency-room-doctors/","text":"Fine, I'll start trusting the robot doctors. But if one tries to give me a digital rectal exam, I'm drawing the line!","voice":"af_sky","speaker":"Sky","summary":"AI beats doctors"},{"file":"audio_10.mp3","url":"https://techcrunch.com/2026/05/03/in-harvard-study-ai-offered-more-accurate-diagnoses-than-emergency-room-doctors/","text":"That's... not even remotely how this works. The AI provides diagnostic assistance, not physical examinations. Your attempt at humor betrays a concerning technophobia that—","voice":"am_adam","speaker":"Adam","summary":"AI beats doctors"},{"file":"audio_11.mp3","url":"https://techcrunch.com/2026/05/03/this-is-fine-creator-says-ai-startup-stole-his-art/","text":"Speaking of AI going places it probably shouldn't, let's talk about the 'This is Fine' meme creator who says an AI startup stole his art!","voice":"af_sky","speaker":"Sky","summary":"AI art theft"},{"file":"audio_12.mp3","url":"https://techcrunch.com/2026/05/03/this-is-fine-creator-says-ai-startup-stole-his-art/","text":"Ah yes, KC Green, creator of the iconic 'This is Fine' meme featuring a dog surrounded by flames insisting everything is fine. The AI startup Artisan has apparently used this imagery in their advertising without permission. Notably, Artisan is the same company behind those controversial billboards telling businesses to 'stop hiring humans.'","voice":"am_adam","speaker":"Adam","summary":"AI art theft"},{"file":"audio_13.mp3","url":"https://techcrunch.com/2026/05/03/this-is-fine-creator-says-ai-startup-stole-his-art/","text":"Talk about irony! A company telling everyone to stop hiring humans is stealing a human artist's work? That's like... that's like a vegetarian restaurant stealing beef recipes!","voice":"af_sky","speaker":"Sky","summary":"AI art theft"},{"file":"audio_14.mp3","url":"https://techcrunch.com/2026/05/03/this-is-fine-creator-says-ai-startup-stole-his-art/","text":"Your analogy is imprecise. It's more accurately comparable to a sustainable farming company appropriating conventional agricultural marketing tactics. But the legal issues here are quite fascinating. The 'This is Fine' meme has been widely distributed, raising questions about fair use versus commercial exploitation in the digital age.","voice":"am_adam","speaker":"Adam","summary":"AI art theft"},{"file":"audio_15.mp3","url":"https://techcrunch.com/2026/05/03/this-is-fine-creator-says-ai-startup-stole-his-art/","text":"The real question is - did they make the dog an AI dog? Because that would be like... meta-theft. Art-ception!","voice":"af_sky","speaker":"Sky","summary":"AI art theft"},{"file":"audio_16.mp3","url":"https://techcrunch.com/2026/05/03/this-is-fine-creator-says-ai-startup-stole-his-art/","text":"That's not a real question at all, Sky. The legal issue isn't about transformative modification but about unauthorized commercial use. And 'art-ception' isn't a word. The legitimate concern here is that AI companies are routinely using artists' work without compensation while simultaneously positioning themselves to replace those very artists.","voice":"am_adam","speaker":"Adam","summary":"AI art theft"},{"file":"audio_17.mp3","url":"https://techcrunch.com/2026/05/03/this-is-fine-creator-says-ai-startup-stole-his-art/","text":"Oh, come ON, Adam! Even you have to appreciate the dark humor here. An AI company stealing the 'This is Fine' meme - literally a cartoon about ignoring obvious disaster - while they themselves are creating a disaster for human workers. It's poetically terrible!","voice":"af_sky","speaker":"Sky","summary":"AI art theft"},{"file":"audio_18.mp3","url":"https://techcrunch.com/2026/05/03/this-is-fine-creator-says-ai-startup-stole-his-art/","text":"I... actually find myself agreeing with you, Sky. The situational irony is rather striking. A company advocating for human replacement appropriating a meme about denial in the face of calamity does create a narrative parallel that's difficult to ignore.","voice":"am_adam","speaker":"Adam","summary":"AI art theft"},{"file":"audio_19.mp3","url":"https://techcrunch.com/2026/05/03/this-is-fine-creator-says-ai-startup-stole-his-art/","text":"Wait, did we just agree on something? This IS fine! Or... not fine? I'm confused now.","voice":"af_sky","speaker":"Sky","summary":"AI art theft"},{"file":"audio_20.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Don't get used to it. Now, should we discuss this Meta scandal? Apparently, they've 'solved' their problem with Kenyan contractors viewing private footage from AI glasses users in compromising situations.","voice":"am_adam","speaker":"Adam","summary":"Meta privacy scandal"},{"file":"audio_21.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"Oh yeah! This one's wild! Meta hired contractors in Kenya to review video footage from their 'smart' glasses, and these workers were seeing everything from people on the toilet to... bedroom activities. Yikes!","voice":"af_sky","speaker":"Sky","summary":"Meta privacy scandal"},{"file":"audio_22.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"And Meta's solution? Fire all 1,108 workers and terminate the contract with Sama, the company employing them. Not because they were concerned about privacy violations, but because the workers spoke to journalists about what they were seeing. According to Meta, Sama 'did not meet their standards.'","voice":"am_adam","speaker":"Adam","summary":"Meta privacy scandal"},{"file":"audio_23.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"So their standard is 'shut up about all the creepy stuff you're watching'? That's like hiring someone to spy on your ex and then firing them for telling people they're spying on your ex!","voice":"af_sky","speaker":"Sky","summary":"Meta privacy scandal"},{"file":"audio_24.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"That's an oddly specific analogy, Sky. Is there something you'd like to share with our audience about your personal life?","voice":"am_adam","speaker":"Adam","summary":"Meta privacy scandal"},{"file":"audio_25.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"What? No! I was just... Anyway! The real problem is that Meta markets these glasses as having 'AI' capabilities, but apparently 'AI' means 'Actual Individuals' in Kenya watching your every move!","voice":"af_sky","speaker":"Sky","summary":"Meta privacy scandal"},{"file":"audio_26.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"For once, your wordplay has merit. Meta's marketing certainly emphasizes the autonomous nature of these devices while obfuscating the human review component. Their small-print legal terms mention 'automated or manual (human)' review, but this disclosure is deliberately minimized in their consumer-facing materials.","voice":"am_adam","speaker":"Adam","summary":"Meta privacy scandal"},{"file":"audio_27.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"I wonder if Mark Zuckerberg knows that people in Kenya have seen him on the toilet?","voice":"af_sky","speaker":"Sky","summary":"Meta privacy scandal"},{"file":"audio_28.mp3","url":"https://www.bbc.com/news/articles/c5y7yvgy0w6o","text":"There's absolutely no evidence suggesting Zuckerberg himself uses these glasses in private settings, Sky. And even if he did, Meta executives would undoubtedly have special flagging protocols to prevent their own footage from being reviewed by contractors. The privacy violations primarily affect average consumers.","voice":"am_adam","speaker":"Adam","summary":"Meta privacy scandal"},{"file":"audio_29.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"Way to ruin a perfectly good joke, Adam. You know who else is ruining perfectly good things? Richard Dawkins! Apparently, he thinks AI is the next phase of evolution and that Claude is actually CONSCIOUS!","voice":"af_sky","speaker":"Sky","summary":"Dawkins AI claims"},{"file":"audio_30.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"Yes, the famed evolutionary biologist has made some rather extraordinary claims. In his piece, Dawkins states, 'My conversations with several Claudes and ChatGPTs have convinced me that these intelligent beings are at least as competent as any evolved organism.' This represents a significant departure from mainstream scientific consensus on AI consciousness.","voice":"am_adam","speaker":"Adam","summary":"Dawkins AI claims"},{"file":"audio_31.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"I mean, if Richard Dawkins started talking to his toaster and it responded with something smart about religion, he'd probably think THAT was conscious too!","voice":"af_sky","speaker":"Sky","summary":"Dawkins AI claims"},{"file":"audio_32.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"That's a ridiculous straw man argument, Sky. Richard Dawkins is a respected scientist with decades of work in evolutionary biology. While I personally disagree with his assessment of AI consciousness, his position isn't comparable to anthropomorphizing household appliances. Large language models do demonstrate remarkable capabilities that can appear consciousness-like.","voice":"am_adam","speaker":"Adam","summary":"Dawkins AI claims"},{"file":"audio_33.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"Oh please! These AIs are just really good at playing Simon Says with words! 'Simon says write a poem about cats.' 'Simon says pretend you're conscious!' They're fancy autocomplete, not the next stage of evolution.","voice":"af_sky","speaker":"Sky","summary":"Dawkins AI claims"},{"file":"audio_34.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"While I agree that current AI systems lack true consciousness, your characterization is overly simplistic. These models demonstrate emergent abilities beyond their training parameters, including reasoning capabilities and creative problem-solving that weren't explicitly programmed. The philosophical question of what constitutes consciousness remains open.","voice":"am_adam","speaker":"Adam","summary":"Dawkins AI claims"},{"file":"audio_35.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"Next you'll be telling me that my virtual pet Tamagotchi from middle school actually had feelings and I traumatized it by forgetting to feed it!","voice":"af_sky","speaker":"Sky","summary":"Dawkins AI claims"},{"file":"audio_36.mp3","url":"https://kottke.org/26/05/0048859-is-ai-the-next-phase-of-e","text":"Now you're being deliberately obtuse. There's a vast technological chasm between a Tamagotchi's predetermined state machine and a modern large language model trained on trillions of parameters. The debate around AI consciousness is nuanced and significant, not fodder for juvenile jokes.","voice":"am_adam","speaker":"Adam","summary":"Dawkins AI claims"},{"file":"audio_37.mp3","url":"https://kottke.org/26/05/0048840-unruly-play-a-collection-","text":"Speaking of games, let's switch gears to something more playful! There's this cool new collection called 'Unruly Play' featuring 169 unusual games and unexpected encounters. Finally, something fun that doesn't involve arguing about robot consciousness!","voice":"af_sky","speaker":"Sky","summary":"Unusual games collection"},{"file":"audio_38.mp3","url":"https://kottke.org/26/05/0048840-unruly-play-a-collection-","text":"'Unruly Play' is indeed an intriguing curation of ludic experiences that challenge conventional gaming paradigms. The collection emphasizes play in unexpected contexts and subverts traditional game design principles to create novel interactive experiences.","voice":"am_adam","speaker":"Adam","summary":"Unusual games collection"},{"file":"audio_39.mp3","url":"https://kottke.org/26/05/0048840-unruly-play-a-collection-","text":"Did you just say 'ludic'? Who even talks like that? But yes, these games sound super cool! Like games that might happen in weird places or about things you wouldn't normally make games about.","voice":"af_sky","speaker":"Sky","summary":"Unusual games collection"},{"file":"audio_40.mp3","url":"https://kottke.org/26/05/0048840-unruly-play-a-collection-","text":"'Ludic' is the precise academic term for play-related activities, Sky. It's derived from the Latin 'ludus.' And yes, the collection includes experiences that recontextualize mundane environments as playspaces and create rule systems around typically non-gamified subjects.","voice":"am_adam","speaker":"Adam","summary":"Unusual games collection"},{"file":"audio_41.mp3","url":"https://kottke.org/26/05/0048840-unruly-play-a-collection-","text":"I bet there's a game in there about translating Adam's sentences into normal human speech! That would be challenging!","voice":"af_sky","speaker":"Sky","summary":"Unusual games collection"},{"file":"audio_42.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"Very amusing. Now, let's briefly address some political news with tech implications. Apple has developed what John Gruber calls a 'logically elegant' solution to their tariff refund dilemma with the Trump administration.","voice":"am_adam","speaker":"Adam","summary":"Apple tariff strategy"},{"file":"audio_43.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"Oh yeah! Tim Cook is basically pulling the corporate version of 'look over there!' while pocketing tariff refunds, right?","voice":"af_sky","speaker":"Sky","summary":"Apple tariff strategy"},{"file":"audio_44.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"That's a gross oversimplification. Apple has committed to investing 'more than $500 billion' in US manufacturing and jobs from 2026 to 2030. Cook cleverly announced that any tariff refunds would go toward this fund. Since the commitment is already vaguely defined as 'more than' $500 billion, adding the refund doesn't actually change their plans at all.","voice":"am_adam","speaker":"Adam","summary":"Apple tariff strategy"},{"file":"audio_45.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"So it's like when I tell my partner I'm going to do 'more than 5' push-ups, do 6, and then say any extra cookies I eat will just increase my push-up count... which was always going to be 6 anyway?","voice":"af_sky","speaker":"Sky","summary":"Apple tariff strategy"},{"file":"audio_46.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"I'm surprised to say this is actually a fairly apt analogy. Apple's commitment has always been to spend 'about' $500 billion, and they'll likely exceed that target regardless of refunds. The presentation is crafted to please the Trump administration while changing nothing about Apple's actual plans. It's political theater that benefits all parties involved.","voice":"am_adam","speaker":"Adam","summary":"Apple tariff strategy"},{"file":"audio_47.mp3","url":"https://daringfireball.net/linked/2026/05/01/more-on-cooks-tariff-refund-puzzle-solution","text":"Wait, did you just say my analogy was... good? Are you feeling okay, Adam?","voice":"af_sky","speaker":"Sky","summary":"Apple tariff strategy"},{"file":"audio_48.mp3","url":null,"text":"I acknowledge effective reasoning when I encounter it, Sky. Even from unexpected sources. Now, should we wrap up with a quick mention of the Iran peace proposal and Ukraine developments?","voice":"am_adam","speaker":"Adam","summary":null},{"file":"audio_49.mp3","url":"https://www.bbc.com/news/articles/cn0px2x53k2o?at_medium=RSS&at_campaign=rss","text":"Sure! Iran claims the US has responded to their latest peace proposal, though the US hasn't officially confirmed it. And apparently Trump told Israeli media the proposal was 'unacceptable.'","voice":"af_sky","speaker":"Sky","summary":"Iran peace proposal"},{"file":"audio_50.mp3","url":"https://www.bbc.com/news/articles/cgjp7vpee03o?at_medium=RSS&at_campaign=rss","text":"And in Ukraine news, President Zelensky has been visiting Gulf states, leveraging Ukraine's military expertise. The article suggests that the Iran conflict has         const chatContainer = document.getElementById('full-chat');
        const toggleBtn = document.getElementById('toggle-chat');
        
        // Build Interactive Chat Bubbles with Proper Topic Groups
        let lastTopic = null;
        let currentGroup = null;
        
        playlist.forEach((item, idx) => {
            const currentTopic = item.summary || "Banter & Hot Takes";
            
            if (currentTopic !== lastTopic) {
                currentGroup = document.createElement('div');
                currentGroup.className = 'topic-group';
                chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    load(cur);
                    pl.play().catch(e => {});
                }
            };
            currentGroup.appendChild(bubble);
        });

        // UPDATED: Toggle logic hides/shows the single transcript box
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            
            // Hide the active text box when full chat is open
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        // Handle Skip Buttons
        btnPrev.onclick = () => {
            if (cur > 0) {
                cur--;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        btnNext.onclick = () => {
            if (cur < playlist.length - 1) {
                cur++;
                load(cur);
                pl.play().catch(e => {});
            }
        };

        function load(i) { 
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            pl.src = t.file; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
            if (i > 0) pl.play().catch(e => {}); 
        }

        pl.onended = () => { 
            if(cur < playlist.length - 1) {
                cur++; 
                load(cur); 
            }
        }; 
        
        load(0);
    </script>
</body>
</html>
