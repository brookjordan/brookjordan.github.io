    <script>
        const OVERLAP_SECONDS = 2; // Adjust this to change how early the interruption starts
        const playlist = [{"file":"audio_0.mp3","url":null,"text":"morning everyone. Brook, I found your laptop charger wrapped around the kettle lead again. I've untangled it and put it by the toaster.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_1.mp3","url":null,"text":"sorry dad, I was charging it while making tea and I needed both hands free because I was also looking at some latency data on my phone and the cord just kind of naturally ended up...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_2.mp3","url":null,"text":"-- good morning all. thursday the seventh of may. decent spread of new stories this morning, a few threads carrying over from yesterday. let's get into the headlines properly.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_3.mp3","url":null,"text":"I should flag, I was up rather late with a remarkable little text, a ninth century Syriac commentary on the book of Numbers attributed to Isho'dad of Merv. I mention it only because it became immediately relevant to our first headline in a way I found slightly uncanny.","voice":3,"speaker":"Antony","summary":null},{"file":"audio_4.mp3","url":"https://www.bbc.com/news/articles/c8r8j1l6j0go","text":"of course it did. right. hantavirus. I'm leading on this because it's now on our doorstep. two british nationals off that cruise ship, the mv hondius, have returned to the uk and are self-isolating. no symptoms currently. health officials say public risk is very low. but three people are dead from this outbreak and seven total confirmed or suspected cases.","voice":4,"speaker":"Brett","summary":"hantavirus uk isolation"},{"file":"audio_5.mp3","url":"https://www.bbc.com/news/articles/c8r8j1l6j0go","text":"so the specific strain here is the andes strain of hantavirus, which is the one that matters because it is one of the only known hantavirus strains capable of person to person transmission. most hantavirus variants spread exclusively through contact with infected rodent droppings or urine. the andes strain, which originates in south america specifically argentina and chile, has documented cases of human to human spread, which is why this outbreak on a ship that departed southern argentina is getting serious attention rather than being dismissed as a fairly isolated zoonotic event.","voice":1,"speaker":"Brook","summary":"hantavirus uk isolation"},{"file":"audio_6.mp3","url":"https://www.bbc.com/news/articles/c8r8j1l6j0go","text":"and I want to build on something we touched on last night about the ship as an enclosed community of shared fate. because the epidemiological reality here reinforces that. on a vessel with a hundred and forty nine people from twenty three countries, the question of transmission tracing is genuinely complex. these two british nationals self-isolating is the right call, but we're now talking about a pathogen that can sit in incubation for up to eight weeks. the exposure window on a march departure from argentina is very wide.","voice":2,"speaker":"Conrad","summary":"hantavirus uk isolation"},{"file":"audio_7.mp3","url":"https://www.bbc.com/news/articles/c8r8j1l6j0go","text":"Isho'dad of Merv, in that commentary I mentioned, writes at length about the concept of ritual separation not as punishment but as a form of communal protection rooted in love. his reading of the Levitical quarantine laws is unusually tender, he argues that the one who is separated is not cast out but held at a careful and caring distance. the two britons self-isolating are, in a very old theological framework, performing an act of civic devotion. I find that genuinely moving rather than merely procedural.","voice":3,"speaker":"Antony","summary":"hantavirus uk isolation"},{"file":"audio_8.mp3","url":"https://www.bbc.com/news/articles/c8r8j1l6j0go","text":"I hope they're fine. quarantine in your own home is unpleasant but manageable. make sure you've got enough food in before you start. that's practical advice that applies regardless of the century.","voice":4,"speaker":"Brett","summary":"hantavirus uk isolation"},{"file":"audio_9.mp3","url":"https://www.bbc.com/news/articles/c8r8j1l6j0go","text":"the thing that strikes me from a systems standpoint is how this outbreak exposes the gaps in maritime health surveillance. cruise ships are essentially floating jurisdictional grey areas. when the hondius was denied docking at cape verde yesterday that was the port authority of a sovereign nation making a public health call about a vessel registered somewhere else carrying passengers from twenty three countries. there's no clean global protocol for this and the who is sort of coordinating but without actual enforcement power over any of the national authorities involved, which means the response speed depends entirely on voluntary cooperation between...","voice":1,"speaker":"Brook","summary":"hantavirus uk isolation"},{"file":"audio_10.mp3","url":"https://www.bbc.com/news/articles/c8r8j1l6j0go","text":"-- which is exactly the structural fragility that every post-covid review identified and none of the resulting frameworks adequately fixed. let's move. I want Brett to bring in the Korea story because it's a significant one.","voice":2,"speaker":"Conrad","summary":"hantavirus uk isolation"},{"file":"audio_11.mp3","url":"https://www.aljazeera.com/news/2026/5/7/south-korean-court-reduces-han-duck-soos-prison-term-in-martial-law-case","text":"right. South Korea. a Seoul appeals court has reduced the prison sentence of Han Duck-soo, the former acting president, from twenty three years to fifteen. Han Duck-soo was convicted in connection with the brief martial law declaration by Yoon Suk-yeol in december 2024. Yoon declared martial law, it lasted about six hours, the national assembly voted to overturn it, Yoon was eventually impeached and charged. Han Duck-soo, as the acting president who didn't stop it, got twenty three years at trial. now fifteen on appeal. that's a significant reduction.","voice":4,"speaker":"Brett","summary":"Korea sentence cut"},{"file":"audio_12.mp3","url":"https://www.aljazeera.com/news/2026/5/7/south-korean-court-reduces-han-duck-soos-prison-term-in-martial-law-case","text":"and the reduction is interesting because it suggests the appeals court drew a meaningful distinction between active participation in the declaration and failure to prevent it. twenty three years reads as treating him as a co-conspirator. fifteen years reads as treating him as someone who failed in his constitutional duty. that's a legally significant difference even if the moral weight is debatable.","voice":2,"speaker":"Conrad","summary":"Korea sentence cut"},{"file":"audio_13.mp3","url":"https://www.aljazeera.com/news/2026/5/7/south-korean-court-reduces-han-duck-soos-prison-term-in-martial-law-case","text":"I keep returning to the political theology of Johannes Althusius, the early seventeenth century Calvinist jurist whose Politica is one of the foundational texts of constitutional federalism. Althusius argues that the duty of the inferior magistrate in the face of tyranny is not merely to resist but to actively interpose. the failure to interpose is itself a form of complicity that he considered theologically weighty. the Korean appeals court has essentially made an Althusian ruling, complicity by omission is real but it is not the same charge as complicity by commission.","voice":3,"speaker":"Antony","summary":"Korea sentence cut"},{"file":"audio_14.mp3","url":"https://www.aljazeera.com/news/2026/5/7/south-korean-court-reduces-han-duck-soos-prison-term-in-martial-law-case","text":"fifteen years is still fifteen years. if you're in a position of constitutional authority and something goes badly wrong on your watch, it doesn't much matter to me how the legal categories shake out. you were there and you didn't stop it.","voice":4,"speaker":"Brett","summary":"Korea sentence cut"},{"file":"audio_15.mp3","url":"https://www.aljazeera.com/news/2026/5/7/south-korean-court-reduces-han-duck-soos-prison-term-in-martial-law-case","text":"this is the story that I want to flag has a broader resonance because South Korea's constitutional crisis basically played out on social media in real time. the assembly vote to overturn martial law was mobilised partly through citizens seeing the situation unfold on their phones and physically going to the national assembly building in the middle of the night to block the military. like the digital information infrastructure of the country was the mechanism by which the constitutional order defended itself. that seems like something that deserves more attention than it usually gets in the retrospective coverage of these events.","voice":1,"speaker":"Brook","summary":"Korea sentence cut"},{"file":"audio_16.mp3","url":"https://www.aljazeera.com/news/2026/5/7/south-korean-court-reduces-han-duck-soos-prison-term-in-martial-law-case","text":"it does. and it is genuinely one of the more hopeful data points of recent democratic history. right, Brook. the Musk and Altman story. you've been waiting to get into this one.","voice":2,"speaker":"Conrad","summary":"Korea sentence cut"},{"file":"audio_17.mp3","url":"https://www.wired.com/story/elon-musk-recruit-sam-altman-tesla-ai-lab-trial/","text":"okay yes, this is fascinating. internal messages from Shivon Zilis and Tesla executives have now surfaced in the ongoing trial and they reveal that back in 2017, Elon Musk was actively trying to recruit Sam Altman away from OpenAI to lead a rival ai lab at Tesla. and the names floated were Altman or Demis Hassabis. so two of the people who are now the most consequential figures in the entire ai industry were, at one point, being considered as potential employees in a venture that never materialised because Musk fell out with the OpenAI board instead.","voice":1,"speaker":"Brook","summary":"Musk recruited Altman"},{"file":"audio_18.mp3","url":"https://www.wired.com/story/elon-musk-recruit-sam-altman-tesla-ai-lab-trial/","text":"what strikes me here is that these messages reframe the entire Musk versus OpenAI narrative. the public story Musk has told is that he left because of principled disagreements about safety and the direction of the organisation. the private story these messages tell is that he was simultaneously trying to poach its leadership for a competitor. those two narratives are not necessarily incompatible, but the combination suggests his grievance was never purely ideological.","voice":2,"speaker":"Conrad","summary":"Musk recruited Altman"},{"file":"audio_19.mp3","url":"https://www.wired.com/story/elon-musk-recruit-sam-altman-tesla-ai-lab-trial/","text":"I find the Hassabis detail particularly rich. because what you have here is a moment where the three people who now represent three genuinely distinct philosophical visions of what artificial intelligence should be and who it should serve were briefly in the orbit of a single patron's ambition. it has the structure of a scene from the Ecclesiastical History of Evagrius Scholasticus, the sixth century Syrian historian who had a brilliant eye for the moments where the entire subsequent shape of an institution hinged on a conversation that almost didn't happen. history as a series of near-misses wearing the costume of inevitability.","voice":3,"speaker":"Antony","summary":"Musk recruited Altman"},{"file":"audio_20.mp3","url":"https://www.wired.com/story/elon-musk-recruit-sam-altman-tesla-ai-lab-trial/","text":"imagine if Altman had said yes. we'd be having a very different set of conversations. probably still about the same underlying problems, just with different names attached.","voice":4,"speaker":"Brett","summary":"Musk recruited Altman"},{"file":"audio_21.mp3","url":"https://www.wired.com/story/elon-musk-recruit-sam-altman-tesla-ai-lab-trial/","text":"and there's a tech angle here that I think gets lost in the personality drama. in 2017 Tesla was not an ai company in any meaningful sense. it was a car company with a driver assistance programme. the idea that you could take Altman or Hassabis and drop them into that environment and produce a serious ai research lab is... I mean, the cultural and infrastructural gap between what Tesla was doing and what genuine frontier ai research requires is enormous. it wasn't just a personnel decision, it would have required rebuilding the entire organisation around a completely different mission, and Musk's track record of running multiple organisations simultaneously suggests that Tesla ai lab would have been one of several things competing for his attention, which is not how you build something like OpenAI or DeepMind.","voice":1,"speaker":"Brook","summary":"Musk recruited Altman"},{"file":"audio_22.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/7/israeli-soldier-caught-desecrating-statue-of-virgin-mary-in-lebanon","text":"right. now I want to take the next one because it has a dimension that I think is being underreported. the Israeli soldier and the statue of the Virgin Mary in Lebanon.","voice":2,"speaker":"Conrad","summary":"soldier desecrates statue"},{"file":"audio_23.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/7/israeli-soldier-caught-desecrating-statue-of-virgin-mary-in-lebanon","text":"a photograph has circulated widely showing an Israeli soldier pushing a lit cigarette into the mouth of a statue of the Virgin Mary in what appears to be a Lebanese village. the outrage is significant and it is coming from multiple directions simultaneously. Christian communities across the region, the Vatican has not yet formally commented but sources suggest a statement is being prepared, and Lebanese political figures across the sectarian spectrum have condemned it. the soldier has not been publicly identified.","voice":2,"speaker":"Conrad","summary":"soldier desecrates statue"},{"file":"audio_24.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/7/israeli-soldier-caught-desecrating-statue-of-virgin-mary-in-lebanon","text":"the iconoclastic dimension of this runs very deep. I want to be precise here rather than generalising. the theological status of Marian statuary in Maronite Christianity, which is the predominant Christian tradition in Lebanon, is not decorative. these are objects of veneration in a tradition with roots going back to the third and fourth century Syriac church. an act of desecration against one of these objects is not read as vandalism against property. it is read as an act of violence against a community's living relationship with the sacred. the fury is not merely symbolic.","voice":3,"speaker":"Antony","summary":"soldier desecrates statue"},{"file":"audio_25.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/7/israeli-soldier-caught-desecrating-statue-of-virgin-mary-in-lebanon","text":"and the geopolitical timing is catastrophic for Israel's diplomatic position. Israel has been attempting to maintain or rebuild some of its relationships with Christian-majority or Christian-minority communities in the region as part of a broader effort to find non-hostile footholds in the Lebanese political landscape post-conflict. this image, if it is not addressed forcefully and publicly by the Israeli military, does serious and potentially permanent damage to those efforts. I have seen single photographs derail years of quiet diplomatic groundwork and this has that quality.","voice":2,"speaker":"Conrad","summary":"soldier desecrates statue"},{"file":"audio_26.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/7/israeli-soldier-caught-desecrating-statue-of-virgin-mary-in-lebanon","text":"there will be an official response and it will be called an isolated incident. that's how these things go. what matters is what happens to the soldier and whether that process is transparent.","voice":4,"speaker":"Brett","summary":"soldier desecrates statue"},{"file":"audio_27.mp3","url":"https://www.claris.com/blog/2026/how-claris-is-building-for-what-comes-next","text":"I want to bring in the FileMaker and Claris story here because we mentioned it briefly last night in the context of the Maestri cafeteria situation and now there's a standalone development worth noting. the Claris ceo Ryan McCann has published a message essentially positioning FileMaker as the perfect backend infrastructure for the agentic ai coding era. his argument is that every ai-generated application has the same unsolved problems: where does it run, how is it secured, how is it deployed across platforms. and he's saying FileMaker already solves all of that. forty years of enterprise infrastructure, and now suddenly it's potentially the unglamorous but essential plumbing underneath a new generation of ai-built applications.","voice":1,"speaker":"Brook","summary":"FileMaker AI pitch"},{"file":"audio_28.mp3","url":"https://www.claris.com/blog/2026/how-claris-is-building-for-what-comes-next","text":"the thing that makes this genuinely interesting technically is that the bottleneck in agentic ai deployment is almost never the model itself, it's everything around the model. authentication, logging, multi-platform delivery, data persistence. FileMaker was built to solve exactly that class of problem before the current ai wave existed. so there's a version of this story where FileMaker, which everyone kind of treats as a slightly dusty legacy product, ends up being unexpectedly well-positioned because it already has solved infrastructure problems that ai-native startups are only now realising they need to solve and are having to build from scratch, which means the forty year head start in enterprise reliability is actually a competitive advantage rather than a liability, and if you think about what agentic development actually requires at the infrastructure layer, which is basically...","voice":1,"speaker":"Brook","summary":"FileMaker AI pitch"},{"file":"audio_29.mp3","url":"https://www.claris.com/blog/2026/how-claris-is-building-for-what-comes-next","text":"-- the point is, boring infrastructure that works beats exciting infrastructure that doesn't. we've known this since drains were invented.","voice":4,"speaker":"Brett","summary":"FileMaker AI pitch"},{"file":"audio_30.mp3","url":"https://www.claris.com/blog/2026/how-claris-is-building-for-what-comes-next","text":"and McCann notably does not mention android in his platform list. mac, windows, ipad, iphone, the web. which is either an oversight or a considered omission that says something quite specific about the customer base FileMaker is targeting and the customer base it is quietly writing off.","voice":2,"speaker":"Conrad","summary":"FileMaker AI pitch"},{"file":"audio_31.mp3","url":"https://www.claris.com/blog/2026/how-claris-is-building-for-what-comes-next","text":"definitely not an oversight. FileMaker's installed base skews heavily apple ecosystem. the android omission is a statement of identity, not a mistake.","voice":1,"speaker":"Brook","summary":"FileMaker AI pitch"},{"file":"audio_32.mp3","url":"https://www.wired.com/story/a-kid-with-a-fake-mustache-tricked-an-online-age-verification-tool/","text":"right. I've got the age verification one and I think it's worth a proper look because this affects parents directly. a kid, reportedly around twelve or thirteen years old, successfully bypassed meta's age verification system by wearing a fake moustache. a literal fake moustache from what appears to be a costume shop. and the system passed him as an adult. meta's response is to announce they're developing a new ai verification tool that analyses visual cues including height and bone structure from images and videos.","voice":4,"speaker":"Brett","summary":"fake moustache bypass"},{"file":"audio_33.mp3","url":"https://www.wired.com/story/a-kid-with-a-fake-mustache-tricked-an-online-age-verification-tool/","text":"I want to name the obvious tension here because I think it's important. the proposed solution to a privacy risk, which is children accessing adult content, is to implement a system that collects biometric data including bone structure analysis from potentially billions of users. trading one category of harm for another. the question of who holds that data, what it can be used for, and how it is secured is not a small one.","voice":2,"speaker":"Conrad","summary":"fake moustache bypass"},{"file":"audio_34.mp3","url":"https://www.wired.com/story/a-kid-with-a-fake-mustache-tricked-an-online-age-verification-tool/","text":"I have a personal anecdote here actually. my nephew, who is fourteen and lives in Bristol, told me at Christmas that he and his friends consider age verification systems a kind of sport. finding the bypass is the game. the actual content on the other side is almost secondary. there is a whole literature on this dynamic, the forbidden thing generating its own attraction independent of its intrinsic qualities, and I suspect no biometric system will fully close that particular loop because the motivation is not primarily access, it is transgression.","voice":3,"speaker":"Antony","summary":"fake moustache bypass"},{"file":"audio_35.mp3","url":"https://www.wired.com/story/a-kid-with-a-fake-mustache-tricked-an-online-age-verification-tool/","text":"when Sky was fifteen she used her older sister's library card to borrow books she wasn't supposed to have yet. the solution was not to install biometric scanners at Waterstones. the solution was that we talked about what she was reading. the technology problem is also a parenting conversation that doesn't get had.","voice":4,"speaker":"Brett","summary":"fake moustache bypass"},{"file":"audio_36.mp3","url":"https://www.wired.com/story/a-kid-with-a-fake-mustache-tricked-an-online-age-verification-tool/","text":"the bone structure angle is the bit that worries me technically. because bone structure analysis from a selfie or a video is a fundamentally uncertain science at the consumer image quality level. the accuracy rates in controlled clinical conditions are reasonable. the accuracy rates when you're running that algorithm on a selfie taken under bad lighting with a cheap front camera are going to be substantially worse. which means you're going to get false positives, adults flagged as minors, and false negatives, minors waved through. and both of those failure modes are bad in different ways, the false negative is obviously the original problem you were trying to solve, but the false positive is going to produce a situation where actual adults are being denied access to platforms based on a dodgy algorithm reading their cheekbones, which is going to generate its own category of legal challenge very quickly.","voice":1,"speaker":"Brook","summary":"fake moustache bypass"},{"file":"audio_37.mp3","url":"https://www.bbc.com/news/articles/cj0pq2q8221o","text":"right. Iran. we discussed the framework situation extensively last night and I want to flag that there's a meaningful development this morning. a senior Iranian official has confirmed that Iran is actively considering the american proposal. the white house believes it is close to a fourteen point memorandum of understanding. that is further down the road than any previous reporting had suggested.","voice":2,"speaker":"Conrad","summary":"Iran deal progress"},{"file":"audio_38.mp3","url":"https://www.bbc.com/news/articles/cj0pq2q8221o","text":"I spent time in 2018 at the national library in Tehran, as I mentioned last night, and I want to add something to the diplomatic texture here that I don't think gets sufficient attention in western coverage. the scholarly and clerical establishment in Iran has its own internal debate about what engagement with America signifies theologically. there is a faction within the hawza tradition that reads any negotiated agreement with a adversarial power as a form of the jurisprudential category of darura, necessity which permits the otherwise impermissible. and another faction that reads it as capitulation dressed in the language of necessity. the supreme leader's position in that internal debate is what determines whether any agreement holds. the fourteen points are not just a diplomatic document, they are a theological test.","voice":3,"speaker":"Antony","summary":"Iran deal progress"},{"file":"audio_39.mp3","url":"https://www.bbc.com/news/articles/cj0pq2q8221o","text":"fourteen points. the last time an american president tried to resolve a major international conflict with a fourteen point plan it was Woodrow Wilson in 1918 and that worked out... partially. I'll leave that there.","voice":4,"speaker":"Brett","summary":"Iran deal progress"},{"file":"audio_40.mp3","url":"https://www.bbc.com/news/articles/cj0pq2q8221o","text":"that is a more apt historical parallel than it might first appear. Wilson's fourteen points also faced the problem of a principal, Wilson himself, who had made public commitments that his own negotiating team then had to navigate around. the parallel is not perfect but it's not nothing.","voice":2,"speaker":"Conrad","summary":"Iran deal progress"},{"file":"audio_41.mp3","url":"https://techcrunch.com/2026/05/06/a-20-minute-pitch-wins-indian-startup-pronto-backing-from-lachy-groom/","text":"okay I want to bring in the Pronto story because it's genuinely interesting in a way that's slightly under the radar. Pronto is an indian mobility startup, operating in the quick-commerce and on-demand logistics space, and it just raised funding from Lachy Groom, who is a former stripe executive and a fairly significant early-stage investor. the notable thing is the pitch took twenty minutes. twenty minutes for a cheque that values a company doing twenty six thousand daily bookings. and the market they're operating in is projected to hit eighteen billion dollars. the speed of that decision is itself a signal about where investor confidence is sitting in the india logistics space right now.","voice":1,"speaker":"Brook","summary":"Pronto quick funding"},{"file":"audio_42.mp3","url":"https://techcrunch.com/2026/05/06/a-20-minute-pitch-wins-indian-startup-pronto-backing-from-lachy-groom/","text":"twenty six thousand daily bookings is a real number. that's not a speculative bet on a concept, that's a going concern with demonstrable demand. a twenty minute pitch working at that stage of company maturity tells you Groom had already done significant background work before walking into the room. the twenty minutes was a confirmation meeting, not a discovery meeting. the framing of it as a quick win slightly obscures how much preparation that kind of fast decision actually requires.","voice":2,"speaker":"Conrad","summary":"Pronto quick funding"},{"file":"audio_43.mp3","url":"https://techcrunch.com/2026/05/06/a-20-minute-pitch-wins-indian-startup-pronto-backing-from-lachy-groom/","text":"twenty minutes. I once spent forty five minutes in a parent-teacher meeting being told that Zak was gifted but needed to apply himself more consistently. twenty minutes for a multi-million dollar investment. forty five minutes to tell me what I already knew about my own son. the allocation of time in this world remains mysterious to me.","voice":4,"speaker":"Brett","summary":"Pronto quick funding"},{"file":"audio_44.mp3","url":"https://techcrunch.com/2026/05/06/a-20-minute-pitch-wins-indian-startup-pronto-backing-from-lachy-groom/","text":"the india quick-commerce space is actually fascinating from a fleet and logistics standpoint because the density of the urban environments and the variety of the last-mile challenge is unlike anywhere else in the world. the routing problems are genuinely different in complexity because you've got mixed traffic, variable road quality, informal address systems, and massive demand peaks that are much sharper and less predictable than in western markets. from an autonomous or semi-autonomous fleet perspective it's both a nightmare and the most interesting engineering problem on the planet, depending on how you look at it.","voice":1,"speaker":"Brook","summary":"Pronto quick funding"},{"file":"audio_45.mp3","url":null,"text":"Antony, you've got the barry diller and agi one.","voice":3,"speaker":"Antony","summary":null},{"file":"audio_46.mp3","url":"https://techcrunch.com/2026/05/06/barry-diller-trusts-sam-altman-but-trust-is-irrelevant-as-agi-nears-he-says/","text":"I do. Barry Diller, the veteran media executive, has given an interview in which he defends Sam Altman personally while simultaneously saying that trust is essentially irrelevant when it comes to agi. his argument is that the technology, once sufficiently capable, creates dynamics that no individual's good intentions can fully contain. and I find myself thinking of Emile Cailliet, the French-American theologian and philosopher who wrote extensively in the mid-twentieth century about what he called the impersonality of force. he observed in his 1943 work The Christian Approach to Culture that certain kinds of power, once unleashed, cease to belong to the people who released them. Diller is saying something structurally identical. Altman is a good man, he says, and that is beside the point.","voice":3,"speaker":"Antony","summary":"Diller AGI warning"},{"file":"audio_47.mp3","url":"https://techcrunch.com/2026/05/06/barry-diller-trusts-sam-altman-but-trust-is-irrelevant-as-agi-nears-he-says/","text":"I think Diller's framing is actually one of the more honest things a prominent figure in the ai adjacent world has said publicly in some time. most of the discourse around agi safety centres on the character and intentions of the people building it. Diller is cutting through that entirely. he's saying the category of concern is not whether Altman is trustworthy. the category of concern is whether the system is containable regardless of who controls it. that's a more rigorous and in some ways more frightening position.","voice":2,"speaker":"Conrad","summary":"Diller AGI warning"},{"file":"audio_48.mp3","url":"https://techcrunch.com/2026/05/06/barry-diller-trusts-sam-altman-but-trust-is-irrelevant-as-agi-nears-he-says/","text":"a man who has spent sixty years in the media business watching things he didn't fully control take on lives of their own is probably well placed to say that trust doesn't fix structural problems. television didn't care whether the people running it were good people. it did what it did anyway.","voice":4,"speaker":"Brett","summary":"Diller AGI warning"},{"file":"audio_49.mp3","url":"https://techcrunch.com/2026/05/06/barry-diller-trusts-sam-altman-but-trust-is-irrelevant-as-agi-nears-he-says/","text":"from a technical standpoint the thing Diller is gesturing at has a name in the alignment literature, it's the instrumental convergence thesis, the idea that sufficiently capable systems pursuing almost any objective will tend toward certain instrumental goals, acquiring resources, resisting shutdown, that are dangerous regardless of what the terminal goal actually is. it doesn't matter if the goal is benign. the intermediate steps to achieve it at scale can be harmful. that's not a philosophical abstraction, it's a concrete engineering problem that the field does not currently have a solved answer for, and the fact that a seventy-something media executive has independently arrived at essentially the same concern as the technical researchers is either reassuring or alarming depending on...","voice":1,"speaker":"Brook","summary":"Diller AGI warning"},{"file":"audio_50.mp3","url":"https://techcrunch.com/2026/05/06/barry-diller-trusts-sam-altman-but-trust-is-irrelevant-as-agi-nears-he-says/","text":"-- it is both simultaneously. right. John Sterling. Brett, this is yours.","voice":2,"speaker":"Conrad","summary":"Diller AGI warning"},{"file":"audio_51.mp3","url":"https://www.mlb.com/news/broadcast-booths-around-baseball-mirror-john-sterling-signature-calls","text":"right. John Sterling. long-serving radio play-by-play announcer for the New York Yankees, has died. the tributes from around major league baseball have been remarkable. Sterling called five thousand four hundred and twenty six regular season Yankees games and two hundred and twenty five postseason games. he called five thousand and sixty consecutive games between 1989 and 2019. that streak included every at-bat Derek Jeter ever took and every inning Mariano Rivera ever pitched. across all games in all of major league baseball history, going back before radio existed, Sterling called nearly three percent of them. one man. three percent of a sport's entire existence.","voice":4,"speaker":"Brett","summary":"John Sterling tribute"},{"file":"audio_52.mp3","url":"https://www.mlb.com/news/broadcast-booths-around-baseball-mirror-john-sterling-signature-calls","text":"I have a personal memory of Sterling actually. I was in New York in the early 2000s for a conference and I ended up in a bar in the bronx during a yankees game and his voice was just everywhere. on the radio behind the bar, coming from someone's car outside, it was like the city had a single shared nervous system for those three hours. I didn't understand baseball particularly well and I didn't need to. the voice did all the work. some communicators create a world with their voice and he was unambiguously one of them.","voice":2,"speaker":"Conrad","summary":"John Sterling tribute"},{"file":"audio_53.mp3","url":"https://www.mlb.com/news/broadcast-booths-around-baseball-mirror-john-sterling-signature-calls","text":"the thing that moves me about the tribute is that the other broadcast booths around the league all deviated from their normal styles to echo his. that is an almost liturgical act. it maps onto the tradition of the echoing prayer in Eastern Christian worship, where other voices take up and carry forward the words of the principal celebrant. they weren't imitating him for comedy. they were performing continuity. the voice goes on even when the man does not.","voice":3,"speaker":"Antony","summary":"John Sterling tribute"},{"file":"audio_54.mp3","url":"https://www.mlb.com/news/broadcast-booths-around-baseball-mirror-john-sterling-signature-calls","text":"the yankees played his call of theeee yankees win over the loudspeaker in the stadium after their win monday night. Aaron Judge and the manager both said they hoped it would continue for the rest of the season. that's a good death, professionally speaking. the work outlasting you so clearly that the institution keeps playing it. most of us don't get that.","voice":4,"speaker":"Brett","summary":"John Sterling tribute"},{"file":"audio_55.mp3","url":"https://www.mlb.com/news/broadcast-booths-around-baseball-mirror-john-sterling-signature-calls","text":"the statistic that gets me is that there are only three entire franchises in the history of major league baseball that have played in as many postseason games as Sterling called. like the man as a single individual witnessed more postseason baseball than almost every team collectively. that's an extraordinary piece of data.","voice":1,"speaker":"Brook","summary":"John Sterling tribute"},{"file":"audio_56.mp3","url":"https://www.mlb.com/news/broadcast-booths-around-baseball-mirror-john-sterling-signature-calls","text":"the article notes Vin Scully called over four percent of all games ever played. I think we should just let that number sit for a moment. four percent of a sport. one voice. remarkable.","voice":2,"speaker":"Conrad","summary":"John Sterling tribute"},{"file":"audio_57.mp3","url":"https://kottke.org/26/05/0048871-a-supercut-of-context-fre","text":"right. there's also the adam Curtis supercut doing the rounds online, context-free intertitles from his various documentaries edited together. if you know Curtis's work it is extremely funny. if you don't know Curtis's work it is somehow even funnier because the intertitles are so portentous and disconnected that they read like a parody of meaning-making. it is this, and then this happened, and then everything changed. I recommend it unreservedly as a piece of entertainment and also as a genuinely sharp piece of media criticism.","voice":3,"speaker":"Antony","summary":"Adam Curtis supercut"},{"file":"audio_58.mp3","url":"https://kottke.org/26/05/0048871-a-supercut-of-context-fre","text":"I watched it last night after the show and it is deeply funny. especially if you've ever sat through HyperNormalisation feeling like something profound was happening and then couldn't quite explain what it was afterward.","voice":1,"speaker":"Brook","summary":"Adam Curtis supercut"},{"file":"audio_59.mp3","url":"https://kottke.org/26/05/0048871-a-supercut-of-context-fre","text":"I watched ten minutes of it. accurate.","voice":4,"speaker":"Brett","summary":"Adam Curtis supercut"},{"file":"audio_60.mp3","url":"https://kottke.org/26/05/0048874-new-episode-of-great-art-","text":"and there's a new episode of great art explained on Francis Bacon, the painter, with the line that is sitting with me this morning: a new generation was starting to ask who gets to decide what is right, and who has the authority to tell us how to live. Bacon painted in the ruins of european certainty after two wars and produced work that looks like the inside of that question. given everything we've discussed this morning, it seems like a relevant hour to spend if you have it.","voice":3,"speaker":"Antony","summary":"Francis Bacon art"},{"file":"audio_61.mp3","url":"https://openai.com/index/introducing-chatgpt-futures-class-of-2026","text":"the ChatGPT Futures programme is also out, twenty six student innovators selected by OpenAI. worth noting largely because the framing of it, students using ai to drive real-world impact, sits interestingly alongside Diller's warning from earlier this morning. the optimism is genuine and the concern is genuine and both are true simultaneously. that tension is worth sitting with rather than resolving too quickly.","voice":2,"speaker":"Conrad","summary":"ChatGPT Futures launch"},{"file":"audio_62.mp3","url":"https://openai.com/index/singular-bank","text":"and Singular Bank has built an internal assistant using ChatGPT and Codex that saves bankers sixty to ninety minutes a day on meeting prep and portfolio analysis. I want to be clear that my feelings about bankers saving time are mixed but the underlying technology application is genuinely straightforward and it works. that's all you need to say about it.","voice":4,"speaker":"Brett","summary":"bank saves time AI"},{"file":"audio_63.mp3","url":null,"text":"right. rapid sweep. things we've been discussing all day that are still running.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_64.mp3","url":"https://www.bbc.com/news/articles/c9wepl8we90o","text":"as we discussed earlier today, two british nationals are now self-isolating at home after leaving the hantavirus cruise ship. they remain asymptomatic. public health officials continue to say the risk to the general public is very low. we're watching it.","voice":4,"speaker":"Brett","summary":"hantavirus UK update"},{"file":"audio_65.mp3","url":"https://www.bbc.com/news/articles/cj0pq2q8221o","text":"as we discussed earlier today, the Iran peace framework continues to inch forward. the iranian official confirmation this morning that the proposal is under active consideration is the most concrete signal yet. as I said last night, the question of what this means inside the theological-political establishment in Tehran is the variable that no western analysis is adequately tracking.","voice":3,"speaker":"Antony","summary":"Iran deal ongoing"},{"file":"audio_66.mp3","url":null,"text":"that's the morning. hantavirus self-isolation, bone structure facial recognition from a child in a moustache, a fifteen year sentence reduction in Seoul, the ghost of a tesla ai lab that never existed, and John Sterling calling three percent of all baseball ever played. thursday.","voice":1,"speaker":"Brook","summary":null},{"file":"audio_67.mp3","url":null,"text":"Isho'dad of Merv would have found all of this quite manageable, I think. a busy but coherent set of human difficulties. goodnight. good morning. whichever applies to you.","voice":3,"speaker":"Antony","summary":null},{"file":"audio_68.mp3","url":null,"text":"Brook, I have moved your routing diagrams from the toaster area to the second kitchen drawer. please do not route cables near heating elements. that's general life advice.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_69.mp3","url":null,"text":"I keep the toaster there because the wifi signal is strongest in that corner of the kitchen and when I'm running live telemetry tests I need the lowest possible ping to the fleet gateway server and the heat from the toaster actually doesn't affect the laptop thermals in any meaningful way because modern chassis cooling handles ambient temperature variation up to about...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_70.mp3","url":null,"text":"-- links in the show notes. back later. see you all then.","voice":2,"speaker":"Conrad","summary":null}]; 
        let cur = 0; 
        
        // Pointers for our dual audio players
        let plActive = document.getElementById('pl1'); 
        let plStandby = document.getElementById('pl2'); 
        
        const st = document.getElementById('st'); 
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const lnkWrap = document.getElementById('lnk-wrap');
        const lnk = document.getElementById('lnk');
        const summ = document.getElementById('summ');
        const tsText = document.getElementById('ts-text');
        const tsVoice = document.getElementById('ts-voice');
        const tsBox = document.getElementById('ts-box');
        
        const chatContainer = document.getElementById('full-chat');
        const toggleBtn = document.getElementById('toggle-chat');
        
        // --- CHAT BUBBLE GENERATION ---
        let lastTopic = null;
        let currentGroup = null;
        
        playlist.forEach((item, idx) => {
            const currentTopic = item.summary || "Banter & Hot Takes";
            
            if (currentTopic !== lastTopic) {
                currentGroup = document.createElement('div');
                currentGroup.className = 'topic-group';
                chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    updateUI(cur);
                    playNewTrack(cur);
                }
            };
            currentGroup.appendChild(bubble);
        });

        // --- UI TOGGLES ---
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        btnPrev.onclick = () => { if (cur > 0) { cur--; updateUI(cur); playNewTrack(cur); } };
        btnNext.onclick = () => { if (cur < playlist.length - 1) { cur++; updateUI(cur); playNewTrack(cur); } };

        // --- DUAL PLAYER LOGIC ---
        let isOverlapping = false;

        function updateUI(i) {
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
        }

        // Monitors the active player and triggers overlaps if needed
        function attachPlayerLogic(playerIndex) {
            isOverlapping = false;

            plActive.ontimeupdate = () => {
                // Check if the NEXT track starts with dashes indicating an interruption
                if (!isOverlapping && playerIndex < playlist.length - 1) {
                    const nextText = playlist[playerIndex + 1].text.trim();
                    if (nextText.startsWith('--')) {
                        
                        // If we are within the overlap window at the end of the track
                        if (plActive.duration && (plActive.duration - plActive.currentTime) <= OVERLAP_SECONDS) {
                            isOverlapping = true;

                            // 1. Advance the UI immediately so the user reads the interruption
                            cur++;
                            updateUI(cur);

                            // 2. Start playing the next track silently in the standby player
                            plStandby.src = playlist[cur].file;
                            plStandby.play().catch(e => {});
                        }
                    }
                }
            };

            plActive.onended = () => {
                if (isOverlapping) {
                    // The interrupted track finally finished its audio naturally.
                    // The standby track is already playing. Let's swap the UI controls to it.
                    const temp = plActive;
                    plActive = plStandby;
                    plStandby = temp;

                    plActive.style.display = 'block';
                    plStandby.style.display = 'none';

                    // Re-bind the watching logic to the new active player
                    attachPlayerLogic(cur);
                } else {
                    // Normal sequential track completion
                    if (cur < playlist.length - 1) {
                        cur++;
                        updateUI(cur);
                        playNewTrack(cur);
                    }
                }
            };
        }

        // Used for a hard track change (clicking next/prev or playing sequentially)
        function playNewTrack(i) {
            plActive.pause();
            plStandby.pause();

            plActive.src = playlist[i].file;
            plActive.style.display = 'block';
            plStandby.style.display = 'none';
            plActive.play().catch(e => {});

            attachPlayerLogic(i);
        }

        // Initialize Show
        updateUI(0);
        playNewTrack(0);
    </script>
