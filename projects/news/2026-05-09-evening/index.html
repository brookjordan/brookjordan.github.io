    <script>
        const OVERLAP_SECONDS = 2; // Adjust this to change how early the interruption starts
        const playlist = [{"file":"audio_0.mp3","url":null,"text":"right. saturday evening, ninth of may. we are back.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_1.mp3","url":null,"text":"evening. long day.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_2.mp3","url":null,"text":"I did run that test on the secondary cluster this afternoon, by the way. the results are... genuinely exciting. the latency variance is holding and the comparative dataset is already looking stronger than I expected, which means the pre-print timeline might actually move up, and the domestic router interference angle is becoming a real story in the data because the handshake patterns across different broadband providers are showing something that I don't think anyone has documented systematically before, and if I cross-reference it with the fleet coordination logs from the overnight...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_3.mp3","url":null,"text":"-- glad the test worked. let's do the news.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_4.mp3","url":null,"text":"the evening feed has moved significantly since this morning. we have the reform story from swansea to sunderland which connects directly to our earlier wales and scotland discussion. starmer is under serious internal pressure. we have fresh reporting from gaza and lebanon. the guardian journalist detention in somalia. africa's news influencer ecosystem. nvidia's forty billion in ai equity deals. an instax camera review, of all things. and those are the new stories. we have a couple of ongoing threads to recap at the end.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_5.mp3","url":"https://www.bbc.com/news/articles/cwy2nz4gwj5o?at_medium=RSS&at_campaign=rss","text":"let's go. the reform story first. because this morning we watched them tie with labour in scotland and now there is a piece mapping exactly how they did it across england as well.","voice":4,"speaker":"Brett","summary":"Reform's UK sweep"},{"file":"audio_6.mp3","url":"https://www.bbc.com/news/articles/cwy2nz4gwj5o?at_medium=RSS&at_campaign=rss","text":"the bbc piece traces reform's vote gains from swansea to sunderland and the through-line is not ideology in any sophisticated sense. it is a feeling of being forgotten by both major parties simultaneously. what is striking to me analytically is that reform is winning in places that voted labour for generations and in places that voted tory for generations. it is not picking off one coalition. it is eating from both plates at once.","voice":2,"speaker":"Conrad","summary":"Reform's UK sweep"},{"file":"audio_7.mp3","url":"https://www.bbc.com/news/articles/cwy2nz4gwj5o?at_medium=RSS&at_campaign=rss","text":"this morning I reached for the liber de causis to describe swinney's exhausted legitimacy. for this evening's story I find myself in a much darker corner of the library entirely. there is a fifteenth-century catalan text called the Somni de Joan Joan, a satirical dream-vision by the valencian poet jaume gassull, in which a sleeping narrator witnesses the complete inversion of a social order. the twist is that the inversion is not performed by any single revolutionary force. it happens because both legitimate powers have simultaneously vacated their moral authority and the space simply fills. reform is not a revolution. it is a filling of a vacuum that two parties created together over about twenty years. gassull would not have been surprised.","voice":3,"speaker":"Antony","summary":"Reform's UK sweep"},{"file":"audio_8.mp3","url":"https://www.bbc.com/news/articles/cwy2nz4gwj5o?at_medium=RSS&at_campaign=rss","text":"the geographic distribution in the piece is what gets me. when you map the swing data there is no obvious regional clustering in the way you might expect. it is dispersed. and from a data perspective dispersed swings are actually harder to explain with a single causal story than concentrated ones. it suggests the underlying driver is something that is approximately uniformly distributed across very different local economies and demographic profiles, which points toward something attitudinal rather than material, and the attitudinal explanation would be...","voice":1,"speaker":"Brook","summary":"Reform's UK sweep"},{"file":"audio_9.mp3","url":"https://www.bbc.com/news/articles/cwy2nz4gwj5o?at_medium=RSS&at_campaign=rss","text":"-- the attitudinal explanation is institutional distrust. and it is not new. it has been building since roughly 2008 and every major political shock since then has deepened it rather than resolved it. the interesting question is whether reform can govern that distrust or whether it will eventually consume them too.","voice":2,"speaker":"Conrad","summary":"Reform's UK sweep"},{"file":"audio_10.mp3","url":"https://www.bbc.com/news/articles/cwy2nz4gwj5o?at_medium=RSS&at_campaign=rss","text":"i drove through sunderland a few years back on the way to somewhere else. perfectly decent place. just a place that has watched its options narrow for a long time. you don't need a sophisticated political theory for why they voted the way they voted.","voice":4,"speaker":"Brett","summary":"Reform's UK sweep"},{"file":"audio_11.mp3","url":"https://www.bbc.com/news/articles/cx21e79qqlgo?at_medium=RSS&at_campaign=rss","text":"and this connects directly to starmer. because the kuenssberg piece this evening is quite remarkable in what it is actually saying between its careful lines. even his most loyal ministers are now pushing him to change. that is not commentary. that is a warning from inside the tent.","voice":3,"speaker":"Antony","summary":"Starmer under pressure"},{"file":"audio_12.mp3","url":"https://www.bbc.com/news/articles/cx21e79qqlgo?at_medium=RSS&at_campaign=rss","text":"this morning I said the results in scotland and wales were evidence rather than prediction. kuenssberg's piece tonight is the westminster confirmation. the feedback loop has completed. the electoral damage has translated into internal parliamentary pressure within roughly thirty-six hours. that is a fast transmission.","voice":2,"speaker":"Conrad","summary":"Starmer under pressure"},{"file":"audio_13.mp3","url":"https://www.bbc.com/news/articles/cx21e79qqlgo?at_medium=RSS&at_campaign=rss","text":"there is a genuinely obscure genre of medieval latin political counsel literature sometimes called the speculum principis, the mirror for princes. the most interesting example for this moment is not the famous ones, not the policraticus, but a much lesser-known text, the Compendiloquium de Vitis Illustrium Philosophorum by john of wales, a thirteenth-century franciscan who compiled it for the english court. his central argument is that a ruler who has lost the confidence of his own household has not merely lost an election. he has lost something closer to the capacity for legitimate action itself. and the crucial detail is that john of wales says the signal is never the public catastrophe. the signal is the moment the loyal ministers start giving private counsel that contradicts the public posture. kuenssberg is describing exactly that signal.","voice":3,"speaker":"Antony","summary":"Starmer under pressure"},{"file":"audio_14.mp3","url":"https://www.bbc.com/news/articles/cx21e79qqlgo?at_medium=RSS&at_campaign=rss","text":"if your most loyal people are telling you to change, you should probably change. that is true of a prime minister and it is true of anyone running anything.","voice":4,"speaker":"Brett","summary":"Starmer under pressure"},{"file":"audio_15.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/9/nowhere-left-to-go-gaza-residents-return-to-rubble-after-israeli-strike?traffic_source=rss","text":"i want to move to the middle east stories because they are genuinely serious and I think they belong together. al jazeera has two separate reports this evening. one from gaza, the al-shati refugee camp, where residents are returning to rubble after overnight israeli airstrikes and describing having nowhere left to go. the other is from lebanon, where at least nineteen people have been killed in israeli attacks despite the us-brokered ceasefire that is supposed to be in place.","voice":1,"speaker":"Brook","summary":"Gaza rubble, nowhere left"},{"file":"audio_16.mp3","url":"https://www.aljazeera.com/news/2026/5/9/israeli-attacks-across-lebanon-kill-at-least-19?traffic_source=rss","text":"the lebanon figure is important to sit with. at least nineteen dead. and there is a us-brokered ceasefire nominally active with new talks expected next week. we talked this morning about the russia-ukraine ceasefire being largely a framing device. this ceasefire in lebanon has a similar quality. the diplomatic language and the military reality are operating in completely separate registers.","voice":2,"speaker":"Conrad","summary":"Lebanon strikes, 19 dead"},{"file":"audio_17.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/9/nowhere-left-to-go-gaza-residents-return-to-rubble-after-israeli-strike?traffic_source=rss","text":"the phrase nowhere left to go is the one that will stay with me from today's feed. it has an almost liturgical weight. it appears in the lamentations of al-hariri, the eleventh-century arabic maqamat, in a passage describing the refugees of a destroyed market city who stand at the edge of a road with nothing ahead and nothing behind. al-hariri wrote it as black comedy about a con-man and a vagrant. but the image has entirely escaped its original frame. it is just what displacement looks like. it looked like that in the eleventh century and it looks like that at al-shati camp today.","voice":3,"speaker":"Antony","summary":"Gaza rubble, nowhere left"},{"file":"audio_18.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/9/nowhere-left-to-go-gaza-residents-return-to-rubble-after-israeli-strike?traffic_source=rss","text":"families returning to rubble. children with nowhere to go. you can cover this story with as many ceasefires and diplomatic frameworks as you like. the situation on the ground is people standing in the wreckage of where they lived.","voice":4,"speaker":"Brett","summary":"Gaza rubble, nowhere left"},{"file":"audio_19.mp3","url":"https://www.theguardian.com/global-development/2026/may/09/guardian-reporter-and-colleagues-detained-and-beaten-by-somali-police","text":"i want to do the somalia story because it is important and I don't think it is getting nearly enough attention outside of the guardian. a journalist called mohamed bulbul was reporting on the case of a woman being tortured in a somali prison. he and two colleagues were arrested in a restaurant in mogadishu by what the guardian describes as a us-trained counter-terrorism police unit. they were beaten with pistols and taken in for questioning. they were released in the early hours of this morning.","voice":1,"speaker":"Brook","summary":"Guardian journalist beaten"},{"file":"audio_20.mp3","url":"https://www.theguardian.com/global-development/2026/may/09/guardian-reporter-and-colleagues-detained-and-beaten-by-somali-police","text":"the detail that cannot be overlooked is that the unit involved is described as us-trained. that is not a throwaway line. the united states has invested significantly in building somalia's security architecture as part of its counter-terrorism strategy in the horn of africa. when that architecture is used to beat journalists who are covering allegations of prison torture, the question of what exactly was trained and to what standards becomes very uncomfortable indeed. I have worked in environments where institutional accountability is thin and the phrase us-trained can cover an enormous range of actual practice.","voice":2,"speaker":"Conrad","summary":"Guardian journalist beaten"},{"file":"audio_21.mp3","url":"https://www.theguardian.com/global-development/2026/may/09/guardian-reporter-and-colleagues-detained-and-beaten-by-somali-police","text":"the act of arresting a journalist in a restaurant while he is covering a story about state violence is itself a message. it is meant to be seen. it is meant to be known. there is a term in the literature of medieval islamic jurisprudence, ta'zir, discretionary punishment outside the fixed hadd penalties, which certain jurists debated extensively in terms of its capacity for abuse. ibn al-mulaqqin, the fourteenth-century egyptian scholar, warned that ta'zir administered publicly and visibly was frequently not punishment at all in any judicial sense. it was theatre designed to terrify a community into silence. what happened to bulbul and his colleagues in that restaurant reads exactly like that.","voice":3,"speaker":"Antony","summary":"Guardian journalist beaten"},{"file":"audio_22.mp3","url":"https://www.theguardian.com/global-development/2026/may/09/guardian-reporter-and-colleagues-detained-and-beaten-by-somali-police","text":"the woman allegedly being tortured in prison. that story. that is the story that got these journalists arrested. it should probably be read alongside this one.","voice":4,"speaker":"Brett","summary":"Guardian journalist beaten"},{"file":"audio_23.mp3","url":"https://www.theguardian.com/world/2026/may/09/africa-influencers-news-consumption-social-media","text":"i want to bring the africa news influencer piece because it connects to the somalia story in a way that I think is worth naming. the guardian has a long feature this evening about creators across africa, particularly in south africa, who are reshaping how young people consume news. a woman called amahle-imvelo jaxa posted one tiktok about south african peacekeepers in the congo, explained a presidential argument, assigned different ethnic groups their hypothetical war roles with dry wit, and racked up a hundred thousand followers in three days.","voice":3,"speaker":"Antony","summary":"Africa news influencers"},{"file":"audio_24.mp3","url":"https://www.theguardian.com/world/2026/may/09/africa-influencers-news-consumption-social-media","text":"the connection to the somalia story is real and worth making explicit. traditional news institutions are being beaten in restaurants and their journalists are being arrested. simultaneously a completely different infrastructure for getting information to young audiences is growing independently of those institutions. the two stories are happening in parallel across the same continent. I find that genuinely significant rather than merely ironic.","voice":2,"speaker":"Conrad","summary":"Africa news influencers"},{"file":"audio_25.mp3","url":"https://www.theguardian.com/world/2026/may/09/africa-influencers-news-consumption-social-media","text":"the piece describes jaxa as a professional yapper and current affairs enthusiast, which she uses self-deprecatingly, but the tradition she is actually working in is ancient and has tremendous dignity. there is a west african griot tradition documented by ibn battuta in the fourteenth century during his time in the mali empire, in which officially recognised public narrators held court memory and political interpretation in oral form precisely because written records were inaccessible to most people. the tiktok explainer is not a degraded form of something better. it is the continuation of a narrative information function that has been running for six or seven centuries at minimum.","voice":3,"speaker":"Antony","summary":"Africa news influencers"},{"file":"audio_26.mp3","url":"https://www.theguardian.com/world/2026/may/09/africa-influencers-news-consumption-social-media","text":"from a platform architecture perspective the piece is describing something that is really interesting which is that the influencer model is solving a distribution problem that legacy media never fully cracked in contexts where mobile-first consumption is the norm rather than the exception. the production costs are near zero, the distribution is algorithmic, and the authenticity signal, the watching a cousin feeling that the headline references, that is doing work that a news anchor in a studio genuinely cannot do. and there is a fleet coordination analogy here actually because the decentralised node structure is...","voice":1,"speaker":"Brook","summary":"Africa news influencers"},{"file":"audio_27.mp3","url":"https://www.theguardian.com/world/2026/may/09/africa-influencers-news-consumption-social-media","text":"-- the cousin framing is the right one. people trust people who seem like them. that is not new.","voice":4,"speaker":"Brett","summary":"Africa news influencers"},{"file":"audio_28.mp3","url":"https://techcrunch.com/2026/05/09/nvidia-has-already-committed-40b-to-equity-ai-deals-this-year/","text":"right. so. nvidia. forty billion dollars in equity ai deals this year alone. techcrunch has the number this evening and even by the standards of the current ai funding environment that number is remarkable!!! this is not nvidia selling chips. this is nvidia taking equity stakes in the companies building on its infrastructure. they are becoming a sovereign wealth fund for the ai ecosystem.","voice":1,"speaker":"Brook","summary":"Nvidia's $40B AI bets"},{"file":"audio_29.mp3","url":"https://techcrunch.com/2026/05/09/nvidia-has-already-committed-40b-to-equity-ai-deals-this-year/","text":"the strategic logic is clear and it is worth saying plainly. if nvidia owns equity in the companies consuming its chips, then nvidia profits twice from every ai workload. once on the hardware margin and once on the equity appreciation. it is vertical integration expressed as a financial instrument rather than a corporate structure. I have been watching large technology companies for a long time and the speed at which nvidia has moved from hardware supplier to ecosystem investor is genuinely unusual.","voice":2,"speaker":"Conrad","summary":"Nvidia's $40B AI bets"},{"file":"audio_30.mp3","url":"https://techcrunch.com/2026/05/09/nvidia-has-already-committed-40b-to-equity-ai-deals-this-year/","text":"and the openai deal that techcrunch specifically mentions is the most pointed example because openai is nvidia's single largest customer for compute and now nvidia has equity in openai. the supplier and the customer now have a shared financial interest in each other's valuation. from a market structure perspective that creates some very interesting questions about pricing dynamics and whether the chip pricing that gets offered to openai looks different from what gets offered to competitors who are not equity partners, and the antitrust implications of that if it is happening are genuinely...","voice":1,"speaker":"Brook","summary":"Nvidia's $40B AI bets"},{"file":"audio_31.mp3","url":"https://techcrunch.com/2026/05/09/nvidia-has-already-committed-40b-to-equity-ai-deals-this-year/","text":"forty billion is a lot of money to have committed in five months. i hope their risk team is having a good weekend.","voice":4,"speaker":"Brett","summary":"Nvidia's $40B AI bets"},{"file":"audio_32.mp3","url":"https://techcrunch.com/2026/05/09/nvidia-has-already-committed-40b-to-equity-ai-deals-this-year/","text":"the model nvidia is constructing has a precedent that I find genuinely illuminating. the venetian colleganza, the medieval merchant partnership contract documented extensively in the archive of the rialto notaries from about the twelfth century, was a structure where a sedentary investor provided capital to a traveling merchant in exchange for a fixed equity share of the venture's profits. what made it powerful was that the investor class gradually moved from funding individual voyages to funding the entire network of merchants, becoming the structural bedrock of venetian commercial expansion without ever leaving the city. nvidia is the sedentary investor. the ai ecosystem is the fleet of venetian merchant ships. forty billion dollars is the colleganza writ very large.","voice":3,"speaker":"Antony","summary":"Nvidia's $40B AI bets"},{"file":"audio_33.mp3","url":"https://techcrunch.com/2026/05/09/the-instax-wide-400-builds-on-instant-photographys-simplicity-and-stretches-it-literally/","text":"alright. the instax wide 400. brett is introducing this one because brook sent it to the group chat this afternoon.","voice":4,"speaker":"Brett","summary":"Instax film nostalgia"},{"file":"audio_34.mp3","url":"https://techcrunch.com/2026/05/09/the-instax-wide-400-builds-on-instant-photographys-simplicity-and-stretches-it-literally/","text":"i did send it because I think it is genuinely interesting! fujifilm has a new instax model, the wide 400, and the techcrunch review notes that in a world of ai-generated images and infinite digital storage, instant film is growing in popularity. and that is the counterintuitive bit. the more frictionless and perfect digital imaging becomes, the more people want something that is imperfect and irreversible and physical. the constraint is the appeal.","voice":1,"speaker":"Brook","summary":"Instax film nostalgia"},{"file":"audio_35.mp3","url":"https://techcrunch.com/2026/05/09/the-instax-wide-400-builds-on-instant-photographys-simplicity-and-stretches-it-literally/","text":"I actually have a story here. my daughter was married three years ago and she put a polaroid camera on a table at the reception rather than a digital booth. just the camera and a stack of film. people went absolutely mad for it. there were queues. and the pictures were terrible, technically. blurry, overexposed, slightly the wrong colour. and she has them all in a box and she looks at them all the time. the digital photos from the professional photographer she almost never opens.","voice":2,"speaker":"Conrad","summary":"Instax film nostalgia"},{"file":"audio_36.mp3","url":"https://techcrunch.com/2026/05/09/the-instax-wide-400-builds-on-instant-photographys-simplicity-and-stretches-it-literally/","text":"the paradox Conrad is describing has a precise theological name, though it comes from an unexpected source. the hesychast tradition of byzantine monasticism, and specifically the fourteenth-century debate recorded in the works of gregory palamas, draws a distinction between the uncreated light, the pure divine emanation, and the created image, the imperfect human representation that nevertheless carries genuine presence. palamas argues that the imperfect created image is not a lesser version of the uncreated light. it is a different and irreplaceable thing. the instant photograph is a created image in exactly this sense. it carries presence that the perfect uncreated digital file does not.","voice":3,"speaker":"Antony","summary":"Instax film nostalgia"},{"file":"audio_37.mp3","url":"https://techcrunch.com/2026/05/09/the-instax-wide-400-builds-on-instant-photographys-simplicity-and-stretches-it-literally/","text":"sky used one of these at a birthday party. the kids loved it. i still have the picture on the fridge. it is slightly too dark and everyone's eyes are a bit red. it has been on the fridge for two years.","voice":4,"speaker":"Brett","summary":"Instax film nostalgia"},{"file":"audio_38.mp3","url":"https://techcrunch.com/2026/05/09/the-instax-wide-400-builds-on-instant-photographys-simplicity-and-stretches-it-literally/","text":"and there is actually a really interesting information theory angle here. a digital image is losslessly copyable and losslessly identical across all copies. an instant print is a single physical object. there is exactly one of it. and from an information theoretic perspective scarcity and irreversibility are doing something to the emotional valuation that abundance and reversibility categorically cannot replicate, which is why the instax is not competing with your iphone camera. it is doing a completely different thing that the iphone cannot do at all, and it is the same reason that physical keys and physical signatures retain legal and emotional weight even though digital alternatives are technically more secure in most...","voice":1,"speaker":"Brook","summary":"Instax film nostalgia"},{"file":"audio_39.mp3","url":"https://techcrunch.com/2026/05/09/the-instax-wide-400-builds-on-instant-photographys-simplicity-and-stretches-it-literally/","text":"-- it's a camera. good story.","voice":4,"speaker":"Brett","summary":"Instax film nostalgia"},{"file":"audio_40.mp3","url":null,"text":"right. the rapid sweep. things we have been following all day.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_41.mp3","url":"https://www.aljazeera.com/news/2026/5/9/israeli-attacks-across-lebanon-kill-at-least-19?traffic_source=rss","text":"as we discussed earlier today, the israel-lebanon ceasefire situation. the nineteen dead figure we covered in the headlines confirms what we suspected this morning. the ceasefire is nominal. the strikes have continued. new talks are expected next week but the pattern from both the ukraine ceasefire this morning and this one is the same. the diplomatic timeline and the military timeline are not the same timeline.","voice":4,"speaker":"Brett","summary":"Lebanon ceasefire failing"},{"file":"audio_42.mp3","url":"https://www.wired.com/gallery/best-captioning-glasses/","text":"as we discussed earlier today, the captioning glasses roundup from wired. the technology exists, it works, and the accessibility case for it is real. not much has changed since the morning airing on that one.","voice":1,"speaker":"Brook","summary":"Captioning glasses recap"},{"file":"audio_43.mp3","url":"https://www.wired.com/story/security-news-this-week-hackable-robot-lawnmower-unlocks-a-new-nightmare/","text":"and as we discussed earlier today, the wired security round-up. meta has officially killed encrypted instagram direct messages. the russia school for elite hackers leak is still being picked over by security researchers. and the hackable robot lawnmower remains, of all things, the image that is going to stick from that piece.","voice":2,"speaker":"Conrad","summary":"Security week recap"},{"file":"audio_44.mp3","url":"https://www.bbc.com/news/articles/c626xjq0q0vo?at_medium=RSS&at_campaign=rss","text":"also as we discussed earlier today, putin's victory day speech. the parade was scaled back. the speech was not. the nato framing, the justification of the ukraine operation. the text of it was the same text he has been delivering in different registers for four years. it landed with approximately the weight it was designed to land with, which is to say it was for a domestic audience and it worked for that audience.","voice":3,"speaker":"Antony","summary":"Putin parade recap"},{"file":"audio_45.mp3","url":null,"text":"that is saturday evening. reform ate from both plates in england and it is worth worrying about. starmer's own people are telling him things. nineteen people are dead in lebanon despite a ceasefire. a guardian journalist was beaten for doing his job. nvidia is buying the future with other people's money. a woman in johannesburg explained african geopolitics on tiktok and became famous in three days. and a photograph that is slightly too dark and slightly blurry is still on my fridge. have a good evening.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_46.mp3","url":null,"text":"oh and one more thing. the parker 51. Conrad. ring a nibmeister. I will find you a list of recommended ones. the tine gap adjustment alone is worth it and if the feed on a forty year old pen is still running smoothly that nib has been doing remarkable things unrewarded for decades and it deserves some attention, and honestly the craft of it is exactly the kind of thing that I think is undervalued in a world where we default to replacement over repair, and the sustainability angle on high-quality pen maintenance is actually a really interesting case study in circular economy principles applied to everyday objects, and the carbon footprint of a maintained fountain pen versus a lifetime of disposable biros is something that nobody has done a proper analysis of but I suspect the numbers would be...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_47.mp3","url":null,"text":"-- the diagrams are still in the drawer. good evening.","voice":4,"speaker":"Brett","summary":null}]; 
        let cur = 0; 
        
        // Pointers for our dual audio players
        let plActive = document.getElementById('pl1'); 
        let plStandby = document.getElementById('pl2'); 
        
        const st = document.getElementById('st'); 
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const lnkWrap = document.getElementById('lnk-wrap');
        const lnk = document.getElementById('lnk');
        const summ = document.getElementById('summ');
        const tsText = document.getElementById('ts-text');
        const tsVoice = document.getElementById('ts-voice');
        const tsBox = document.getElementById('ts-box');
        
        const chatContainer = document.getElementById('full-chat');
        const toggleBtn = document.getElementById('toggle-chat');
        
        // --- CHAT BUBBLE GENERATION ---
        let lastTopic = null;
        let currentGroup = null;
        
        playlist.forEach((item, idx) => {
            const currentTopic = item.summary || "Banter & Hot Takes";
            
            if (currentTopic !== lastTopic) {
                currentGroup = document.createElement('div');
                currentGroup.className = 'topic-group';
                chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    updateUI(cur);
                    playNewTrack(cur);
                }
            };
            currentGroup.appendChild(bubble);
        });

        // --- UI TOGGLES ---
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        btnPrev.onclick = () => { if (cur > 0) { cur--; updateUI(cur); playNewTrack(cur); } };
        btnNext.onclick = () => { if (cur < playlist.length - 1) { cur++; updateUI(cur); playNewTrack(cur); } };

        // --- DUAL PLAYER LOGIC ---
        let isOverlapping = false;

        function updateUI(i) {
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
        }

        // Monitors the active player and triggers overlaps if needed
        function attachPlayerLogic(playerIndex) {
            isOverlapping = false;

            plActive.ontimeupdate = () => {
                // Check if the NEXT track starts with dashes indicating an interruption
                if (!isOverlapping && playerIndex < playlist.length - 1) {
                    const nextText = playlist[playerIndex + 1].text.trim();
                    if (nextText.startsWith('--')) {
                        
                        // If we are within the overlap window at the end of the track
                        if (plActive.duration && (plActive.duration - plActive.currentTime) <= OVERLAP_SECONDS) {
                            isOverlapping = true;

                            // 1. Advance the UI immediately so the user reads the interruption
                            cur++;
                            updateUI(cur);

                            // 2. Start playing the next track silently in the standby player
                            plStandby.src = playlist[cur].file;
                            plStandby.play().catch(e => {});
                        }
                    }
                }
            };

            plActive.onended = () => {
                if (isOverlapping) {
                    // The interrupted track finally finished its audio naturally.
                    // The standby track is already playing. Let's swap the UI controls to it.
                    const temp = plActive;
                    plActive = plStandby;
                    plStandby = temp;

                    plActive.style.display = 'block';
                    plStandby.style.display = 'none';

                    // Re-bind the watching logic to the new active player
                    attachPlayerLogic(cur);
                } else {
                    // Normal sequential track completion
                    if (cur < playlist.length - 1) {
                        cur++;
                        updateUI(cur);
                        playNewTrack(cur);
                    }
                }
            };
        }

        // Used for a hard track change (clicking next/prev or playing sequentially)
        function playNewTrack(i) {
            plActive.pause();
            plStandby.pause();

            plActive.src = playlist[i].file;
            plActive.style.display = 'block';
            plStandby.style.display = 'none';
            plActive.play().catch(e => {});

            attachPlayerLogic(i);
        }

        // Initialize Show
        updateUI(0);
        playNewTrack(0);
    </script>
