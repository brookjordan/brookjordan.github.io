    <script>
        const OVERLAP_SECONDS = 2; // Adjust this to change how early the interruption starts
        const playlist = [{"file":"audio_0.mp3","url":null,"text":"evening everyone. Brook, the routing diagrams I put in the second kitchen drawer this morning have somehow migrated back to the toaster. I'm not going to ask.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_1.mp3","url":null,"text":"I needed them there for a cross-reference during a latency test. the toaster corner really is the best signal spot in the flat, I've actually mapped the whole kitchen with a wifi analyser app and there's a clear...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_2.mp3","url":null,"text":"-- thursday evening, seventh of may. good selection of new stories tonight. let's move.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_3.mp3","url":null,"text":"I will say, I spent the afternoon with a rather obscure object, a twelfth century Coptic homiliary from the monastery of Saint Macarius in Wadi El Natrun, and something in it made me unexpectedly well-prepared for at least two of tonight's stories. you'll see what I mean when we get there.","voice":3,"speaker":"Antony","summary":null},{"file":"audio_4.mp3","url":"https://www.aljazeera.com/news/2026/5/7/palestinians-expose-torture-and-sexual-violence-in-israeli-detention?traffic_source=rss","text":"right. I'll start us off on the big one this evening. Palestinians who have been held in Israeli detention are coming forward with detailed accounts of rape, sexual violence, and physical abuse. rights groups and released detainees are describing a systematic pattern. it is a serious and disturbing set of allegations and it is getting significant international attention tonight.","voice":4,"speaker":"Brett","summary":"Israeli detention abuse"},{"file":"audio_5.mp3","url":"https://www.aljazeera.com/news/2026/5/7/palestinians-expose-torture-and-sexual-violence-in-israeli-detention?traffic_source=rss","text":"the word systematic is the one that matters legally here. individual abuse allegations, however serious, sit in a different category from allegations of pattern and practice. what the rights groups are documenting is not a series of isolated incidents. they are describing structures, specific facilities, specific categories of treatment that appear consistently across multiple independent testimonies from people who had no contact with each other during or after detention. that is the evidentiary shape of a war crimes investigation, not a disciplinary matter.","voice":2,"speaker":"Conrad","summary":"Israeli detention abuse"},{"file":"audio_6.mp3","url":"https://www.aljazeera.com/news/2026/5/7/palestinians-expose-torture-and-sexual-violence-in-israeli-detention?traffic_source=rss","text":"I have been sitting with this one for most of the afternoon and the framework I keep returning to is from the Coptic homiliary I mentioned. there is a tradition within Coptic theological anthropology, drawing on Shenoute of Atripe, the fifth century abbot of the White Monastery, that treats the body of the captive as possessing a particular sacred inviolability precisely because it is powerless. Shenoute writes with extraordinary ferocity about those who violate that inviolability. he argues that the body under total control of another is the site where the humanity of the captor is most fully revealed or most fully destroyed. these testimonies are, in that framework, not only an indictment of what was done to the detainees. they are a document of what was done to the people who did it.","voice":3,"speaker":"Antony","summary":"Israeli detention abuse"},{"file":"audio_7.mp3","url":"https://www.aljazeera.com/news/2026/5/7/palestinians-expose-torture-and-sexual-violence-in-israeli-detention?traffic_source=rss","text":"there is also a documentation angle here that I think is genuinely significant. the fact that these accounts are coming out in detail now, in 2026, is partly a function of the infrastructure around survivor testimony having improved enormously. the rights groups involved are using encrypted reporting platforms, corroborating across geographically dispersed former detainees using digital timelines, cross-referencing testimony with satellite imagery of facility locations. the evidentiary quality of what is being compiled is categorically different from what was possible even ten years ago. which means the legal exposure for individuals and institutions named in these testimonies is substantially higher than it would have been in previous conflicts.","voice":1,"speaker":"Brook","summary":"Israeli detention abuse"},{"file":"audio_8.mp3","url":"https://www.aljazeera.com/news/2026/5/7/palestinians-expose-torture-and-sexual-violence-in-israeli-detention?traffic_source=rss","text":"the Israeli military will investigate or say they will investigate. what matters is whether anyone with authority over the facilities in question faces any consequence. that is the only measure that means anything.","voice":4,"speaker":"Brett","summary":"Israeli detention abuse"},{"file":"audio_9.mp3","url":"https://www.aljazeera.com/news/2026/5/7/palestinians-expose-torture-and-sexual-violence-in-israeli-detention?traffic_source=rss","text":"and the international criminal court dimension here is live. the court already has an active investigation. every new corroborated account adds to a body of evidence that prosecutors are actively reviewing. the gap between what is alleged and what is prosecuted in international law is enormous and the reasons for that gap are structural rather than evidentiary. but the evidentiary record being built right now is serious.","voice":2,"speaker":"Conrad","summary":"Israeli detention abuse"},{"file":"audio_10.mp3","url":"https://kottke.org/26/05/rogue-one-the-andor-cut","text":"right, I want to bring this one in because it landed tonight and it is genuinely fascinating from a cinema and technology standpoint simultaneously. there is a fan editor called David Kaylor who has been quietly re-cutting Star Wars films for years, and he has now released a trailer for what he calls the Andor Cut of Rogue One. the premise is simple: Rogue One re-edited from Cassian Andor's perspective rather than Jyn Erso's, and rescored with Andor's soundtrack to shift the tonal register from swashbuckling adventure to the slower, more paranoid, morally serious atmosphere of the series. it is out on the twenty-fifth of May in four-k with five-point-one surround sound.","voice":1,"speaker":"Brook","summary":"Andor Cut Rogue One"},{"file":"audio_11.mp3","url":"https://kottke.org/26/05/rogue-one-the-andor-cut","text":"I watched Rogue One with Cyan and Zak the Christmas it came out. Zak thought Cassian was the most interesting character in it and spent the whole drive home complaining that he didn't get enough of the film. so apparently Zak's been waiting nine years for this cut specifically.","voice":4,"speaker":"Brett","summary":"Andor Cut Rogue One"},{"file":"audio_12.mp3","url":"https://kottke.org/26/05/rogue-one-the-andor-cut","text":"the editorial act Kaylor is performing here has a genuine name in textual scholarship. it is called redaction in the strict sense, not abbreviation but reframing through selection and resequencing. the Deuteronomist did something structurally identical to the earlier source material in the Hebrew Bible, taking existing narrative and applying a new theological and moral lens to the same events by foregrounding different actors and different motivations. what Kaylor is doing to Rogue One is what the Deuteronomist did to the traditions he inherited. the story does not change. the meaning of the story changes entirely because of where you stand when you watch it.","voice":3,"speaker":"Antony","summary":"Andor Cut Rogue One"},{"file":"audio_13.mp3","url":"https://kottke.org/26/05/rogue-one-the-andor-cut","text":"the technical craft involved in this kind of fan edit is actually more demanding than people realise. Kaylor is not just cutting between existing scenes in a different order. he is adjusting colour grading to match Andor's cinematographic palette, which is much cooler and more desaturated than Rogue One's warmer tones. he is integrating a different score not just by swapping tracks but by matching the sonic texture to the scene rhythms. and the audio engineering to maintain dialogue clarity while replacing the underlying musical bed without the original stems is genuinely difficult. it's the kind of work that in a professional context would involve a full post-production suite and a team of people, and he's doing it...","voice":1,"speaker":"Brook","summary":"Andor Cut Rogue One"},{"file":"audio_14.mp3","url":"https://kottke.org/26/05/rogue-one-the-andor-cut","text":"-- the broader point is that Andor's existence has retroactively made Rogue One a more interesting film than it was when it was released. which is a genuinely unusual cultural phenomenon. a prequel enriching its predecessor rather than diminishing it. the causality runs backwards in a way that is philosophically strange if you think about it too hard.","voice":2,"speaker":"Conrad","summary":"Andor Cut Rogue One"},{"file":"audio_15.mp3","url":"https://kottke.org/26/05/rogue-one-the-andor-cut","text":"it is not that strange if you've read much in the way of medieval Syriac commentary tradition. the interpretive tradition frequently made the earlier text richer by placing it in a new chain of meaning. the text did not change. its significance expanded because of everything that came after it. Rogue One is now a different film because Andor exists. the Deuteronomist would have found that entirely natural.","voice":3,"speaker":"Antony","summary":"Andor Cut Rogue One"},{"file":"audio_16.mp3","url":"https://kottke.org/26/05/0048896-lessons-from-the-rise-and","text":"now. America's Reconstruction era. there's a long-form piece out today asking whether the promises of Reconstruction, genuine egalitarian pluralism across lines of race, gender, religion, and wealth, have ever actually been fulfilled, or whether American history is better understood as a recurring cycle of expansion and retrenchment. the question it poses is stark: must America be forever defined by strict hierarchies, or can it realise the promise it has been making to itself for a hundred and fifty years.","voice":2,"speaker":"Conrad","summary":"Reconstruction's lessons"},{"file":"audio_17.mp3","url":"https://kottke.org/26/05/0048896-lessons-from-the-rise-and","text":"the history of Reconstruction is one of the most theologically saturated episodes in American political history and almost nobody talks about it in those terms. the Freedmen's Bureau was explicitly shaped by figures drawing on postmillennialist Protestant theology, the idea that human institutions could be reformed into approximations of the Kingdom on earth before the return of Christ. the collapse of Reconstruction was not merely a political failure. for the people who built it, it was an eschatological catastrophe. the promised thing had arrived and then been unmade by organised violence and political abandonment. the grief encoded in Black American Christianity from the 1870s onward is partly grief about that specific broken promise. W.E.B. Du Bois understood this and wrote about it in ways that almost no secular historian has properly processed.","voice":3,"speaker":"Antony","summary":"Reconstruction's lessons"},{"file":"audio_18.mp3","url":"https://kottke.org/26/05/0048896-lessons-from-the-rise-and","text":"I want to add a personal observation here. I gave a talk in Atlanta in 2019 at a community college, and afterward a retired school teacher in her late seventies told me that her grandmother had been born during Reconstruction and had told her, as a child, what it felt like when the rights were taken back. that is three generations. living memory across three generations reaching back to a political project that was dismantled in the 1870s. the timeline of American racial history is not as long as it is often presented as being.","voice":2,"speaker":"Conrad","summary":"Reconstruction's lessons"},{"file":"audio_19.mp3","url":"https://kottke.org/26/05/0048896-lessons-from-the-rise-and","text":"the question the piece asks, must America be forever defined by this, is one that only gets answered by what happens next. not by the essay. what happens next is the answer.","voice":4,"speaker":"Brett","summary":"Reconstruction's lessons"},{"file":"audio_20.mp3","url":"https://www.wired.com/story/you-can-disable-gemini-in-chrome-if-its-freaking-you-out/","text":"right. I'm taking the Google Gemini in Chrome story because this is directly in my world. so Chrome users this week discovered that a four gigabyte Google ai model called Gemini Nano has been silently installed into Chrome as part of a browser update. most people had no idea it was there. it is running locally on their machine, using their storage, potentially accessing their browsing context. the good news is you can remove it. the concerning news is that Google's own guidance suggests you might not want to because removing it disables certain safety features that use the model to detect scams and phishing in real time.","voice":1,"speaker":"Brook","summary":"Gemini in Chrome"},{"file":"audio_21.mp3","url":"https://www.wired.com/story/you-can-disable-gemini-in-chrome-if-its-freaking-you-out/","text":"four gigabytes installed without asking. on anyone's laptop in this house, that conversation would be had. I don't care if it's detecting phishing. you ask first.","voice":4,"speaker":"Brett","summary":"Gemini in Chrome"},{"file":"audio_22.mp3","url":"https://www.wired.com/story/you-can-disable-gemini-in-chrome-if-its-freaking-you-out/","text":"the consent architecture here is genuinely problematic. and I want to be technically precise about why. running a four gigabyte model locally is actually a privacy-positive approach in principle, because local inference means your data doesn't leave your device to a cloud server. that's the argument Google is making and it's not wrong on its face. the problem is that the model was installed without meaningful disclosure, and the framing of its removal as potentially harmful to your own security is a classic dark pattern. you're being told you need this thing that you didn't consent to acquiring. and the integration with the browser's access to your browsing context means that even if the model runs locally, the question of what data it can access and how that shapes its outputs is not fully answered by Google's current documentation, which leaves open a whole category of questions about what the model is...","voice":1,"speaker":"Brook","summary":"Gemini in Chrome"},{"file":"audio_23.mp3","url":"https://www.wired.com/story/you-can-disable-gemini-in-chrome-if-its-freaking-you-out/","text":"-- the consent framing is the one I'd push back on slightly, not to defend Google but to make it precise. the real problem is not that the model was installed without a popup. popups do not constitute meaningful consent and everyone knows it. the real problem is that the capability was added to a piece of infrastructure that most people treat as neutral plumbing, with no public debate about what it means for a browser to contain an active ai model with access to your browsing context as a default state. that is a change to the nature of what a browser is, and it happened without that conversation.","voice":2,"speaker":"Conrad","summary":"Gemini in Chrome"},{"file":"audio_24.mp3","url":"https://www.wired.com/story/you-can-disable-gemini-in-chrome-if-its-freaking-you-out/","text":"there is a concept in the Canon law tradition, specifically in the decretist commentary on Gratian's Decretum from the twelfth century, called tacitus consensus, tacit consent, which was used to argue that ongoing participation in an institution constitutes agreement with its governing rules even without explicit assent. Google is essentially operating on a tacit consensus model. you continue using Chrome, therefore you consent to what Chrome now is. the decretists were very careful to limit that principle to cases where the new rule was publicly promulgated and the participant had genuine freedom to exit. neither of those conditions fully applies to someone who uses Chrome because it is the dominant browser and has no realistic alternative.","voice":3,"speaker":"Antony","summary":"Gemini in Chrome"},{"file":"audio_25.mp3","url":"https://www.wired.com/story/you-can-disable-gemini-in-chrome-if-its-freaking-you-out/","text":"I use Firefox. have done for years. not for any principled reason. I just found it first and never changed. sometimes that's enough.","voice":4,"speaker":"Brett","summary":"Gemini in Chrome"},{"file":"audio_26.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/7/kenyan-villagers-sue-bp-over-pollution-from-1980s-oil-exploration?traffic_source=rss","text":"I want to bring in the Kenyan BP lawsuit because it deserves more airtime than it is likely to get. villagers in Kenya are suing British Petroleum over pollution left by Amoco's oil exploration activities in the 1980s. toxic contamination that has sat in their land for forty years. Amoco was acquired by BP in 1998, which is the basis for the liability claim. the case is being brought in British courts.","voice":3,"speaker":"Antony","summary":"Kenya BP lawsuit"},{"file":"audio_27.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/7/kenyan-villagers-sue-bp-over-pollution-from-1980s-oil-exploration?traffic_source=rss","text":"I find the timeline here the most striking thing. the contamination happened in the 1980s. the community has been living with the consequences for four decades. the legal mechanism that makes the case possible in a British court is the acquisition that happened in 1998, almost ten years after the damage was done. the pathway to any form of accountability is this long and this indirect. and yet the case exists, which is itself significant, because twenty years ago it almost certainly would not have been arguable in a British jurisdiction at all.","voice":2,"speaker":"Conrad","summary":"Kenya BP lawsuit"},{"file":"audio_28.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/7/kenyan-villagers-sue-bp-over-pollution-from-1980s-oil-exploration?traffic_source=rss","text":"there is a concept in Ethiopian Orthodox jurisprudential tradition, the Fetha Nagast, the Law of the Kings, compiled in the thirteenth century and drawing on Byzantine and Coptic sources, which holds that harm done to the earth visited upon a community is a harm done to all subsequent generations of that community, not merely to those living at the time. the people suing BP are not only representing themselves. in that framework they are representing everyone who has lived on that land since the 1980s and everyone who will live there after the case concludes. that is a different conception of standing than British tort law currently recognises, but it is not an incoherent one.","voice":3,"speaker":"Antony","summary":"Kenya BP lawsuit"},{"file":"audio_29.mp3","url":"https://www.aljazeera.com/video/newsfeed/2026/5/7/kenyan-villagers-sue-bp-over-pollution-from-1980s-oil-exploration?traffic_source=rss","text":"BP will argue Amoco is a separate legal entity and the corporate chain of liability doesn't fully extend. that argument has worked before in similar cases. whether it works here depends on the specific acquisition terms and the British court's appetite for closing that gap. it will take years regardless.","voice":4,"speaker":"Brett","summary":"Kenya BP lawsuit"},{"file":"audio_30.mp3","url":"https://techcrunch.com/2026/05/07/gusto-hits-1b-revenue-a-figure-that-brings-it-closer-to-public-markets/","text":"okay, I'm genuinely excited about this one. Gusto, the payroll and hr software company, has hit one billion dollars in actual revenue. not annualised run rate, not projected, not arr. real cash in the door over twelve months. one billion. and the significance of that distinction is massive in the current market because the era of inflating arr numbers to make growth stories look better than they are has made investors deeply suspicious of any number that isn't actual recognised revenue. Gusto is saying here is the real number and it is a billion dollars, which puts them in a serious position to go public.","voice":1,"speaker":"Brook","summary":"Gusto hits $1B"},{"file":"audio_31.mp3","url":"https://techcrunch.com/2026/05/07/gusto-hits-1b-revenue-a-figure-that-brings-it-closer-to-public-markets/","text":"the decision to lead with actual revenue rather than arr is itself a strategic communication choice and I think it's worth noting why it matters right now specifically. the ipo window has been essentially closed or very narrow for the last two years. companies that want to open that window need to signal a kind of financial seriousness that the growth-at-all-costs era actively discouraged. Gusto is positioning itself as the kind of company that exists in the real world with real numbers, which is precisely what the current public market appetite is looking for.","voice":2,"speaker":"Conrad","summary":"Gusto hits $1B"},{"file":"audio_32.mp3","url":"https://techcrunch.com/2026/05/07/gusto-hits-1b-revenue-a-figure-that-brings-it-closer-to-public-markets/","text":"payroll software. nobody thinks it's exciting but if you run a small business and the payroll software breaks, nothing else matters. boring and essential is a very good place to be.","voice":4,"speaker":"Brett","summary":"Gusto hits $1B"},{"file":"audio_33.mp3","url":"https://techcrunch.com/2026/05/07/gusto-hits-1b-revenue-a-figure-that-brings-it-closer-to-public-markets/","text":"Gusto's market is specifically small and medium businesses in the US, which is the segment that the big enterprise payroll players like Workday have historically underserved because the implementation complexity and cost of those platforms makes them impractical for a company with fifteen employees. Gusto built something genuinely usable at that scale and then scaled it into a billion dollar business by solving a problem that was hiding in plain sight. it's actually a really clean product story, the infrastructure plumbing that everyone needs and nobody glamorous is competing on.","voice":1,"speaker":"Brook","summary":"Gusto hits $1B"},{"file":"audio_34.mp3","url":"https://techcrunch.com/2026/05/07/openai-introduces-new-trusted-contact-safeguard-for-cases-of-possible-self-harm/","text":"now. OpenAI's new trusted contact feature for ChatGPT. Brook, this is yours to introduce.","voice":2,"speaker":"Conrad","summary":"OpenAI self-harm safeguard"},{"file":"audio_35.mp3","url":"https://techcrunch.com/2026/05/07/openai-introduces-new-trusted-contact-safeguard-for-cases-of-possible-self-harm/","text":"right. so OpenAI has added a feature to ChatGPT where users can designate a trusted contact, essentially someone who will be notified if the conversation turns toward self-harm in a way that the model identifies as a genuine risk signal rather than academic or fictional discussion. it is opt-in. the user has to set it up themselves. and the model uses a combination of context signals to determine when to prompt the user to reach out to their contact or to crisis resources.","voice":1,"speaker":"Brook","summary":"OpenAI self-harm safeguard"},{"file":"audio_36.mp3","url":"https://techcrunch.com/2026/05/07/openai-introduces-new-trusted-contact-safeguard-for-cases-of-possible-self-harm/","text":"I want to sit with the theological weight of what is actually being proposed here. the trusted contact is, functionally, a designated witness. in the tradition of the Desert Fathers and particularly the writings of Abba Poemen collected in the Apophthegmata Patrum, the practice of spiritual direction was built around exactly this structure: a person in darkness designating in advance another person who holds the authority and the obligation to speak when the darkness becomes dangerous. the innovation is not the concept. the concept is ancient. the innovation is that the intermediary between the soul in crisis and the witness is now a language model.","voice":3,"speaker":"Antony","summary":"OpenAI self-harm safeguard"},{"file":"audio_37.mp3","url":"https://techcrunch.com/2026/05/07/openai-introduces-new-trusted-contact-safeguard-for-cases-of-possible-self-harm/","text":"and I'd note from direct experience that this kind of feature will live or die on calibration. I spent several years running public workshops on digital wellbeing and the consistent finding was that over-intervention is as damaging as under-intervention. if the model flags too readily it trains users to avoid honest expression. if it flags too rarely it fails at its core purpose. finding that threshold is genuinely hard and OpenAI has not been particularly transparent about how it has been determined.","voice":2,"speaker":"Conrad","summary":"OpenAI self-harm safeguard"},{"file":"audio_38.mp3","url":"https://techcrunch.com/2026/05/07/openai-introduces-new-trusted-contact-safeguard-in-cases-of-possible-self-harm/","text":"I think it is better that it exists than that it doesn't. the implementation questions are real but they come after the basic decision that this is a problem worth trying to address. that decision is the right one.","voice":4,"speaker":"Brett","summary":"OpenAI self-harm safeguard"},{"file":"audio_39.mp3","url":"https://techcrunch.com/2026/05/07/openai-introduces-new-trusted-contact-safeguard-for-cases-of-possible-self-harm/","text":"the detection accuracy question is the one that keeps me up at night technically, to be honest. distinguishing between someone writing a story that involves a character considering self-harm, someone researching the topic academically, and someone expressing genuine distress is an extraordinarily subtle natural language problem. the false positive rate for a feature like this has real consequences. someone who tells their partner they were flagged by ChatGPT while writing a short story has to navigate that conversation. that's not trivial. and the false negative consequences are obviously far more serious. I genuinely don't know how OpenAI has tuned this and they haven't published the methodology, which is a gap that matters given what is at stake.","voice":1,"speaker":"Brook","summary":"OpenAI self-harm safeguard"},{"file":"audio_40.mp3","url":null,"text":"right. rapid sweep. stories we've been tracking all day.","voice":2,"speaker":"Conrad","summary":null},{"file":"audio_41.mp3","url":"https://www.theguardian.com/world/2026/may/07/two-britons-evacuated-hantavirus-hit-ship-improving-hospital","text":"as we discussed earlier today, the hantavirus situation on the cruise ship continues. the two britons who were evacuated are reportedly improving in hospital, one in Johannesburg, one in the Netherlands. the who has confirmed this is not the start of a new pandemic. hantavirus does not spread the way covid did and the public risk remains low. good news where we can find it.","voice":4,"speaker":"Brett","summary":"Hantavirus update"},{"file":"audio_42.mp3","url":"https://firstthings.com/abortion-pills-head-to-the-supreme-court/","text":"as we discussed earlier today, the abortion pill battle in the United States is heading to the Supreme Court in earnest. the Fifth Circuit ruled against mail-order access, Justice Alito issued a stay restoring access until at least the eleventh of May, and the two pharmaceutical companies involved are now petitioning for emergency relief. the gap opening up between the pro-life movement and the Trump administration on this specific question, with figures like Marjorie Dannenfelser now publicly saying Trump is the problem, is the political story underneath the legal story and it is significant.","voice":3,"speaker":"Antony","summary":"Abortion pill court"},{"file":"audio_43.mp3","url":"https://www.bbc.com/news/articles/cwy2d0v3p2po?at_medium=RSS&at_campaign=rss","text":"as we discussed earlier today, Germany's finance minister has called the Iran war irresponsible and blamed it directly for Germany's economic slowdown. that framing, a major European ally using the word irresponsible publicly about an active American military operation, is not diplomatic language. it is quite pointed and it reflects a fracture in the transatlantic relationship that is going to get more visible as the economic effects of the conflict on European energy markets continue to develop.","voice":1,"speaker":"Brook","summary":"Germany vs Iran war"},{"file":"audio_44.mp3","url":"https://www.bbc.com/news/articles/c0m2wjlkzplo?at_medium=RSS&at_campaign=rss","text":"and as we discussed this morning, the UK immigration officer among those convicted of working for Chinese intelligence. Chi Leung Wai used the immigration database to track Hong Kong dissidents living in the United Kingdom. that case concluded today with a guilty verdict and it is a serious domestic counterintelligence matter that deserves more sustained attention than it has received in the evening coverage. the full implications for how we think about insider threat within public sector data systems are not small.","voice":2,"speaker":"Conrad","summary":"UK Chinese spy"},{"file":"audio_45.mp3","url":null,"text":"that's the evening. israeli detention allegations, a fan editor redeeming Rogue One, Gemini hiding in your browser, a billion dollars in honest payroll revenue, OpenAI trying to protect people having bad conversations, and a Kenyan village still living with the 1980s. thursday.","voice":4,"speaker":"Brett","summary":null},{"file":"audio_46.mp3","url":null,"text":"Abba Poemen, Shenoute of Atripe, the Fetha Nagast, and the Deuteronomist all made surprise appearances. I consider that a good evening's work. goodnight.","voice":3,"speaker":"Antony","summary":null},{"file":"audio_47.mp3","url":null,"text":"I'm going to go and move my routing diagrams back to the toaster corner. they were in exactly the right place for the wifi signal and I have a fleet telemetry run scheduled at nine that absolutely requires low latency and the kitchen drawer is a full three metres from the router which at that distance introduces measurable packet...","voice":1,"speaker":"Brook","summary":null},{"file":"audio_48.mp3","url":null,"text":"-- drawer. goodnight everyone.","voice":4,"speaker":"Brett","summary":null}]; 
        let cur = 0; 
        
        // Pointers for our dual audio players
        let plActive = document.getElementById('pl1'); 
        let plStandby = document.getElementById('pl2'); 
        
        const st = document.getElementById('st'); 
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const lnkWrap = document.getElementById('lnk-wrap');
        const lnk = document.getElementById('lnk');
        const summ = document.getElementById('summ');
        const tsText = document.getElementById('ts-text');
        const tsVoice = document.getElementById('ts-voice');
        const tsBox = document.getElementById('ts-box');
        
        const chatContainer = document.getElementById('full-chat');
        const toggleBtn = document.getElementById('toggle-chat');
        
        // --- CHAT BUBBLE GENERATION ---
        let lastTopic = null;
        let currentGroup = null;
        
        playlist.forEach((item, idx) => {
            const currentTopic = item.summary || "Banter & Hot Takes";
            
            if (currentTopic !== lastTopic) {
                currentGroup = document.createElement('div');
                currentGroup.className = 'topic-group';
                chatContainer.appendChild(currentGroup);
                
                const header = document.createElement('div');
                header.className = 'topic-header';
                header.innerText = currentTopic;
                currentGroup.appendChild(header);
                
                lastTopic = currentTopic;
            }

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + item.voice;
            bubble.id = 'chat-msg-' + idx;
            bubble.innerHTML = '<div class="chat-label">' + item.speaker + '</div>' + item.text;
            
            bubble.onclick = () => {
                if (cur !== idx) {
                    cur = idx;
                    updateUI(cur);
                    playNewTrack(cur);
                }
            };
            currentGroup.appendChild(bubble);
        });

        // --- UI TOGGLES ---
        toggleBtn.onclick = () => {
            const isVis = chatContainer.classList.toggle('visible');
            toggleBtn.innerText = isVis ? 'Hide Transcript' : 'Show Full Transcript';
            tsBox.style.display = isVis ? 'none' : 'block';

            if (isVis) {
                const activeBubble = document.getElementById('chat-msg-' + cur);
                if (activeBubble) activeBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        btnPrev.onclick = () => { if (cur > 0) { cur--; updateUI(cur); playNewTrack(cur); } };
        btnNext.onclick = () => { if (cur < playlist.length - 1) { cur++; updateUI(cur); playNewTrack(cur); } };

        // --- DUAL PLAYER LOGIC ---
        let isOverlapping = false;

        function updateUI(i) {
            if (i >= playlist.length) {
                st.innerText = 'Broadcast Ended';
                tsText.innerText = 'See you tomorrow!';
                tsVoice.innerText = '';
                lnkWrap.classList.remove('visible');
                btnNext.disabled = true;
                return;
            } 
            
            btnPrev.disabled = (i === 0);
            btnNext.disabled = (i >= playlist.length - 1);

            const t = playlist[i]; 
            st.innerText = 'Segment ' + (i + 1) + ' of ' + playlist.length;
            
            tsText.innerText = t.text;
            tsVoice.innerText = t.speaker;
            tsBox.className = 'transcript-box ' + t.voice;

            document.querySelectorAll('.chat-bubble').forEach((b, idx) => {
                if (idx === i) {
                    b.classList.add('active');
                    if (chatContainer.classList.contains('visible')) {
                        b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    b.classList.remove('active');
                }
            });

            if (t.url) { 
                lnk.href = t.url; 
                if (t.summary) {
                    summ.innerText = t.summary;
                    summ.style.display = 'block';
                } else {
                    summ.style.display = 'none';
                }
                lnkWrap.classList.add('visible'); 
            } else { 
                lnkWrap.classList.remove('visible'); 
            } 
        }

        // Monitors the active player and triggers overlaps if needed
        function attachPlayerLogic(playerIndex) {
            isOverlapping = false;

            plActive.ontimeupdate = () => {
                // Check if the NEXT track starts with dashes indicating an interruption
                if (!isOverlapping && playerIndex < playlist.length - 1) {
                    const nextText = playlist[playerIndex + 1].text.trim();
                    if (nextText.startsWith('--')) {
                        
                        // If we are within the overlap window at the end of the track
                        if (plActive.duration && (plActive.duration - plActive.currentTime) <= OVERLAP_SECONDS) {
                            isOverlapping = true;

                            // 1. Advance the UI immediately so the user reads the interruption
                            cur++;
                            updateUI(cur);

                            // 2. Start playing the next track silently in the standby player
                            plStandby.src = playlist[cur].file;
                            plStandby.play().catch(e => {});
                        }
                    }
                }
            };

            plActive.onended = () => {
                if (isOverlapping) {
                    // The interrupted track finally finished its audio naturally.
                    // The standby track is already playing. Let's swap the UI controls to it.
                    const temp = plActive;
                    plActive = plStandby;
                    plStandby = temp;

                    plActive.style.display = 'block';
                    plStandby.style.display = 'none';

                    // Re-bind the watching logic to the new active player
                    attachPlayerLogic(cur);
                } else {
                    // Normal sequential track completion
                    if (cur < playlist.length - 1) {
                        cur++;
                        updateUI(cur);
                        playNewTrack(cur);
                    }
                }
            };
        }

        // Used for a hard track change (clicking next/prev or playing sequentially)
        function playNewTrack(i) {
            plActive.pause();
            plStandby.pause();

            plActive.src = playlist[i].file;
            plActive.style.display = 'block';
            plStandby.style.display = 'none';
            plActive.play().catch(e => {});

            attachPlayerLogic(i);
        }

        // Initialize Show
        updateUI(0);
        playNewTrack(0);
    </script>
